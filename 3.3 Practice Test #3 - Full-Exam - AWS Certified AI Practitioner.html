 two options contradict the explanation provided above, so these are incorrect.</p>\n\n<p><strong>Amazon Q Business never allows the end users to upload files in chat to generate responses from those uploaded files</strong> - Amazon Q Business lets you control whether end users can upload files in chat to generate responses from uploaded files.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/amazonq/latest/qbusiness-ug/guardrails.html\">https://docs.aws.amazon.com/amazonq/latest/qbusiness-ug/guardrails.html</a></p>\n\n<p><a href=\"https://docs.aws.amazon.com/amazonq/latest/qbusiness-ug/guardrails-concepts.html\">https://docs.aws.amazon.com/amazonq/latest/qbusiness-ug/guardrails-concepts.html</a></p>\n","answers":["<p>Amazon Q Business chat responses can be generated using model knowledge and enterprise data, or enterprise data only</p>","<p>Amazon Q Business chat responses can be generated using only model knowledge</p>","<p>Amazon Q Business never allows the end users to upload files in chat to generate responses from those uploaded files</p>","<p>Amazon Q Business guardrails support topic-specific controls to determine the web application environment's behavior when it encounters a mention of a blocked topic by an end-user</p>","<p>Amazon Q Business guardrails do not support topic-specific controls to determine the web application environment's behavior when it encounters a mention of a blocked topic by an end-user</p>"]},"correct_response":["a","d"],"section":"Applications of Foundation Models","question_plain":"A financial services company is exploring Amazon Q Business to automate reporting and streamline business insights across departments. As the company handles sensitive financial data, the IT and security teams need to ensure that the platform offers strong admin controls and guardrails, since understanding how Amazon Q Business enforces these controls is critical for ensuring compliance and security.\n\nWhat do you recommend to the company regarding admin controls and guardrails in Amazon Q Business? (Select two)","related_lectures":[]},{"_class":"assessment","id":96321725,"assessment_type":"multiple-choice","prompt":{"question":"<p>A healthcare company has deployed a machine learning model using Amazon SageMaker to predict patient health outcomes based on various clinical parameters. A data analyst at the company inputs new patient data, such as age, blood pressure, and cholesterol levels, into the SageMaker model to receive a prediction on the likelihood of a cardiovascular event. The analyst needs to understand the specific term for this process, where the trained model uses its learned patterns to provide a prediction or output based on new input data.</p>\n\n<p>What is this term called?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>This process is called inference, where the model uses its trained parameters to generate a prediction or output based on new input data provided by the user</strong></p>\n\n<p>Inference is the correct term for this process. It refers to the stage where a trained machine learning model is deployed to make predictions or generate outputs based on new input data. During inference, the model uses the patterns and relationships it learned during training to provide accurate and meaningful results. In this scenario, the user sends input data to the SageMaker model, which then performs inference to generate the corresponding output or prediction.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>This process is known as training, which involves using labeled data to adjust the model's parameters so it can generate a prediction or output based on new input data provided by the user</strong> - Training is the process of teaching a machine learning model to recognize patterns by adjusting its internal parameters based on a labeled dataset. During training, the model learns from data by minimizing errors and improving accuracy. However, the scenario described does not involve modifying the model’s parameters; it only involves using the trained model to make predictions, making \"training\" an incorrect choice.</p>\n\n<p><strong>This process is referred to as validation, here the model uses its trained parameters to generate a prediction or output based on new input data provided by the user</strong> - Validation is a step used to evaluate and fine-tune the model during the training process by checking its performance on a validation dataset, which is separate from the training dataset. The purpose is to optimize the model's hyperparameters and prevent overfitting. Since the scenario involves using the model to predict outcomes from new input data, rather than evaluating or fine-tuning it, \"validation\" is not the correct term.</p>\n\n<p><strong>This process is called testing, which involves assessing the model's final performance on an unseen dataset after training is complete to estimate its generalization ability to predict an output</strong> - Testing is the final evaluation phase of a model, where its performance is assessed on an unseen test dataset after the training and validation phases are complete. It provides an unbiased estimate of the model’s generalization ability to new data. However, in the given scenario, the focus is on generating predictions from a model already trained, rather than testing its performance, so \"testing\" is not the correct answer.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/sagemaker/latest/dg/deploy-model.html\">https://docs.aws.amazon.com/sagemaker/latest/dg/deploy-model.html</a></p>\n\n<p><a href=\"https://aws.amazon.com/blogs/machine-learning/create-train-test-and-validation-splits-on-your-data-for-machine-learning-with-amazon-sagemaker-data-wrangler/\">https://aws.amazon.com/blogs/machine-learning/create-train-test-and-validation-splits-on-your-data-for-machine-learning-with-amazon-sagemaker-data-wrangler/</a></p>\n","answers":["<p>This process is known as training, which involves using labeled data to adjust the model's parameters so it can generate a prediction or output based on new input data provided by the user</p>","<p>This process is called inference, where the model uses its trained parameters to generate a prediction or output based on new input data provided by the user</p>","<p>This process is referred to as validation, here the model uses its trained parameters to generate a prediction or output based on new input data provided by the user</p>","<p>This process is called testing, which involves assessing the model's final performance on an unseen dataset after training is complete to estimate its generalization ability to predict an output</p>"]},"correct_response":["b"],"section":"Fundamentals of AI and ML","question_plain":"A healthcare company has deployed a machine learning model using Amazon SageMaker to predict patient health outcomes based on various clinical parameters. A data analyst at the company inputs new patient data, such as age, blood pressure, and cholesterol levels, into the SageMaker model to receive a prediction on the likelihood of a cardiovascular event. The analyst needs to understand the specific term for this process, where the trained model uses its learned patterns to provide a prediction or output based on new input data.\n\nWhat is this term called?","related_lectures":[]},{"_class":"assessment","id":96321723,"assessment_type":"multiple-choice","prompt":{"question":"<p>A research lab is exploring various generative AI models for its project on creating realistic images and data simulations. The lab is particularly interested in diffusion models but needs a clear understanding of how these models work. Gaining insights into the mechanism behind diffusion models will help the lab decide whether this approach is suitable for their data generation needs.</p>\n\n<p>What do you recommend to the lab regarding the capabilities of diffusion models?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Diffusion models create new data by iteratively making controlled random changes to an initial data sample</strong></p>\n\n<p>Diffusion models work by first corrupting data with noise through a forward diffusion process and then learning to reverse this process to denoise the data. They use neural networks to predict and remove the noise step by step, ultimately generating new, structured data from random noise.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt3-q21-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/what-is/generative-ai/\">https://aws.amazon.com/what-is/generative-ai/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Diffusion models are a type of transformer-based models that use a self-attention mechanism</strong> - The transformer-based generative AI model builds upon the encoder and decoder concepts of VAEs. Transformer-based models add more layers to the encoder to improve performance on text-based tasks like comprehension, translation, and creative writing. Transformer-based models use a self-attention mechanism. They weigh the importance of different parts of an input sequence when processing each element in the sequence. Diffusion models are not a type of transformer-based models.</p>\n\n<p><strong>Diffusion models work by learning a compact representation of data called latent space</strong> - Variational autoencoders (VAEs) learn a compact representation of data called latent space. You can think of it as a unique code representing the data based on all its attributes. VAEs use two neural networks—the encoder and the decoder. The encoder neural network maps the input data to a mean and variance for each dimension of the latent space. The decoder neural network takes this sampled point from the latent space and reconstructs it back into data that resembles the original input.</p>\n\n<p><strong>Diffusion models work by training two neural networks in a competitive manner</strong> - Generative Adversarial Networks (GANs) work by training two neural networks in a competitive manner. GANs work by training two neural networks in a competitive manner. The first network, known as the generator, generates fake data samples by adding random noise. The second network called the discriminator, tries to distinguish between real data and the fake data produced by the generator.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://aws.amazon.com/what-is/generative-ai/\">https://aws.amazon.com/what-is/generative-ai/</a></p>\n\n<p><a href=\"https://aws.amazon.com/what-is/gan/\">https://aws.amazon.com/what-is/gan/</a></p>\n","answers":["<p>Diffusion models are a type of transformer-based models that use a self-attention mechanism</p>","<p>Diffusion models work by learning a compact representation of data called latent space</p>","<p>Diffusion models work by training two neural networks in a competitive manner</p>","<p>Diffusion models create new data by iteratively making controlled random changes to an initial data sample</p>"]},"correct_response":["d"],"section":"Fundamentals of AI and ML","question_plain":"A research lab is exploring various generative AI models for its project on creating realistic images and data simulations. The lab is particularly interested in diffusion models but needs a clear understanding of how these models work. Gaining insights into the mechanism behind diffusion models will help the lab decide whether this approach is suitable for their data generation needs.\n\nWhat do you recommend to the lab regarding the capabilities of diffusion models?","related_lectures":[]},{"_class":"assessment","id":96321721,"assessment_type":"multiple-choice","prompt":{"question":"<p>You are working as an NLP engineer at a tech company tasked with building an advanced text summarization tool to help customers generate concise summaries of lengthy documents. After successfully training your model, your manager asks you to evaluate its performance and quality to ensure it meets the required standards for deployment.</p>\n\n<p>Considering the nature of text summarization, which evaluation method would be most appropriate to assess the model's output effectively?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Leverage human evaluation to assess the quality of summaries</strong></p>\n\n<p>Human evaluation is the most appropriate method for assessing the quality of text summarization because it captures subjective aspects such as coherence, fluency, and relevance that automated metrics and benchmark datasets cannot fully measure.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Use automated testing via metrics like ROUGE or BLEU to measure the similarity between generated and reference summaries</strong> - Use automated testing via metrics metrics like ROUGE and BLEU provide quick and objective measurements, but they cannot assess subjective qualities like coherence, readability, or context-specific accuracy, which are crucial for text summarization.</p>\n\n<p><strong>Test the model on established benchmark datasets to evaluate performance</strong> - While benchmark datasets allow for performance comparison and standard testing, they alone do not provide insights into subjective aspects of summary quality that human evaluation covers.</p>\n\n<p><strong>Conduct code review to analyze the implementation code for logical or structural issues</strong> - Code review ensures implementation quality but does not evaluate the model's output or its ability to produce meaningful and accurate summaries.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://aws.amazon.com/blogs/aws/amazon-bedrock-model-evaluation-is-now-generally-available/\">https://aws.amazon.com/blogs/aws/amazon-bedrock-model-evaluation-is-now-generally-available/</a></p>\n","answers":["<p>Use automated testing via metrics like ROUGE or BLEU to measure the similarity between generated and reference summaries</p>","<p>Leverage human evaluation to assess the quality of summaries</p>","<p>Test the model on established benchmark datasets to evaluate performance</p>","<p>Conduct code review to analyze the implementation code for logical or structural issues</p>"]},"correct_response":["b"],"section":"Guidelines for Responsible AI","question_plain":"You are working as an NLP engineer at a tech company tasked with building an advanced text summarization tool to help customers generate concise summaries of lengthy documents. After successfully training your model, your manager asks you to evaluate its performance and quality to ensure it meets the required standards for deployment.\n\nConsidering the nature of text summarization, which evaluation method would be most appropriate to assess the model's output effectively?","related_lectures":[]},{"_class":"assessment","id":96321719,"assessment_type":"multiple-choice","prompt":{"question":"<p>A technology company is planning to implement machine learning to improve its product recommendation system and optimize supply chain management. The data science team is evaluating different types of machine learning approaches. Gaining a clear understanding of these types will help them choose the right strategy for model development.</p>\n\n<p>What of the following option would you suggest to the team as the three main types of machine learning?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Supervised learning, Unsupervised learning, Deep Learning</strong></p>\n\n<p>Machine learning (ML) is a subset of artificial intelligence that involves training algorithms to learn from and make predictions or decisions based on data.</p>\n\n<p>The three main types of machine learning are supervised learning, unsupervised learning, and deep learning.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt3-q23-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/what-is/machine-learning/\">https://aws.amazon.com/what-is/machine-learning/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Deep Learning, Self-supervised Learning, Reinforcement Learning</strong></p>\n\n<p><strong>Transfer Learning, Semi-supervised Learning, Self-supervised Learning</strong></p>\n\n<p><strong>Reinforcement Learning, Transfer Learning, Semi-supervised Learning</strong></p>\n\n<p>Transfer learning involves taking a pre-trained model on one task and fine-tuning it on a new, but related, task. This approach leverages existing knowledge to improve performance on the new task. Self-supervised learning is a type of unsupervised learning where the data itself provides the supervision. The model generates labels from the data and uses these labels to learn. Transfer learning and self-supervised learning are not considered as main types of machine learning. So, these three options are incorrect.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://aws.amazon.com/what-is/machine-learning/\">https://aws.amazon.com/what-is/machine-learning/</a></p>\n","answers":["<p>Supervised learning, Unsupervised learning, Deep Learning</p>","<p>Deep Learning, Self-supervised Learning, Reinforcement Learning</p>","<p>Transfer Learning, Semi-supervised Learning, Self-supervised Learning</p>","<p>Reinforcement Learning, Transfer Learning, Semi-supervised Learning</p>"]},"correct_response":["a"],"section":"Fundamentals of AI and ML","question_plain":"A technology company is planning to implement machine learning to improve its product recommendation system and optimize supply chain management. The data science team is evaluating different types of machine learning approaches. Gaining a clear understanding of these types will help them choose the right strategy for model development.\n\nWhat of the following option would you suggest to the team as the three main types of machine learning?","related_lectures":[]},{"_class":"assessment","id":96321717,"assessment_type":"multiple-choice","prompt":{"question":"<p>A retail company is developing machine learning models to analyze customer behavior and optimize inventory management. The data science team is working with both structured data as well as unstructured data and needs to understand how these two types of data differ in terms of how they are processed and used in machine learning models. Understanding this key difference will help the team select the right algorithms and preprocessing methods.</p>\n\n<p>Give this context, how would you outline the differences between structured data and unstructured data?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Structured data is organized in a predefined manner, often in rows and columns, making it easy to search and analyze, while unstructured data lacks a specific format and includes data like text, images, and videos</strong></p>\n\n<p>Structured data is highly organized and formatted, typically found in databases and spreadsheets, making it straightforward to search and analyze. Unstructured data, on the other hand, does not have a predefined format and can include diverse data types such as text, images, and videos.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt3-q24-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/compare/the-difference-between-structured-data-and-unstructured-data/\">https://aws.amazon.com/compare/the-difference-between-structured-data-and-unstructured-data/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Structured data is typically freeform text that lacks any specific format, whereas unstructured data is organized in a tabular format with rows and columns</strong> - Structured data is not freeform text; it is organized in a specific format, usually in rows and columns. Unstructured data does not have a predefined format.</p>\n\n<p><strong>Structured data includes data like text, images, and videos, whereas unstructured data is limited to numerical data only</strong> - Structured data is not limited to numerical data; it can include various data types as long as it is organized. Unstructured data includes data types like text, images, and videos.</p>\n\n<p><strong>Structured data is used exclusively for training machine learning models, whereas unstructured data is used solely for storing information without any analytical purpose</strong> - Both structured and unstructured data can be used for training machine learning models and for various analytical purposes, not just storage.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/compare/the-difference-between-structured-data-and-unstructured-data/\">https://aws.amazon.com/compare/the-difference-between-structured-data-and-unstructured-data/</a></p>\n","answers":["<p>Structured data is typically freeform text that lacks any specific format, whereas unstructured data is organized in a tabular format with rows and columns</p>","<p>Structured data is organized in a predefined manner, often in rows and columns, making it easy to search and analyze, while unstructured data lacks a specific format and includes data like text, images, and videos</p>","<p>Structured data includes data like text, images, and videos, whereas unstructured data is limited to numerical data only</p>","<p>Structured data is used exclusively for training machine learning models, whereas unstructured data is used solely for storing information without any analytical purpose</p>"]},"correct_response":["b"],"section":"Fundamentals of AI and ML","question_plain":"A retail company is developing machine learning models to analyze customer behavior and optimize inventory management. The data science team is working with both structured data as well as unstructured data and needs to understand how these two types of data differ in terms of how they are processed and used in machine learning models. Understanding this key difference will help the team select the right algorithms and preprocessing methods.\n\nGive this context, how would you outline the differences between structured data and unstructured data?","related_lectures":[]},{"_class":"assessment","id":96321715,"assessment_type":"multiple-choice","prompt":{"question":"<p>A financial services company is exploring machine learning to automate credit scoring and fraud detection. The leadership team, new to this technology, needs to understand the core concept behind machine learning. Gaining clarity on this central idea will help them decide how to best apply machine learning to their business operations. The company has tasked you, as an AI Practitioner, to convey the central idea behind machine learning to the leadership team.</p>\n\n<p>What do you recommend?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Machine learning involves training algorithms on large datasets to identify patterns and make predictions or decisions based on new data</strong></p>\n\n<p>Machine learning works by training algorithms on large datasets, allowing them to identify patterns within the data. Once trained, these algorithms can make predictions or decisions when presented with new data, improving their performance over time as they are exposed to more data.</p>\n\n<p>The central idea behind machine learning is an existing mathematical relationship between any input and output data combination. The machine learning model does not know this relationship in advance but can guess if sufficient examples of input-output data sets are given. This means every machine learning algorithm is built around a modifiable math function. The underlying principle can be understood like this:</p>\n\n<p>We ‘train’ the algorithm by giving it the following input/output (i,o) combinations – (2,10), (5,19), and (9,31)\nThe algorithm computes the relationship between input and output to be: o=3*i+4\nWe then give it input 7 and ask it to predict the output. It can automatically determine the output as 25.</p>\n\n<p>While this is a basic understanding, machine learning focuses on the principle that computer systems can mathematically link all complex data points as long as they have sufficient data and computing power to process. Therefore, the accuracy of the output is directly co-relational to the magnitude of the input given. Machine learning phases are given below.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt3-q25-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/what-is/machine-learning/\">https://aws.amazon.com/what-is/machine-learning/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Machine learning works by using predefined rules to generate outcomes without the need for data input</strong> - Machine learning does not rely on predefined rules alone; it uses data to learn and make predictions or decisions.</p>\n\n<p><strong>Machine learning is primarily based on hardware configurations and does not rely on software algorithms or data analysis</strong> - Machine learning is fundamentally based on software algorithms and data analysis rather than solely on hardware configurations.</p>\n\n<p><strong>Machine learning only functions effectively when data is manually labeled and categorized by humans</strong> - While labeled data can improve the performance of supervised learning models, machine learning can also function with unlabeled data through unsupervised learning methods.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/what-is/machine-learning/\">https://aws.amazon.com/what-is/machine-learning/</a></p>\n","answers":["<p>Machine learning involves training algorithms on large datasets to identify patterns and make predictions or decisions based on new data</p>","<p>Machine learning works by using predefined rules to generate outcomes without the need for data input</p>","<p>Machine learning is primarily based on hardware configurations and does not rely on software algorithms or data analysis</p>","<p>Machine learning only functions effectively when data is manually labeled and categorized by humans</p>"]},"correct_response":["a"],"section":"Fundamentals of AI and ML","question_plain":"A financial services company is exploring machine learning to automate credit scoring and fraud detection. The leadership team, new to this technology, needs to understand the core concept behind machine learning. Gaining clarity on this central idea will help them decide how to best apply machine learning to their business operations. The company has tasked you, as an AI Practitioner, to convey the central idea behind machine learning to the leadership team.\n\nWhat do you recommend?","related_lectures":[]},{"_class":"assessment","id":96321713,"assessment_type":"multiple-choice","prompt":{"question":"<p>A healthcare company is using machine learning to analyze patient data and improve diagnostics. The data science team is considering both supervised and unsupervised machine learning approaches to handle different types of data, as understanding the key differences between these two approaches will help the team determine which method is best suited for tasks like disease prediction versus discovering hidden patterns in patient data.</p>\n\n<p>Which of the following would you identify as the key difference between supervised machine learning and unsupervised machine learning?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Supervised machine learning involves training models with labeled data to make predictions or classify data, whereas unsupervised machine learning identifies patterns and relationships in unlabeled data</strong></p>\n\n<p>Supervised machine learning uses labeled data for training models to make predictions or classify data. In contrast, unsupervised machine learning works with unlabeled data to identify hidden patterns and relationships without specific labels.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt3-q26-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/compare/the-difference-between-machine-learning-supervised-and-unsupervised/\">https://aws.amazon.com/compare/the-difference-between-machine-learning-supervised-and-unsupervised/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Supervised machine learning requires labeled data for training, whereas unsupervised machine learning does not use any data for training</strong> - While supervised learning requires labeled data, unsupervised learning also uses data for training, but it is unlabeled.</p>\n\n<p><strong>Supervised machine learning focuses on finding patterns in data without any specific guidance, while unsupervised machine learning uses labeled data to make predictions</strong> - Supervised learning uses labeled data to make predictions, while unsupervised learning finds patterns in unlabeled data.</p>\n\n<p><strong>Supervised machine learning is used only for clustering tasks, whereas unsupervised machine learning is used only for regression tasks</strong> - Both supervised and unsupervised learning can be used for a variety of tasks, not limited to clustering and regression exclusively.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://aws.amazon.com/compare/the-difference-between-machine-learning-supervised-and-unsupervised/\">https://aws.amazon.com/compare/the-difference-between-machine-learning-supervised-and-unsupervised/</a></p>\n","answers":["<p>Supervised machine learning requires labeled data for training, whereas unsupervised machine learning does not use any data for training</p>","<p>Supervised machine learning focuses on finding patterns in data without any specific guidance, while unsupervised machine learning uses labeled data to make predictions</p>","<p>Supervised machine learning involves training models with labeled data to make predictions or classify data, whereas unsupervised machine learning identifies patterns and relationships in unlabeled data</p>","<p>Supervised machine learning is used only for clustering tasks, whereas unsupervised machine learning is used only for regression tasks</p>"]},"correct_response":["c"],"section":"Fundamentals of AI and ML","question_plain":"A healthcare company is using machine learning to analyze patient data and improve diagnostics. The data science team is considering both supervised and unsupervised machine learning approaches to handle different types of data, as understanding the key differences between these two approaches will help the team determine which method is best suited for tasks like disease prediction versus discovering hidden patterns in patient data.\n\nWhich of the following would you identify as the key difference between supervised machine learning and unsupervised machine learning?","related_lectures":[]},{"_class":"assessment","id":96321711,"assessment_type":"multiple-choice","prompt":{"question":"<p>A financial services company is deploying a machine learning model to predict stock market trends in real time. The model must generate predictions quickly to provide timely insights for trading decisions. The team wants to evaluate the runtime efficiency of the model to ensure it meets performance requirements.</p>\n\n<p>Which metric would be the most appropriate to evaluate the runtime efficiency of this model?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Average Response Time</strong></p>\n\n<p>Average response time measures how long it takes for the model to process input data and generate a prediction. It directly reflects the model's runtime efficiency, which is crucial in scenarios where timely decisions need to be made, such as real-time stock market predictions. A lower average response time indicates better runtime efficiency, ensuring that predictions are delivered quickly enough to be actionable.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Model Accuracy</strong> - While model accuracy is essential for assessing how well the model's predictions match the actual outcomes, it is not a measure of runtime efficiency. Accuracy evaluates the correctness of the model’s predictions but does not reflect how quickly those predictions are generated. For runtime efficiency, response time is the key metric, not accuracy.</p>\n\n<p><strong>Precision-Recall Score</strong> - Precision and recall are metrics used to evaluate the model's performance in handling imbalanced datasets, particularly in classification tasks. These metrics focus on the trade-off between the model’s ability to correctly identify positive instances and its capacity to avoid false positives. While precision-recall is important for model performance, it does not provide insights into the model's runtime efficiency.</p>\n\n<p><strong>Data Throughput</strong> - Data throughput measures the amount of data a system can process in a given time. While this can be related to the overall system performance, it does not directly assess the model's runtime efficiency in terms of how quickly it generates predictions. Average response time is a more appropriate metric for measuring runtime efficiency, particularly in real-time prediction scenarios.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/blogs/machine-learning/increase-ml-model-performance-and-reduce-training-time-using-amazon-sagemaker-built-in-algorithms-with-pre-trained-models/\">https://aws.amazon.com/blogs/machine-learning/increase-ml-model-performance-and-reduce-training-time-using-amazon-sagemaker-built-in-algorithms-with-pre-trained-models/</a></p>\n\n<p><a href=\"https://docs.aws.amazon.com/sagemaker/latest/dg/autopilot-metrics-validation.html\">https://docs.aws.amazon.com/sagemaker/latest/dg/autopilot-metrics-validation.html</a></p>\n","answers":["<p>Average Response Time</p>","<p>Model Accuracy</p>","<p>Precision-Recall Score</p>","<p>Data Throughput</p>"]},"correct_response":["a"],"section":"Fundamentals of AI and ML","question_plain":"A financial services company is deploying a machine learning model to predict stock market trends in real time. The model must generate predictions quickly to provide timely insights for trading decisions. The team wants to evaluate the runtime efficiency of the model to ensure it meets performance requirements.\n\nWhich metric would be the most appropriate to evaluate the runtime efficiency of this model?","related_lectures":[]},{"_class":"assessment","id":96321709,"assessment_type":"multi-select","prompt":{"question":"<p>A retail company is exploring machine learning to improve customer segmentation and discover hidden patterns in sales data. The data science team is particularly interested in using unsupervised learning to analyze large volumes of unlabeled customer and product data to identify trends and groupings without predefined categories. To determine the best approach, they need to understand which methods fall under unsupervised learning.</p>\n\n<p>Which of the following would you suggest to the company as examples of unsupervised learning? (Select two)</p>\n","relatedLectureIds":"","feedbacks":["","","","",""],"explanation":"<p>Correct options:</p>\n\n<p>Unsupervised learning algorithms train on unlabeled data. They scan through new data and establish meaningful connections between the unknown input and predetermined outputs. For instance, unsupervised learning algorithms could group news articles from different news sites into common categories like sports and crime.</p>\n\n<p><strong>Clustering</strong></p>\n\n<p>Clustering is an unsupervised learning technique that groups certain data inputs, so they may be categorized as a whole. There are various types of clustering algorithms depending on the input data. An example of clustering is identifying different types of network traffic to predict potential security incidents.</p>\n\n<p><strong>Dimensionality reduction</strong></p>\n\n<p>Dimensionality reduction is an unsupervised learning technique that reduces the number of features in a dataset. It’s often used to preprocess data for other machine learning functions and reduce complexity and overheads. For example, it may blur out or crop background features in an image recognition application.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt3-q28-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/compare/the-difference-between-machine-learning-supervised-and-unsupervised/\">https://aws.amazon.com/compare/the-difference-between-machine-learning-supervised-and-unsupervised/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Decision tree</strong> - The decision tree is a supervised machine learning technique that takes some given inputs and applies an if-else structure to predict an outcome. An example of a decision tree problem is predicting customer churn.</p>\n\n<p><strong>Neural network</strong> - A neural network solution is a more complex supervised learning technique. To produce a given outcome, it takes some given inputs and performs one or more layers of mathematical transformation based on adjusting data weightings. An example of a neural network technique is predicting a digit from a handwritten image.</p>\n\n<p><strong>Sentiment analysis</strong> - This is an example of semi-supervised learning. Semi-supervised learning is when you apply both supervised and unsupervised learning techniques to a common problem. This technique relies on using a small amount of labeled data and a large amount of unlabeled data to train systems. When considering the breadth of an organization’s text-based customer interactions, it may not be cost-effective to categorize or label sentiment across all channels. An organization could train a model on the larger unlabeled portion of data first, and then a sample that has been labeled.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/what-is/machine-learning/\">https://aws.amazon.com/what-is/machine-learning/</a></p>\n\n<p><a href=\"https://aws.amazon.com/compare/the-difference-between-machine-learning-supervised-and-unsupervised/\">https://aws.amazon.com/compare/the-difference-between-machine-learning-supervised-and-unsupervised/</a></p>\n","answers":["<p>Decision tree</p>","<p>Clustering</p>","<p>Neural network</p>","<p>Sentiment analysis</p>","<p>Dimensionality reduction</p>"]},"correct_response":["b","e"],"section":"Fundamentals of AI and ML","question_plain":"A retail company is exploring machine learning to improve customer segmentation and discover hidden patterns in sales data. The data science team is particularly interested in using unsupervised learning to analyze large volumes of unlabeled customer and product data to identify trends and groupings without predefined categories. To determine the best approach, they need to understand which methods fall under unsupervised learning.\n\nWhich of the following would you suggest to the company as examples of unsupervised learning? (Select two)","related_lectures":[]},{"_class":"assessment","id":96321779,"assessment_type":"multiple-choice","prompt":{"question":"<p>A company is using Amazon Bedrock based Foundation Model in a Retrieval Augmented Generation (RAG) configuration to provide tailored insights and responses based on client data stored in Amazon S3. Each team within the company is assigned to different clients and uses the foundation model to generate insights specific to their clients' data. To maintain data privacy and security, the company needs to ensure that each team can only access the model responses generated from the data of their respective clients, preventing any unauthorized access to other teams' client data.</p>\n\n<p>What is the most effective approach to implement this access control and maintain data security?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>The company should create a service role for Amazon Bedrock for each team, granting access only to the specific team's clients data in Amazon S3</strong></p>\n\n<p>This is the correct approach because creating a service role for each team that has specific access to their data in Amazon S3 ensures fine-grained control over who can access which data. By assigning specific service roles to Amazon Bedrock, the company can enforce data security and privacy rules at the team level, ensuring that each team only has access to the data they are authorized to use. This method also aligns with AWS best practices for secure and controlled access management.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>The company should create a single role for Amazon Bedrock with full access to Amazon S3 and then create separate IAM roles for each team that are limited to each team's clients data</strong> - This approach is incorrect because creating a single Amazon Bedrock role with full access to S3 poses a security risk, as it grants excessive permissions beyond what is necessary. Although creating separate IAM roles for each team restricts access to customer data, it does not control access at the Amazon Bedrock service level, which means that the Bedrock service could still potentially access all data in S3, defeating the purpose of limiting access.</p>\n\n<p><strong>The company should configure S3 bucket policies to allow access to all teams but monitor usage through AWS CloudTrail logs to detect any unauthorized access</strong> - Configuring S3 bucket policies to allow broad access and relying on AWS CloudTrail logs for monitoring is a reactive approach that does not prevent unauthorized access. This method only detects and reports access violations after they occur, making it a less efficient and secure strategy for maintaining data confidentiality and access control. Proactive access management is more effective for ensuring data security.</p>\n\n<p><strong>The company should create a single IAM policy that grants read-only access to all S3 buckets for all teams</strong> - Granting read-only access to all S3 buckets for all teams is an incorrect approach because it does not enforce data segregation or limit access to only the relevant customer data for each team. This method lacks the necessary security controls, potentially exposing sensitive data to unauthorized users and increasing the risk of data breaches.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/knowledge-base.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/knowledge-base.html</a></p>\n\n<p><a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/security-iam-sr.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/security-iam-sr.html</a></p>\n","answers":["<p>The company should create a single role for Amazon Bedrock with full access to Amazon S3 and then create separate IAM roles for each team that are limited to each team's clients data</p>","<p>The company should create a service role for Amazon Bedrock for each team, granting access only to the specific team's clients data in Amazon S3</p>","<p>The company should configure S3 bucket policies to allow access to all teams but monitor usage through AWS CloudTrail logs to detect any unauthorized access</p>","<p>The company should create a single IAM policy that grants read-only access to all S3 buckets for all teams</p>"]},"correct_response":["b"],"section":"Security, Compliance, and Governance for AI Solutions","question_plain":"A company is using Amazon Bedrock based Foundation Model in a Retrieval Augmented Generation (RAG) configuration to provide tailored insights and responses based on client data stored in Amazon S3. Each team within the company is assigned to different clients and uses the foundation model to generate insights specific to their clients' data. To maintain data privacy and security, the company needs to ensure that each team can only access the model responses generated from the data of their respective clients, preventing any unauthorized access to other teams' client data.\n\nWhat is the most effective approach to implement this access control and maintain data security?","related_lectures":[]},{"_class":"assessment","id":96321761,"assessment_type":"multiple-choice","prompt":{"question":"<p>A financial services company is developing a machine learning model to predict credit risk and optimize loan approvals. The data science team is preparing the dataset for model development and needs to understand how to properly split the data into training, validation, and test sets. Each of these sets serves a different purpose in ensuring the model’s accuracy and generalization. Understanding the key differences between a training set, validation set, and test set will help the team implement an effective model evaluation strategy.</p>\n\n<p>What do you recommend to the company?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>The training set is used for training the model, the validation set is used for tuning hyperparameters and model selection, and the test set is used for evaluating the final model performance</strong></p>\n\n<p>Data used for ML is typically split into the following datasets:</p>\n\n<p>Training – Used to train an algorithm or ML model. The model iteratively uses the data and learns to provide the desired result.</p>\n\n<p>Validation – Introduces new data to the trained model. You can use a validation set to periodically measure model performance as training is happening and also tune any hyperparameters of the model. However, validation datasets are optional.</p>\n\n<p>Test – Used on the final trained model to assess its performance on unseen data. This helps determine how well the model generalizes.</p>\n\n<p>The training set is used to train the model, the validation set is used for tuning hyperparameters and selecting the best model during the training process, and the test set is used for evaluating the final performance of the model on unseen data.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>The training set is used for evaluating model performance, the validation set is used for training the model, and the test set is used for hyperparameter tuning</strong></p>\n\n<p><strong>The training set is used for tuning hyperparameters, the validation set is used for evaluating the final model performance, and the test set is used for training the model</strong></p>\n\n<p><strong>The training set, validation set, and test set all serve the same purpose of evaluating the model performance</strong></p>\n\n<p>These three options contradict the explanation provided above, so these options are incorrect.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/blogs/machine-learning/create-train-test-and-validation-splits-on-your-data-for-machine-learning-with-amazon-sagemaker-data-wrangler/\">https://aws.amazon.com/blogs/machine-learning/create-train-test-and-validation-splits-on-your-data-for-machine-learning-with-amazon-sagemaker-data-wrangler/</a></p>\n","answers":["<p>The training set is used for evaluating model performance, the validation set is used for training the model, and the test set is used for hyperparameter tuning</p>","<p>The training set is used for tuning hyperparameters, the validation set is used for evaluating the final model performance, and the test set is used for training the model</p>","<p>The training set, validation set, and test set all serve the same purpose of evaluating the model performance</p>","<p>The training set is used for training the model, the validation set is used for tuning hyperparameters and model selection, and the test set is used for evaluating the final model performance</p>"]},"correct_response":["d"],"section":"Fundamentals of AI and ML","question_plain":"A financial services company is developing a machine learning model to predict credit risk and optimize loan approvals. The data science team is preparing the dataset for model development and needs to understand how to properly split the data into training, validation, and test sets. Each of these sets serves a different purpose in ensuring the model’s accuracy and generalization. Understanding the key differences between a training set, validation set, and test set will help the team implement an effective model evaluation strategy.\n\nWhat do you recommend to the company?","related_lectures":[]},{"_class":"assessment","id":96321777,"assessment_type":"multiple-choice","prompt":{"question":"<p>A healthcare company is building a machine learning model to predict patient outcomes based on various health indicators. The data science team is exploring different techniques to improve the model’s accuracy by refining the input data, specifically using feature extraction and feature selection. Understanding the key differences between these two approaches will help the team optimize the model’s performance.</p>\n\n<p>What do you suggest to the company?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Feature extraction reduces the number of features by transforming data into a new space, while feature selection reduces the number of features by selecting the most relevant ones from the existing features</strong></p>\n\n<p>Feature extraction involves transforming the data into a new feature space, often using techniques like Principal Component Analysis (PCA) to reduce the number of features. Feature selection, on the other hand, involves selecting a subset of the most relevant features from the original dataset, typically using methods like forward selection, backward elimination, or regularization techniques.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt3-q31-i1.jpg\">\nvia - <a href=\"https://docs.aws.amazon.com/wellarchitected/latest/machine-learning-lens/feature-engineering.html\">https://docs.aws.amazon.com/wellarchitected/latest/machine-learning-lens/feature-engineering.html</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Feature extraction involves selecting the most relevant features from the dataset, while feature selection involves creating new features from existing data</strong> - Feature extraction involves creating new features from existing data by transforming it, whereas feature selection involves selecting the most relevant features from the existing ones.</p>\n\n<p><strong>Feature extraction and feature selection are both used to remove irrelevant features but do not reduce the dimensionality of the dataset</strong> - Both feature extraction and feature selection are techniques to reduce the dimensionality of the dataset.</p>\n\n<p><strong>Feature extraction is only applicable to supervised learning, while feature selection is only applicable to unsupervised learning</strong> - Both feature extraction and feature selection can be applied in supervised and unsupervised learning contexts.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/wellarchitected/latest/machine-learning-lens/feature-engineering.html\">https://docs.aws.amazon.com/wellarchitected/latest/machine-learning-lens/feature-engineering.html</a></p>\n","answers":["<p>Feature extraction reduces the number of features by transforming data into a new space, while feature selection reduces the number of features by selecting the most relevant ones from the existing features</p>","<p>Feature extraction involves selecting the most relevant features from the dataset, while feature selection involves creating new features from existing data</p>","<p>Feature extraction and feature selection are both used to remove irrelevant features but do not reduce the dimensionality of the dataset</p>","<p>Feature extraction is only applicable to supervised learning, while feature selection is only applicable to unsupervised learning</p>"]},"correct_response":["a"],"section":"Fundamentals of AI and ML","question_plain":"A healthcare company is building a machine learning model to predict patient outcomes based on various health indicators. The data science team is exploring different techniques to improve the model’s accuracy by refining the input data, specifically using feature extraction and feature selection. Understanding the key differences between these two approaches will help the team optimize the model’s performance.\n\nWhat do you suggest to the company?","related_lectures":[]},{"_class":"assessment","id":96321775,"assessment_type":"multiple-choice","prompt":{"question":"<p>A retail company is exploring machine learning algorithms to improve its customer segmentation systems. The data science team is evaluating both K-Means and K-Nearest Neighbors (KNN) algorithms but needs to understand the key differences between them, since understanding these distinctions will help the team choose the right algorithm for their specific tasks.</p>\n\n<p>Given this context, what do you recommend to the company?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>K-Means is an unsupervised learning algorithm used for clustering data points into groups, while KNN is a supervised learning algorithm used for classifying data points based on their proximity to labeled examples</strong></p>\n\n<p>K-Means is an unsupervised learning algorithm used to partition a dataset into distinct clusters by minimizing the variance within each cluster. KNN, on the other hand, is a supervised learning algorithm that classifies new data points based on the majority class among its k-nearest neighbors in the training data.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>K-Means is a supervised learning algorithm used for classification, while KNN is an unsupervised learning algorithm used for clustering</strong> - K-Means is an unsupervised learning algorithm, and KNN is a supervised learning algorithm.</p>\n\n<p><strong>K-Means requires labeled data to form clusters, whereas KNN does not use labeled data for making predictions</strong> - K-Means does not require labeled data; it is used for clustering. KNN, however, requires labeled data for classification.</p>\n\n<p><strong>K-Means is primarily used for regression tasks, while KNN is used for reducing the dimensionality of data</strong> - K-Means is not used for regression tasks, and KNN is not primarily used for dimensionality reduction. KNN is used for classification and regression tasks based on proximity to neighbors.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/blogs/machine-learning/k-means-clustering-with-amazon-sagemaker/\">https://aws.amazon.com/blogs/machine-learning/k-means-clustering-with-amazon-sagemaker/</a></p>\n\n<p><a href=\"https://docs.aws.amazon.com/sagemaker/latest/dg/k-nearest-neighbors.html\">https://docs.aws.amazon.com/sagemaker/latest/dg/k-nearest-neighbors.html</a></p>\n","answers":["<p>K-Means is a supervised learning algorithm used for classification, while KNN is an unsupervised learning algorithm used for clustering</p>","<p>K-Means is an unsupervised learning algorithm used for clustering data points into groups, while KNN is a supervised learning algorithm used for classifying data points based on their proximity to labeled examples</p>","<p>K-Means requires labeled data to form clusters, whereas KNN does not use labeled data for making predictions</p>","<p>K-Means is primarily used for regression tasks, while KNN is used for reducing the dimensionality of data</p>"]},"correct_response":["b"],"section":"Fundamentals of AI and ML","question_plain":"A retail company is exploring machine learning algorithms to improve its customer segmentation systems. The data science team is evaluating both K-Means and K-Nearest Neighbors (KNN) algorithms but needs to understand the key differences between them, since understanding these distinctions will help the team choose the right algorithm for their specific tasks.\n\nGiven this context, what do you recommend to the company?","related_lectures":[]},{"_class":"assessment","id":96321773,"assessment_type":"multiple-choice","prompt":{"question":"<p>A company is considering using Reinforcement Learning (RL) to optimize decision-making in dynamic environments. Which of the following would you recommend as the best-fit use case for Reinforcement Learning?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Reinforcement learning is used for optimizing complex systems such as robotics, game playing, and industrial automation by learning optimal actions through trial and error</strong></p>\n\n<p>Reinforcement learning is well-suited for optimizing complex systems where an agent learns to make decisions through interactions with the environment, receiving feedback in the form of rewards or penalties. This approach is particularly effective in applications like robotics, game playing, and industrial automation, where learning optimal actions through trial and error is crucial.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt3-q33-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/what-is/reinforcement-learning/\">https://aws.amazon.com/what-is/reinforcement-learning/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Reinforcement learning is primarily used for clustering large datasets without any predefined labels</strong> - Clustering large datasets without predefined labels is typically associated with unsupervised learning, not reinforcement learning.</p>\n\n<p><strong>Reinforcement learning is used for making predictions based on historical data trends</strong> - Making predictions based on historical data trends is a characteristic of supervised learning techniques.</p>\n\n<p><strong>Reinforcement learning is used for performing regression analysis on large numerical datasets</strong> - Regression analysis is a task associated with supervised learning, not reinforcement learning.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://aws.amazon.com/what-is/reinforcement-learning/\">https://aws.amazon.com/what-is/reinforcement-learning/</a></p>\n","answers":["<p>Reinforcement learning is primarily used for clustering large datasets without any predefined labels</p>","<p>Reinforcement learning is used for making predictions based on historical data trends</p>","<p>Reinforcement learning is used for optimizing complex systems such as robotics, game playing, and industrial automation by learning optimal actions through trial and error</p>","<p>Reinforcement learning is used for performing regression analysis on large numerical datasets</p>"]},"correct_response":["c"],"section":"Fundamentals of AI and ML","question_plain":"A company is considering using Reinforcement Learning (RL) to optimize decision-making in dynamic environments. Which of the following would you recommend as the best-fit use case for Reinforcement Learning?","related_lectures":[]},{"_class":"assessment","id":96321771,"assessment_type":"multiple-choice","prompt":{"question":"<p>A financial services company is developing a machine learning model to predict credit risk. During the model evaluation, the data science team notices that the model performs exceptionally well on the training data but struggles with new, unseen data, indicating overfitting. To address this issue, the team needs to identify the root cause of overfitting.</p>\n\n<p>What would you recommend to the team?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Overfitting occurs when the model is overly complex and captures noise or random fluctuations in the training data rather than the underlying patterns</strong></p>\n\n<p>Overfitting happens when a model is too complex, meaning it has too many parameters relative to the number of observations. This allows the model to capture noise or random fluctuations in the training data, mistaking them for true underlying patterns, which leads to poor generalization of new data.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt3-q34-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/what-is/reinforcement-learning/\">https://aws.amazon.com/what-is/reinforcement-learning/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Overfitting occurs when the model is using fewer feature combinations</strong> - When the model uses fewer feature combinations, this implies that the model is simple, so it cannot overfit.</p>\n\n<p><strong>Overfitting occurs when the model ignores the training data and makes predictions based on pre-defined rules</strong> - Overfitting is about the model fitting too closely to the training data, not ignoring it.</p>\n\n<p><strong>Overfitting occurs when the model is not updated frequently enough with new data, leading to outdated patterns</strong> - While outdated data can cause poor performance, overfitting specifically refers to the model fitting the training data too well, including noise, rather than capturing general patterns.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/machine-learning/latest/dg/model-fit-underfitting-vs-overfitting.html\">https://docs.aws.amazon.com/machine-learning/latest/dg/model-fit-underfitting-vs-overfitting.html</a></p>\n\n<p><a href=\"https://aws.amazon.com/what-is/overfitting/\">https://aws.amazon.com/what-is/overfitting/</a></p>\n","answers":["<p>Overfitting occurs when the model is using fewer feature combinations</p>","<p>Overfitting occurs when the model ignores the training data and makes predictions based on pre-defined rules</p>","<p>Overfitting occurs when the model is not updated frequently enough with new data, leading to outdated patterns</p>","<p>Overfitting occurs when the model is overly complex and captures noise or random fluctuations in the training data rather than the underlying patterns</p>"]},"correct_response":["d"],"section":"Fundamentals of AI and ML","question_plain":"A financial services company is developing a machine learning model to predict credit risk. During the model evaluation, the data science team notices that the model performs exceptionally well on the training data but struggles with new, unseen data, indicating overfitting. To address this issue, the team needs to identify the root cause of overfitting.\n\nWhat would you recommend to the team?","related_lectures":[]},{"_class":"assessment","id":96321769,"assessment_type":"multiple-choice","prompt":{"question":"<p>A healthcare company is developing a machine learning model to predict patient outcomes based on medical data. To ensure the model generalizes well, the company needs to understand the balance between underfitting and overfitting and how to address these issues.</p>\n\n<p>Which of the following would you identify as correct regarding underfitting and overfitting in machine learning?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Underfit models experience high bias, whereas, overfit models experience high variance</strong></p>\n\n<p>Your model is underfitting the training data when the model performs poorly on the training data. This is because the model is unable to capture the relationship between the input examples (often called X) and the target values (often called Y). Your model is overfitting your training data when you see that the model performs well on the training data but does not perform well on the evaluation data. This is because the model is memorizing the data it has seen and is unable to generalize to unseen examples.</p>\n\n<p>Underfit models experience high bias — they give inaccurate results for both the training data and test set. On the other hand, overfit models experience high variance - they give accurate results for the training set but not for the test set. More model training results in less bias but variance can increase. Data scientists aim to find the sweet spot between underfitting and overfitting when fitting a model. A well-fitted model can quickly establish the dominant trend for seen and unseen data sets.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Underfit models experience low bias, whereas, overfit models experience low variance</strong></p>\n\n<p><strong>Underfit models experience low bias, whereas, overfit models experience high variance</strong></p>\n\n<p><strong>Underfit models experience high bias, whereas, overfit models experience low variance</strong></p>\n\n<p>These three options contradict the explanation provided above, so these options are incorrect.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/machine-learning/latest/dg/model-fit-underfitting-vs-overfitting.html\">https://docs.aws.amazon.com/machine-learning/latest/dg/model-fit-underfitting-vs-overfitting.html</a></p>\n\n<p><a href=\"https://aws.amazon.com/what-is/overfitting/\">https://aws.amazon.com/what-is/overfitting/</a></p>\n","answers":["<p>Underfit models experience low bias, whereas, overfit models experience low variance</p>","<p>Underfit models experience low bias, whereas, overfit models experience high variance</p>","<p>Underfit models experience high bias, whereas, overfit models experience high variance</p>","<p>Underfit models experience high bias, whereas, overfit models experience low variance</p>"]},"correct_response":["c"],"section":"Fundamentals of AI and ML","question_plain":"A healthcare company is developing a machine learning model to predict patient outcomes based on medical data. To ensure the model generalizes well, the company needs to understand the balance between underfitting and overfitting and how to address these issues.\n\nWhich of the following would you identify as correct regarding underfitting and overfitting in machine learning?","related_lectures":[]},{"_class":"assessment","id":96321767,"assessment_type":"multiple-choice","prompt":{"question":"<p>Is it possible to increase both the bias and variance of a machine learning model simultaneously?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Yes, it is possible to increase both bias and variance, but this typically leads to a model that performs poorly due to both underfitting and overfitting</strong></p>\n\n<p>Bias is an error introduced by approximating a real-world problem (which may be complex) by a simpler model. High bias can cause the model to miss relevant relations between features and target outputs (underfitting).</p>\n\n<p>Variance is an error introduced by the model's sensitivity to small fluctuations in the training data. High variance can cause the model to mimic the random noise in the training data rather than the intended outputs (overfitting).</p>\n\n<p>It is possible to increase both bias and variance, but doing so usually results in a model that is both underfit and overfit, leading to poor performance. High bias causes the model to miss important patterns (underfitting), while high variance makes the model too sensitive to noise in the training data (overfitting).</p>\n\n<p>For example, if you reduce the amount of training data, the model has less information to learn from. This can increase bias because the model may not capture the underlying patterns well (underfitting). At the same time, with less data, the model can become more sensitive to fluctuations in the training data, increasing variance.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Yes, increasing both bias and variance simultaneously will improve the model's accuracy and generalization capabilities</strong> - Increasing both bias and variance will not improve the model's performance. High bias can lead to underfitting, and high variance can lead to overfitting, making the model perform poorly.</p>\n\n<p><strong>No, it is not possible to increase both bias and variance simultaneously, as they are inversely related</strong> - Bias and variance are not inversely related to the extent that one cannot increase both. It is possible to design a model that suffers from both high bias and high variance.</p>\n\n<p><strong>No, increasing bias always decreases variance and vice versa, so they cannot be increased at the same time</strong> - While there is often a trade-off between bias and variance, they can both be high in a poorly designed model.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/wellarchitected/latest/machine-learning-lens/mlper-09.html\">https://docs.aws.amazon.com/wellarchitected/latest/machine-learning-lens/mlper-09.html</a></p>\n\n<p><a href=\"https://aws.amazon.com/what-is/overfitting/\">https://aws.amazon.com/what-is/overfitting/</a></p>\n\n<p><a href=\"https://stackoverflow.com/questions/32161174/can-a-model-have-both-high-bias-and-high-variance-overfitting-and-underfitting\">https://stackoverflow.com/questions/32161174/can-a-model-have-both-high-bias-and-high-variance-overfitting-and-underfitting</a></p>\n","answers":["<p>Yes, increasing both bias and variance simultaneously will improve the model's accuracy and generalization capabilities</p>","<p>Yes, it is possible to increase both bias and variance, but this typically leads to a model that performs poorly due to both underfitting and overfitting</p>","<p>No, it is not possible to increase both bias and variance simultaneously, as they are inversely related</p>","<p>No, increasing bias always decreases variance and vice versa, so they cannot be increased at the same time</p>"]},"correct_response":["b"],"section":"Fundamentals of AI and ML","question_plain":"Is it possible to increase both the bias and variance of a machine learning model simultaneously?","related_lectures":[]},{"_class":"assessment","id":96321765,"assessment_type":"multi-select","prompt":{"question":"<p>A retail company is deploying machine learning models to predict customer demand and optimize inventory management. The company needs to decide between using real-time inference vs batch inference. Understanding the key differences between these approaches, including their use cases, latency requirements, and processing needs, is crucial for optimizing the company's operations.</p>\n\n<p>Given this context, what would you suggest to the company as the key differences between real-time inference and batch inference? (Select two)</p>\n","relatedLectureIds":"","feedbacks":["","","","",""],"explanation":"<p>Correct options:</p>\n\n<p><strong>Real-time inference is used for applications requiring immediate predictions with low latency, whereas batch inference is used for processing large volumes of data at once, often with higher latency</strong></p>\n\n<p>Batch inferencing, also known as offline inferencing, generates model predictions on a batch of observations. Batch inference is a good option for large datasets or if you don't need an immediate response to a model prediction request.\nUse Cases: High throughput applications like data warehousing, ETL pipelines, periodic reports, and predictive maintenance.</p>\n\n<p>Real-time inference is ideal for inference workloads where you have real-time, interactive, low-latency requirements.\nUse Cases: Low latency applications like recommendation systems, chatbots, fraud detection, and autonomous vehicles.</p>\n\n<p><strong>Real-time inference follows a synchronous execution mode, whereas batch inference follows an asynchronous execution mode</strong></p>\n\n<p>Synchronous execution means that a request is made, and the process waits for the response before proceeding. The client (e.g., a user, application, or service) sends a request to the inference system and waits for the prediction result to be returned immediately. The execution of the task is completed in a single, continuous operation.</p>\n\n<p>Asynchronous execution means that the request and the response are handled independently. The client sends a request to the inference system, which processes the request at its own pace and returns the results at a later time. The execution of the task is decoupled from the initial request, allowing the client to continue with other tasks.</p>\n\n<p>Summary of Key Differences</p>\n\n<p>Real-time inference (synchronous execution) -\nInteraction: Direct and immediate.\nOperation: Blocking; the client waits for the result.\nUse Cases: Applications where immediate feedback is required (e.g., chatbots, real-time recommendations, online fraud detection).</p>\n\n<p>Batch inference (asynchronous execution) -\nInteraction: Indirect and delayed.\nOperation: Non-blocking; the client can perform other tasks while waiting for the result.\nUse Cases: Applications where immediate feedback is not necessary, and processing can be done in bulk (e.g., nightly data analysis, periodic reporting, large-scale data processing).</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt3-q37-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/blogs/architecture/batch-inference-at-scale-with-amazon-sagemaker/\">https://aws.amazon.com/blogs/architecture/batch-inference-at-scale-with-amazon-sagemaker/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Real-time inference processes data in large batches at scheduled intervals, while batch inference processes individual data points immediately as they arrive</strong> - Real-time inference processes individual data points as they arrive, providing immediate predictions. Batch inference processes data in large batches at scheduled intervals.</p>\n\n<p><strong>Batch inference follows an API-based invocation, whereas real-time inference follows a schedule-based invocation</strong> - For real-time inference, the typical invocation modes are - REST API, gRPC, WebSockets, and Serverless Functions. For batch inference, the typical invocation modes are - Batch processing frameworks (Spark, Flink, Hadoop), Cloud Batch Services (AWS Batch), and scripted jobs on a schedule.</p>\n\n<p><strong>Batch inference follows a synchronous execution mode, whereas real-time inference follows an asynchronous execution mode</strong> - The execution modes for real-time inference vs batch inference are reversed in this option, so it is incorrect.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://aws.amazon.com/blogs/architecture/batch-inference-at-scale-with-amazon-sagemaker/\">https://aws.amazon.com/blogs/architecture/batch-inference-at-scale-with-amazon-sagemaker/</a></p>\n","answers":["<p>Real-time inference is used for applications requiring immediate predictions with low latency, whereas batch inference is used for processing large volumes of data at once, often with higher latency</p>","<p>Real-time inference processes data in large batches at scheduled intervals, while batch inference processes individual data points immediately as they arrive</p>","<p>Batch inference follows an API-based invocation, whereas real-time inference follows a schedule-based invocation</p>","<p>Real-time inference follows a synchronous execution mode, whereas batch inference follows an asynchronous execution mode</p>","<p>Batch inference follows a synchronous execution mode, whereas real-time inference follows an asynchronous execution mode</p>"]},"correct_response":["a","d"],"section":"Fundamentals of AI and ML","question_plain":"A retail company is deploying machine learning models to predict customer demand and optimize inventory management. The company needs to decide between using real-time inference vs batch inference. Understanding the key differences between these approaches, including their use cases, latency requirements, and processing needs, is crucial for optimizing the company's operations.\n\nGiven this context, what would you suggest to the company as the key differences between real-time inference and batch inference? (Select two)","related_lectures":[]},{"_class":"assessment","id":96321763,"assessment_type":"multi-select","prompt":{"question":"<p>Which of the following AWS services are regional in scope? (Select two)</p>\n","relatedLectureIds":"","feedbacks":["","","","",""],"explanation":"<p>Correct options:</p>\n\n<p>Most of the services that AWS offers are Region-specific. But few services, by definition, need to be in a global scope because of the underlying service they offer. AWS Identity and Access Management (AWS IAM), Amazon CloudFront, Amazon Route 53, and AWS Web Application Firewall (AWS WAF) are some of the global services.</p>\n\n<p><strong>AWS Lambda</strong></p>\n\n<p>AWS Lambda is a compute service that lets you run code without provisioning or managing servers. AWS Lambda executes your code only when needed and scales automatically, from a few requests per day to thousands per second. AWS Lambda is a regional service.</p>\n\n<p><strong>Amazon Rekognition</strong></p>\n\n<p>With Amazon Rekognition, you can identify objects, people, text, scenes, and activities in images and videos, as well as detect any inappropriate content. Amazon Rekognition also provides highly accurate facial analysis and facial search capabilities that you can use to detect, analyze, and compare faces for a wide variety of user verification, people counting, and public safety use cases. Amazon Rekognition is a regional service.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>AWS Identity and Access Management (AWS IAM)</strong> - AWS Identity and Access Management (AWS IAM) enables you to manage access to AWS services and resources securely. Using AWS Identity and Access Management (AWS IAM), you can create and manage IAM users and IAM user groups, and use permissions to allow and deny their access to AWS resources.</p>\n\n<p><strong>Amazon CloudFront</strong> - Amazon CloudFront is a fast content delivery network (CDN) service that securely delivers data, videos, applications, and APIs to customers globally with low latency, and high transfer speeds, all within a developer-friendly environment.</p>\n\n<p><strong>AWS Web Application Firewall (AWS WAF)</strong> - By using AWS Web Application Firewall (AWS WAF), you can configure web access control lists (Web ACLs) on your CloudFront distributions or Application Load Balancers to filter and block requests based on request signatures.</p>\n\n<p>As mentioned earlier, these three services are global in scope.</p>\n\n<p>Exam Alert:</p>\n\n<p><strong>Amazon S3</strong> - Amazon S3 is a unique service in the sense that it follows a global namespace but the buckets are regional. You specify an AWS Region when you create your Amazon S3 bucket. This is a regional service.</p>\n","answers":["<p>AWS Identity and Access Management (AWS IAM)</p>","<p>AWS Lambda</p>","<p>Amazon CloudFront</p>","<p>AWS Web Application Firewall (AWS WAF)</p>","<p>Amazon Rekognition</p>"]},"correct_response":["b","e"],"section":"Security, Compliance, and Governance for AI Solutions","question_plain":"Which of the following AWS services are regional in scope? (Select two)","related_lectures":[]},{"_class":"assessment","id":96321743,"assessment_type":"multiple-choice","prompt":{"question":"<p>An organization deploys its IT infrastructure in a combination of its on-premises data center along with AWS Cloud. How would you categorize this deployment model?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Hybrid deployment</strong></p>\n\n<p>A hybrid deployment is a way to connect your on-premises infrastructure to the cloud. The most common method of hybrid deployment is between the cloud and existing on-premises infrastructure to extend an organization's infrastructure into the cloud while connecting cloud resources to internal systems.</p>\n\n<p>Overview of Cloud Computing Deployment Models:\n<img src=\"https://assets-pt.media.datacumulus.com/aw
