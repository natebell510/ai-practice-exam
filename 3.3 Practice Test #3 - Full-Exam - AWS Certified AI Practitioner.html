interactions for bias, but this approach is not ideal due to the lack of standardization. It requires considerable effort to manually select, curate, and evaluate the data for bias, and there is a risk that the selected samples may not cover all relevant bias scenarios comprehensively. This method also involves privacy and ethical considerations, adding further complexity and administrative effort.</p>\n\n<p><strong>The company should use internally generated synthetic data, which involves creating artificial datasets tailored to specific scenarios</strong> - Internally generated synthetic data allows for custom scenarios to be tested, but it requires a significant investment in resources, expertise, and time to create and maintain these datasets. Designing synthetic data that accurately reflects real-world biases and discrimination scenarios is complex, making it an impractical choice when aiming to minimize administrative effort.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/model-evaluation-prompt-datasets-builtin.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/model-evaluation-prompt-datasets-builtin.html</a></p>\n\n<p><a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/model-evaluation-prompt-datasets.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/model-evaluation-prompt-datasets.html</a></p>\n","answers":["<p>The company should use human-monitored benchmarking, where human reviewers manually assess the model's outputs for bias and discrimination</p>","<p>The company should use randomly selected user-generated data, where random samples from actual user interactions are analyzed to identify potential biases</p>","<p>The company should use benchmark datasets, which are pre-compiled, standardized datasets specifically designed to test for biases and discrimination in model outputs</p>","<p>The company should use internally generated synthetic data, which involves creating artificial datasets tailored to specific scenarios</p>"]},"correct_response":["c"],"section":"Security, Compliance, and Governance for AI Solutions","question_plain":"A social media company is planning to implement a large language model (LLM) for content moderation to automatically flag inappropriate or harmful content. To ensure the model is fair and does not show bias or discrimination against specific groups or individuals, the company needs to evaluate the model's outputs regularly for potential bias. The team is considering different data sources for this evaluation but wants to choose an option that minimizes administrative effort while still providing reliable and comprehensive insights into any biases or discrimination present in the LLM's outputs.\n\nGiven these requirements, which data source would be most suitable?","related_lectures":[]},{"_class":"assessment","id":96321681,"assessment_type":"multiple-choice","prompt":{"question":"<p>Which security discipline in the Generative AI Security Scoping Matrix focuses on identifying potential threats to generative AI solutions and recommending mitigations?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Risk management</strong></p>\n\n<p>Risk management in the Generative AI Security Scoping Matrix involves identifying potential threats to generative AI solutions and recommending mitigations. It encompasses activities like risk assessments and threat modeling, which are essential for understanding and addressing the unique risks associated with generative AI workloads.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt3-q60-i1.jpg\"></p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt3-q60-i2.jpg\">\nvia - <a href=\"https://aws.amazon.com/blogs/security/securing-generative-ai-an-introduction-to-the-generative-ai-security-scoping-matrix/\">https://aws.amazon.com/blogs/security/securing-generative-ai-an-introduction-to-the-generative-ai-security-scoping-matrix/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Governance and compliance</strong> - This discipline focuses on the policies, procedures, and reporting specific to generative AI solutions.</p>\n\n<p><strong>Legal and privacy</strong> - This discipline addresses regulatory, legal, and privacy requirements specific to generative AI solutions.</p>\n\n<p><strong>Resilience</strong> - This discipline involves designing generative AI solutions to maintain availability and meet business SLAs.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://aws.amazon.com/blogs/security/securing-generative-ai-an-introduction-to-the-generative-ai-security-scoping-matrix/\">https://aws.amazon.com/blogs/security/securing-generative-ai-an-introduction-to-the-generative-ai-security-scoping-matrix/</a></p>\n","answers":["<p>Governance and compliance</p>","<p>Legal and privacy</p>","<p>Risk management</p>","<p>Resilience</p>"]},"correct_response":["c"],"section":"Guidelines for Responsible AI","question_plain":"Which security discipline in the Generative AI Security Scoping Matrix focuses on identifying potential threats to generative AI solutions and recommending mitigations?","related_lectures":[]},{"_class":"assessment","id":96321679,"assessment_type":"multiple-choice","prompt":{"question":"<p>A retail company is building multiple machine learning models using Amazon SageMaker to optimize inventory management and customer recommendations. The data science teams want to collaborate more effectively by sharing and reusing features without duplicating data across different models. They are looking for a service within Amazon SageMaker that allows them to maintain a centralized catalog of features, ensuring consistency and efficiency in their machine learning workflows.</p>\n\n<p>What do you suggest?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Amazon SageMaker Feature Store</strong></p>\n\n<p>Amazon SageMaker Feature Store is a fully managed, purpose-built repository to store, share, and manage features for machine learning (ML) models. Features are inputs to ML models used during training and inference. For example, in an application that recommends a music playlist, features could include song ratings, listening duration, and listener demographics.</p>\n\n<p>SageMaker Feature Store tags and indexes feature groups so they are easily discoverable through the visual interface of Amazon SageMaker Studio. Browsing the feature catalog allows teams to discover existing features they can confidently reuse and avoid duplication of pipelines. SageMaker Feature Store uses the AWS Glue Data Catalog by default but allows you to use a different catalog if desired. You can also query features using familiar SQL with Amazon Athena or another query tool of your choice.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Amazon SageMaker Data Wrangler</strong> - Amazon SageMaker Data Wrangler reduces the time it takes to aggregate and prepare tabular and image data for ML from weeks to minutes. With SageMaker Data Wrangler, you can simplify the process of data preparation and feature engineering, and complete each step of the data preparation workflow (including data selection, cleansing, exploration, visualization, and processing at scale) from a single visual interface.</p>\n\n<p><strong>Amazon SageMaker Clarify</strong> - SageMaker Clarify helps identify potential bias during data preparation without writing code. You specify input features, such as gender or age, and SageMaker Clarify runs an analysis job to detect potential bias in those features.</p>\n\n<p><strong>Amazon SageMaker Model Dashboard</strong> - Amazon SageMaker Model Dashboard is a centralized portal, accessible from the SageMaker console, where you can view, search, and explore all of the models in your account. You can track which models are deployed for inference and if they are used in batch transform jobs or hosted on endpoints.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://aws.amazon.com/sagemaker/feature-store/\">https://aws.amazon.com/sagemaker/feature-store/</a></p>\n","answers":["<p>Amazon SageMaker Data Wrangler</p>","<p>Amazon SageMaker Model Dashboard</p>","<p>Amazon SageMaker Feature Store</p>","<p>Amazon SageMaker Clarify</p>"]},"correct_response":["c"],"section":"Applications of Foundation Models","question_plain":"A retail company is building multiple machine learning models using Amazon SageMaker to optimize inventory management and customer recommendations. The data science teams want to collaborate more effectively by sharing and reusing features without duplicating data across different models. They are looking for a service within Amazon SageMaker that allows them to maintain a centralized catalog of features, ensuring consistency and efficiency in their machine learning workflows.\n\nWhat do you suggest?","related_lectures":[]},{"_class":"assessment","id":96321677,"assessment_type":"multiple-choice","prompt":{"question":"<p>A logistics company is building machine learning models using Amazon SageMaker to predict delivery times and optimize routes. The data science team needs to clean and preprocess large datasets efficiently but wants to minimize manual coding to speed up development. They are looking for an Amazon SageMaker service that offers built-in data transformations, allowing them to quickly prepare the data without writing code.</p>\n\n<p>Which of the following options is the best-fit for these requirements?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Amazon SageMaker Data Wrangler</strong></p>\n\n<p>Amazon SageMaker Data Wrangler reduces the time it takes to aggregate and prepare tabular and image data for ML from weeks to minutes. With SageMaker Data Wrangler, you can simplify the process of data preparation and feature engineering, and complete each step of the data preparation workflow (including data selection, cleansing, exploration, visualization, and processing at scale) from a single visual interface. You can use SQL to select the data that you want from various data sources and import it quickly. Next, you can use the data quality and insights report to automatically verify data quality and detect anomalies, such as duplicate rows and target leakage. SageMaker Data Wrangler contains over 300 built-in data transformations, so you can quickly transform data without writing any code.</p>\n\n<p>SageMaker Data Wrangler offers a selection of over 300 prebuilt, PySpark-based data transformations, so you can transform your data and scale your data preparation workflow without writing a single line of code. Preconfigured transformations cover common use cases such as flattening JSON files, deleting duplicate rows, imputing missing data with mean or median, one hot encoding, and time-series–specific transformers to accelerate the preparation of time-series data for ML.</p>\n\n<p>Prebuilt transformations in Data Wrangler:\n<img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt3-q62-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/sagemaker/data-wrangler/\">https://aws.amazon.com/sagemaker/data-wrangler/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Amazon SageMaker Clarify</strong> - SageMaker Clarify helps identify potential bias during data preparation without writing code. You specify input features, such as gender or age, and SageMaker Clarify runs an analysis job to detect potential bias in those features.</p>\n\n<p><strong>Amazon SageMaker Ground Truth</strong> - Amazon SageMaker Ground Truth offers the most comprehensive set of human-in-the-loop capabilities, allowing you to harness the power of human feedback across the ML lifecycle to improve the accuracy and relevancy of models. You can complete a variety of human-in-the-loop tasks with SageMaker Ground Truth, from data generation and annotation to model review, customization, and evaluation, either through a self-service or an AWS-managed offering.</p>\n\n<p><strong>Amazon SageMaker Feature Store</strong> - Amazon SageMaker Feature Store is a fully managed, purpose-built repository to store, share, and manage features for machine learning (ML) models. Features are inputs to ML models used during training and inference. For example, in an application that recommends a music playlist, features could include song ratings, listening duration, and listener demographics.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://aws.amazon.com/sagemaker/data-wrangler/\">https://aws.amazon.com/sagemaker/data-wrangler/</a></p>\n","answers":["<p>Amazon SageMaker Data Wrangler</p>","<p>Amazon SageMaker Clarify</p>","<p>Amazon SageMaker Feature Store</p>","<p>Amazon SageMaker Ground Truth</p>"]},"correct_response":["a"],"section":"Applications of Foundation Models","question_plain":"A logistics company is building machine learning models using Amazon SageMaker to predict delivery times and optimize routes. The data science team needs to clean and preprocess large datasets efficiently but wants to minimize manual coding to speed up development. They are looking for an Amazon SageMaker service that offers built-in data transformations, allowing them to quickly prepare the data without writing code.\n\nWhich of the following options is the best-fit for these requirements?","related_lectures":[]},{"_class":"assessment","id":96321675,"assessment_type":"multiple-choice","prompt":{"question":"<p>A financial services company manages a machine learning model to assess loan eligibility for its customers. The company wants to migrate to AWS Cloud and is looking at understanding the capabilities of the various SageMaker services to operationalize and manage its Machine Learning workflow.</p>\n\n<p>As an AI Practitioner, what would you recommend to the company as the best-fit use case for the SageMaker Clarify service?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>You can use SageMaker Clarify to identify potential bias in data preparation, allowing you to detect and measure bias in datasets and models to ensure fairness and transparency in machine learning applications</strong></p>\n\n<p>SageMaker Clarify is specifically designed to help identify and mitigate bias in machine learning models and datasets. It provides tools to analyze both data and model predictions to detect potential bias, generate reports, and help ensure that models are fair and transparent. It can help identify and measure bias within the data preparation stage and throughout the model's lifecycle. This capability is essential for building trustworthy AI systems that do not inadvertently discriminate against specific groups.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>You can use SageMaker Clarify to monitor the quality of a model, which involves assessing and optimizing model performance in real-time during deployment to improve its accuracy and reliability</strong> - While SageMaker Clarify helps ensure that models are fair and unbiased, it is not specifically designed for monitoring the quality or performance of a model in real-time. Model monitoring and performance assessment are typically handled by tools such as SageMaker Model Monitor, which tracks performance metrics, data drift, and other factors that affect model accuracy and reliability.</p>\n\n<p><strong>You can use SageMaker Clarify to prepare ML models with no coding involved, which offers a no-code interface for building, training, and deploying machine learning models without requiring any programming skills</strong> - SageMaker Clarify is not a tool for building, training, or deploying machine learning models without coding. It is specifically focused on detecting bias and explaining model predictions. For no-code or low-code model building, tools like SageMaker Canvas or SageMaker Studio are more appropriate.</p>\n\n<p><strong>You can use SageMaker Clarify to automate hyperparameter tuning, which is the process of automatically optimizing the hyperparameters of a model to achieve the best performance.</strong> - Hyperparameter tuning is not the purpose of SageMaker Clarify. Automated hyperparameter tuning is typically performed using SageMaker’s built-in Hyperparameter Optimization (HPO) capabilities, which explore different hyperparameter configurations to improve model performance. SageMaker Clarify focuses on bias detection and explainability, not model optimization.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://aws.amazon.com/sagemaker/clarify/\">https://aws.amazon.com/sagemaker/clarify/</a></p>\n","answers":["<p>You can use SageMaker Clarify to monitor the quality of a model, which involves assessing and optimizing model performance in real-time during deployment to improve its accuracy and reliability</p>","<p>You can use SageMaker Clarify to prepare ML models with no coding involved, which offers a no-code interface for building, training, and deploying machine learning models without requiring any programming skills</p>","<p>You can use SageMaker Clarify to automate hyperparameter tuning, which is the process of automatically optimizing the hyperparameters of a model to achieve the best performance.</p>","<p>You can use SageMaker Clarify to identify potential bias in data preparation, allowing you to detect and measure bias in datasets and models to ensure fairness and transparency in machine learning applications</p>"]},"correct_response":["d"],"section":"Guidelines for Responsible AI","question_plain":"A financial services company manages a machine learning model to assess loan eligibility for its customers. The company wants to migrate to AWS Cloud and is looking at understanding the capabilities of the various SageMaker services to operationalize and manage its Machine Learning workflow.\n\nAs an AI Practitioner, what would you recommend to the company as the best-fit use case for the SageMaker Clarify service?","related_lectures":[]},{"_class":"assessment","id":96321673,"assessment_type":"multiple-choice","prompt":{"question":"<p>A retail company wants to leverage machine learning to analyze customer behavior and predict future purchasing trends but lacks in-house coding expertise. The company’s goal is to build a model that can identify patterns in customer data and forecast sales, helping to tailor marketing strategies and inventory management. Since the team does not have any programming skills, they are considering different tools or services that would enable them to develop a machine learning model without writing any code.</p>\n\n<p>Given this limitation, which of the following tools or services would be most suitable for the company to use?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>The company should use SageMaker Canvas, as it enables users to create machine learning models using a visual interface</strong></p>\n\n<p>SageMaker Canvas is a perfect choice for a company without coding expertise because it provides a fully no-code environment where users can build machine learning models through a user-friendly visual interface. It simplifies the entire machine learning process, from data import and preparation to model building and deployment, without the need to write any code. This makes it highly suitable for business analysts and non-technical users.</p>\n\n<p>Amazon SageMaker Canvas enables you to build your own AI/ML models without having to write a single line of code. You can build ML models for common use cases such as regression and forecasting and can access and evaluate foundation models (FMs) from Amazon Bedrock. You can also access public FMs from Amazon SageMaker JumpStart for content generation, text extraction, and text summarization to support generative AI solutions.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>The company should use SageMaker Built-in Algorithms, which provide a collection of pre-built algorithms for building machine learning models</strong> - SageMaker Built-in Algorithms offer a range of pre-built machine learning algorithms that can be used for various tasks such as classification, regression, and clustering. However, using these algorithms typically requires knowledge of coding to manage data preparation, model training, and tuning. As such, this option is less suitable for a company with no coding expertise.</p>\n\n<p><strong>The company should use SageMaker Data Wrangler to simplify data preparation and feature engineering, which are mandatory steps towards building a machine learning model</strong> - SageMaker Data Wrangler can be a valuable tool for companies looking to clean and prepare data with minimal coding. It provides a visual interface for data wrangling tasks such as data cleaning, transformation, and feature engineering. However, it cannot be used to build machine learning models.</p>\n\n<p><strong>The company should use SageMaker Clarify, as it enables users to create machine learning models using a visual interface</strong> - SageMaker Clarify automatically evaluates foundation models for your generative AI use case with metrics such as accuracy, robustness, and toxicity to support your responsible AI initiative. SageMaker Clarify explains how input features contribute to your model predictions during model development and inference. Evaluate your FM during customization using automatic and human-based evaluations. SageMaker Clarify cannot be used to build machine learning models.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/sagemaker/canvas/\">https://aws.amazon.com/sagemaker/canvas/</a></p>\n\n<p><a href=\"https://docs.aws.amazon.com/documentdb/latest/developerguide/no-code-machine-learning.html\">https://docs.aws.amazon.com/documentdb/latest/developerguide/no-code-machine-learning.html</a></p>\n","answers":["<p>The company should use SageMaker Canvas, as it enables users to create machine learning models using a visual interface</p>","<p>The company should use SageMaker Built-in Algorithms, which provide a collection of pre-built algorithms for building machine learning models</p>","<p>The company should use SageMaker Data Wrangler to simplify data preparation and feature engineering, which are mandatory steps towards building a machine learning model</p>","<p>The company should use SageMaker Clarify, as it enables users to create machine learning models using a visual interface</p>"]},"correct_response":["a"],"section":"Guidelines for Responsible AI","question_plain":"A retail company wants to leverage machine learning to analyze customer behavior and predict future purchasing trends but lacks in-house coding expertise. The company’s goal is to build a model that can identify patterns in customer data and forecast sales, helping to tailor marketing strategies and inventory management. Since the team does not have any programming skills, they are considering different tools or services that would enable them to develop a machine learning model without writing any code.\n\nGiven this limitation, which of the following tools or services would be most suitable for the company to use?","related_lectures":[]},{"_class":"assessment","id":96321781,"assessment_type":"multiple-choice","prompt":{"question":"<p>Which of the following best describes the Amazon SageMaker Canvas ML tool?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Gives the ability to use machine learning to generate predictions without the need to write any code</strong></p>\n\n<p>Amazon SageMaker Canvas gives you the ability to use machine learning to generate predictions without needing to write any code. With Canvas, you can chat with popular large language models (LLMs), access Ready-to-use models, or build a custom model trained on your data.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Provides one-click, end-to-end solutions for many common machine learning use cases</strong> - Amazon SageMaker JumpStart supports this feature.</p>\n\n<p><strong>Explains how input features contribute to the model predictions during model development and inference</strong> - Amazon SageMaker Clarify supports this feature.</p>\n\n<p><strong>The fastest and easiest way to prepare tabular and image data for machine learning</strong> - Amazon SageMaker Data Wrangler supports this feature.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/sagemaker/latest/dg/canvas.html\">https://docs.aws.amazon.com/sagemaker/latest/dg/canvas.html</a></p>\n","answers":["<p>Gives the ability to use machine learning to generate predictions without the need to write any code</p>","<p>Provides one-click, end-to-end solutions for many common machine learning use cases</p>","<p>Explains how input features contribute to the model predictions during model development and inference</p>","<p>The fastest and easiest way to prepare tabular and image data for machine learning</p>"]},"correct_response":["a"],"section":"Applications of Foundation Models","question_plain":"Which of the following best describes the Amazon SageMaker Canvas ML tool?","related_lectures":[]}]};
      let correct = new Set();

      const questionData = quizData.questions;
      const passPercent = quizData.pass_percent;
      const modalTextElement = document.getElementById('modal-text');
      const quizContainerElement = document.getElementById('quiz-container');

      const dialog = document.querySelector('dialog');
      const showButton = document.getElementById('view-explanatin');
      const closeButton = document.getElementById('close-modal-btn');
      const quizTitleElement = document.getElementById('quiz-title');
      const quizDescriptionElement = document.getElementById('quiz-description');

      function main() {
        // update quiz meta data
        document.title = quizTitle;
        quizTitleElement.innerHTML = quizTitle;
        quizDescriptionElement.innerHTML = quizDescription;

        const passPercentElement = document.getElementById('pass-percent');
        passPercentElement.innerHTML = passPercent + '%';
        totalNumberOfQuestions = questionData.length;
        // shuffle the questionData to randomize the order of the questions
        for (let i = questionData.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [questionData[i], questionData[j]] = [questionData[j], questionData[i]];
        }

        let formattedQuestions = questionData.map(formatSingleQuestionData);
        updateScore();
        // display the formattedQuestions
        formattedQuestions.forEach((question, idx) => {
          renderSingleQuestion(question, idx + 1);
        });
      }

      /**
       * Formats the question data from the given QuizData object.
       *
       * @param {Object} singleQuizData - The singleQuizData object containing prompt and correct_response.
       * @return {Object} The formatted question object with the following properties:
       *   - id: The ID of the question.
       *   - question: The text of the question.
       *   - answers: The array of answer options.
       *   - correctAnswer: The text of the correct answer.
       *   - explanation: The explanation of the correct answer.
       */
      function formatSingleQuestionData(singleQuizData = null) {
        const { prompt, correct_response, id } = singleQuizData;
        const questionText = prompt.question;
        const answers = prompt.answers;
        const correctAnswer = correct_response[0];
        const correctAnswerText = answers[correctAnswer.toLowerCase().charCodeAt(0) - 97];
        const questionObj = {
          id: id,
          question: questionText,
          answers: answers,
          correctAnswer,
          explanation: prompt?.explanation || '',
        };
        return questionObj;
      }

      /**
       * Renders a single question with its options and submit button.
       *
       * @param {Object} singleQuestionData - The data of the question to render.
       * @param {number} rootIndex - The index of the question in the quiz.
       * @return {void} return nothing.
       */

      const renderSingleQuestion = (singleQuestionData = {}, rootIndex = 1) => {
        const { id, explanation, answers, correctAnswer, question } = singleQuestionData;
        // shuffle the answers to randomize the order of the answers
        // for (let i = answers.length - 1; i > 0; i--) {
        //   const j = Math.floor(Math.random() * (i + 1));
        //   [answers[i], answers[j]] = [answers[j], answers[i]];
        // }
        const alphabet = 'abcdefghijklmnopqrstuvwxyz'.split('');
        const optionsHTML = answers
          .map((option, index) => {
            const optionId = `${id}_${index}`;

            return `
        <div class="question-lable">
          <input type="radio" id="${optionId}" name="${'answer'}" value="${alphabet[index]}" />
          <label for="${optionId}">${option}</label>
        </div>
      `;
          })

          .join('');

        const container = document.createElement('div');
        container.innerHTML = `
        <form data-correct-answer="${correctAnswer}" data-question-id="${id}" class="single-question-container" onsubmit="submitButtonListener(event)">
          <div style="display: flex;justify-content: space-between;">
            <p style="font-weight: 600">Question ${rootIndex}:</p>
            <button type="button" onclick="renderExplanation(event)" id="${`explanation-${id}`}" data-explanation="${'tt'}" data-explanation-id=${id} class="explanation-btn">View Explanation</button>
          </div>
          <p style="margin-bottom: 8px;line-height: 1.5">${question}</p>
          <div class="options-container">
            ${optionsHTML}
          </div>
          <div style="display: flex; gap: 8px;">
            <button type="submit" id="submit-button" class="button">Submit</button>
          </div>
        </form>
      `;
        quizContainerElement.appendChild(container);
      };

      /**
       * Updates the score on the page based on the number of correct and incorrect answers.
       *
       * @return {void} This function does not return a value.
       */
      function updateScore() {
        const currentParcentageElement = document.getElementById('current-score');
        const correctAnswerElement = document.getElementById('correct-answers');
        const wrongAnswerElement = document.getElementById('wrong-answers');
        correctAnswerElement.innerHTML = correct.size;
        wrongAnswerElement.innerHTML = incorrect.size;
        const score = Number((correct.size / totalNumberOfQuestions) * 100).toFixed(2);
        currentParcentageElement.innerHTML = score;
      }

      /**
       * Handles the event when the submit button is clicked.
       *
       * @param {Event} e - The event object.
       * @return {void} This function does not return anything.
       */
      const submitButtonListener = e => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const form = e.target;
        const selectedOption = e.target.querySelector('input[type="radio"]:checked');
        if (!selectedOption) {
          alert('Please select an answer!');
          return;
        }

        let isCorrect = false;
        const { answer: userAnswer } = Object.fromEntries(formData.entries());
        const correctAnswer = e.target.dataset.correctAnswer;
        const questionId = e.target.dataset.questionId;
        if (userAnswer == correctAnswer) {
          correct.add(questionId);
          incorrect.delete(questionId);
          isCorrect = true;
        } else {
          incorrect.add(e.target.dataset.questionId);
          correct.delete(questionId);
        }
        updateScore();

        const resultClass = isCorrect ? 'correct-answer' : 'incorrect-answer';

        form.querySelectorAll('.question-lable').forEach(label => {
          label.classList.remove('correct-answer', 'incorrect-answer');
        });
        selectedOption.closest('.question-lable').classList.add(resultClass);
      };

      function renderExplanation(ev) {
        const dataid = ev.target.dataset.explanationId;
        const quiz = quizData.questions.find(q => q.id === Number(dataid));
        modalTextElement.innerHTML =
          quiz && quiz.prompt.explanation ? quiz.prompt.explanation : 'no explanation found';
        // modalTextElement.innerHTML = ev.target.dataset?.explanation || 'no explanation found';
        dialog.showModal();
        dialog.addEventListener('click', event => {
          if (event.target === dialog) {
            dialog.close();
          }
        });
      }
    </script>
  </body>
</html>
