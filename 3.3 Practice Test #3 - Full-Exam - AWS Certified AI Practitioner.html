<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz</title>
    <style>
      * {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu,
          Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-size: 16px;
      }

      main {
        padding-top: 48px;
      }

      :root {
        --large-device-width: 850px;
        --primary-color: #0f172a;
        --secondary-color: #020617;
        --primary-text-color: #c7d1dd;
        --secondary-text-color: #061602;
        --success-background: hsl(159, 82%, 24%);
        --success-foreground: hsl(164, 86%, 16%);
        --success: hsl(160, 84%, 39%);
        --danger: #ef4444;
        --warning: #f59e0b;
        --info-background: hsl(218, 81%, 8%);
        --info-foreground: hsl(217, 91%, 85%);
        --border-color: #d1d7dc;
        --check-box-size: 20px;
        /* control the size */
        --check-box-color: var(--info-foreground);
        /* the active color */
      }

      body {
        position: relative;
        background-color: #020617;
        color: var(--primary-text-color);
      }

      #score-stats-container {
        position: fixed;
        z-index: 10;
        top: 0;
        height: 40px;
        width: 100%;
        background-color: var(--info-background);

        padding: 0px 16px;
        color: var(--info-foreground);
        font-weight: 600;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      #quiz-container {
        border-radius: 8px;
        display: flex;
        gap: 16px;
        flex-direction: column;
      }

      input[type='radio'] {
        height: var(--check-box-size);
        aspect-ratio: 1;
        border: calc(var(--check-box-size) / 8) solid #939393;
        padding: calc(var(--check-box-size) / 8);
        background: radial-gradient(farthest-side, var(--check-box-color) 94%, #0000) 50%/0 0 no-repeat
          content-box;
        border-radius: 50%;
        outline-offset: calc(var(--check-box-size) / 10);
        -webkit-appearance: none;
        -moz-appearance: none;
        appearance: none;
        cursor: pointer;
        font-size: inherit;
        transition: 0.3s;
      }

      input[type='radio']:checked {
        border-color: var(--check-box-color);
        background-size: 100% 100%;
      }

      input[type='radio']:disabled {
        background: linear-gradient(#939393 0 0) 50%/100% 20% no-repeat content-box;
        opacity: 0.5;
        cursor: not-allowed;
      }

      label {
        /* display: inline-flex; */
        align-items: center;
        gap: 10px;
        cursor: pointer;
        padding: 4px 6px;
        border-radius: 4px;
      }

      @media (max-width: 767px) {
        input[type='radio'],
        label {
          cursor: default;
        }

        #quiz-container {
          margin-left: 8px;
          margin-right: 8px;
        }
      }

      /* PC (Desktop devices) */
      @media (min-width: 768px) {
        body {
          display: flex;
          justify-content: center;
        }

        main {
          max-width: var(--large-device-width);
        }

        #score-stats-container {
          max-width: var(--large-device-width);
        }

        dialog {
          max-width: var(--large-device-width);
        }
      }

      @media print {
        input[type='radio'] {
          background: none !important;
          border-color: #939393 !important;
        }

        input[type='radio']:checked {
          border-color: #939393 !important;
        }
      }

      .question-lable {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      button {
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
        outline: none;
        position: relative;
        overflow: hidden;
        cursor: pointer;
      }

      .button {
        background-color: var(--success-background);
        border: none;
        color: #f4f5f7;
        opacity: 0.8;
        font-size: 18px;
        flex-grow: 1;
        padding: 8px 16px;
        border-radius: 8px;
      }

      .button:hover {
        opacity: 1;
      }

      .explanation-btn {
        border: none;
        color: var(--success);
        background-color: transparent;
      }

      #submit-button:active::after {
        background-color: #ef4444;
      }

      .single-question-container {
        background-color: var(--primary-color);
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding: 16px;
        border-radius: 8px;
      }

      #modal-content {
        padding: 16px;
        line-height: 24px;
      }

      dialog::backdrop {
        background: rgba(0, 0, 0, 0.5);
      }

      dialog {
        position: fixed;
        border: 1px solid var(--border-color);
        background-color: var(--primary-color);
        color: rgb(240, 241, 248);
        padding: 16px;
        border-radius: 8px;
        width: 80vw;
        max-height: 80vh;
        overflow: auto;
        top: 50%;
        left: 50%;
        -webkit-transform: translateX(-50%) translateY(-50%);
        -moz-transform: translateX(-50%) translateY(-50%);
        -ms-transform: translateX(-50%) translateY(-50%);
        transform: translateX(-50%) translateY(-50%);
      }

      #close-modal-btn {
        position: absolute;
        top: 4px;
        right: 4px;
        padding: 2px 8px;
        border-radius: 2px;
        border: none;
        background-color: var(--danger);
      }

      .correct-answer label {
        border: 2px solid var(--success);
        width: 100%;
      }

      .incorrect-answer label {
        border: 2px solid var(--danger);
        width: 100%;
      }

      .options-container {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      #quiz-meta-container {
        border-radius: 8px;
        background-color: var(--primary-color);
        margin-bottom: 12px;
        padding: 8px;
      }

      #quiz-title {
        text-align: center;
        font-size: 24px;
        margin-bottom: 8px;
      }

      #quiz-description {
        line-height: 1.5;
        padding: 2px 6px;
      }
      img {
        width: 100%;
      }
    </style>
  </head>

  <body onload="main()">
    <main>
      <section id="quiz-meta-container">
        <h1 id="quiz-title"></h1>

      </section>
      <section id="score-stats-container">
        <div id="score-card">
          Score: <span id="current-score">999</span> of
          <span id="pass-percent">999%</span>
        </div>
        <div>Correct: <span id="correct-answers">999</span></div>
        <div>Incorrect: <span id="wrong-answers">999</span></div>
      </section>

      <section id="quiz-container"></section>

      <dialog id="modal" class="modal-container">
        <div id="modal-content">
          <p id="modal-text"></p>
        </div>
      </dialog>
    </main>

    <script>
      const quizData = {"quiz_id":6463759,"quiz_title":"Practice Test #3 - Full-Exam - AWS Certified AI Practitioner","questions":[{"_class":"assessment","id":96321655,"assessment_type":"multiple-choice","prompt":{"question":"<p>A media company is considering using generative AI to automate content creation for articles, videos, and marketing campaigns. The team wants to understand the underlying mechanics of generative AI, particularly how these models are able to create entirely new content or data, such as text, images, and music, based on patterns learned from existing datasets. This understanding will help the company determine how to best integrate generative AI into its creative workflows.</p>\n\n<p>Given this context, how does generative AI create new content or data?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>By learning patterns from existing data and using algorithms to generate new content that mimics those patterns</strong></p>\n\n<p>Generative AI works by learning patterns from existing data and using sophisticated algorithms to generate new content that mimics these patterns. This approach allows it to create realistic and coherent new data that aligns with the learned patterns.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt3-q1-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/what-is/generative-ai/\">https://aws.amazon.com/what-is/generative-ai/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>By using pre-defined rules and templates without any learning from existing data</strong> - Generative AI does not rely on pre-defined rules and templates alone; it learns from existing data to generate new content.</p>\n\n<p><strong>Through traditional programming methods where each outcome is manually coded</strong> - Traditional programming involves manually coding each outcome, whereas generative AI uses machine learning algorithms to automate content creation.</p>\n\n<p><strong>By randomly generating content without any reference to existing data</strong> - Generative AI does not generate content randomly; it leverages learned data patterns to produce new, relevant content.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://aws.amazon.com/what-is/generative-ai/\">https://aws.amazon.com/what-is/generative-ai/</a></p>\n","answers":["<p>By using pre-defined rules and templates without any learning from existing data</p>","<p>Through traditional programming methods where each outcome is manually coded</p>","<p>By learning patterns from existing data and using algorithms to generate new content that mimics those patterns</p>","<p>By randomly generating content without any reference to existing data</p>"]},"correct_response":["c"],"section":"Fundamentals of Generative AI","question_plain":"A media company is considering using generative AI to automate content creation for articles, videos, and marketing campaigns. The team wants to understand the underlying mechanics of generative AI, particularly how these models are able to create entirely new content or data, such as text, images, and music, based on patterns learned from existing datasets. This understanding will help the company determine how to best integrate generative AI into its creative workflows.\n\nGiven this context, how does generative AI create new content or data?","related_lectures":[]},{"_class":"assessment","id":96321653,"assessment_type":"multiple-choice","prompt":{"question":"<p>A financial services company is exploring the adoption of generative AI to automate report generation and enhance customer service through chatbots. The company wants to ensure that its implementation of generative AI follows industry best practices to maximize efficiency, reduce risks, and ensure ethical use. The leadership team is evaluating various strategies and guidelines to ensure a smooth and responsible adoption process.</p>\n\n<p>Give this use case, which of the following represents a best practice in generative AI adoption?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Implementing guardrails and enhancing transparency for generative AI applications</strong></p>\n\n<p>You must clearly communicate about all generative AI applications and outputs, so your users know they are interacting with AI and not humans. For instance, the AI can introduce itself as AI or AI-based search results can be marked and highlighted. You should also implement guardrails so your generative AI applications don't allow inadvertent unauthorized access to sensitive data.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt3-q2-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/what-is/generative-ai/\">https://aws.amazon.com/what-is/generative-ai/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Prioritizing rapid deployment over the ethical considerations and potential biases in AI models</strong> - Ethical considerations and potential biases are crucial in AI deployment, and should not be overlooked in favor of rapid deployment.</p>\n\n<p><strong>Disregarding continuous monitoring and updating of AI models after deployment</strong> - Continuous monitoring and updating of AI models are essential to maintain their effectiveness and relevance over time. So, this option is incorrect.</p>\n\n<p><strong>Using generative AI exclusively for creative applications and avoiding its use in business operations</strong> - Generative AI has a wide range of applications beyond just creative fields, and it can be beneficial in various business operations as well.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://aws.amazon.com/what-is/generative-ai/\">https://aws.amazon.com/what-is/generative-ai/</a></p>\n","answers":["<p>Prioritizing rapid deployment over the ethical considerations and potential biases in AI models</p>","<p>Disregarding continuous monitoring and updating of AI models after deployment</p>","<p>Implementing guardrails and enhancing transparency for generative AI applications</p>","<p>Using generative AI exclusively for creative applications and avoiding its use in business operations</p>"]},"correct_response":["c"],"section":"Fundamentals of Generative AI","question_plain":"A financial services company is exploring the adoption of generative AI to automate report generation and enhance customer service through chatbots. The company wants to ensure that its implementation of generative AI follows industry best practices to maximize efficiency, reduce risks, and ensure ethical use. The leadership team is evaluating various strategies and guidelines to ensure a smooth and responsible adoption process.\n\nGive this use case, which of the following represents a best practice in generative AI adoption?","related_lectures":[]},{"_class":"assessment","id":96321671,"assessment_type":"multiple-choice","prompt":{"question":"<p>A tech company is integrating generative AI into its customer support system to automatically answer user queries. During testing, the team notices that the AI occasionally generates responses that sound convincing but contain inaccurate information. To address this issue, the team needs to understand the phenomenon where a generative AI model produces information that may appear plausible but is factually incorrect.</p>\n\n<p>What is this phenomenon called?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Hallucination</strong></p>\n\n<p>Generative AI models are as reliable as the data they’re trained on and can access. There is a risk of hallucination, which is when the models make something up that may sound plausible and factual but which may not be correct.</p>\n\n<p>Any organizations or teams that use generative AI to make decisions or prioritize actions, must build responsible AI systems that are fair, explainable, robust, secure, transparent, and that safeguard privacy.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Explainability</strong> - Explainability refers to understanding and evaluating system outputs.</p>\n\n<p><strong>Fairness</strong> - Fairness addresses the impact on different groups of stakeholders in the ML ecosystem.</p>\n\n<p><strong>Controllability</strong> - Controllability refers to mechanisms for monitoring and steering AI system behavior.</p>\n\n<p>These three options are core dimensions of responsible AI.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/blogs/publicsector/generative-ai-understand-the-challenges-to-realize-the-opportunities/\">https://aws.amazon.com/blogs/publicsector/generative-ai-understand-the-challenges-to-realize-the-opportunities/</a></p>\n\n<p><a href=\"https://aws.amazon.com/machine-learning/responsible-ai/\">https://aws.amazon.com/machine-learning/responsible-ai/</a></p>\n","answers":["<p>Hallucination</p>","<p>Explainability</p>","<p>Fairness</p>","<p>Controllability</p>"]},"correct_response":["a"],"section":"Applications of Foundation Models","question_plain":"A tech company is integrating generative AI into its customer support system to automatically answer user queries. During testing, the team notices that the AI occasionally generates responses that sound convincing but contain inaccurate information. To address this issue, the team needs to understand the phenomenon where a generative AI model produces information that may appear plausible but is factually incorrect.\n\nWhat is this phenomenon called?","related_lectures":[]},{"_class":"assessment","id":96321669,"assessment_type":"multiple-choice","prompt":{"question":"<p>A technology consulting firm is advising a client on how to integrate AI into their customer service and content creation workflows. The client is particularly interested in using Large Language Models (LLMs) for tasks such as automating customer support, generating marketing content, and processing large volumes of text data. To ensure they choose the right applications, the team needs to understand the potential uses of LLMs across different industries and business functions.</p>\n\n<p>What do you suggest?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>LLMs are used for generating human-like text, translating languages, summarizing text, and answering questions based on large datasets</strong></p>\n\n<p>Large language models (LLM) are very large deep learning models that are pre-trained on vast amounts of data. Large language models are incredibly flexible. One model can perform completely different tasks such as answering questions, summarizing documents, translating languages and completing sentences.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt3-q4-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/what-is/large-language-model/\">https://aws.amazon.com/what-is/large-language-model/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>LLMs are used to synthesize realistic human speech from text inputs</strong></p>\n\n<p><strong>LLMs are used for designing and generating 3D models for use in various applications such as gaming, virtual reality, or industrial design</strong></p>\n\n<p><strong>LLMs are used for creating videos from textual descriptions</strong></p>\n\n<p>Certain specialized applications - such as synthesizing speech, generating 3D models, creating videos from textual descriptions - typically require models that are specialized in handling visual, audio, or three-dimensional data, and while LLMs are powerful for text-based tasks, they are not designed for generating or manipulating non-textual data. Generative Adversarial Networks (GANs), Variational Autoencoders (VAEs), and other specialized generative models are more suitable for these applications. Therefore, these three options are incorrect.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/what-is/large-language-model/\">https://aws.amazon.com/what-is/large-language-model/</a></p>\n\n<p><a href=\"https://aws.amazon.com/what-is/gan/\">https://aws.amazon.com/what-is/gan/</a></p>\n\n<p><a href=\"https://aws.amazon.com/what-is/generative-ai/\">https://aws.amazon.com/what-is/generative-ai/</a></p>\n","answers":["<p>LLMs are used for generating human-like text, translating languages, summarizing text, and answering questions based on large datasets</p>","<p>LLMs are used to synthesize realistic human speech from text inputs</p>","<p>LLMs are used for designing and generating 3D models for use in various applications such as gaming, virtual reality, or industrial design</p>","<p>LLMs are used for creating videos from textual descriptions</p>"]},"correct_response":["a"],"section":"Fundamentals of Generative AI","question_plain":"A technology consulting firm is advising a client on how to integrate AI into their customer service and content creation workflows. The client is particularly interested in using Large Language Models (LLMs) for tasks such as automating customer support, generating marketing content, and processing large volumes of text data. To ensure they choose the right applications, the team needs to understand the potential uses of LLMs across different industries and business functions.\n\nWhat do you suggest?","related_lectures":[]},{"_class":"assessment","id":96321667,"assessment_type":"multiple-choice","prompt":{"question":"<p>A healthcare company is considering using Amazon Bedrock to develop AI solutions that handle sensitive patient data, such as medical records and diagnostic information. Given the strict regulatory requirements in healthcare, the company needs to ensure that Amazon Bedrock provides robust data security and compliance features. The company is evaluating the platform's capabilities to safeguard data and meet compliance standards like HIPAA.</p>\n\n<p>Which of the following is correct regarding the data security and compliance aspects of Amazon Bedrock for the given use case?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>The company's data is not used to improve the base Foundation Models (FMs) and it is not shared with any model providers</strong></p>\n\n<p>Amazon Bedrock is a fully managed service that makes high-performing foundation models (FMs) from leading AI startups and Amazon available for your use through a unified API. Using Amazon Bedrock, you can easily experiment with and evaluate top foundation models for your use cases, privately customize them with your data using techniques such as fine-tuning and Retrieval Augmented Generation (RAG), and build agents that execute tasks using your enterprise systems and data sources.</p>\n\n<p>With Amazon Bedrock, your content is not used to improve the base models and is not shared with any model providers.</p>\n\n<p>Your data in Amazon Bedrock is always encrypted in transit and at rest, and you can optionally encrypt the data using your own keys. You can use AWS PrivateLink with Amazon Bedrock to establish private connectivity between your FMs and your Amazon Virtual Private Cloud (Amazon VPC) without exposing your traffic to the Internet.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt3-q5-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/bedrock/faqs/\">https://aws.amazon.com/bedrock/faqs/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>The company's data is used to improve the base Foundation Models (FMs) and it is also shared with the model providers for model optimization</strong></p>\n\n<p><strong>The company's data is only used to improve the base Foundation Models (FMs), however, it is not shared with any model providers</strong></p>\n\n<p><strong>The company's data is not used to improve the base Foundation Models (FMs), however, it is shared with the model providers for model optimization</strong></p>\n\n<p>These three options contradict the explanation provided above, so these options are incorrect.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://aws.amazon.com/bedrock/faqs/\">https://aws.amazon.com/bedrock/faqs/</a></p>\n","answers":["<p>The company's data is used to improve the base Foundation Models (FMs) and it is also shared with the model providers for model optimization</p>","<p>The company's data is only used to improve the base Foundation Models (FMs), however, it is not shared with any model providers</p>","<p>The company's data is not used to improve the base Foundation Models (FMs), however, it is shared with the model providers for model optimization</p>","<p>The company's data is not used to improve the base Foundation Models (FMs) and it is not shared with any model providers</p>"]},"correct_response":["d"],"section":"Applications of Foundation Models","question_plain":"A healthcare company is considering using Amazon Bedrock to develop AI solutions that handle sensitive patient data, such as medical records and diagnostic information. Given the strict regulatory requirements in healthcare, the company needs to ensure that Amazon Bedrock provides robust data security and compliance features. The company is evaluating the platform's capabilities to safeguard data and meet compliance standards like HIPAA.\n\nWhich of the following is correct regarding the data security and compliance aspects of Amazon Bedrock for the given use case?","related_lectures":[]},{"_class":"assessment","id":96321665,"assessment_type":"multiple-choice","prompt":{"question":"<p>A company wants to improve the performance of a Foundation Model (FM) being used in Amazon Bedrock.</p>\n\n<p>Which of the following lists the underlying techniques in the increasing order of complexity for implementing a solution?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Prompt engineering, Retrieval Augmented Generation (RAG), Fine-tuning</strong></p>\n\n<p>Prompt engineering is the practice of carefully designing prompts to efficiently tap into the capabilities of FMs. It involves the use of prompts, which are short pieces of text that guide the model to generate more accurate and relevant responses. With prompt engineering, you can improve the performance of FMs and make them more effective for a variety of applications.</p>\n\n<p>Retrieval Augmented Generation (RAG) allows you to customize a model’s responses when you want the model to consider new knowledge or up-to-date information. When your data changes frequently, like inventory or pricing, it’s not practical to fine-tune and update the model while it’s serving user queries. To equip the FM with up-to-date proprietary information, organizations turn to RAG, a technique that involves fetching data from company data sources and enriching the prompt with that data to deliver more relevant and accurate responses.</p>\n\n<p>RAG produces quality results, due to augmenting use case-specific context directly from vectorized data stores. Compared to prompt engineering, it produces vastly improved results with massively low chances of hallucinations. RAG has a higher complexity than prompt engineering because you need to have coding and architecture skills to implement this solution.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt3-q6-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/blogs/machine-learning/best-practices-to-build-generative-ai-applications-on-aws/\">https://aws.amazon.com/blogs/machine-learning/best-practices-to-build-generative-ai-applications-on-aws/</a></p>\n\n<p>Fine-tuning is the process of taking a pre-trained FM, such as Llama 2, and further training it on a downstream task with a dataset specific to that task. The pre-trained model provides general linguistic knowledge, and fine-tuning allows it to specialize and improve performance on a particular task like text classification, question answering, or text generation. With fine-tuning, you provide labeled datasets—which are annotated with additional context—to train the model on specific tasks.</p>\n\n<p>Model customization - such as fine-tuning - has higher complexity than prompt engineering and RAG because the model’s weight and parameters are being changed via tuning scripts, which requires data science and ML expertise.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt3-q6-i2.jpg\">\nvia - <a href=\"https://aws.amazon.com/blogs/machine-learning/best-practices-to-build-generative-ai-applications-on-aws/\">https://aws.amazon.com/blogs/machine-learning/best-practices-to-build-generative-ai-applications-on-aws/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Prompt engineering, Fine-tuning, Retrieval Augmented Generation (RAG)</strong></p>\n\n<p><strong>Retrieval Augmented Generation (RAG), Fine-tuning, Prompt engineering</strong></p>\n\n<p><strong>Retrieval Augmented Generation (RAG), Prompt engineering, Fine-tuning</strong></p>\n\n<p>These three options contradict the explanation provided above, so these options are incorrect.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://aws.amazon.com/blogs/machine-learning/best-practices-to-build-generative-ai-applications-on-aws/\">https://aws.amazon.com/blogs/machine-learning/best-practices-to-build-generative-ai-applications-on-aws/</a></p>\n","answers":["<p>Prompt engineering, Fine-tuning, Retrieval Augmented Generation (RAG)</p>","<p>Retrieval Augmented Generation (RAG), Fine-tuning, Prompt engineering</p>","<p>Retrieval Augmented Generation (RAG), Prompt engineering, Fine-tuning</p>","<p>Prompt engineering, Retrieval Augmented Generation (RAG), Fine-tuning</p>"]},"correct_response":["d"],"section":"Fundamentals of Generative AI","question_plain":"A company wants to improve the performance of a Foundation Model (FM) being used in Amazon Bedrock.\n\nWhich of the following lists the underlying techniques in the increasing order of complexity for implementing a solution?","related_lectures":[]},{"_class":"assessment","id":96321663,"assessment_type":"multi-select","prompt":{"question":"<p>A retail company is using Amazon Bedrock to enhance its product recommendation system with generative AI. To tailor the AI model to the company’s specific needs, the data science team is exploring different model customization methods, since understanding the valid customization options available for Amazon Bedrock is crucial for optimizing the model’s performance.</p>\n\n<p>Which of the following represent valid model customization methods for Amazon Bedrock? (Select two)</p>\n","relatedLectureIds":"","feedbacks":["","","","",""],"explanation":"<p>Correct options:</p>\n\n<p>Model customization involves further training and changing the weights of the model to enhance its performance. You can use <code>continued pre-training</code> or <code>fine-tuning</code> for model customization in Amazon Bedrock.</p>\n\n<p><strong>Continued Pre-training</strong></p>\n\n<p>In the continued pre-training process,  you provide unlabeled data to pre-train a foundation model by familiarizing it with certain types of inputs. You can provide data from specific topics to expose a model to those areas. The Continued Pre-training process will tweak the model parameters to accommodate the input data and improve its domain knowledge.</p>\n\n<p>For example, you can train a model with private data, such as business documents, that are not publicly available for training large language models. Additionally, you can continue to improve the model by retraining the model with more unlabeled data as it becomes available.</p>\n\n<p><strong>Fine-tuning</strong></p>\n\n<p>While fine-tuning a model, you provide labeled data to train a model to improve performance on specific tasks. By providing a training dataset of labeled examples, the model learns to associate what types of outputs should be generated for certain types of inputs. The model parameters are adjusted in the process and the model's performance is improved for the tasks represented by the training dataset.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt3-q7-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/blogs/machine-learning/best-practices-to-build-generative-ai-applications-on-aws/\">https://aws.amazon.com/blogs/machine-learning/best-practices-to-build-generative-ai-applications-on-aws/</a></p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt3-q7-i2.jpg\">\nvia - <a href=\"https://aws.amazon.com/blogs/machine-learning/best-practices-to-build-generative-ai-applications-on-aws/\">https://aws.amazon.com/blogs/machine-learning/best-practices-to-build-generative-ai-applications-on-aws/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Zero-shot prompting</strong></p>\n\n<p><strong>Chain-of-thought prompting</strong></p>\n\n<p>Prompt engineering is the practice of carefully designing prompts to efficiently tap into the capabilities of FMs. It involves the use of prompts, which are short pieces of text that guide the model to generate more accurate and relevant responses. With prompt engineering, you can improve the performance of FMs and make them more effective for a variety of applications. Prompt engineering has techniques such as zero-shot and few-shot prompting, which rapidly adapts FMs to new tasks with just a few examples, and chain-of-thought prompting, which breaks down complex reasoning into intermediate steps.</p>\n\n<p>Prompt engineering is not a model customization method. Therefore, both these options are incorrect.</p>\n\n<p><strong>Retrieval Augmented Generation (RAG)</strong> - Retrieval Augmented Generation (RAG) allows you to customize a model’s responses when you want the model to consider new knowledge or up-to-date information. When your data changes frequently, like inventory or pricing, it’s not practical to fine-tune and update the model while it’s serving user queries. To equip the FM with up-to-date proprietary information, organizations turn to RAG, a technique that involves fetching data from company data sources and enriching the prompt with that data to deliver more relevant and accurate responses. RAG is not a model customization method.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/custom-models.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/custom-models.html</a></p>\n\n<p><a href=\"https://aws.amazon.com/blogs/machine-learning/best-practices-to-build-generative-ai-applications-on-aws/\">https://aws.amazon.com/blogs/machine-learning/best-practices-to-build-generative-ai-applications-on-aws/</a></p>\n","answers":["<p>Continued Pre-training</p>","<p>Fine-tuning</p>","<p>Retrieval Augmented Generation (RAG)</p>","<p>Zero-shot prompting</p>","<p>Chain-of-thought prompting</p>"]},"correct_response":["a","b"],"section":"Fundamentals of Generative AI","question_plain":"A retail company is using Amazon Bedrock to enhance its product recommendation system with generative AI. To tailor the AI model to the company’s specific needs, the data science team is exploring different model customization methods, since understanding the valid customization options available for Amazon Bedrock is crucial for optimizing the model’s performance.\n\nWhich of the following represent valid model customization methods for Amazon Bedrock? (Select two)","related_lectures":[]},{"_class":"assessment","id":96321661,"assessment_type":"multi-select","prompt":{"question":"<p>A financial services company is deploying a machine learning model using Amazon Bedrock to predict loan approval risks. The data science team needs to ensure that the model performs effectively before going into production. They are focused on understanding the correct practices and tools for model evaluation on Amazon Bedrock to ensure accuracy, fairness, and reliability in their predictions.</p>\n\n<p>Which of the following are correct regarding model evaluation for Amazon Bedrock? (Select two)</p>\n","relatedLectureIds":"","feedbacks":["","","","",""],"explanation":"<p>Correct options:</p>\n\n<p>Model evaluation is the process of evaluating and comparing model outputs to determine the model that is best suited for a use case. You can choose to create either an automatic model evaluation job or a model evaluation job that uses a human workforce.</p>\n\n<p><strong>Human model evaluation is valuable for assessing qualitative aspects of the model, whereas, automatic model valuation is valuable for assessing quantitative aspects of the model</strong></p>\n\n<p>Automatic model evaluation jobs allow you to quickly evaluate a model's ability to perform a task. You can either provide your own custom prompt dataset that you've tailored to a specific use case, or you can use an available built-in dataset. These datasets consist of associated metrics that offer a consistent, objective means to measure model performances.</p>\n\n<p>Model evaluation jobs that use human workers allow you to bring human input to the model evaluation process. They can be employees of your company or a group of subject-matter experts from your industry. This can include tasks like open-ended conversations, answering questions, generating text, or other specific use cases. Human evaluators can give qualitative feedback on aspects such as coherence, relevance, accuracy, and the overall quality of the model's outputs.</p>\n\n<p><strong>Automatic model evaluation provides model scores that are calculated using various statistical methods such as BERT Score and F1</strong></p>\n\n<p>For automated model evaluation job report cards, you get details on model scores that are calculated using various statistical methods such as BERT Score and F1. For example, for text summarization task type - BERT Score is calculated using pre-trained contextual embeddings from BERT models. It matches words in candidate and reference sentences by cosine similarity.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Automatic model evaluation is valuable for assessing qualitative aspects of the model, whereas, human model valuation is valuable for assessing quantitative aspects of the model</strong> - This option contradicts the explanation provided above. Human evaluators can give qualitative feedback on the overall quality of the model's outputs.</p>\n\n<p><strong>Human model evaluation provides model scores that are calculated using various statistical methods such as BERT Score and F1</strong> - As mentioned earlier, it is only for automated model evaluation job report cards, you get details on model scores that are calculated using various statistical methods such as BERT Score and F1.</p>\n\n<p><strong>For human model evaluation, you can use either built-in prompt datasets or your own prompt datasets</strong> - To evaluate a model's performance for automatic model evaluation jobs, you can use either built-in prompt datasets or your own prompt datasets. For model evaluation jobs that use workers, you must use your own dataset. So, this option is incorrect.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/model-evaluation.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/model-evaluation.html</a></p>\n\n<p><a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/model-evaluation-report-programmatic.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/model-evaluation-report-programmatic.html</a></p>\n","answers":["<p>For human model evaluation, you can use either built-in prompt datasets or your own prompt datasets</p>","<p>Human model evaluation provides model scores that are calculated using various statistical methods such as BERT Score and F1</p>","<p>Human model evaluation is valuable for assessing qualitative aspects of the model, whereas, automatic model valuation is valuable for assessing quantitative aspects of the model</p>","<p>Automatic model evaluation provides model scores that are calculated using various statistical methods such as BERT Score and F1</p>","<p>Automatic model evaluation is valuable for assessing qualitative aspects of the model, whereas, human model valuation is valuable for assessing quantitative aspects of the model</p>"]},"correct_response":["c","d"],"section":"Fundamentals of Generative AI","question_plain":"A financial services company is deploying a machine learning model using Amazon Bedrock to predict loan approval risks. The data science team needs to ensure that the model performs effectively before going into production. They are focused on understanding the correct practices and tools for model evaluation on Amazon Bedrock to ensure accuracy, fairness, and reliability in their predictions.\n\nWhich of the following are correct regarding model evaluation for Amazon Bedrock? (Select two)","related_lectures":[]},{"_class":"assessment","id":96321659,"assessment_type":"multiple-choice","prompt":{"question":"<p>A company wants to implement safeguards for its generative AI application using Amazon Bedrock. Specifically, the company wants to filter undesirable and harmful content as well as redact any personally identifiable information (PII).</p>\n\n<p>What do you recommend?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Guardrails for Amazon Bedrock</strong></p>\n\n<p>Guardrails for Amazon Bedrock help you implement safeguards for your generative AI applications based on your use cases and responsible AI policies. Guardrails for Amazon Bedrock helps control the interaction between users and FMs by filtering undesirable and harmful content and will soon redact personally identifiable information (PII), enhancing content safety and privacy in generative AI applications. You cannot use guardrails to implement RAG workflow in Amazon Bedrock.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt3-q9-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/bedrock/guardrails/\">https://aws.amazon.com/bedrock/guardrails/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Knowledge Bases for Amazon Bedrock</strong> - With Knowledge Bases for Amazon Bedrock, you can give FMs and agents contextual information from your company’s private data sources for Retrieval Augmented Generation (RAG) to deliver more relevant, accurate, and customized responses</p>\n\n<p><strong>Watermark detection for Amazon Bedrock</strong> - The watermark detection mechanism allows you to identify images generated by Amazon Titan Image Generator, a foundation model that allows users to create realistic, studio-quality images in large volumes and at low cost, using natural language prompts. With watermark detection, you can increase transparency around AI-generated content by mitigating harmful content generation and reducing the spread of misinformation.</p>\n\n<p><strong>Continued pretraining in Amazon Bedrock</strong> - In the continued pretraining process, you provide unlabeled data to pre-train a model by familiarizing it with certain types of inputs. You can provide data from specific topics to expose a model to those areas. The continued pretraining process will tweak the model parameters to accommodate the input data and improve its domain knowledge. You can use <code>continued pretraining</code> or <code>fine-tuning</code> for model customization in Amazon Bedrock.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/bedrock/guardrails/\">https://aws.amazon.com/bedrock/guardrails/</a></p>\n\n<p><a href=\"https://aws.amazon.com/bedrock/faqs/\">https://aws.amazon.com/bedrock/faqs/</a></p>\n","answers":["<p>Knowledge Bases for Amazon Bedrock</p>","<p>Watermark detection for Amazon Bedrock</p>","<p>Continued pretraining in Amazon Bedrock</p>","<p>Guardrails for Amazon Bedrock</p>"]},"correct_response":["d"],"section":"Fundamentals of Generative AI","question_plain":"A company wants to implement safeguards for its generative AI application using Amazon Bedrock. Specifically, the company wants to filter undesirable and harmful content as well as redact any personally identifiable information (PII).\n\nWhat do you recommend?","related_lectures":[]},{"_class":"assessment","id":96321657,"assessment_type":"multiple-choice","prompt":{"question":"<p>Match the following Amazon SageMaker services to the respective use cases:</p>\n\n<p>A) SageMaker Data Wrangler</p>\n\n<p>B) SageMaker Canvas</p>\n\n<p>C) SageMaker Ground Truth</p>\n\n<p>1) Harnessing human input across the ML lifecycle to improve the accuracy and relevancy of models</p>\n\n<p>2) Offers 300+ pre-configured data transformations to prepare data for ML</p>\n\n<p>3) No-code service with an intuitive, point-and-click interface</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>A-2, B-3, C-1</strong></p>\n\n<p>SageMaker Canvas is a no-code service with an intuitive, point-and-click interface that lets you create highly accurate ML-based predictions from your data. SageMaker Canvas lets you access and combine data from a variety of sources using a drag-and-drop user interface, automatically cleaning and preparing data to minimize manual cleanup.</p>\n\n<p>Amazon SageMaker Ground Truth offers the most comprehensive set of human-in-the-loop capabilities, allowing you to harness the power of human feedback across the ML lifecycle to improve the accuracy and relevancy of models. You can complete a variety of human-in-the-loop tasks with SageMaker Ground Truth, from data generation and annotation to model review, customization, and evaluation, either through a self-service or an AWS-managed offering.</p>\n\n<p>SageMaker Data Wrangler supports tabular, time-series, and image data, offering 300+ pre-configured data transformations to prepare these different data modalities. For customers wanting to prepare text data in Data Wrangler for NLP use cases, Data Wrangler supports the NLTK library so that customers can prepare text data by authoring their custom transformations in Data Wrangler.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>A-3, B-2, C-1</strong></p>\n\n<p><strong>A-2, B-1, C-3</strong></p>\n\n<p><strong>A-3, B-1, C-2</strong></p>\n\n<p>These three options contradict the explanation provided above, so these options are incorrect.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://aws.amazon.com/sagemaker/faqs/\">https://aws.amazon.com/sagemaker/faqs/</a></p>\n","answers":["<p>A-3, B-2, C-1</p>","<p>A-2, B-1, C-3</p>","<p>A-2, B-3, C-1</p>","<p>A-3, B-1, C-2</p>"]},"correct_response":["c"],"section":"Applications of Foundation Models","question_plain":"Match the following Amazon SageMaker services to the respective use cases:\n\nA) SageMaker Data Wrangler\n\nB) SageMaker Canvas\n\nC) SageMaker Ground Truth\n\n1) Harnessing human input across the ML lifecycle to improve the accuracy and relevancy of models\n\n2) Offers 300+ pre-configured data transformations to prepare data for ML\n\n3) No-code service with an intuitive, point-and-click interface","related_lectures":[]},{"_class":"assessment","id":96321741,"assessment_type":"multiple-choice","prompt":{"question":"<p>A tech company is leveraging generative AI to develop personalized customer experiences and is considering whether to use a pre-built Foundation Model (FM) or to customize a model tailored to their specific needs. The team needs to understand the key differences between using a Foundation Model as-is versus customizing a model with their own data to enhance performance for specific tasks. This distinction will guide their strategy for deploying the most effective AI solution.</p>\n\n<p>What do you suggest?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>FM is an AI model with a large number of parameters and trained on a massive amount of diverse data, whereas, model customization is the process of using training data to adjust the model parameter values in a base model to create a custom model</strong></p>\n\n<p>Foundation model (FM) is an AI model with a large number of parameters and trained on a massive amount of diverse data. A foundation model can generate a variety of responses for a wide range of use cases. Foundation models can generate text or image, and can also convert input into embeddings.</p>\n\n<p>Model customization is the process of using training data to adjust the model parameter values in a base model to create a custom model. Examples of model customization include Fine-tuning, which uses labeled data (inputs and corresponding outputs), and Continued Pre-training, which uses unlabeled data (inputs only) to adjust model parameters.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Model customization refers to an AI model with a large number of parameters and trained on a massive amount of diverse data, whereas, FM refers to the process of using training data to adjust the model parameter values in a base model to create a custom model</strong></p>\n\n<p><strong>Both model customization and FM refer to an AI model with a large number of parameters and trained on a massive amount of diverse data</strong></p>\n\n<p><strong>Both model customization and FM refer to the process of using training data to adjust the model parameter values in a base model to create a custom model</strong></p>\n\n<p>These three options contradict the explanation provided above, so these options are incorrect.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/key-definitions.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/key-definitions.html</a></p>\n","answers":["<p>FM is an AI model with a large number of parameters and trained on a massive amount of diverse data, whereas, model customization is the process of using training data to adjust the model parameter values in a base model to create a custom model</p>","<p>Model customization refers to an AI model with a large number of parameters and trained on a massive amount of diverse data, whereas, FM refers to the process of using training data to adjust the model parameter values in a base model to create a custom model</p>","<p>Both model customization and FM refer to an AI model with a large number of parameters and trained on a massive amount of diverse data</p>","<p>Both model customization and FM refer to the process of using training data to adjust the model parameter values in a base model to create a custom model</p>"]},"correct_response":["a"],"section":"Fundamentals of Generative AI","question_plain":"A tech company is leveraging generative AI to develop personalized customer experiences and is considering whether to use a pre-built Foundation Model (FM) or to customize a model tailored to their specific needs. The team needs to understand the key differences between using a Foundation Model as-is versus customizing a model with their own data to enhance performance for specific tasks. This distinction will guide their strategy for deploying the most effective AI solution.\n\nWhat do you suggest?","related_lectures":[]},{"_class":"assessment","id":96321707,"assessment_type":"multiple-choice","prompt":{"question":"<p>A legal services company is implementing AI solutions using Amazon Bedrock to improve document analysis and automate responses to client queries. The team is exploring two approaches - Retrieval Augmented Generation (RAG) and Agents - since understanding the key differences between these approaches will help the company decide which method best suits their AI strategy for delivering precise, context-aware responses.</p>\n\n<p>Which of the following summarizes the differences between Retrieval augmented generation (RAG) and Agent in the context of Amazon Bedrock?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>RAG refers to querying and retrieving information from a data source to augment a generated response to a prompt, whereas, Agent refers to an application that carries out orchestrations through cyclically interpreting inputs and producing outputs by using a foundation model</strong></p>\n\n<p>Retrieval augmented generation (RAG) refers to the process of querying and retrieving information from a data source to augment a generated response to a prompt.</p>\n\n<p>Agent refers to an application that carries out orchestrations through cyclically interpreting inputs and producing outputs by using a foundation model. An agent can be used to carry out customer requests.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Both RAG and Agent refer to an application that carries out orchestrations through cyclically interpreting inputs and producing outputs by using a foundation model</strong></p>\n\n<p><strong>Both RAG and Agent refer to querying and retrieving information from a data source to augment a generated response to a prompt</strong></p>\n\n<p><strong>Agent refers to querying and retrieving information from a data source to augment a generated response to a prompt, whereas, RAG refers to an application that carries out orchestrations through cyclically interpreting inputs and producing outputs by using a foundation model</strong></p>\n\n<p>These three options contradict the explanation provided above, so these options are incorrect.</p>\n\n<p>References:</p>\n","answers":["<p>Both RAG and Agent refer to an application that carries out orchestrations through cyclically interpreting inputs and producing outputs by using a foundation model</p>","<p>Both RAG and Agent refer to querying and retrieving information from a data source to augment a generated response to a prompt</p>","<p>Agent refers to querying and retrieving information from a data source to augment a generated response to a prompt, whereas, RAG refers to an application that carries out orchestrations through cyclically interpreting inputs and producing outputs by using a foundation model</p>","<p>RAG refers to querying and retrieving information from a data source to augment a generated response to a prompt, whereas, Agent refers to an application that carries out orchestrations through cyclically interpreting inputs and producing outputs by using a foundation model</p>"]},"correct_response":["d"],"section":"Fundamentals of Generative AI","question_plain":"A legal services company is implementing AI solutions using Amazon Bedrock to improve document analysis and automate responses to client queries. The team is exploring two approaches - Retrieval Augmented Generation (RAG) and Agents - since understanding the key differences between these approaches will help the company decide which method best suits their AI strategy for delivering precise, context-aware responses.\n\nWhich of the following summarizes the differences between Retrieval augmented generation (RAG) and Agent in the context of Amazon Bedrock?","related_lectures":[]},{"_class":"assessment","id":96321739,"assessment_type":"multiple-choice","prompt":{"question":"<p>A media analytics company utilizes Amazon Bedrock to run inferences with its generative AI models to analyze large volumes of user-generated content and provide insights to its clients. The company frequently processes numerous inference requests and is looking for a way to minimize the costs associated with running these inferences while still maintaining the required level of service. Given that the company can tolerate some delays in receiving responses, it seeks a cost-effective inference method that optimizes resource usage without sacrificing too much on turnaround time.</p>\n\n<p>Which inference approach would be the most suitable for the company to use in order to reduce its overall inference costs?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>The company should use batch inference, thereby allowing it to run multiple inference requests in a single batch</strong></p>\n\n<p>You can use batch inference to run multiple inference requests asynchronously, and improve the performance of model inference on large datasets. Amazon Bedrock offers select foundation models (FMs) from leading AI providers like Anthropic, Meta, Mistral AI, and Amazon for batch inference at 50% of on-demand inference pricing.</p>\n\n<p>Batch inference is the most cost-effective choice when reducing inference costs on Amazon Bedrock. By processing large numbers of data points in a single batch, the company can lower the cost per inference as the model handles multiple requests simultaneously. This approach is ideal when there is no need for immediate responses, allowing for more efficient use of resources and minimizing computational expenses.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>The company should use real-time inference, which is designed for low-latency responses and continuous, immediate processing</strong></p>\n\n<p><strong>The company should use serverless inference, which automatically scales resources based on traffic</strong></p>\n\n<p>Real-time inference and serverless inference options apply to Amazon SageMaker, rather than Amazon Bedrock. Amazon Bedrock only offers on-demand or batch inference options. Therefore, both these options are incorrect.</p>\n\n<p><strong>The company should use on-demand inference, which allows the company to pay only for the resources consumed during each inference</strong> - On-demand inference offers flexibility by charging only for the resources used during each inference, making it suitable for unpredictable or variable usage patterns. However, it is generally more costly when used frequently or over long periods because it does not benefit from cost savings associated with bulk processing. For a company looking to reduce costs, on-demand inference may not be the most economical option.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/about-aws/whats-new/2024/08/amazon-bedrock-fms-batch-inference-50-price/\">https://aws.amazon.com/about-aws/whats-new/2024/08/amazon-bedrock-fms-batch-inference-50-price/</a></p>\n\n<p><a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/inference.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/inference.html</a></p>\n\n<p><a href=\"https://aws.amazon.com/about-aws/whats-new/2024/08/amazon-bedrock-fms-batch-inference-50-price/\">https://aws.amazon.com/about-aws/whats-new/2024/08/amazon-bedrock-fms-batch-inference-50-price/</a></p>\n\n<p><a href=\"https://docs.aws.amazon.com/sagemaker/latest/dg/how-it-works-deployment.html\">https://docs.aws.amazon.com/sagemaker/latest/dg/how-it-works-deployment.html</a></p>\n","answers":["<p>The company should use on-demand inference, which allows the company to pay only for the resources consumed during each inference</p>","<p>The company should use batch inference, thereby allowing it to run multiple inference requests in a single batch</p>","<p>The company should use real-time inference, which is designed for low-latency responses and continuous, immediate processing</p>","<p>The company should use serverless inference, which automatically scales resources based on traffic</p>"]},"correct_response":["b"],"section":"Applications of Foundation Models","question_plain":"A media analytics company utilizes Amazon Bedrock to run inferences with its generative AI models to analyze large volumes of user-generated content and provide insights to its clients. The company frequently processes numerous inference requests and is looking for a way to minimize the costs associated with running these inferences while still maintaining the required level of service. Given that the company can tolerate some delays in receiving responses, it seeks a cost-effective inference method that optimizes resource usage without sacrificing too much on turnaround time.\n\nWhich inference approach would be the most suitable for the company to use in order to reduce its overall inference costs?","related_lectures":[]},{"_class":"assessment","id":96321737,"assessment_type":"multiple-choice","prompt":{"question":"<p>A biotech company is building machine learning models using Amazon SageMaker to analyze large genomic datasets for research purposes. The team is considering Amazon SageMaker Asynchronous Inference to handle these predictions efficiently. To ensure that this deployment model aligns with their requirements, they need to understand which use cases are best suited for asynchronous inference.</p>\n\n<p>What do you recommend?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Requests with large payload sizes up to 1GB and long processing times</strong></p>\n\n<p>Amazon SageMaker Asynchronous Inference is a capability in SageMaker that queues incoming requests and processes them asynchronously. This option is ideal for requests with large payload sizes (up to 1GB), long processing times (up to one hour), and near real-time latency requirements. Asynchronous Inference enables you to save on costs by autoscaling the instance count to zero when there are no requests to process, so you only pay when your endpoint is processing requests.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>To get predictions for an entire dataset</strong> - To get predictions for an entire dataset, SageMaker batch transform deployment type is recommended.</p>\n\n<p><strong>For persistent, real-time endpoints that make one prediction at a time</strong> - For persistent, real-time endpoints that make one prediction at a time, SageMaker real-time hosting services are recommended.</p>\n\n<p><strong>For workloads that can tolerate cold starts</strong> - For workloads that have idle periods between traffic spikes and can tolerate cold starts, SageMaker Serverless Inference is recommended.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/sagemaker/latest/dg/async-inference.html\">https://docs.aws.amazon.com/sagemaker/latest/dg/async-inference.html</a></p>\n\n<p><a href=\"https://docs.aws.amazon.com/sagemaker/latest/dg/how-it-works-deployment.html\">https://docs.aws.amazon.com/sagemaker/latest/dg/how-it-works-deployment.html</a></p>\n","answers":["<p>To get predictions for an entire dataset</p>","<p>For persistent, real-time endpoints that make one prediction at a time</p>","<p>For workloads that can tolerate cold starts</p>","<p>Requests with large payload sizes up to 1GB and long processing times</p>"]},"correct_response":["d"],"section":"Applications of Foundation Models","question_plain":"A biotech company is building machine learning models using Amazon SageMaker to analyze large genomic datasets for research purposes. The team is considering Amazon SageMaker Asynchronous Inference to handle these predictions efficiently. To ensure that this deployment model aligns with their requirements, they need to understand which use cases are best suited for asynchronous inference.\n\nWhat do you recommend?","related_lectures":[]},{"_class":"assessment","id":96321735,"assessment_type":"multiple-choice","prompt":{"question":"<p>A retail company is utilizing Amazon Bedrock to generate personalized product descriptions and recommendations. The data science team is experimenting with the <code>Top K</code> inference parameter, since it is crucial to understand how adjusting the <code>Top K</code> parameter impacts the responses for optimizing customer interactions.</p>\n\n<p>What do you suggest to the team regarding the <code>Top K</code> parameter?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Influences the number of most-likely candidates that the model considers for the next token</strong></p>\n\n<p>The inference parameter <code>Top K</code> represents the number of most likely candidates that the model considers for the next token. Choose a lower value to decrease the size of the pool and limit the options to more likely outputs. Choose a higher value to increase the size of the pool and allow the model to consider less likely outputs.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt3-q15-i1.jpg\">\nvia - <a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/inference-parameters.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/inference-parameters.html</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Specifies the sequences of characters that stop the model from generating further tokens</strong> - The inference parameter <code>Stop sequences</code> specifies the sequences of characters that stop the model from generating further tokens. If the model generates a stop sequence that you specify, it will stop generating after that sequence.</p>\n\n<p><strong>Influences the percentage of most-likely candidates that the model considers for the next token</strong> - The inference parameter <code>Top P</code> represents the percentage of most likely candidates that the model considers for the next token.</p>\n\n<p><strong>Influences the likelihood of the model selecting lower-probability outputs, thereby impacting the creativity of the model’s output</strong> - The inference parameter <code>Temperature</code> is a value between 0 and 1, and it regulates the creativity of the model's responses.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/inference-parameters.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/inference-parameters.html</a></p>\n\n<p><a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/general-guidelines-for-bedrock-users.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/general-guidelines-for-bedrock-users.html</a></p>\n","answers":["<p>Specifies the sequences of characters that stop the model from generating further tokens</p>","<p>Influences the percentage of most-likely candidates that the model considers for the next token</p>","<p>Influences the number of most-likely candidates that the model considers for the next token</p>","<p>Influences the likelihood of the model selecting lower-probability outputs, thereby impacting the creativity of the model’s output</p>"]},"correct_response":["c"],"section":"Fundamentals of Generative AI","question_plain":"A retail company is utilizing Amazon Bedrock to generate personalized product descriptions and recommendations. The data science team is experimenting with the Top K inference parameter, since it is crucial to understand how adjusting the Top K parameter impacts the responses for optimizing customer interactions.\n\nWhat do you suggest to the team regarding the Top K parameter?","related_lectures":[]},{"_class":"assessment","id":96321733,"assessment_type":"multiple-choice","prompt":{"question":"<p>A customer support company is using Amazon Bedrock to automate responses to frequently asked questions through its AI-driven chatbot. The development team is adjusting various inference parameters to control the responses. They are particularly interested in the <code>Response length</code> parameter, since this parameter is critical for providing clear, customer-friendly interactions.</p>\n\n<p>How does the inference parameter <code>Response length</code> influence the model response for Amazon Bedrock?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Specifies the minimum or maximum number of tokens to return in the generated response.</strong></p>\n\n<p>Response length represents the minimum or maximum number of tokens to return in the generated response.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt3-q16-i1.jpg\"></p>\n\n<p>via - <a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/inference-parameters.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/inference-parameters.html</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Specifies the sequences of characters that stop the model from generating further tokens</strong> - The inference parameter <code>Stop sequences</code> specifies the sequences of characters that stop the model from generating further tokens. If the model generates a stop sequence that you specify, it will stop generating after that sequence.</p>\n\n<p><strong>Influences the percentage of most-likely candidates that the model considers for the next token</strong> - The inference parameter <code>Top P</code> represents the percentage of most likely candidates that the model considers for the next token.</p>\n\n<p><strong>Influences the number of most-likely candidates that the model considers for the next token</strong> - The inference parameter <code>Top K</code> represents the number of most likely candidates that the model considers for the next token.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/inference-parameters.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/inference-parameters.html</a></p>\n\n<p><a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/general-guidelines-for-bedrock-users.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/general-guidelines-for-bedrock-users.html</a></p>\n","answers":["<p>Specifies the sequences of characters that stop the model from generating further tokens</p>","<p>Influences the percentage of most-likely candidates that the model considers for the next token</p>","<p>Influences the number of most-likely candidates that the model considers for the next token</p>","<p>Specifies the minimum or maximum number of tokens to return in the generated response.</p>"]},"correct_response":["d"],"section":"Fundamentals of Generative AI","question_plain":"A customer support company is using Amazon Bedrock to automate responses to frequently asked questions through its AI-driven chatbot. The development team is adjusting various inference parameters to control the responses. They are particularly interested in the Response length parameter, since this parameter is critical for providing clear, customer-friendly interactions.\n\nHow does the inference parameter Response length influence the model response for Amazon Bedrock?","related_lectures":[]},{"_class":"assessment","id":96321731,"assessment_type":"multiple-choice","prompt":{"question":"<p>A software company is looking for tools to help its IT professionals streamline the process of coding, testing, and upgrading applications. The team is evaluating different solutions that can improve efficiency, automate routine tasks, and enhance productivity for its workflow.</p>\n\n<p>Which of the following can assist in coding, testing, and upgrading applications?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Amazon Q Developer</strong></p>\n\n<p>Amazon Q Developer is a generative artificial intelligence (AI) powered conversational assistant that can help you understand, build, extend, and operate AWS applications. You can ask questions about AWS architecture, your AWS resources, best practices, documentation, support, and more. Amazon Q is constantly updating its capabilities so your questions get the most contextually relevant and actionable answers.</p>\n\n<p>When used in an integrated development environment (IDE), Amazon Q provides software development assistance. Amazon Q can chat about code, provide inline code completions, generate new code, scan your code for security vulnerabilities, and make code upgrades and improvements, such as language updates, debugging, and optimizations.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Amazon Q Business</strong> - Amazon Q Business is a fully managed, generative-AI powered assistant that you can configure to answer questions, provide summaries, generate content, and complete tasks based on your enterprise data. It allows end users to receive immediate, permissions-aware responses from enterprise data sources with citations, for use cases such as IT, HR, and benefits help desks.</p>\n\n<p><strong>Amazon Q in QuickSight</strong> - With Amazon Q in QuickSight, customers get a generative BI assistant that allows business analysts to use natural language to build BI dashboards in minutes and easily create visualizations and complex calculations.</p>\n\n<p><strong>Amazon Q in Connect</strong> - Amazon Connect is the contact center service from AWS. Amazon Q helps customer service agents provide better customer service. Amazon Q in Connect uses real-time conversation with the customer along with relevant company content to automatically recommend what to say or what actions an agent should take to better assist customers.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/q/\">https://aws.amazon.com/q/</a></p>\n\n<p><a href=\"https://docs.aws.amazon.com/amazonq/latest/qdeveloper-ug/what-is.html\">https://docs.aws.amazon.com/amazonq/latest/qdeveloper-ug/what-is.html</a></p>\n\n<p><a href=\"https://docs.aws.amazon.com/amazonq/latest/qbusiness-ug/what-is.html\">https://docs.aws.amazon.com/amazonq/latest/qbusiness-ug/what-is.html</a></p>\n","answers":["<p>Amazon Q Developer</p>","<p>Amazon Q Business</p>","<p>Amazon Q in QuickSight</p>","<p>Amazon Q in Connect</p>"]},"correct_response":["a"],"section":"Applications of Foundation Models","question_plain":"A software company is looking for tools to help its IT professionals streamline the process of coding, testing, and upgrading applications. The team is evaluating different solutions that can improve efficiency, automate routine tasks, and enhance productivity for its workflow.\n\nWhich of the following can assist in coding, testing, and upgrading applications?","related_lectures":[]},{"_class":"assessment","id":96321729,"assessment_type":"multiple-choice","prompt":{"question":"<p>A consulting firm is considering adopting Amazon Q Business to help its teams automate workflows, generate business insights, and streamline decision-making. To ensure smooth integration with their existing AWS infrastructure, the firm's IT department needs to understand which underlying AWS service powers Amazon Q Business.</p>\n\n<p>What do you suggest?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Amazon Bedrock</strong></p>\n\n<p>Amazon Q Business is a fully managed, generative-AI powered assistant that you can configure to answer questions, provide summaries, generate content, and complete tasks based on your enterprise data. It allows end users to receive immediate, permissions-aware responses from enterprise data sources with citations, for use cases such as IT, HR, and benefits help desks.</p>\n\n<p>Amazon Q Business is powered by Amazon Bedrock.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt3-q18-i1.jpg\"></p>\n\n<p>via - <a href=\"https://docs.aws.amazon.com/amazonq/latest/qbusiness-ug/what-is.html\">https://docs.aws.amazon.com/amazonq/latest/qbusiness-ug/what-is.html</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Amazon Q Apps</strong> - Amazon Q Apps is a capability within Amazon Q Business for users to create generative artificial intelligence (generative AI)–powered apps based on the organization’s data. Users can build apps using natural language and securely publish them to the organization’s app library for everyone to use.</p>\n\n<p><strong>Amazon SageMaker Jumpstart</strong> - Amazon SageMaker JumpStart is a machine learning hub with foundation models, built-in algorithms, and prebuilt ML solutions that you can deploy with just a few clicks With SageMaker JumpStart, you can access pre-trained models, including foundation models, to perform tasks like article summarization and image generation.</p>\n\n<p><strong>Amazon Kendra</strong> - Amazon Kendra is an intelligent search service that uses natural language processing and advanced machine learning algorithms to return specific answers to search questions from your data.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/amazonq/latest/qbusiness-ug/what-is.html\">https://docs.aws.amazon.com/amazonq/latest/qbusiness-ug/what-is.html</a></p>\n\n<p><a href=\"https://docs.aws.amazon.com/amazonq/latest/qbusiness-ug/concepts-terms.html\">https://docs.aws.amazon.com/amazonq/latest/qbusiness-ug/concepts-terms.html</a></p>\n\n<p><a href=\"https://docs.aws.amazon.com/kendra/latest/dg/what-is-kendra.html\">https://docs.aws.amazon.com/kendra/latest/dg/what-is-kendra.html</a></p>\n\n<p><a href=\"https://aws.amazon.com/blogs/aws/amazon-q-apps-now-generally-available-enables-users-to-build-their-own-generative-ai-apps/\">https://aws.amazon.com/blogs/aws/amazon-q-apps-now-generally-available-enables-users-to-build-their-own-generative-ai-apps/</a></p>\n","answers":["<p>Amazon Q Apps</p>","<p>Amazon Bedrock</p>","<p>Amazon SageMaker Jumpstart</p>","<p>Amazon Kendra</p>"]},"correct_response":["b"],"section":"Applications of Foundation Models","question_plain":"A consulting firm is considering adopting Amazon Q Business to help its teams automate workflows, generate business insights, and streamline decision-making. To ensure smooth integration with their existing AWS infrastructure, the firm's IT department needs to understand which underlying AWS service powers Amazon Q Business.\n\nWhat do you suggest?","related_lectures":[]},{"_class":"assessment","id":96321727,"assessment_type":"multi-select","prompt":{"question":"<p>A financial services company is exploring Amazon Q Business to automate reporting and streamline business insights across departments. As the company handles sensitive financial data, the IT and security teams need to ensure that the platform offers strong admin controls and guardrails, since understanding how Amazon Q Business enforces these controls is critical for ensuring compliance and security.</p>\n\n<p>What do you recommend to the company regarding admin controls and guardrails in Amazon Q Business? (Select two)</p>\n","relatedLectureIds":"","feedbacks":["","","","",""],"explanation":"<p>Correct options:</p>\n\n<p><strong>Amazon Q Business chat responses can be generated using model knowledge and enterprise data, or enterprise data only</strong></p>\n\n<p>Amazon Q Business chat responses can be generated using only enterprise data or your application environment can also use its underlying large language model (LLM) to generate responses when it can’t find answers in your enterprise data. So, you can use the application environment level controls for controlling the sources that your application environment uses to generate responses (model knowledge and enterprise data, or enterprise data only). Global controls also define and control blocked phrases within your application environment.</p>\n\n<p><strong>Amazon Q Business guardrails support topic-specific controls to determine the web application environment's behavior when it encounters a mention of a blocked topic by an end-user</strong></p>\n\n<p>Amazon Q Business allows you to use topic-specific controls to determine the web application environment's behavior when it encounters a mention of a blocked topic by an end user.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt3-q19-i1.jpg\">\nvia - <a href=\"https://docs.aws.amazon.com/amazonq/latest/qbusiness-ug/guardrails-concepts.html\">https://docs.aws.amazon.com/amazonq/latest/qbusiness-ug/guardrails-concepts.html</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Amazon Q Business chat responses can be generated using only model knowledge</strong></p>\n\n<p><strong>Amazon Q Business guardrails do not support topic-specific controls to determine the web application environment's behavior when it encounters a mention of a blocked topic by an end-user</strong></p>\n\n<p>These
