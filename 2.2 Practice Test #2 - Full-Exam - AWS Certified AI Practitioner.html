<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz</title>
    <style>
      * {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu,
          Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-size: 16px;
      }

      main {
        padding-top: 48px;
      }

      :root {
        --large-device-width: 850px;
        --primary-color: #0f172a;
        --secondary-color: #020617;
        --primary-text-color: #c7d1dd;
        --secondary-text-color: #061602;
        --success-background: hsl(159, 82%, 24%);
        --success-foreground: hsl(164, 86%, 16%);
        --success: hsl(160, 84%, 39%);
        --danger: #ef4444;
        --warning: #f59e0b;
        --info-background: hsl(218, 81%, 8%);
        --info-foreground: hsl(217, 91%, 85%);
        --border-color: #d1d7dc;
        --check-box-size: 20px;
        /* control the size */
        --check-box-color: var(--info-foreground);
        /* the active color */
      }

      body {
        position: relative;
        background-color: #020617;
        color: var(--primary-text-color);
      }

      #score-stats-container {
        position: fixed;
        z-index: 10;
        top: 0;
        height: 40px;
        width: 100%;
        background-color: var(--info-background);

        padding: 0px 16px;
        color: var(--info-foreground);
        font-weight: 600;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      #quiz-container {
        border-radius: 8px;
        display: flex;
        gap: 16px;
        flex-direction: column;
      }

      input[type='radio'] {
        height: var(--check-box-size);
        aspect-ratio: 1;
        border: calc(var(--check-box-size) / 8) solid #939393;
        padding: calc(var(--check-box-size) / 8);
        background: radial-gradient(farthest-side, var(--check-box-color) 94%, #0000) 50%/0 0 no-repeat
          content-box;
        border-radius: 50%;
        outline-offset: calc(var(--check-box-size) / 10);
        -webkit-appearance: none;
        -moz-appearance: none;
        appearance: none;
        cursor: pointer;
        font-size: inherit;
        transition: 0.3s;
      }

      input[type='radio']:checked {
        border-color: var(--check-box-color);
        background-size: 100% 100%;
      }

      input[type='radio']:disabled {
        background: linear-gradient(#939393 0 0) 50%/100% 20% no-repeat content-box;
        opacity: 0.5;
        cursor: not-allowed;
      }

      label {
        /* display: inline-flex; */
        align-items: center;
        gap: 10px;
        cursor: pointer;
        padding: 4px 6px;
        border-radius: 4px;
      }

      @media (max-width: 767px) {
        input[type='radio'],
        label {
          cursor: default;
        }

        #quiz-container {
          margin-left: 8px;
          margin-right: 8px;
        }
      }

      /* PC (Desktop devices) */
      @media (min-width: 768px) {
        body {
          display: flex;
          justify-content: center;
        }

        main {
          max-width: var(--large-device-width);
        }

        #score-stats-container {
          max-width: var(--large-device-width);
        }

        dialog {
          max-width: var(--large-device-width);
        }
      }

      @media print {
        input[type='radio'] {
          background: none !important;
          border-color: #939393 !important;
        }

        input[type='radio']:checked {
          border-color: #939393 !important;
        }
      }

      .question-lable {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      button {
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
        outline: none;
        position: relative;
        overflow: hidden;
        cursor: pointer;
      }

      .button {
        background-color: var(--success-background);
        border: none;
        color: #f4f5f7;
        opacity: 0.8;
        font-size: 18px;
        flex-grow: 1;
        padding: 8px 16px;
        border-radius: 8px;
      }

      .button:hover {
        opacity: 1;
      }

      .explanation-btn {
        border: none;
        color: var(--success);
        background-color: transparent;
      }

      #submit-button:active::after {
        background-color: #ef4444;
      }

      .single-question-container {
        background-color: var(--primary-color);
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding: 16px;
        border-radius: 8px;
      }

      #modal-content {
        padding: 16px;
        line-height: 24px;
      }

      dialog::backdrop {
        background: rgba(0, 0, 0, 0.5);
      }

      dialog {
        position: fixed;
        border: 1px solid var(--border-color);
        background-color: var(--primary-color);
        color: rgb(240, 241, 248);
        padding: 16px;
        border-radius: 8px;
        width: 80vw;
        max-height: 80vh;
        overflow: auto;
        top: 50%;
        left: 50%;
        -webkit-transform: translateX(-50%) translateY(-50%);
        -moz-transform: translateX(-50%) translateY(-50%);
        -ms-transform: translateX(-50%) translateY(-50%);
        transform: translateX(-50%) translateY(-50%);
      }

      #close-modal-btn {
        position: absolute;
        top: 4px;
        right: 4px;
        padding: 2px 8px;
        border-radius: 2px;
        border: none;
        background-color: var(--danger);
      }

      .correct-answer label {
        border: 2px solid var(--success);
        width: 100%;
      }

      .incorrect-answer label {
        border: 2px solid var(--danger);
        width: 100%;
      }

      .options-container {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      #quiz-meta-container {
        border-radius: 8px;
        background-color: var(--primary-color);
        margin-bottom: 12px;
        padding: 8px;
      }

      #quiz-title {
        text-align: center;
        font-size: 24px;
        margin-bottom: 8px;
      }

      #quiz-description {
        line-height: 1.5;
        padding: 2px 6px;
      }
      img {
        width: 100%;
      }
    </style>
  </head>

  <body onload="main()">
    <main>
      <section id="quiz-meta-container">
        <h1 id="quiz-title"></h1>
        <p id="quiz-description"></p>
      </section>
      <section id="score-stats-container">
        <div id="score-card">
          Score: <span id="current-score">999</span> of
          <span id="pass-percent">999%</span>
        </div>
        <div>Correct: <span id="correct-answers">999</span></div>
        <div>Incorrect: <span id="wrong-answers">999</span></div>
      </section>

      <section id="quiz-container"></section>

      <dialog id="modal" class="modal-container">
        <div id="modal-content">
          <p id="modal-text"></p>
        </div>
      </dialog>
    </main>

    <script>
      const quizData = {"quiz_id":6463757,"quiz_title":"Practice Test #2 - Full-Exam - AWS Certified AI Practitioner","questions":[{"_class":"assessment","id":93244123,"assessment_type":"multiple-choice","prompt":{"question":"<p>A media company is looking to enhance its content creation processes by leveraging cutting-edge technologies and has been exploring the use of generative AI. The leadership team wants to understand the broader significance of generative AI in modern technological applications, including its potential to automate tasks, improve creativity, and optimize workflows across industries. Understanding why generative AI is considered important will help the company make informed decisions about integrating this technology into its operations.</p>\n\n<p>Given this context, why is generative AI considered important in modern technological applications?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Generative AI is important because it can autonomously create novel and complex data, enhancing creativity and efficiency in various domains</strong></p>\n\n<p>Generative AI is important because it can autonomously create novel and complex data, which significantly enhances creativity and efficiency across various fields, such as content creation, design, and problem-solving.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt2-q1-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/what-is/generative-ai/\">https://aws.amazon.com/what-is/generative-ai/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Generative AI can easily perform simple tasks like sorting and filtering data</strong> - Generative AI is capable of much more than simple tasks like sorting and filtering data. It can generate new and complex data based on learned patterns. So, this option is not the right fit.</p>\n\n<p><strong>Generative AI can replace all traditional databases with its own storage solutions</strong> - Generative AI does not replace traditional databases but works alongside them to enhance data-driven insights and applications. Therefore, this option is incorrect.</p>\n\n<p><strong>Generative AI is the best fit for use cases related to gaming and entertainment applications</strong> - While generative AI can be used in gaming and entertainment, its applications extend far beyond these domains, including healthcare, finance, manufacturing, and more. So, this option is incorrect.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/what-is/generative-ai/\">https://aws.amazon.com/what-is/generative-ai/</a></p>\n\n<p><a href=\"https://aws.amazon.com/ai/generative-ai/services/\">https://aws.amazon.com/ai/generative-ai/services/</a></p>\n","answers":["<p>Generative AI is important because it can autonomously create novel and complex data, enhancing creativity and efficiency in various domains</p>","<p>Generative AI can easily perform simple tasks like sorting and filtering data</p>","<p>Generative AI can replace all traditional databases with its own storage solutions</p>","<p>Generative AI is the best fit for use cases related to gaming and entertainment applications</p>"]},"correct_response":["a"],"section":"Fundamentals of Generative AI","question_plain":"A media company is looking to enhance its content creation processes by leveraging cutting-edge technologies and has been exploring the use of generative AI. The leadership team wants to understand the broader significance of generative AI in modern technological applications, including its potential to automate tasks, improve creativity, and optimize workflows across industries. Understanding why generative AI is considered important will help the company make informed decisions about integrating this technology into its operations.\n\nGiven this context, why is generative AI considered important in modern technological applications?","related_lectures":[]},{"_class":"assessment","id":93244139,"assessment_type":"multiple-choice","prompt":{"question":"<p>An Internet-of-Things (IoT) company is developing a suite of smart sensors and devices that rely on real-time data processing to enable applications like predictive maintenance, environmental monitoring, and immediate anomaly detection. To provide immediate feedback and actions, the company needs to deploy machine learning models directly on its edge devices, ensuring that these models can perform inference with minimal latency. The company is evaluating different approaches to optimize performance and maintain low-latency inference on these edge devices.</p>\n\n<p>Which approach would be the most suitable for meeting this requirement?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>The company should use an optimized small language model (SLM) deployed directly on the edge device, allowing for real-time, low-latency inference</strong></p>\n\n<p>This is the most suitable choice because a small language model (SLM) optimized for deployment on edge devices is specifically designed to be lightweight, efficient, and capable of running on devices with limited computational resources. Deploying the model directly on the edge device eliminates the need for network communication with a central server, thereby achieving the required low-latency inference needed for real-time IoT applications.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>The company should use an optimized large language model (LLM) deployed directly on the edge device, allowing for real-time, low-latency inference</strong> - While deploying a model on the edge device is beneficial for reducing latency, a large language model (LLM) is generally too resource-intensive for edge devices, which often have limited memory, processing power, and storage. LLMs typically require substantial computational resources that exceed the capabilities of most edge devices, leading to poor performance or the inability to run at all.</p>\n\n<p><strong>The company should use a central API connected to a large language model (LLM) with an asynchronous inference endpoint, which allows the model to handle requests from multiple edge devices</strong> - This option is less suitable because relying on a central API and asynchronous inference endpoint introduces network latency, which contradicts the requirement for low-latency inference. Additionally, LLMs are computationally heavy and may not provide the timely responses needed for real-time IoT applications when accessed over a network.</p>\n\n<p><strong>The company should use a central API connected to a small language model (SLM) with an asynchronous inference endpoint, which allows the model to handle requests from multiple edge devices</strong> - Although a small language model (SLM) is more lightweight and efficient than an LLM, using a central API with asynchronous inference endpoints still involves network communication that can result in latency. This approach does not meet the low-latency requirement needed for edge-based real-time processing, as network delays could adversely affect performance.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://community.aws/content/2fTJuxaxuSwl64cVakqtuEK4tnl/running-small-language-models-on-aws-lambda\">https://community.aws/content/2fTJuxaxuSwl64cVakqtuEK4tnl/running-small-language-models-on-aws-lambda</a></p>\n\n<p><a href=\"https://aws.amazon.com/about-aws/whats-new/2024/05/amazon-bedrock-mistral-small-foundation-model/\">https://aws.amazon.com/about-aws/whats-new/2024/05/amazon-bedrock-mistral-small-foundation-model/</a></p>\n\n<p><a href=\"https://aws.amazon.com/what-is/large-language-model/\">https://aws.amazon.com/what-is/large-language-model/</a></p>\n","answers":["<p>The company should use an optimized large language model (LLM) deployed directly on the edge device, allowing for real-time, low-latency inference</p>","<p>The company should use an optimized small language model (SLM) deployed directly on the edge device, allowing for real-time, low-latency inference</p>","<p>The company should use a central API connected to a large language model (LLM) with an asynchronous inference endpoint, which allows the model to handle requests from multiple edge devices</p>","<p>The company should use a central API connected to a small language model (SLM) with an asynchronous inference endpoint, which allows the model to handle requests from multiple edge devices</p>"]},"correct_response":["b"],"section":"Applications of Foundation Models","question_plain":"An Internet-of-Things (IoT) company is developing a suite of smart sensors and devices that rely on real-time data processing to enable applications like predictive maintenance, environmental monitoring, and immediate anomaly detection. To provide immediate feedback and actions, the company needs to deploy machine learning models directly on its edge devices, ensuring that these models can perform inference with minimal latency. The company is evaluating different approaches to optimize performance and maintain low-latency inference on these edge devices.\n\nWhich approach would be the most suitable for meeting this requirement?","related_lectures":[]},{"_class":"assessment","id":93244137,"assessment_type":"multiple-choice","prompt":{"question":"<p>A technology consulting firm is advising a client on the use of AI to enhance their business operations, particularly through the implementation of large-scale models that can handle diverse tasks such as text generation, image recognition, and natural language understanding. The firm is evaluating Foundation Models as a potential solution and wants to clarify their capabilities, including their ability to generalize across multiple domains and perform a wide range of tasks with minimal fine-tuning.</p>\n\n<p>Which of the following options aptly summarizes the capabilities of Foundation Models?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Foundation models can perform a wide range of tasks across different domains by leveraging their extensive pre-training on large datasets</strong></p>\n\n<p>Foundation models are a form of generative artificial intelligence (generative AI). They generate output from one or more inputs (prompts) in the form of human language instructions.</p>\n\n<p>In general, an FM uses learned patterns and relationships to predict the next item in a sequence. For example, with image generation, the model analyzes the image and creates a sharper, more clearly defined version of the image. Similarly, with text, the model predicts the next word in a string of text based on the previous words and their context. It then selects the next word using probability distribution techniques.</p>\n\n<p>Foundation models use self-supervised learning to create labels from input data. This means no one has instructed or trained the model with labeled training data sets. This feature separates LLMs from previous ML architectures, which use supervised or unsupervised learning.</p>\n\n<p>Foundation models, even though are pre-trained, can continue to learn from data inputs or prompts during inference. This means that you can develop comprehensive outputs through carefully curated prompts. Tasks that FMs can perform include language processing, visual comprehension, code generation, and human-centered engagement.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt2-q3-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/what-is/foundation-models/\">https://aws.amazon.com/what-is/foundation-models/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Foundation models can only perform a single task they were specifically trained for</strong> - Foundation models are not limited to a single task; they can be fine-tuned for various tasks due to their broad pre-training.</p>\n\n<p><strong>Foundation models are limited to simple data processing tasks and cannot handle complex operations</strong> - Foundation models are capable of handling complex operations across different domains, not just simple data processing tasks.</p>\n\n<p><strong>Foundation models are designed to work exclusively with structured data and cannot process unstructured data like text or images</strong> - Foundation models can process both structured and unstructured data, including text, images, and more.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://aws.amazon.com/what-is/foundation-models/\">https://aws.amazon.com/what-is/foundation-models/</a></p>\n","answers":["<p>Foundation models can only perform a single task they were specifically trained for</p>","<p>Foundation models are limited to simple data processing tasks and cannot handle complex operations</p>","<p>Foundation models can perform a wide range of tasks across different domains by leveraging their extensive pre-training on large datasets</p>","<p>Foundation models are designed to work exclusively with structured data and cannot process unstructured data like text or images</p>"]},"correct_response":["c"],"section":"Fundamentals of Generative AI","question_plain":"A technology consulting firm is advising a client on the use of AI to enhance their business operations, particularly through the implementation of large-scale models that can handle diverse tasks such as text generation, image recognition, and natural language understanding. The firm is evaluating Foundation Models as a potential solution and wants to clarify their capabilities, including their ability to generalize across multiple domains and perform a wide range of tasks with minimal fine-tuning.\n\nWhich of the following options aptly summarizes the capabilities of Foundation Models?","related_lectures":[]},{"_class":"assessment","id":93244135,"assessment_type":"multiple-choice","prompt":{"question":"<p>A healthcare analytics company is exploring the use of Foundation Models to automate the process of labeling vast amounts of medical data, such as patient records and clinical notes, to enhance its machine learning models for diagnosis and treatment recommendations. The company wants to understand the specific techniques that Foundation Models use to generate labels from raw input data, helping streamline the data annotation process without requiring extensive manual effort.</p>\n\n<p>Which of the following techniques is used by Foundation Models to create labels from input data?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Self-supervised learning</strong></p>\n\n<p>It works when models are provided vast amounts of raw, almost entirely, or completely unlabeled data and then generate the labels themselves.</p>\n\n<p>Foundation models use self-supervised learning to create labels from input data. In self-supervised learning, models are provided vast amounts of raw completely unlabeled data and then the models generate the labels themselves. This means no one has instructed or trained the model with labeled training data sets.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Reinforcement learning</strong> - Reinforcement learning is a method with reward values attached to the different steps that the algorithm must go through. So the model’s goal is to accumulate as many reward points as possible and eventually reach an end goal.</p>\n\n<p><strong>Supervised learning</strong> - In supervised learning, models are supplied with labeled and defined training data to assess for correlations. The sample data specifies both the input and the output for the model. For example, images of handwritten figures are annotated to indicate which number they correspond to. A supervised learning system could recognize the clusters of pixels and shapes associated with each number, given sufficient examples.</p>\n\n<p>Data labeling is the process of categorizing input data with its corresponding defined output values. Labeled training data is required for supervised learning. For example, millions of apple and banana images would need to be tagged with the words “apple” or “banana.” Then machine learning applications could use this training data to guess the name of the fruit when given a fruit image.</p>\n\n<p><strong>Unsupervised learning</strong> - Unsupervised learning algorithms train on unlabeled data. They scan through new data, trying to establish meaningful connections between the inputs and predetermined outputs. They can spot patterns and categorize data. For example, unsupervised algorithms could group news articles from different news sites into common categories like sports, crime, etc. They can use natural language processing to comprehend meaning and emotion in the article.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/what-is/foundation-models/\">https://aws.amazon.com/what-is/foundation-models/</a></p>\n\n<p><a href=\"https://aws.amazon.com/what-is/machine-learning/\">https://aws.amazon.com/what-is/machine-learning/</a></p>\n","answers":["<p>Reinforcement learning</p>","<p>Self-supervised learning</p>","<p>Supervised learning</p>","<p>Unsupervised learning</p>"]},"correct_response":["b"],"section":"Fundamentals of Generative AI","question_plain":"A healthcare analytics company is exploring the use of Foundation Models to automate the process of labeling vast amounts of medical data, such as patient records and clinical notes, to enhance its machine learning models for diagnosis and treatment recommendations. The company wants to understand the specific techniques that Foundation Models use to generate labels from raw input data, helping streamline the data annotation process without requiring extensive manual effort.\n\nWhich of the following techniques is used by Foundation Models to create labels from input data?","related_lectures":[]},{"_class":"assessment","id":93244133,"assessment_type":"multiple-choice","prompt":{"question":"<p>An insurance company is transitioning to AWS Cloud and wants to use Amazon Bedrock for product recommendations. The company wants to supplement organization-specific information to the underlying Foundation Model (FM).</p>\n\n<p>Which of the following represents the best-fit solution for the given use case?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Use Knowledge Bases for Amazon Bedrock to supplement contextual information from the company's private data to the FM using Retrieval Augmented Generation (RAG)</strong></p>\n\n<p>With the comprehensive capabilities of Amazon Bedrock, you can experiment with a variety of top FMs, customize them privately with your data using techniques such as fine-tuning and retrieval-augmented generation (RAG), and create managed agents that execute complex business tasks—from booking travel and processing insurance claims to creating ad campaigns and managing inventory—all without writing any code.</p>\n\n<p>Using Knowledge Bases for Amazon Bedrock, you can provide foundation models with contextual information from your company's private data for Retrieval Augmented Generation (RAG), enhancing response relevance and accuracy. This fully managed feature handles the entire RAG workflow, eliminating the need for custom data integrations and management.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt2-q5-i1.jpg\">\nvia - <a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/knowledge-base.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/knowledge-base.html</a></p>\n\n<p>Incorrect options:</p>\n\n<p>Reinforcement learning from human feedback (RLHF) is a machine learning (ML) technique that uses human feedback to optimize ML models to self-learn more efficiently. Reinforcement learning (RL) techniques train software to make decisions that maximize rewards, making their outcomes more accurate. RLHF incorporates human feedback in the rewards function, so the ML model can perform tasks more aligned with human goals, wants, and needs. RLHF is used throughout generative artificial intelligence (generative AI) applications, including in large language models (LLM).</p>\n\n<p><strong>Use Knowledge Bases for Amazon Bedrock to supplement contextual information from the company's private data to the FM using Reinforcement Learning from Human Feedback (RLHF)</strong> - Knowledge Bases for Amazon Bedrock does not use RLHF to supplement contextual information to the FM, so this option is incorrect.</p>\n\n<p><strong>Implement Reinforcement Learning from Human Feedback (RLHF) in Amazon Bedrock by leveraging the contextual information from the company's private data</strong> - This option acts as a distractor since you cannot implement RLHF in Amazon Bedrock.</p>\n\n<p><strong>Fine-tune the base Foundation Model (FM) used by Amazon Bedrock by leveraging the contextual information from the company's private data</strong> - It is certainly possible to fine-tune the FM being used in Amazon Bedrock. However, you do not fine-tune the base FM. Rather, you make a separate copy of the base FM model and train this private copy of the model using the labeled training dataset. So, this option is incorrect.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/bedrock/faqs/\">https://aws.amazon.com/bedrock/faqs/</a></p>\n\n<p><a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/knowledge-base.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/knowledge-base.html</a></p>\n\n<p><a href=\"https://aws.amazon.com/what-is/reinforcement-learning-from-human-feedback/\">https://aws.amazon.com/what-is/reinforcement-learning-from-human-feedback/</a></p>\n","answers":["<p>Use Knowledge Bases for Amazon Bedrock to supplement contextual information from the company's private data to the FM using Reinforcement Learning from Human Feedback (RLHF)</p>","<p>Implement Reinforcement Learning from Human Feedback (RLHF) in Amazon Bedrock by leveraging the contextual information from the company's private data</p>","<p>Fine-tune the base Foundation Model (FM) used by Amazon Bedrock by leveraging the contextual information from the company's private data</p>","<p>Use Knowledge Bases for Amazon Bedrock to supplement contextual information from the company's private data to the FM using Retrieval Augmented Generation (RAG)</p>"]},"correct_response":["d"],"section":"Fundamentals of Generative AI","question_plain":"An insurance company is transitioning to AWS Cloud and wants to use Amazon Bedrock for product recommendations. The company wants to supplement organization-specific information to the underlying Foundation Model (FM).\n\nWhich of the following represents the best-fit solution for the given use case?","related_lectures":[]},{"_class":"assessment","id":93244131,"assessment_type":"multiple-choice","prompt":{"question":"<p>A global e-commerce company is leveraging a Foundation Model (FM) to improve its product recommendation engine and enhance customer experience. However, the data science team is looking to further optimize the model's performance by applying advanced techniques that can fine-tune the FM for specific tasks, ensure higher accuracy, and improve overall efficiency. The company needs to identify the most effective methods for enhancing the model's capabilities while maintaining scalability.</p>\n\n<p>Which of the following is correct regarding the techniques used to improve the performance of a Foundation Model (FM)?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Fine-tuning changes the weights of the FM whereas Retrieval-augmented generation (RAG) does not change the weights of the FM</strong></p>\n\n<p>Retrieval-Augmented Generation (RAG) is the process of optimizing the output of a large language model, so it references an authoritative knowledge base outside of its training data sources before generating a response. Large Language Models (LLMs) are trained on vast volumes of data and use billions of parameters to generate original output for tasks like answering questions, translating languages, and completing sentences. RAG extends the already powerful capabilities of LLMs to specific domains or an organization's internal knowledge base, all without the need to retrain the model.</p>\n\n<p>Another recommended way to first customize a foundation model to a specific use case is through prompt engineering. Providing your foundation model with well-engineered, context-rich prompts can help achieve desired results without any fine-tuning or changing of model weights.</p>\n\n<p>Lastly, fine-tuning is a customization method for FMs that involves further training and does change the weights of your model.</p>\n\n<p>Retrieval Augmented Generation (RAG) allows you to customize a model’s responses when you want the model to consider new knowledge or up-to-date information. When your data changes frequently, like inventory or pricing, it’s not practical to fine-tune and update the model while it’s serving user queries.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt2-q6-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/blogs/machine-learning/best-practices-to-build-generative-ai-applications-on-aws/\">https://aws.amazon.com/blogs/machine-learning/best-practices-to-build-generative-ai-applications-on-aws/</a></p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt2-q6-i2.jpg\">\nvia - <a href=\"https://docs.aws.amazon.com/sagemaker/latest/dg/jumpstart-foundation-models-fine-tuning.html\">https://docs.aws.amazon.com/sagemaker/latest/dg/jumpstart-foundation-models-fine-tuning.html</a></p>\n\n<p>Exam Alert:</p>\n\n<p>Note the following regarding the techniques to improve the performance of a Foundation Model (FM):</p>\n\n<p>Prompt engineering does NOT change the weights of the FM.\nRetrieval-Augmented Generation (RAG) does NOT change the weights of the FM.\nFine-tuning DOES change the weights of the FM.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Neither Fine-tuning nor Retrieval-augmented generation (RAG) changes the weights of the FM</strong></p>\n\n<p><strong>Both Fine-tuning and Retrieval-augmented generation (RAG) change the weights of the FM</strong></p>\n\n<p><strong>Fine-tuning does not change the weights of the FM whereas Retrieval-augmented generation (RAG) changes the weights of the FM</strong></p>\n\n<p>These three options contradict the explanation provided above, so these options are incorrect.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/blogs/machine-learning/best-practices-to-build-generative-ai-applications-on-aws/\">https://aws.amazon.com/blogs/machine-learning/best-practices-to-build-generative-ai-applications-on-aws/</a></p>\n\n<p><a href=\"https://docs.aws.amazon.com/sagemaker/latest/dg/jumpstart-foundation-models-fine-tuning.html\">https://docs.aws.amazon.com/sagemaker/latest/dg/jumpstart-foundation-models-fine-tuning.html</a></p>\n","answers":["<p>Neither Fine-tuning nor Retrieval-augmented generation (RAG) changes the weights of the FM</p>","<p>Both Fine-tuning and Retrieval-augmented generation (RAG) change the weights of the FM</p>","<p>Fine-tuning changes the weights of the FM whereas Retrieval-augmented generation (RAG) does not change the weights of the FM</p>","<p>Fine-tuning does not change the weights of the FM whereas Retrieval-augmented generation (RAG) changes the weights of the FM</p>"]},"correct_response":["c"],"section":"Fundamentals of Generative AI","question_plain":"A global e-commerce company is leveraging a Foundation Model (FM) to improve its product recommendation engine and enhance customer experience. However, the data science team is looking to further optimize the model's performance by applying advanced techniques that can fine-tune the FM for specific tasks, ensure higher accuracy, and improve overall efficiency. The company needs to identify the most effective methods for enhancing the model's capabilities while maintaining scalability.\n\nWhich of the following is correct regarding the techniques used to improve the performance of a Foundation Model (FM)?","related_lectures":[]},{"_class":"assessment","id":93244129,"assessment_type":"multiple-choice","prompt":{"question":"<p>An e-commerce company is developing a chatbot to enhance its user experience by allowing customers to submit queries that include both text descriptions and images, such as product photos or screenshots of issues. The company aims for the chatbot to understand these multi-modal inputs and provide accurate and context-aware responses, seamlessly combining visual and textual information to address customer needs effectively.</p>\n\n<p>Which approach would be the most cost-effective for enabling the chatbot to process such multi-modal queries effectively?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>The company should use a multi-modal embedding model, which is designed to represent and align different types of data (such as text and images) in a shared embedding space, allowing the chatbot to understand and interpret both forms of input simultaneously</strong></p>\n\n<p>A multi-modal embedding model is the most suitable choice for this task because it enables the integration of multiple types of data, such as text and images, into a unified representation. This allows the chatbot to effectively process and understand queries containing both text and visual content by aligning them in a shared embedding space, facilitating more accurate and context-aware responses.</p>\n\n<p>You can generate embeddings for your content and store them in a vector database. When an end user submits any combination of text and image as a search query, the model generates embeddings for the search query and matches them to the stored embeddings to provide relevant search and recommendations results to end users. For example, a stock photography company with hundreds of millions of images can use the model to power its search functionality, so users can search for images using a phrase, image, or a combination of image and text. You can further customize the model to enhance its understanding of your unique content and provide more meaningful results using image-text pairs for fine-tuning.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>The company should use a multi-modal generative model, which can generate responses or outputs based on combined inputs from different modalities, such as text and images, enhancing the chatbot’s ability to provide contextually relevant answers</strong> - While a multi-modal generative model can generate outputs based on multiple types of input data, it is more complex and typically used for generating new content rather than interpreting and responding to queries. In addition, it is costlier to build and maintain a multi-modal generative model compared to a multi-modal embedding model. A multi-modal embedding model is more efficient for understanding and processing combined text and image inputs, whereas a generative model may be excessive if the primary goal is to process and respond to existing multi-modal queries.</p>\n\n<p><strong>The company should use a text-only language model, which is trained exclusively on textual data</strong> - A text-only language model cannot handle image data because it is designed to process and generate text exclusively. This model lacks the capability to understand or incorporate visual information, making it unsuitable for a chatbot that needs to interpret both text and images in user queries.</p>\n\n<p><strong>The company should use a convolutional neural network (CNN), a deep learning model primarily designed for processing image data</strong> - A convolutional neural network (CNN) is designed specifically for image recognition and processing tasks and is highly effective for analyzing visual data. However, it cannot process text-based inputs and therefore cannot fulfill the requirement of handling multi-modal queries that include both text and images. A CNN would need to be combined with other models to process text, which adds complexity without directly addressing the multi-modal nature of the queries.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://community.aws/content/2Z5Z29gSjBC2kRYeWpAQZzFE3tV/a-new-way-to-implement-product-search-using-titan-multimodal-embeddings-on-amazon-bedrock\">https://community.aws/content/2Z5Z29gSjBC2kRYeWpAQZzFE3tV/a-new-way-to-implement-product-search-using-titan-multimodal-embeddings-on-amazon-bedrock</a></p>\n\n<p><a href=\"https://aws.amazon.com/about-aws/whats-new/2023/11/amazon-titan-multimodal-embeddings-model-bedrock/\">https://aws.amazon.com/about-aws/whats-new/2023/11/amazon-titan-multimodal-embeddings-model-bedrock/</a></p>\n","answers":["<p>The company should use a multi-modal embedding model, which is designed to represent and align different types of data (such as text and images) in a shared embedding space, allowing the chatbot to understand and interpret both forms of input simultaneously</p>","<p>The company should use a multi-modal generative model, which can generate responses or outputs based on combined inputs from different modalities, such as text and images, enhancing the chatbot’s ability to provide contextually relevant answers</p>","<p>The company should use a text-only language model, which is trained exclusively on textual data</p>","<p>The company should use a convolutional neural network (CNN), a deep learning model primarily designed for processing image data</p>"]},"correct_response":["a"],"section":"Applications of Foundation Models","question_plain":"An e-commerce company is developing a chatbot to enhance its user experience by allowing customers to submit queries that include both text descriptions and images, such as product photos or screenshots of issues. The company aims for the chatbot to understand these multi-modal inputs and provide accurate and context-aware responses, seamlessly combining visual and textual information to address customer needs effectively.\n\nWhich approach would be the most cost-effective for enabling the chatbot to process such multi-modal queries effectively?","related_lectures":[]},{"_class":"assessment","id":93244127,"assessment_type":"multi-select","prompt":{"question":"<p>A financial services company is exploring Amazon Bedrock to streamline its AI development for use cases such as fraud detection, personalized customer service, and automated reporting. The company is particularly interested in understanding the key features and benefits of Amazon Bedrock, including its ability to simplify access to powerful foundation models, support customizations, and integrate with existing AWS services.</p>\n\n<p>To make an informed decision, the company needs to identify which of the following accurately applies to Amazon Bedrock and its capabilities? (Select two)</p>\n","relatedLectureIds":"","feedbacks":["","","","",""],"explanation":"<p>Correct options:</p>\n\n<p>With Amazon Bedrock, you will be charged for model inference and customization. You have a choice of two pricing plans for inference: 1. On-Demand and Batch: This mode allows you to use FMs on a pay-as-you-go basis without having to make any time-based term commitments. 2. Provisioned Throughput: This mode allows you to provision sufficient throughput to meet your application's performance requirements in exchange for a time-based term commitment.</p>\n\n<p><strong>Smaller models are cheaper to use than larger models</strong></p>\n\n<p>The cost of generative AI models can vary. It's important to weigh the trade-offs between model size and speed. Larger models tend to be more accurate but are costly and have limited deployment options. In contrast, smaller models are more affordable and faster, offering more deployment flexibility.</p>\n\n<p><strong>You can use a customized model only in the Provisioned Throughput mode</strong></p>\n\n<p>With the Provisioned Throughput mode, you can purchase model units for a specific base or custom model. The Provisioned Throughput mode is primarily designed for large consistent inference workloads that need guaranteed throughput. Custom models can only be accessed using Provisioned Throughput.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt2-q8-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/bedrock/pricing/\">https://aws.amazon.com/bedrock/pricing/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>You can use the On-Demand mode only with time-based term commitments</strong> - With the On-Demand mode, you only pay for what you use, with no time-based term commitments. So, this option is incorrect.</p>\n\n<p><strong>Larger models are cheaper to use than smaller models</strong> - As mentioned above, larger models tend to be more accurate but are costly and have limited deployment options. In contrast, smaller models are more affordable and faster, offering more deployment flexibility.</p>\n\n<p><strong>You can use a customized model in the Provisioned Throughput or On-Demand mode</strong> - Custom models can only be accessed using Provisioned Throughput. So, this option is incorrect.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/bedrock/pricing/\">https://aws.amazon.com/bedrock/pricing/</a></p>\n\n<p><a href=\"https://aws.amazon.com/blogs/machine-learning/best-practices-to-build-generative-ai-applications-on-aws/\">https://aws.amazon.com/blogs/machine-learning/best-practices-to-build-generative-ai-applications-on-aws/</a></p>\n","answers":["<p>You can use the On-Demand mode only with time-based term commitments</p>","<p>Larger models are cheaper to use than smaller models</p>","<p>You can use a customized model in the Provisioned Throughput or On-Demand mode</p>","<p>Smaller models are cheaper to use than larger models</p>","<p>You can use a customized model only in the Provisioned Throughput mode</p>"]},"correct_response":["d","e"],"section":"Fundamentals of Generative AI","question_plain":"A financial services company is exploring Amazon Bedrock to streamline its AI development for use cases such as fraud detection, personalized customer service, and automated reporting. The company is particularly interested in understanding the key features and benefits of Amazon Bedrock, including its ability to simplify access to powerful foundation models, support customizations, and integrate with existing AWS services.\n\nTo make an informed decision, the company needs to identify which of the following accurately applies to Amazon Bedrock and its capabilities? (Select two)","related_lectures":[]},{"_class":"assessment","id":93244125,"assessment_type":"multi-select","prompt":{"question":"<p>A legal firm is looking to implement an AI solution that can generate detailed, accurate responses to client queries by retrieving relevant information from its extensive database of legal documents. The firm is considering the use of Retrieval Augmented Generation (RAG) through Amazon Bedrock to enhance the quality and relevance of the generated content. The team wants to understand the best-fit use cases for RAG to determine if it aligns with their needs for knowledge retrieval and content generation.</p>\n\n<p>Which of the following represents the best-fit use cases for utilizing Retrieval Augmented Generation (RAG) in Amazon Bedrock? (Select two)</p>\n","relatedLectureIds":"","feedbacks":["","","","",""],"explanation":"<p>Correct options:</p>\n\n<p><strong>Customer service chatbot</strong></p>\n\n<p><strong>Medical queries chatbot</strong></p>\n\n<p>To equip foundation models (FMs) with up-to-date and proprietary information, organizations use Retrieval Augmented Generation (RAG), a technique that fetches data from company data sources and enriches the prompt to provide more relevant and accurate responses. Knowledge Bases for Amazon Bedrock is a fully managed capability that helps you implement the entire RAG workflow from ingestion to retrieval and prompt augmentation without having to build custom integrations to data sources and manage data flows. Some of the common use cases that can be addressed via RAG in Amazon Bedrock are customer service chatbot, medical queries chatbot, legal research and analysis, etc.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Image generation from text prompt</strong></p>\n\n<p><strong>Product recommendations that match shopper preferences</strong></p>\n\n<p><strong>Original content creation</strong></p>\n\n<p>Here are some of the use cases that are not the right fit for using RAG in Amazon Bedrock:</p>\n\n<p>Create new pieces of original content, such as short stories, essays, social media posts, and web page copy.\nCreate realistic and artistic images of various subjects, environments, and scenes from language prompts.\nSuggest products that match shopper preferences and past purchases</p>\n\n<p>Therefore, these three options are incorrect.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/bedrock/faqs/\">https://aws.amazon.com/bedrock/faqs/</a></p>\n\n<p><a href=\"https://aws.amazon.com/bedrock/knowledge-bases/\">https://aws.amazon.com/bedrock/knowledge-bases/</a></p>\n\n<p><a href=\"https://aws.amazon.com/blogs/aws/knowledge-bases-now-delivers-fully-managed-rag-experience-in-amazon-bedrock/\">https://aws.amazon.com/blogs/aws/knowledge-bases-now-delivers-fully-managed-rag-experience-in-amazon-bedrock/</a></p>\n","answers":["<p>Image generation from text prompt</p>","<p>Customer service chatbot</p>","<p>Product recommendations that match shopper preferences</p>","<p>Medical queries chatbot</p>","<p>Original content creation</p>"]},"correct_response":["b","d"],"section":"Fundamentals of Generative AI","question_plain":"A legal firm is looking to implement an AI solution that can generate detailed, accurate responses to client queries by retrieving relevant information from its extensive database of legal documents. The firm is considering the use of Retrieval Augmented Generation (RAG) through Amazon Bedrock to enhance the quality and relevance of the generated content. The team wants to understand the best-fit use cases for RAG to determine if it aligns with their needs for knowledge retrieval and content generation.\n\nWhich of the following represents the best-fit use cases for utilizing Retrieval Augmented Generation (RAG) in Amazon Bedrock? (Select two)","related_lectures":[]},{"_class":"assessment","id":93244141,"assessment_type":"multiple-choice","prompt":{"question":"<p>An app developer is building an educational application to help high-school students understand fundamental concepts in mathematics, such as calculating the probability of drawing a spade from a deck of cards.</p>\n\n<p>Which approach would be the most suitable for this purpose?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>The developer should create a rule-based application that uses predefined mathematical rules and formulas to answer probability questions accurately</strong></p>\n\n<p>A rule-based application is the most suitable choice for this scenario. Probability questions, like calculating the chance of drawing a spade from a deck of cards, are based on well-defined mathematical rules and formulas. A rule-based system can be programmed with these rules to provide precise answers to such questions, making it an efficient and straightforward solution. This approach ensures accuracy, is easy to implement, and requires no training data, making it ideal for helping students understand fundamental mathematical concepts.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>The developer should leverage reinforcement learning (RL), a type of machine learning where an agent learns to make decisions by receiving rewards or penalties</strong> - Reinforcement Learning (RL) is a machine learning technique used for decision-making tasks where an agent learns by interacting with an environment and receiving feedback in the form of rewards or penalties. RL is better suited for dynamic and complex environments, such as games or robotic control, where exploration and adaptation are necessary. It is not appropriate for solving straightforward mathematical problems with well-defined answers, as it does not leverage existing mathematical rules and requires significant computational resources for training.</p>\n\n<p><strong>The developer should apply supervised learning, a machine learning approach where the model learns from labeled datasets to make predictions</strong> - Supervised learning involves training a model on a labeled dataset to predict outcomes based on input features. While effective for tasks like image recognition or language translation, it is not suitable for answering mathematical questions that have precise, rule-based answers. Building a dataset of probability questions and answers would be inefficient and unnecessary, as the app can directly use mathematical formulas to provide correct responses without requiring model training.</p>\n\n<p><strong>The developer should utilize unsupervised learning, a machine learning method that identifies patterns and structures in data without using labeled datasets</strong> - Unsupervised learning is designed to identify patterns and structures in data without any predefined labels, making it useful for tasks such as clustering or dimensionality reduction. However, it is not applicable for answering specific mathematical questions like those involving probability, which require exact calculations based on established mathematical principles. Therefore, unsupervised learning does not provide a direct or efficient means to achieve the app’s objective.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://aws.amazon.com/what-is/machine-learning/\">https://aws.amazon.com/what-is/machine-learning/</a></p>\n","answers":["<p>The developer should leverage reinforcement learning (RL), a type of machine learning where an agent learns to make decisions by receiving rewards or penalties</p>","<p>The developer should apply supervised learning, a machine learning approach where the model learns from labeled datasets to make predictions</p>","<p>The developer should utilize unsupervised learning, a machine learning method that identifies patterns and structures in data without using labeled datasets</p>","<p>The developer should create a rule-based application that uses predefined mathematical rules and formulas to answer probability questions accurately</p>"]},"correct_response":["d"],"section":"Fundamentals of AI and ML","question_plain":"An app developer is building an educational application to help high-school students understand fundamental concepts in mathematics, such as calculating the probability of drawing a spade from a deck of cards.\n\nWhich approach would be the most suitable for this purpose?","related_lectures":[]},{"_class":"assessment","id":93244121,"assessment_type":"multiple-choice","prompt":{"question":"<p>A machine learning team at a tech company is developing a generative AI model to automate text generation for customer support. As part of optimizing the model’s performance, the team needs to adjust both model parameters and hyperparameters but wants to clearly understand the distinctions between the two. Understanding these differences is crucial for fine-tuning the model and improving its output.</p>\n\n<p>Which of the following highlights the key differences between model parameters and hyperparameters in the context of generative AI?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Model parameters are values that define a model and its behavior in interpreting input and generating responses. Hyperparameters are values that can be adjusted for model customization to control the training process</strong></p>\n\n<p>Hyperparameters are values that can be adjusted for model customization to control the training process and, consequently, the output custom model. In other words, hyperparameters are external configurations set before the training process begins. They control the training process and the structure of the model but are not adjusted by the training algorithm itself. Examples include the learning rate, the number of layers in a neural network, etc.</p>\n\n<p>Model parameters are values that define a model and its behavior in interpreting input and generating responses. Model parameters are controlled and updated by providers. You can also update model parameters to create a new model through the process of model customization. In other words, Model parameters are the internal variables of the model that are learned and adjusted during the training process. These parameters directly influence the output of the model for a given input. Examples include the weights and biases in a neural network.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt2-q11-i1.jpg\">\nvia - <a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/key-definitions.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/key-definitions.html</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Both Hyperparameters and model parameters are values that can be adjusted for model customization to control the training process</strong></p>\n\n<p><strong>Both Hyperparameters and model parameters are values that define a model and its behavior in interpreting input and generating responses</strong></p>\n\n<p><strong>Hyperparameters are values that define a model and its behavior in interpreting input and generating responses. Model parameters are values that can be adjusted for model customization to control the training process</strong></p>\n\n<p>These three options contradict the explanation provided above, so these options are incorrect.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/key-definitions.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/key-definitions.html</a></p>\n","answers":["<p>Both Hyperparameters and model parameters are values that can be adjusted for model customization to control the training process</p>","<p>Both Hyperparameters and model parameters are values that define a model and its behavior in interpreting input and generating responses</p>","<p>Hyperparameters are values that define a model and its behavior in interpreting input and generating responses. Model parameters are values that can be adjusted for model customization to control the training process</p>","<p>Model parameters are values that define a model and its behavior in interpreting input and generating responses. Hyperparameters are values that can be adjusted for model customization to control the training process</p>"]},"correct_response":["d"],"section":"Fundamentals of AI and ML","question_plain":"A machine learning team at a tech company is developing a generative AI model to automate text generation for customer support. As part of optimizing the model’s performance, the team needs to adjust both model parameters and hyperparameters but wants to clearly understand the distinctions between the two. Understanding these differences is crucial for fine-tuning the model and improving its output.\n\nWhich of the following highlights the key differences between model parameters and hyperparameters in the context of generative AI?","related_lectures":[]},{"_class":"assessment","id":93244119,"assessment_type":"multiple-choice","prompt":{"question":"<p>A software company is developing a generative AI model for language translation and needs to optimize the way the model processes and understands text. The development team is focusing on improving the model’s ability to convert words into a form that the AI can effectively interpret and generate accurate translations. To achieve this, they need to clarify the roles of tokens and embeddings in the model’s language processing.</p>\n\n<p>Which of the following summarizes the differences between a token and an embedding in the context of generative AI?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>A token is a sequence of characters that a model can interpret or predict as a single unit of meaning, whereas, an embedding is a vector of numerical values that represents condensed information obtained by transforming input into that vector</strong></p>\n\n<p>Embedding – The process of condensing information by transforming input into a vector of numerical values, known as the embeddings, in order to compare the similarity between different objects by using a shared numerical representation. For example, sentences can be compared to determine the similarity in meaning, images can be compared to determine visual similarity, or text and image can be compared to see if they're relevant to each other.</p>\n\n<p>Token – A sequence of characters that a model can interpret or predict as a single unit of meaning. For example, with text models, a token could correspond not just to a word, but also to a part of a word with grammatical meaning (such as \"-ed\"), a punctuation mark (such as \"?\"), or a common phrase (such as \"a lot\").</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt2-q12-i1.jpg\">\nvia - <a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/key-definitions.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/key-definitions.html</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Both token and embedding refer to a sequence of characters that a model can interpret or predict as a single unit of meaning</strong></p>\n\n<p><strong>An embedding is a sequence of characters that a model can interpret or predict as a single unit of meaning, whereas, a token is a vector of numerical values that represents condensed information obtained by transforming input into that vector</strong></p>\n\n<p><strong>Both token and embedding refer to a vector of numerical values that represents condensed information obtained by transforming input into that vector</strong></p>\n\n<p>These three options contradict the explanation provided above, so these options are incorrect.</p>\n\n<p>References:</p>\n","answers":["<p>Both token and embedding refer to a sequence of characters that a model can interpret or predict as a single unit of meaning</p>","<p>An embedding is a sequence of characters that a model can interpret or predict as a single unit of meaning, whereas, a token is a vector of numerical values that represents condensed information obtained by transforming input into that vector</p>","<p>A token is a sequence of characters that a model can interpret or predict as a single unit of meaning, whereas, an embedding is a vector of numerical values that represents condensed information obtained by transforming input into that vector</p>","<p>Both token and embedding refer to a vector of numerical values that represents condensed information obtained by transforming input into that vector</p>"]},"correct_response":["c"],"section":"Fundamentals of AI and ML","question_plain":"A software company is developing a generative AI model for language translation and needs to optimize the way the model processes and understands text. The development team is focusing on improving the model’s ability to convert words into a form that the AI can effectively interpret and generate accurate translations. To achieve this, they need to clarify the roles of tokens and embeddings in the model’s language processing.\n\nWhich of the following summarizes the differences between a token and an embedding in the context of generative AI?","related_lectures":[]},{"_class":"assessment","id":93244117,"assessment_type":"multiple-choice","prompt":{"question":"<p>A technology firm is developing an AI-driven solution for automating business processes and needs to design effective prompts for its generative AI model. The model is tasked with solving complex, multi-step problems, such as generating detailed business reports or creating process workflows. To improve the model's performance, the team is exploring prompt engineering techniques that can help simplify these tasks by breaking them down into smaller, manageable parts.</p>\n\n<p>Which prompt engineering technique is best suited for breaking down a complex problem into smaller logical parts?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Chain-of-thought prompting</strong></p>\n\n<p>Chain-of-thought prompting is a technique that breaks down a complex question into smaller, logical parts that mimic a train of thought. This helps the model solve problems in a series of intermediate steps rather than directly answering the question. This enhances its reasoning ability. It involves guiding the model through a step-by-step process to arrive at a solution or generate content, thereby enhancing the quality and coherence of the output.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt2-q13-i1.jpg\"></p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt2-q13-i2.jpg\"></p>\n\n<p>via - <a href=\"https://aws.amazon.com/what-is/prompt-engineering/\">https://aws.amazon.com/what-is/prompt-engineering/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Negative prompting</strong> - Negative prompting refers to guiding a generative AI model to avoid certain outputs or behaviors when generating content. In the context of AWS generative AI, like those using Amazon Bedrock, negative prompting is used to refine and control the output of models by specifying what should not be included in the generated content. For example, when generating text for a marketing campaign, a company can use negative prompts to exclude competitive brand names or sensitive topics.</p>\n\n<p><strong>Zero shot Prompting</strong> - In zero shot prompting, you present a task to the model without providing examples or explicit training for that specific task.</p>\n\n<p><strong>Few shot Prompting</strong> - In few shot prompting, you provide a few examples of a task to the model to guide its output.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://aws.amazon.com/what-is/prompt-engineering/\">https://aws.amazon.com/what-is/prompt-engineering/</a></p>\n","answers":["<p>Negative prompting</p>","<p>Chain-of-thought prompting</p>","<p>Zero shot Prompting</p>","<p>Few shot Prompting</p>"]},"correct_response":["b"],"section":"Fundamentals of AI and ML","question_plain":"A technology firm is developing an AI-driven solution for automating business processes and needs to design effective prompts for its generative AI model. The model is tasked with solving complex, multi-step problems, such as generating detailed business reports or creating process workflows. To improve the model's performance, the team is exploring prompt engineering techniques that can help simplify these tasks by breaking them down into smaller, manageable parts.\n\nWhich prompt engineering technique is best suited for breaking down a complex problem into smaller logical parts?","related_lectures":[]},{"_class":"assessment","id":93244115,"assessment_type":"multiple-choice","prompt":{"question":"<p>A company is using a Large Language Model (LLM) on Amazon Bedrock and it wants to regulate the creativity of the model's output.</p>\n\n<p>Which of the following inference parameters would you recommend for the given use case?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Temperature</strong></p>\n\n<p>LLMs on Amazon Bedrock come with several inference parameters that you can set to control the response from the models.</p>\n\n<p>Temperature is a value between 0 and 1, and it regulates the creativity of LLMs’ responses. Use a lower temperature if you want more deterministic responses, and use a higher temperature if you want creative or different responses for the same prompt from LLMs on Amazon Bedrock.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt2-q14-i1.jpg\"></p>\n\n<p>via - <a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/inference-parameters.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/inference-parameters.html</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Top P</strong> - Top P represents the percentage of most likely candidates that the model considers for the next token. Choose a lower value to decrease the size of the pool and limit the options to more likely outputs. Choose a higher value to increase the size of the pool and allow the model to consider less likely outputs.</p>\n\n<p><strong>Top K</strong> - Top K represents the number of most likely candidates that the model considers for the next token. Choose a lower value to decrease the size of the pool and limit the options to more likely outputs. Choose a higher value to increase the size of the pool and allow the model to consider less likely outputs.</p>\n\n<p><strong>Stop sequences</strong> - Stop sequences specify the sequences of characters that stop the model from generating further tokens. If the model generates a stop sequence that you specify, it will stop generating after that sequence.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/inference-parameters.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/inference-parameters.html</a></p>\n\n<p><a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/general-guidelines-for-bedrock-users.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/general-guidelines-for-bedrock-users.html</a></p>\n","answers":["<p>Temperature</p>","<p>Top P</p>","<p>Top K</p>","<p>Stop sequences</p>"]},"correct_response":["a"],"section":"Fundamentals of AI and ML","question_plain":"A company is using a Large Language Model (LLM) on Amazon Bedrock and it wants to regulate the creativity of the model's output.\n\nWhich of the following inference parameters would you recommend for the given use case?","related_lectures":[]},{"_class":"assessment","id":93244113,"assessment_type":"multiple-choice","prompt":{"question":"<p>A company is using Amazon Bedrock and it wants to regulate the percentage of most-likely candidates considered for the next word in the model's output.</p>\n\n<p>Which of the following inference parameters would you recommend for the given use case?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Top P</strong></p>\n\n<p>Top P represents the percentage of most likely candidates that the model considers for the next token. Choose a lower value to decrease the size of the pool and limit the options to more likely outputs. Choose a higher value to increase the size of the pool and allow the model to consider less likely outputs.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt2-q15-i1.jpg\"></p>\n\n<p>via - <a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/inference-parameters.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/inference-parameters.html</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Temperature</strong> - Temperature is a value between 0 and 1, and it regulates the creativity of the model's responses. Use a lower temperature if you want more deterministic responses, and use a higher temperature if you want more creative or different responses for the same prompt on Amazon Bedrock.</p>\n\n<p><strong>Top K</strong> - Top K represents the number of most likely candidates that the model considers for the next token. Choose a lower value to decrease the size of the pool and limit the options to more likely outputs. Choose a higher value to increase the size of the pool and allow the model to consider less likely outputs.</p>\n\n<p><strong>Stop sequences</strong> - Stop sequences specify the sequences of characters that stop the model from generating further tokens. If the model generates a stop sequence that you specify, it will stop generating after that sequence.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/inference-parameters.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/inference-parameters.html</a></p>\n\n<p><a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/general-guidelines-for-bedrock-users.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/general-guidelines-for-bedrock-users.html</a></p>\n","answers":["<p>Temperature</p>","<p>Top P</p>","<p>Top K</p>","<p>Stop sequences</p>"]},"correct_response":["b"],"section":"Fundamentals of AI and ML","question_plain":"A company is using Amazon Bedrock and it wants to regulate the percentage of most-likely candidates considered for the next word in the model's output.\n\nWhich of the following inference parameters would you recommend for the given use case?","related_lectures":[]},{"_class":"assessment","id":93244111,"assessment_type":"multiple-choice","prompt":{"question":"<p>A company is using Amazon Bedrock and it wants to set an upper limit on the number of tokens returned in the model's response.</p>\n\n<p>Which of the following inference parameters would you recommend for the given use case?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Response length</strong></p>\n\n<p>Response length represents the minimum or maximum number of tokens to return in the generated response.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt2-q16-i1.jpg\">\nvia - <a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/inference-parameters.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/inference-parameters.html</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Stop sequence</strong> - Stop sequences specify the sequences of characters that stop the model from generating further tokens. If the model generates a stop sequence that you specify, it will stop generating after that sequence.</p>\n\n<p><strong>Top P</strong> - Top P represents the percentage of most likely candidates that the model considers for the next token.</p>\n\n<p><strong>Top K</strong> - Top K represents the number of most likely candidates that the model considers for the next token.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/inference-parameters.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/inference-parameters.html</a></p>\n\n<p><a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/general-guidelines-for-bedrock-users.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/general-guidelines-for-bedrock-users.html</a></p>\n","answers":["<p>Stop sequence</p>","<p>Top P</p>","<p>Top K</p>","<p>Response length</p>"]},"correct_response":["d"],"section":"Fundamentals of AI and ML","question_plain":"A company is using Amazon Bedrock and it wants to set an upper limit on the number of tokens returned in the model's response.\n\nWhich of the following inference parameters would you recommend for the given use case?","related_lectures":[]},{"_class":"assessment","id":93244109,"assessment_type":"multiple-choice","prompt":{"question":"<p>A company has implemented a chatbot powered by Amazon Bedrock to handle customer inquiries and support requests. While the chatbot is effective at providing automated responses, the company has noticed that some of the replies do not consistently match its desired tone — professional, empathetic, and friendly. To maintain brand consistency and ensure a positive customer experience, the company needs to align the chatbot’s responses with its specific communication style and standards.</p>\n\n<p>Which approach would be most effective for ensuring that the chatbot's responses are consistently aligned with the company's tone and style?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>The company should iteratively test and adjust the chatbot prompts to ensure that its outputs consistently reflect the company's tone and style</strong></p>\n\n<p>This is the correct approach because it directly focuses on fine-tuning the chatbot’s behavior via prompt engineering. Experimenting with and refining the prompt allows the company to guide the chatbot towards generating responses that are aligned with its specific tone and communication style. This process involves providing clear instructions or examples in the prompt and making iterative adjustments based on the chatbot's output until the desired tone is achieved.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>The company should adjust the temperature to reduce the randomness and creativity of the chatbot’s responses</strong> - Adjusting the temperature affects the variability and creativity of the chatbot's outputs but does not specifically help in aligning the responses with the company's tone. Lowering the temperature makes responses more predictable, while raising it makes them more diverse. However, it does not ensure that the output matches the desired tone or style.</p>\n\n<p><strong>The company should use batch inferencing, a method that processes multiple input requests in one go to make the chatbot’s responses consistent</strong> - Batch inferencing is a cost-saving technique used to process several requests simultaneously, improving efficiency and throughput. However, it does not help in refining or aligning the chatbot’s responses to a particular tone or style. This option is irrelevant to the goal of matching the company’s specific communication standards.</p>\n\n<p><strong>The company should set a low limit on the number of tokens, which restricts the length of the chatbot's responses, thereby making the chatbot’s responses consistent</strong> - Limiting the number of tokens restricts the length of the responses generated by the chatbot but does not affect the tone or style of the responses. While shorter responses may sometimes seem more aligned with a specific tone, this method does not directly help the chatbot adhere to the company’s desired communication style.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/prompt-engineering-guidelines.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/prompt-engineering-guidelines.html</a></p>\n\n<p><a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/prompt-templates-and-examples.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/prompt-templates-and-examples.html</a></p>\n","answers":["<p>The company should iteratively test and adjust the chatbot prompts to ensure that its outputs consistently reflect the company's tone and style</p>","<p>The company should adjust the temperature to reduce the randomness and creativity of the chatbot’s responses</p>","<p>The company should use batch inferencing, a method that processes multiple input requests in one go to make the chatbot’s responses consistent</p>","<p>The company should set a low limit on the number of tokens, which restricts the length of the chatbot's responses, thereby making the chatbot’s responses consistent</p>"]},"correct_response":["a"],"section":"Security, Compliance, and Governance for AI Solutions","question_plain":"A company has implemented a chatbot powered by Amazon Bedrock to handle customer inquiries and support requests. While the chatbot is effective at providing automated responses, the company has noticed that some of the replies do not consistently
