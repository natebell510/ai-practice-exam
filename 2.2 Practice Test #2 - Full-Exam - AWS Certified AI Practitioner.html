 about managing user permissions, while integrity focuses on data accuracy and consistency.</p>\n\n<p><strong>Data access control and data integrity are both concerned with encrypting data at rest and in transit</strong> - While encryption is important for both access control and integrity, this statement does not capture their primary roles. Access control is about user permissions, and integrity is about data accuracy and consistency.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://aws.amazon.com/ai/generative-ai/security/\">https://aws.amazon.com/ai/generative-ai/security/</a></p>\n","answers":["<p>Data access control ensures the accuracy and consistency of data, while data integrity manages who can access the data</p>","<p>Data access control involves authentication and authorization of users, whereas data integrity ensures the data is accurate, consistent, and unaltered</p>","<p>Data access control is responsible for data encryption, while data integrity focuses on auditing and logging user activities</p>","<p>Data access control and data integrity are both concerned with encrypting data at rest and in transit</p>"]},"correct_response":["b"],"section":"Guidelines for Responsible AI","question_plain":"A financial institution is designing an AI system on AWS to process sensitive customer data for fraud detection. The company’s data engineering team is focused on securing the AI pipeline and ensuring that both data access and data integrity are maintained throughout the process. To implement proper security measures, they need to understand the distinction between data access control and data integrity.\n\nWhat do you suggest?","related_lectures":[]},{"_class":"assessment","id":93244093,"assessment_type":"multiple-choice","prompt":{"question":"<p>A healthcare company is deploying AI systems on AWS to manage patient data and improve diagnostic accuracy. To ensure compliance with strict healthcare regulations and to enhance the security of their applications, the company's security team is looking for an AWS service that can automate security assessments.</p>\n\n<p>What do you recommend?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Amazon Inspector</strong></p>\n\n<p>Amazon Inspector is an automated security assessment service that helps improve the security and compliance of applications deployed on AWS. It automatically assesses applications for exposure, vulnerabilities, and deviations from best practices, making it an essential tool for ensuring the security of AI systems.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>AWS Config</strong> - AWS Config is a service that enables you to assess, audit, and evaluate the configurations of your AWS resources. While it is important for governance and compliance monitoring, it does not perform automated security assessments of applications.</p>\n\n<p><strong>AWS Audit Manager</strong> - AWS Audit Manager helps you continuously audit your AWS usage to simplify how you assess risk and compliance with regulations and industry standards. It focuses on audit and compliance reporting rather than automated security assessments.</p>\n\n<p><strong>AWS Artifact</strong> - AWS Artifact provides on-demand access to AWS’ compliance reports and online agreements. It helps with compliance reporting but does not offer automated security assessments of applications.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://aws.amazon.com/inspector/features/\">https://aws.amazon.com/inspector/features/</a></p>\n","answers":["<p>AWS Config</p>","<p>AWS Audit Manager</p>","<p>Amazon Inspector</p>","<p>AWS Artifact</p>"]},"correct_response":["c"],"section":"Guidelines for Responsible AI","question_plain":"A healthcare company is deploying AI systems on AWS to manage patient data and improve diagnostic accuracy. To ensure compliance with strict healthcare regulations and to enhance the security of their applications, the company's security team is looking for an AWS service that can automate security assessments.\n\nWhat do you recommend?","related_lectures":[]},{"_class":"assessment","id":93244091,"assessment_type":"multiple-choice","prompt":{"question":"<p>A financial services company is deploying AI systems on AWS to analyze customer transactions and detect fraud. To meet stringent regulatory requirements, the company's compliance team needs a tool that can continuously audit AWS usage, automate evidence collection, and streamline risk assessments. This tool should help ensure that the AI systems comply with industry standards and reduce the manual effort involved in compliance reporting.</p>\n\n<p>Which AWS tool meets these requirements?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>AWS Audit Manager</strong></p>\n\n<p>AWS Audit Manager helps automate the collection of evidence to continuously audit your AWS usage. It simplifies the process of assessing risk and compliance with regulations and industry standards, making it an essential tool for governance in AI systems.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>AWS Artifact</strong> - AWS Artifact provides on-demand access to AWS’ compliance reports and online agreements. It is useful for obtaining compliance documentation but does not provide continuous auditing or automated evidence collection.</p>\n\n<p><strong>AWS Trusted Advisor</strong> - AWS Trusted Advisor offers guidance to help optimize your AWS environment for cost savings, performance, security, and fault tolerance. While it provides recommendations for best practices, it does not focus on auditing or evidence collection for compliance.</p>\n\n<p><strong>AWS CloudTrail</strong> - AWS CloudTrail records AWS API calls for auditing purposes and delivers log files for compliance and operational troubleshooting. It is crucial for tracking user activity but does not automate compliance assessments or evidence collection.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/audit-manager/latest/userguide/what-is.html\">https://docs.aws.amazon.com/audit-manager/latest/userguide/what-is.html</a></p>\n","answers":["<p>AWS Artifact</p>","<p>AWS Trusted Advisor</p>","<p>AWS CloudTrail</p>","<p>AWS Audit Manager</p>"]},"correct_response":["d"],"section":"Guidelines for Responsible AI","question_plain":"A financial services company is deploying AI systems on AWS to analyze customer transactions and detect fraud. To meet stringent regulatory requirements, the company's compliance team needs a tool that can continuously audit AWS usage, automate evidence collection, and streamline risk assessments. This tool should help ensure that the AI systems comply with industry standards and reduce the manual effort involved in compliance reporting.\n\nWhich AWS tool meets these requirements?","related_lectures":[]},{"_class":"assessment","id":93244089,"assessment_type":"multiple-choice","prompt":{"question":"<p>A retail company is developing machine learning models on AWS to improve product recommendations and customer insights. To ensure consistency and collaboration among its data science team, the company needs a solution for storing, sharing, and managing the inputs used during the model training and inference phases. The company is evaluating AWS services that can help streamline this process.</p>\n\n<p>What do you suggest</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Amazon SageMaker Feature Store</strong></p>\n\n<p>Amazon SageMaker Feature Store is a fully managed, purpose-built repository to store, share, and manage features for machine learning (ML) models. Features are inputs to ML models used during training and inference. For example, in an application that recommends a music playlist, features could include song ratings, listening duration, and listener demographics.</p>\n\n<p>You can ingest data into SageMaker Feature Store from a variety of sources, such as application and service logs, clickstreams, sensors, and tabular data from Amazon Simple Storage Service (Amazon S3), Amazon Redshift, AWS Lake Formation, Snowflake, and Databricks Delta Lake.</p>\n\n<p>How Feature Store works:\n<img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt2-q61-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/sagemaker/feature-store/\">https://aws.amazon.com/sagemaker/feature-store/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Amazon SageMaker Clarify</strong> - SageMaker Clarify helps identify potential bias during data preparation without writing code. You specify input features, such as gender or age, and SageMaker Clarify runs an analysis job to detect potential bias in those features.</p>\n\n<p><strong>Amazon SageMaker Data Wrangler</strong> - Amazon SageMaker Data Wrangler reduces the time it takes to aggregate and prepare tabular and image data for ML from weeks to minutes. With SageMaker Data Wrangler, you can simplify the process of data preparation and feature engineering, and complete each step of the data preparation workflow (including data selection, cleansing, exploration, visualization, and processing at scale) from a single visual interface.</p>\n\n<p><strong>Amazon SageMaker Ground Truth</strong> - Amazon SageMaker Ground Truth offers the most comprehensive set of human-in-the-loop capabilities, allowing you to harness the power of human feedback across the ML lifecycle to improve the accuracy and relevancy of models. You can complete a variety of human-in-the-loop tasks with SageMaker Ground Truth, from data generation and annotation to model review, customization, and evaluation, either through a self-service or an AWS-managed offering.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/sagemaker/feature-store/\">https://aws.amazon.com/sagemaker/feature-store/</a></p>\n\n<p><a href=\"https://aws.amazon.com/sagemaker/groundtruth\">https://aws.amazon.com/sagemaker/groundtruth</a></p>\n\n<p><a href=\"https://aws.amazon.com/sagemaker/clarify/\">https://aws.amazon.com/sagemaker/clarify/</a></p>\n\n<p><a href=\"https://aws.amazon.com/sagemaker/data-wrangler/\">https://aws.amazon.com/sagemaker/data-wrangler/</a></p>\n","answers":["<p>Amazon SageMaker Data Wrangler</p>","<p>Amazon SageMaker Feature Store</p>","<p>Amazon SageMaker Clarify</p>","<p>Amazon SageMaker Ground Truth</p>"]},"correct_response":["b"],"section":"Applications of Foundation Models","question_plain":"A retail company is developing machine learning models on AWS to improve product recommendations and customer insights. To ensure consistency and collaboration among its data science team, the company needs a solution for storing, sharing, and managing the inputs used during the model training and inference phases. The company is evaluating AWS services that can help streamline this process.\n\nWhat do you suggest","related_lectures":[]},{"_class":"assessment","id":93244087,"assessment_type":"multiple-choice","prompt":{"question":"<p>A company stores its training datasets on Amazon S3 in the form of tabular data running into millions of rows. The company needs to prepare this data for Machine Learning jobs. The data preparation involves data selection, cleansing, exploration, and visualization using a single visual interface.</p>\n\n<p>Which Amazon SageMaker service is the best fit for these requirements?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Amazon SageMaker Data Wrangler</strong></p>\n\n<p>Amazon SageMaker Data Wrangler reduces the time it takes to aggregate and prepare tabular and image data for ML from weeks to minutes. With SageMaker Data Wrangler, you can simplify the process of data preparation and feature engineering, and complete each step of the data preparation workflow (including data selection, cleansing, exploration, visualization, and processing at scale) from a single visual interface. You can use SQL to select the data that you want from various data sources and import it quickly. Next, you can use the data quality and insights report to automatically verify data quality and detect anomalies, such as duplicate rows and target leakage. SageMaker Data Wrangler contains over 300 built-in data transformations, so you can quickly transform data without writing code.</p>\n\n<p>With the SageMaker Data Wrangler data selection tool, you can quickly access and select your tabular and image data from various popular sources - such as Amazon Simple Storage Service (Amazon S3), Amazon Athena, Amazon Redshift, AWS Lake Formation, Snowflake, and Databricks - and over 50 other third-party sources - such as Salesforce, SAP, Facebook Ads, and Google Analytics. You can also write queries for data sources using SQL and import data directly into SageMaker from various file formats, such as CSV, Parquet, JSON, and database tables.</p>\n\n<p>How Data Wrangler works:\n<img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt2-q62-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/sagemaker/data-wrangler/\">https://aws.amazon.com/sagemaker/data-wrangler/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>SageMaker Model Dashboard</strong> - Amazon SageMaker Model Dashboard is a centralized portal, accessible from the SageMaker console, where you can view, search, and explore all of the models in your account. You can track which models are deployed for inference and if they are used in batch transform jobs or hosted on endpoints.</p>\n\n<p><strong>Amazon SageMaker Clarify</strong> - SageMaker Clarify helps identify potential bias during data preparation without writing code. You specify input features, such as gender or age, and SageMaker Clarify runs an analysis job to detect potential bias in those features.</p>\n\n<p><strong>Amazon SageMaker Feature Store</strong> - Amazon SageMaker Feature Store is a fully managed, purpose-built repository to store, share, and manage features for machine learning (ML) models. Features are inputs to ML models used during training and inference.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://aws.amazon.com/sagemaker/data-wrangler/\">https://aws.amazon.com/sagemaker/data-wrangler/</a></p>\n","answers":["<p>SageMaker Model Dashboard</p>","<p>Amazon SageMaker Clarify</p>","<p>Amazon SageMaker Feature Store</p>","<p>Amazon SageMaker Data Wrangler</p>"]},"correct_response":["d"],"section":"Applications of Foundation Models","question_plain":"A company stores its training datasets on Amazon S3 in the form of tabular data running into millions of rows. The company needs to prepare this data for Machine Learning jobs. The data preparation involves data selection, cleansing, exploration, and visualization using a single visual interface.\n\nWhich Amazon SageMaker service is the best fit for these requirements?","related_lectures":[]},{"_class":"assessment","id":93244085,"assessment_type":"multiple-choice","prompt":{"question":"<p>A healthcare company is building multiple machine learning models using Amazon SageMaker to support various projects, such as patient outcome prediction and medical image analysis. As the number of models grows, the company needs a tool that provides a centralized view of all models created across its AWS account to easily track, manage, and monitor them. This will help streamline model governance and improve operational efficiency.</p>\n\n<p>Which of the following is the best-fit for the given requirements?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Amazon SageMaker Model Dashboard</strong></p>\n\n<p>Amazon SageMaker Model Dashboard is a centralized repository of all models created in your account. The models are generally the outputs of SageMaker training jobs, but you can also import models trained elsewhere and host them on SageMaker. Model Dashboard provides a single interface for IT administrators, model risk managers, and business leaders to track all deployed models and aggregate data from multiple AWS services to provide indicators about how your models are performing. You can view details about model endpoints, batch transform jobs, and monitoring jobs for additional insights into model performance.</p>\n\n<p>The dashboard’s visual display helps you quickly identify which models have missing or inactive monitors, so you can ensure all models are periodically checked for data drift, model drift, bias drift, and feature attribution drift. Lastly, the dashboard’s ready access to model details helps you dive deep, so you can access logs, infrastructure-related information, and resources to help you debug monitoring failures.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Amazon SageMaker Model Monitor</strong> - Amazon SageMaker Model Monitor monitors the quality of Amazon SageMaker machine learning models in production. With Model Monitor, you can set up: Continuous monitoring with a real-time endpoint, Continuous monitoring with a batch transform job that runs regularly, and On-schedule monitoring for asynchronous batch transform jobs.</p>\n\n<p><strong>Amazon SageMaker Ground Truth</strong> - Amazon SageMaker Ground Truth offers the most comprehensive set of human-in-the-loop capabilities, allowing you to harness the power of human feedback across the ML lifecycle to improve the accuracy and relevancy of models. You can complete a variety of human-in-the-loop tasks with SageMaker Ground Truth, from data generation and annotation to model review, customization, and evaluation, either through a self-service or an AWS-managed offering.</p>\n\n<p><strong>Amazon SageMaker Clarify</strong> - SageMaker Clarify helps identify potential bias during data preparation without writing code. You specify input features, such as gender or age, and SageMaker Clarify runs an analysis job to detect potential bias in those features.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/sagemaker/latest/dg/model-dashboard-faqs.html\">https://docs.aws.amazon.com/sagemaker/latest/dg/model-dashboard-faqs.html</a></p>\n","answers":["<p>Amazon SageMaker Model Monitor</p>","<p>Amazon SageMaker Ground Truth</p>","<p>Amazon SageMaker Model Dashboard</p>","<p>Amazon SageMaker Clarify</p>"]},"correct_response":["c"],"section":"Applications of Foundation Models","question_plain":"A healthcare company is building multiple machine learning models using Amazon SageMaker to support various projects, such as patient outcome prediction and medical image analysis. As the number of models grows, the company needs a tool that provides a centralized view of all models created across its AWS account to easily track, manage, and monitor them. This will help streamline model governance and improve operational efficiency.\n\nWhich of the following is the best-fit for the given requirements?","related_lectures":[]},{"_class":"assessment","id":93244083,"assessment_type":"multiple-choice","prompt":{"question":"<p>A financial analytics company has deployed a machine learning model using Amazon SageMaker within a Virtual Private Cloud (VPC) to analyze sensitive customer data. To meet security guidelines, the VPC is configured with no internet access. However, the model needs to regularly access and read data stored in Amazon S3. The company is looking for a solution that allows secure data transfer between the SageMaker model in the VPC and Amazon S3 without exposing data traffic to the public internet.</p>\n\n<p>What do you recommend?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>The company should use a VPC endpoint for Amazon S3 that allows secure, private connectivity between the VPC and Amazon S3, without the need for an internet connection, ensuring data is transferred securely within the AWS network</strong></p>\n\n<p>A VPC endpoint for Amazon S3 is the most appropriate choice because it creates a private connection between the VPC and Amazon S3 over the AWS network, without requiring internet access. This VPC endpoint allows the SageMaker model deployed within the VPC to securely access data from Amazon S3 directly, using the internal AWS network paths. It provides enhanced security by keeping data traffic within the AWS infrastructure and not exposing it to the public internet.</p>\n\n<p>You can use two types of VPC endpoints to access Amazon S3: gateway endpoints and interface endpoints (by using AWS PrivateLink). A gateway endpoint is a gateway that you specify in your route table to access Amazon S3 from your VPC over the AWS network. Interface endpoints extend the functionality of gateway endpoints by using private IP addresses to route requests to Amazon S3 from within your VPC, on premises, or from a VPC in another AWS Region by using VPC peering or AWS Transit Gateway.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>The company should use an Internet Gateway, which provides a direct connection between the VPC and the internet, allowing data to be accessed from Amazon S3</strong> - An Internet Gateway enables VPC resources to communicate with the internet, but it is not suitable in this scenario because the VPC does not have internet access, and the objective is to securely access S3 without exposing data traffic to the public internet. Using an Internet Gateway would not only require additional security configurations but also go against the company's requirement to avoid internet access.</p>\n\n<p><strong>The company should use a SageMaker Inference endpoint that allows secure connectivity between the VPC and Amazon S3</strong> - A SageMaker Inference endpoint allows clients to invoke deployed models and receive predictions but does not serve the purpose of connecting a SageMaker model to Amazon S3. It is not designed to handle data access between the SageMaker model and S3, so it would not meet the company's requirement for secure data retrieval from S3 within a VPC.</p>\n\n<p><strong>The company should use a NAT Gateway which enables outbound internet access for resources within the VPC to securely access Amazon S3</strong> - A NAT Gateway allows instances in a private subnet to access the internet, but it still routes traffic through the public internet, which may not align with the company's need for secure and private data transfer. Since the goal is to avoid internet access and maintain secure connectivity between the VPC and Amazon S3, a NAT Gateway is not the appropriate solution.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/AmazonS3/latest/userguide/privatelink-interface-endpoints.html\">https://docs.aws.amazon.com/AmazonS3/latest/userguide/privatelink-interface-endpoints.html</a></p>\n\n<p><a href=\"https://docs.aws.amazon.com/sagemaker/latest/dg/deploy-model.html\">https://docs.aws.amazon.com/sagemaker/latest/dg/deploy-model.html</a></p>\n","answers":["<p>The company should use an Internet Gateway, which provides a direct connection between the VPC and the internet, allowing data to be accessed from Amazon S3</p>","<p>The company should use a SageMaker Inference endpoint that allows secure connectivity between the VPC and Amazon S3</p>","<p>The company should use a NAT Gateway which enables outbound internet access for resources within the VPC to securely access Amazon S3</p>","<p>The company should use a VPC endpoint for Amazon S3 that allows secure, private connectivity between the VPC and Amazon S3, without the need for an internet connection, ensuring data is transferred securely within the AWS network</p>"]},"correct_response":["d"],"section":"Security, Compliance, and Governance for AI Solutions","question_plain":"A financial analytics company has deployed a machine learning model using Amazon SageMaker within a Virtual Private Cloud (VPC) to analyze sensitive customer data. To meet security guidelines, the VPC is configured with no internet access. However, the model needs to regularly access and read data stored in Amazon S3. The company is looking for a solution that allows secure data transfer between the SageMaker model in the VPC and Amazon S3 without exposing data traffic to the public internet.\n\nWhat do you recommend?","related_lectures":[]},{"_class":"assessment","id":93244081,"assessment_type":"multiple-choice","prompt":{"question":"<p>A retail company is looking to enable its business analysts to leverage machine learning without needing extensive coding skills. The team wants to solve key business challenges such as demand forecasting and customer segmentation by using a tool that offers a visual, point-and-click interface, allowing them to build, train, and deploy machine learning models easily. To ensure the right solution is chosen, the company is evaluating AWS services that provide this capability.</p>\n\n<p>What do you recommend?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Amazon SageMaker Canvas</strong></p>\n\n<p>Through the no-code interface of SageMaker Canvas, you can create highly accurate machine-learning models — without any machine-learning experience or writing a single line of code. SageMaker Canvas provides access to ready-to-use models including foundation models from Amazon Bedrock or Amazon SageMaker JumpStart or you can build your custom ML model using AutoML powered by SageMaker AutoPilot. With SageMaker Canvas, you can use SageMaker Data Wrangler to easily access and import data from 50+ sources, prepare data using natural language and 300+ built-in transforms, build and train highly accurate models, generate predictions, and deploy models to production.</p>\n\n<p>Amazon SageMaker Canvas provides a visual point-and-click interface for business analysts to solve business problems using ML such as customer churn prediction, fraud detection, forecasting financial metrics and sales, inventory optimization, content generation, and more without writing any code.</p>\n\n<p>How SageMaker Canvas works:\n<img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt2-q65-i1.jpg\">\nvia - <a href=\"https://docs.aws.amazon.com/sagemaker/latest/dg/canvas.html\">https://docs.aws.amazon.com/sagemaker/latest/dg/canvas.html</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Amazon SageMaker Model Dashboard</strong> - Amazon SageMaker Model Dashboard is a centralized portal, accessible from the SageMaker console, where you can view, search, and explore all of the models in your account. You can track which models are deployed for inference and if they are used in batch transform jobs or hosted on endpoints.</p>\n\n<p><strong>Amazon SageMaker Data Wrangler</strong> - Amazon SageMaker Data Wrangler reduces the time it takes to aggregate and prepare tabular and image data for ML from weeks to minutes. With SageMaker Data Wrangler, you can simplify the process of data preparation and feature engineering, and complete each step of the data preparation workflow (including data selection, cleansing, exploration, visualization, and processing at scale) from a single visual interface.</p>\n\n<p><strong>Amazon SageMaker Clarify</strong> - SageMaker Clarify helps identify potential bias during data preparation without writing code. You specify input features, such as gender or age, and SageMaker Clarify runs an analysis job to detect potential bias in those features.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://aws.amazon.com/sagemaker/canvas/\">https://aws.amazon.com/sagemaker/canvas/</a></p>\n","answers":["<p>Amazon SageMaker Model Dashboard</p>","<p>Amazon SageMaker Canvas</p>","<p>Amazon SageMaker Clarify</p>","<p>Amazon SageMaker Data Wrangler</p>"]},"correct_response":["b"],"section":"Applications of Foundation Models","question_plain":"A retail company is looking to enable its business analysts to leverage machine learning without needing extensive coding skills. The team wants to solve key business challenges such as demand forecasting and customer segmentation by using a tool that offers a visual, point-and-click interface, allowing them to build, train, and deploy machine learning models easily. To ensure the right solution is chosen, the company is evaluating AWS services that provide this capability.\n\nWhat do you recommend?","related_lectures":[]}]};
      let correct = new Set();
      let incorrect = new Set();
      let totalNumberOfQuestions = 0;
      const quizTitle = quizData.quiz_title;
      const quizDescription = quizData.quiz_description;
      const questionData = quizData.questions;
      const passPercent = quizData.pass_percent;
      const modalTextElement = document.getElementById('modal-text');
      const quizContainerElement = document.getElementById('quiz-container');

      const dialog = document.querySelector('dialog');
      const showButton = document.getElementById('view-explanatin');
      const closeButton = document.getElementById('close-modal-btn');
      const quizTitleElement = document.getElementById('quiz-title');
      const quizDescriptionElement = document.getElementById('quiz-description');

      function main() {
        // update quiz meta data
        document.title = quizTitle;
        quizTitleElement.innerHTML = quizTitle;
        quizDescriptionElement.innerHTML = quizDescription;

        const passPercentElement = document.getElementById('pass-percent');
        passPercentElement.innerHTML = passPercent + '%';
        totalNumberOfQuestions = questionData.length;
        // shuffle the questionData to randomize the order of the questions
        for (let i = questionData.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [questionData[i], questionData[j]] = [questionData[j], questionData[i]];
        }

        let formattedQuestions = questionData.map(formatSingleQuestionData);
        updateScore();
        // display the formattedQuestions
        formattedQuestions.forEach((question, idx) => {
          renderSingleQuestion(question, idx + 1);
        });
      }

      /**
       * Formats the question data from the given QuizData object.
       *
       * @param {Object} singleQuizData - The singleQuizData object containing prompt and correct_response.
       * @return {Object} The formatted question object with the following properties:
       *   - id: The ID of the question.
       *   - question: The text of the question.
       *   - answers: The array of answer options.
       *   - correctAnswer: The text of the correct answer.
       *   - explanation: The explanation of the correct answer.
       */
      function formatSingleQuestionData(singleQuizData = null) {
        const { prompt, correct_response, id } = singleQuizData;
        const questionText = prompt.question;
        const answers = prompt.answers;
        const correctAnswer = correct_response[0];
        const correctAnswerText = answers[correctAnswer.toLowerCase().charCodeAt(0) - 97];
        const questionObj = {
          id: id,
          question: questionText,
          answers: answers,
          correctAnswer,
          explanation: prompt?.explanation || '',
        };
        return questionObj;
      }

      /**
       * Renders a single question with its options and submit button.
       *
       * @param {Object} singleQuestionData - The data of the question to render.
       * @param {number} rootIndex - The index of the question in the quiz.
       * @return {void} return nothing.
       */

      const renderSingleQuestion = (singleQuestionData = {}, rootIndex = 1) => {
        const { id, explanation, answers, correctAnswer, question } = singleQuestionData;
        // shuffle the answers to randomize the order of the answers
        // for (let i = answers.length - 1; i > 0; i--) {
        //   const j = Math.floor(Math.random() * (i + 1));
        //   [answers[i], answers[j]] = [answers[j], answers[i]];
        // }
        const alphabet = 'abcdefghijklmnopqrstuvwxyz'.split('');
        const optionsHTML = answers
          .map((option, index) => {
            const optionId = `${id}_${index}`;

            return `
        <div class="question-lable">
          <input type="radio" id="${optionId}" name="${'answer'}" value="${alphabet[index]}" />
          <label for="${optionId}">${option}</label>
        </div>
      `;
          })

          .join('');

        const container = document.createElement('div');
        container.innerHTML = `
        <form data-correct-answer="${correctAnswer}" data-question-id="${id}" class="single-question-container" onsubmit="submitButtonListener(event)">
          <div style="display: flex;justify-content: space-between;">
            <p style="font-weight: 600">Question ${rootIndex}:</p>
            <button type="button" onclick="renderExplanation(event)" id="${`explanation-${id}`}" data-explanation="${'tt'}" data-explanation-id=${id} class="explanation-btn">View Explanation</button>
          </div>
          <p style="margin-bottom: 8px;line-height: 1.5">${question}</p>
          <div class="options-container">
            ${optionsHTML}
          </div>
          <div style="display: flex; gap: 8px;">
            <button type="submit" id="submit-button" class="button">Submit</button>
          </div>
        </form>
      `;
        quizContainerElement.appendChild(container);
      };

      /**
       * Updates the score on the page based on the number of correct and incorrect answers.
       *
       * @return {void} This function does not return a value.
       */
      function updateScore() {
        const currentParcentageElement = document.getElementById('current-score');
        const correctAnswerElement = document.getElementById('correct-answers');
        const wrongAnswerElement = document.getElementById('wrong-answers');
        correctAnswerElement.innerHTML = correct.size;
        wrongAnswerElement.innerHTML = incorrect.size;
        const score = Number((correct.size / totalNumberOfQuestions) * 100).toFixed(2);
        currentParcentageElement.innerHTML = score;
      }

      /**
       * Handles the event when the submit button is clicked.
       *
       * @param {Event} e - The event object.
       * @return {void} This function does not return anything.
       */
      const submitButtonListener = e => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const form = e.target;
        const selectedOption = e.target.querySelector('input[type="radio"]:checked');
        if (!selectedOption) {
          alert('Please select an answer!');
          return;
        }

        let isCorrect = false;
        const { answer: userAnswer } = Object.fromEntries(formData.entries());
        const correctAnswer = e.target.dataset.correctAnswer;
        const questionId = e.target.dataset.questionId;
        if (userAnswer == correctAnswer) {
          correct.add(questionId);
          incorrect.delete(questionId);
          isCorrect = true;
        } else {
          incorrect.add(e.target.dataset.questionId);
          correct.delete(questionId);
        }
        updateScore();

        const resultClass = isCorrect ? 'correct-answer' : 'incorrect-answer';

        form.querySelectorAll('.question-lable').forEach(label => {
          label.classList.remove('correct-answer', 'incorrect-answer');
        });
        selectedOption.closest('.question-lable').classList.add(resultClass);
      };

      function renderExplanation(ev) {
        const dataid = ev.target.dataset.explanationId;
        const quiz = quizData.questions.find(q => q.id === Number(dataid));
        modalTextElement.innerHTML =
          quiz && quiz.prompt.explanation ? quiz.prompt.explanation : 'no explanation found';
        // modalTextElement.innerHTML = ev.target.dataset?.explanation || 'no explanation found';
        dialog.showModal();
        dialog.addEventListener('click', event => {
          if (event.target === dialog) {
            dialog.close();
          }
        });
      }
    </script>
  </body>
</html>
