<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz</title>
    <style>
      * {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu,
          Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-size: 16px;
      }

      main {
        padding-top: 48px;
      }

      :root {
        --large-device-width: 850px;
        --primary-color: #0f172a;
        --secondary-color: #020617;
        --primary-text-color: #c7d1dd;
        --secondary-text-color: #061602;
        --success-background: hsl(159, 82%, 24%);
        --success-foreground: hsl(164, 86%, 16%);
        --success: hsl(160, 84%, 39%);
        --danger: #ef4444;
        --warning: #f59e0b;
        --info-background: hsl(218, 81%, 8%);
        --info-foreground: hsl(217, 91%, 85%);
        --border-color: #d1d7dc;
        --check-box-size: 20px;
        /* control the size */
        --check-box-color: var(--info-foreground);
        /* the active color */
      }

      body {
        position: relative;
        background-color: #020617;
        color: var(--primary-text-color);
      }

      #score-stats-container {
        position: fixed;
        z-index: 10;
        top: 0;
        height: 40px;
        width: 100%;
        background-color: var(--info-background);

        padding: 0px 16px;
        color: var(--info-foreground);
        font-weight: 600;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      #quiz-container {
        border-radius: 8px;
        display: flex;
        gap: 16px;
        flex-direction: column;
      }

      input[type='radio'] {
        height: var(--check-box-size);
        aspect-ratio: 1;
        border: calc(var(--check-box-size) / 8) solid #939393;
        padding: calc(var(--check-box-size) / 8);
        background: radial-gradient(farthest-side, var(--check-box-color) 94%, #0000) 50%/0 0 no-repeat
          content-box;
        border-radius: 50%;
        outline-offset: calc(var(--check-box-size) / 10);
        -webkit-appearance: none;
        -moz-appearance: none;
        appearance: none;
        cursor: pointer;
        font-size: inherit;
        transition: 0.3s;
      }

      input[type='radio']:checked {
        border-color: var(--check-box-color);
        background-size: 100% 100%;
      }

      input[type='radio']:disabled {
        background: linear-gradient(#939393 0 0) 50%/100% 20% no-repeat content-box;
        opacity: 0.5;
        cursor: not-allowed;
      }

      label {
        /* display: inline-flex; */
        align-items: center;
        gap: 10px;
        cursor: pointer;
        padding: 4px 6px;
        border-radius: 4px;
      }

      @media (max-width: 767px) {
        input[type='radio'],
        label {
          cursor: default;
        }

        #quiz-container {
          margin-left: 8px;
          margin-right: 8px;
        }
      }

      /* PC (Desktop devices) */
      @media (min-width: 768px) {
        body {
          display: flex;
          justify-content: center;
        }

        main {
          max-width: var(--large-device-width);
        }

        #score-stats-container {
          max-width: var(--large-device-width);
        }

        dialog {
          max-width: var(--large-device-width);
        }
      }

      @media print {
        input[type='radio'] {
          background: none !important;
          border-color: #939393 !important;
        }

        input[type='radio']:checked {
          border-color: #939393 !important;
        }
      }

      .question-lable {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      button {
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
        outline: none;
        position: relative;
        overflow: hidden;
        cursor: pointer;
      }

      .button {
        background-color: var(--success-background);
        border: none;
        color: #f4f5f7;
        opacity: 0.8;
        font-size: 18px;
        flex-grow: 1;
        padding: 8px 16px;
        border-radius: 8px;
      }

      .button:hover {
        opacity: 1;
      }

      .explanation-btn {
        border: none;
        color: var(--success);
        background-color: transparent;
      }

      #submit-button:active::after {
        background-color: #ef4444;
      }

      .single-question-container {
        background-color: var(--primary-color);
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding: 16px;
        border-radius: 8px;
      }

      #modal-content {
        padding: 16px;
        line-height: 24px;
      }

      dialog::backdrop {
        background: rgba(0, 0, 0, 0.5);
      }

      dialog {
        position: fixed;
        border: 1px solid var(--border-color);
        background-color: var(--primary-color);
        color: rgb(240, 241, 248);
        padding: 16px;
        border-radius: 8px;
        width: 80vw;
        max-height: 80vh;
        overflow: auto;
        top: 50%;
        left: 50%;
        -webkit-transform: translateX(-50%) translateY(-50%);
        -moz-transform: translateX(-50%) translateY(-50%);
        -ms-transform: translateX(-50%) translateY(-50%);
        transform: translateX(-50%) translateY(-50%);
      }

      #close-modal-btn {
        position: absolute;
        top: 4px;
        right: 4px;
        padding: 2px 8px;
        border-radius: 2px;
        border: none;
        background-color: var(--danger);
      }

      .correct-answer label {
        border: 2px solid var(--success);
        width: 100%;
      }

      .incorrect-answer label {
        border: 2px solid var(--danger);
        width: 100%;
      }

      .options-container {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      #quiz-meta-container {
        border-radius: 8px;
        background-color: var(--primary-color);
        margin-bottom: 12px;
        padding: 8px;
      }

      #quiz-title {
        text-align: center;
        font-size: 24px;
        margin-bottom: 8px;
      }

      #quiz-description {
        line-height: 1.5;
        padding: 2px 6px;
      }
      img {
        width: 100%;
      }
    </style>
  </head>

  <body onload="main()">
    <main>
      <section id="quiz-meta-container">
        <h1 id="quiz-title"></h1>

      <section id="score-stats-container">

        </div>
        <div>Correct: <span id="correct-answers">999</span></div>
        <div>Incorrect: <span id="wrong-answers">999</span></div>
      </section>

      <section id="quiz-container"></section>

      <dialog id="modal" class="modal-container">
        <div id="modal-content">
          <p id="modal-text"></p>
        </div>
      </dialog>
    </main>

    <script>
      const quizData = {"quiz_id":6610377,"quiz_title":"Practice Test #4 - Full-Exam - AWS Certified AI Practitioner","questions":[{"_class":"assessment","id":96321995,"assessment_type":"multiple-choice","prompt":{"question":"<p>Which AWS service is specifically designed for converting medical speech to text, ensuring compliance with healthcare regulations such as HIPAA?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Amazon Transcribe medical</strong></p>\n\n<p>Amazon Transcribe Medical is an automatic speech recognition (ASR) service that makes it easy for you to add medical speech-to-text capabilities to your voice-enabled applications. Conversations between health care providers and patients provide the foundation of a patient’s diagnosis and treatment plan and clinical documentation workflow. It’s critically important that this information is accurate. However, accurate medical transcriptions such as dictation recorders and scribes are expensive, time-consuming, and disruptive to the patient experience. Some organizations use existing medical transcription software but find them inefficient and low in quality.</p>\n\n<p>Driven by state-of-the-art machine learning, Amazon Transcribe Medical accurately transcribes medical terminologies such as medicine names, procedures, and even conditions or diseases. Amazon Transcribe Medical can serve a diverse range of use cases such as transcribing physician-patient conversations for clinical documentation, capturing phone calls in pharmacovigilance, or subtitling telehealth consultations.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Amazon Transcribe</strong> - Amazon Transcribe is an automatic speech recognition service that uses machine learning models to convert audio to text. You can use Amazon Transcribe as a standalone transcription service or add speech-to-text capabilities to any application. Amazon Transcribe is not specifically trained for medical terminologies or patient conditions and diseases. Hence, Amazon Transcribe Medical is optimal for this use case.</p>\n\n<p><strong>Amazon Rekognition</strong> - Amazon Rekognition is a cloud-based image and video analysis service that makes it easy to add advanced computer vision capabilities to your applications. The service is powered by proven deep learning technology and it requires no machine learning expertise to use. Amazon Rekognition includes a simple, easy-to-use API that can quickly analyze any image or video file that’s stored in Amazon S3. Rekognition is not an automatic speech recognition (ASR) service.</p>\n\n<p><strong>Amazon Polly</strong> - Amazon Polly uses deep learning technologies to synthesize natural-sounding human speech, so you can convert articles to speech. With dozens of lifelike voices across a broad set of languages, use Amazon Polly to build speech-activated applications. Amazon Polly enables existing applications to speak as a first-class feature and creates the opportunity for entirely new categories of speech-enabled products, from mobile apps and cars to devices and appliances. Polly is not an automatic speech recognition (ASR) service.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://aws.amazon.com/transcribe/medical/\">https://aws.amazon.com/transcribe/medical/</a></p>\n","answers":["<p>Amazon Transcribe</p>","<p>Amazon Rekognition</p>","<p>Amazon Transcribe medical</p>","<p>Amazon Polly</p>"]},"correct_response":["c"],"section":"Applications of Foundation Models","question_plain":"Which AWS service is specifically designed for converting medical speech to text, ensuring compliance with healthcare regulations such as HIPAA?","related_lectures":[]},{"_class":"assessment","id":96321993,"assessment_type":"multiple-choice","prompt":{"question":"<p>A global e-commerce company is utilizing a foundation model through Amazon Bedrock to enhance its customer service chatbot, providing automated support and answering user queries. However, the company is concerned about the potential for the model to generate inappropriate, sensitive, or malicious content that could harm its reputation or negatively impact customer experience. To mitigate these risks, the company seeks to implement safety measures that ensure the model consistently produces safe, relevant, and context-appropriate responses.</p>\n\n<p>Given this goal, what would be the most effective approach to control these risks and maintain model safety?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>The company should instruct the model to stick to the prompt by adding explicit instructions to ignore any unrelated or potentially malicious content</strong></p>\n\n<p>This is the correct approach because providing explicit instructions within the prompt helps guide the model's behavior, reducing the likelihood of generating inappropriate or unsafe content. By clarifying what the model should focus on and what it should ignore, the company can enforce boundaries that align with its safety standards. This method is straightforward and leverages prompt engineering to mitigate risks effectively.</p>\n\n<p>Amazon Bedrock Guardrails:</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt1-q67-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/bedrock/guardrails/\">https://aws.amazon.com/bedrock/guardrails/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>The company should develop an API that processes all responses from the model and checks for any risks of exposure, which involves creating a custom layer that monitors and filters all model outputs, scanning them for inappropriate or unsafe content before they are delivered to the end-user</strong> - While developing an API to filter model outputs could help detect unsafe content, it is a less efficient solution as it adds complexity, increases response times, and requires continuous monitoring and updates to stay effective. Additionally, this method does not prevent the model from generating problematic content in the first place; it only tries to catch such content post-generation.</p>\n\n<p><strong>The company should adjust the model hyperparameters to safeguard the output</strong> - Adjusting hyperparameters, such as temperature or top-p, can help control the creativity or diversity of the responses but does not specifically address the risk of generating unsafe or malicious content. This method is not a reliable safety measure because it does not focus on aligning the model’s output with the desired content standards or filtering out potentially harmful responses.</p>\n\n<p><strong>The company should retrain the underlying foundation model (FM) from scratch to prevent exposure</strong> - Retraining the foundation model from scratch is an impractical solution for controlling exposure risks. It involves substantial resources, including massive datasets, computational power, and time. This approach is excessive and unnecessary when the goal is to implement straightforward safety measures to manage model outputs. The focus should be on guiding and controlling the model’s behavior through simpler, more effective methods like prompt engineering. You should also note that you cannot train the base Foundation Models (FMs) using Amazon Bedrock, rather you can only customize the base FMs wherein you create your own private copy of the base FM using Provisioned Throughput mode.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/bedrock/guardrails/\">https://aws.amazon.com/bedrock/guardrails/</a></p>\n\n<p><a href=\"https://docs.aws.amazon.com/AWSCloudFormation/latest/UserGuide/aws-resource-bedrock-guardrail.html\">https://docs.aws.amazon.com/AWSCloudFormation/latest/UserGuide/aws-resource-bedrock-guardrail.html</a></p>\n","answers":["<p>The company should develop an API that processes all responses from the model and checks for any risks of exposure, which involves creating a custom layer that monitors and filters all model outputs, scanning them for inappropriate or unsafe content before they are delivered to the end-user</p>","<p>The company should adjust the model hyperparameters to safeguard the output</p>","<p>The company should retrain the underlying foundation model (FM) from scratch to prevent exposure</p>","<p>The company should instruct the model to stick to the prompt by adding explicit instructions to ignore any unrelated or potentially malicious content</p>"]},"correct_response":["d"],"section":"Guidelines for Responsible AI","question_plain":"A global e-commerce company is utilizing a foundation model through Amazon Bedrock to enhance its customer service chatbot, providing automated support and answering user queries. However, the company is concerned about the potential for the model to generate inappropriate, sensitive, or malicious content that could harm its reputation or negatively impact customer experience. To mitigate these risks, the company seeks to implement safety measures that ensure the model consistently produces safe, relevant, and context-appropriate responses.\n\nGiven this goal, what would be the most effective approach to control these risks and maintain model safety?","related_lectures":[]},{"_class":"assessment","id":96322019,"assessment_type":"multiple-choice","prompt":{"question":"<p>A financial services company is building machine learning models on AWS to automate loan approval processes. As an AI Practitioner, you have been tasked to build and maintain data lineage in the context of these machine learning models on AWS.</p>\n\n<p>Which of the following would you identify as the key reason to maintain data lineage?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>It ensures data privacy and compliance by tracking the flow and transformation of data</strong></p>\n\n<p>Maintaining data lineage involves tracking the flow, transformations, and origins of data throughout its lifecycle. This is crucial for ensuring data privacy, security, and compliance with regulatory standards. By having a clear record of where data comes from and how it has been processed, organizations can ensure that their machine learning models are built on trustworthy and compliant data.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>It improves the performance of machine learning models by optimizing data processing</strong> - While data lineage helps in understanding and tracking data, it does not directly optimize data processing or improve the performance of machine learning models. Performance optimization involves other factors like algorithm efficiency, hardware capabilities, and data preprocessing techniques.</p>\n\n<p><strong>It enhances the visualization capabilities of the data</strong> - Data lineage itself does not enhance visualization capabilities. This option acts as a distractor.</p>\n\n<p><strong>It reduces the storage costs by efficiently managing data</strong> - Data lineage focuses on tracking the flow and transformations of data rather than directly impacting storage costs. Efficient data management and cost optimization involve other strategies like data tiering, compression, etc.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://aws.amazon.com/blogs/big-data/build-data-lineage-for-data-lakes-using-aws-glue-amazon-neptune-and-spline/\">https://aws.amazon.com/blogs/big-data/build-data-lineage-for-data-lakes-using-aws-glue-amazon-neptune-and-spline/</a></p>\n","answers":["<p>It improves the performance of machine learning models by optimizing data processing</p>","<p>It enhances the visualization capabilities of the data</p>","<p>It ensures data privacy and compliance by tracking the flow and transformation of data</p>","<p>It reduces the storage costs by efficiently managing data</p>"]},"correct_response":["c"],"section":"Security, Compliance, and Governance for AI Solutions","question_plain":"A financial services company is building machine learning models on AWS to automate loan approval processes. As an AI Practitioner, you have been tasked to build and maintain data lineage in the context of these machine learning models on AWS.\n\nWhich of the following would you identify as the key reason to maintain data lineage?","related_lectures":[]},{"_class":"assessment","id":96322017,"assessment_type":"multiple-choice","prompt":{"question":"<p>A retail company is exploring the use of generative AI to improve its customer experience by personalizing recommendations and automating product descriptions. The company is interested in leveraging pre-built, high-performing Foundation Models (FMs) to accelerate development but also needs the ability to customize these models with its proprietary data to meet specific business needs. The company is seeking an AWS service that not only provides access to a variety of Foundation Models but also offers the option to privately fine-tune and customize these models for their unique use case.</p>\n\n<p>Which AWS service/feature offers a choice of high-performing Foundation Models (FMs) and the ability to privately customize the FMs with your data?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Amazon Bedrock</strong></p>\n\n<p>Amazon Bedrock is a fully managed service that offers a choice of high-performing FMs and a broad set of capabilities. You can easily experiment with various top FMs, privately customize them with your data, and create managed agents that execute complex business tasks.</p>\n\n<p>Amazon Bedrock is the easiest way to build and scale generative AI applications with foundation models. Amazon Bedrock makes foundation models from Amazon and leading AI startups available through an API, so you can choose from various FMs to find the model that's best suited for your use case. With Amazon Bedrock, you can speed up developing and deploying scalable, reliable, and secure generative AI applications without managing infrastructure.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Amazon Q Developer</strong> - Code generation is one of the most promising applications for generative AI. With Amazon Q Developer, a generative AI-powered assistant for software development, you can get great results in developer productivity.</p>\n\n<p><strong>Amazon Q in QuickSight</strong> - Amazon Q in QuickSight helps business analysts easily create and customize visuals using natural-language commands. The new Generative BI authoring capabilities extend the natural-language querying of QuickSight Q beyond answering well-structured questions (such as “What are the top 10 products sold in California?”) to help analysts quickly create customizable visuals from question fragments (such as “Top 10 products”), clarify the intent of a query by asking follow-up questions, refine visualizations, and complete complex calculations.</p>\n\n<p><strong>AWS Inferentia</strong> - AWS Inferentia accelerators are designed by AWS to deliver high performance at the lowest cost in Amazon EC2 for your deep learning (DL) and generative AI inference applications.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/what-is/generative-ai/\">https://aws.amazon.com/what-is/generative-ai/</a></p>\n\n<p><a href=\"https://aws.amazon.com/machine-learning/inferentia/\">https://aws.amazon.com/machine-learning/inferentia/</a></p>\n","answers":["<p>Amazon Bedrock</p>","<p>Amazon Q Developer</p>","<p>Amazon Q in QuickSight</p>","<p>AWS Inferentia</p>"]},"correct_response":["a"],"section":"Fundamentals of Generative AI","question_plain":"A retail company is exploring the use of generative AI to improve its customer experience by personalizing recommendations and automating product descriptions. The company is interested in leveraging pre-built, high-performing Foundation Models (FMs) to accelerate development but also needs the ability to customize these models with its proprietary data to meet specific business needs. The company is seeking an AWS service that not only provides access to a variety of Foundation Models but also offers the option to privately fine-tune and customize these models for their unique use case.\n\nWhich AWS service/feature offers a choice of high-performing Foundation Models (FMs) and the ability to privately customize the FMs with your data?","related_lectures":[]},{"_class":"assessment","id":96322015,"assessment_type":"multiple-choice","prompt":{"question":"<p>An ecommerce company is transitioning to AWS Cloud and wants to use Amazon Bedrock for product recommendations. The company wants to provide its own labeled training dataset to improve the selected Foundation Model's (FM) performance.</p>\n\n<p>Which of the following represents the best-fit solution for the given use case?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Leverage Amazon Bedrock to make a separate copy of the base FM model and train this private copy of the model using the labeled training dataset</strong></p>\n\n<p>Amazon Bedrock is a fully managed service that makes high-performing foundation models (FMs) from leading AI startups and Amazon available for your use through a unified API. Using Amazon Bedrock, you can easily experiment with and evaluate top foundation models for your use cases, privately customize them with your data using techniques such as fine-tuning and Retrieval Augmented Generation (RAG), and build agents that execute tasks using your enterprise systems and data sources.</p>\n\n<p>With Amazon Bedrock, you can privately customize FMs, retaining control over how your data is used and encrypted. Amazon Bedrock makes a separate copy of the base FM and trains this private copy of the model. Your data includes prompts, information used to supplement a prompt, and FM responses. Customized FMs remain in the Region where the API call is processed.</p>\n\n<p>With Amazon Bedrock, your data, including prompts and customized foundation models, stays within the AWS Region where the API call is processed and encrypted in transit as well as at rest. You can use AWS PrivateLink to ensure private connectivity between your models and on-premises networks without exposing traffic to the internet.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Leverage Amazon Bedrock to make a public copy of the base FM model and train this public copy of the model using the labeled training dataset</strong></p>\n\n<p><strong>Leverage Amazon Bedrock to train the base FM itself using the labeled training dataset</strong></p>\n\n<p>These two options contradict the explanation provided above, so these options are incorrect.</p>\n\n<p><strong>Leverage Amazon Bedrock to discard the selected FM and create a new model from scratch by using the labeled training dataset</strong></p>\n\n<p>You cannot use Amazon Bedrock to create a new model from scratch. Instead, you may use Amazon SageMaker to develop a new model. So, this option is incorrect.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/bedrock/faqs/\">https://aws.amazon.com/bedrock/faqs/</a></p>\n\n<p><a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/what-is-bedrock.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/what-is-bedrock.html</a></p>\n","answers":["<p>Leverage Amazon Bedrock to discard the selected FM and create a new model from scratch by using the labeled training dataset</p>","<p>Leverage Amazon Bedrock to make a public copy of the base FM model and train this public copy of the model using the labeled training dataset</p>","<p>Leverage Amazon Bedrock to make a separate copy of the base FM model and train this private copy of the model using the labeled training dataset</p>","<p>Leverage Amazon Bedrock to train the base FM itself using the labeled training dataset</p>"]},"correct_response":["c"],"section":"Fundamentals of Generative AI","question_plain":"An ecommerce company is transitioning to AWS Cloud and wants to use Amazon Bedrock for product recommendations. The company wants to provide its own labeled training dataset to improve the selected Foundation Model's (FM) performance.\n\nWhich of the following represents the best-fit solution for the given use case?","related_lectures":[]},{"_class":"assessment","id":96322013,"assessment_type":"multiple-choice","prompt":{"question":"<p>A healthcare analytics company is developing machine learning models to predict patient outcomes and improve treatment plans. To enhance these models, conduct rigorous testing, and ensure data privacy when sharing with partners, the company needs to generate synthetic data that closely mirrors its existing patient records without compromising sensitive information. The synthetic data must maintain the statistical properties and patterns of the original dataset to be useful for model training and evaluation.</p>\n\n<p>Which of the following methods would be most suitable for generating synthetic data?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>The company should use a Generative Adversarial Network (GAN) for creating realistic synthetic data while preserving the statistical properties of the original data</strong></p>\n\n<p>This is the correct answer because GANs are specifically designed for generating synthetic data that is statistically similar to real data. They consist of two neural networks—a generator and a discriminator—that work against each other to create highly realistic synthetic data. GANs have been successfully used in various domains, including image generation, text synthesis, and more, to produce data that retains the underlying patterns and structures of the original dataset, making them highly suitable for this purpose.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt1-q71-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/what-is/gan/\">https://aws.amazon.com/what-is/gan/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>The company should use Support Vector Machines (SVMs), a type of supervised learning algorithm used for generating synthetic data</strong> - This option is incorrect because SVMs are used for classification and regression, where the algorithm finds the optimal hyperplane that best separates different classes in the data. SVMs do not generate new data or create synthetic datasets, so they are not suitable for a task that requires generating synthetic data based on existing datasets.</p>\n\n<p><strong>The company should use a Convolutional Neural Network (CNN), a type of deep learning model, best-suited for generating synthetic data</strong> - This option is incorrect because CNNs are designed for tasks such as image and video recognition, object detection, and similar applications involving grid-like data (such as pixels in an image). While CNNs are excellent at feature extraction and classification in images, they are not suitable for generating synthetic data, especially for non-visual data types.</p>\n\n<p><strong>The company should use WaveNet, a deep generative model specifically designed for generating general-purpose synthetic data across various domains</strong> - This option is incorrect because WaveNet is tailored for audio data generation, specifically for tasks such as speech synthesis and audio signal processing. While it is powerful within its specific domain, it is not designed for generating synthetic data outside of audio, making it an unsuitable choice for general-purpose data generation.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/what-is/gan/\">https://aws.amazon.com/what-is/gan/</a></p>\n\n<p><a href=\"https://aws.amazon.com/what-is/generative-ai/\">https://aws.amazon.com/what-is/generative-ai/</a></p>\n","answers":["<p>The company should use a Generative Adversarial Network (GAN) for creating realistic synthetic data while preserving the statistical properties of the original data</p>","<p>The company should use Support Vector Machines (SVMs), a type of supervised learning algorithm used for generating synthetic data</p>","<p>The company should use a Convolutional Neural Network (CNN), a type of deep learning model, best-suited for generating synthetic data</p>","<p>The company should use WaveNet, a deep generative model specifically designed for generating general-purpose synthetic data across various domains</p>"]},"correct_response":["a"],"section":"Fundamentals of Generative AI","question_plain":"A healthcare analytics company is developing machine learning models to predict patient outcomes and improve treatment plans. To enhance these models, conduct rigorous testing, and ensure data privacy when sharing with partners, the company needs to generate synthetic data that closely mirrors its existing patient records without compromising sensitive information. The synthetic data must maintain the statistical properties and patterns of the original dataset to be useful for model training and evaluation.\n\nWhich of the following methods would be most suitable for generating synthetic data?","related_lectures":[]},{"_class":"assessment","id":96322011,"assessment_type":"multiple-choice","prompt":{"question":"<p>A retail company wants to simplify how its employees access and analyze sales data stored in a large database. To achieve this, the company aims to implement a solution that automatically converts plain English text commands, such as \"show total sales for the last quarter\" or \"list top-selling products,\" into SQL queries. This would allow employees without technical skills to interact with the database seamlessly, improving efficiency and decision-making.</p>\n\n<p>Which of the following solutions would be most suitable for this purpose?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>The company should use GPT (Generative Pre-trained Transformer), to interpret natural language inputs and generating coherent outputs, such as SQL queries, by leveraging its understanding of language patterns and structures</strong></p>\n\n<p>This is the correct option because GPT models are specifically designed to process and generate human-like text based on context and input data. GPT can be fine-tuned to understand specific domain language and generate accurate SQL queries from plain text input. It uses advanced natural language processing (NLP) techniques to parse input text, understand user intent, and generate the appropriate SQL statements, making it highly suitable for the task.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt1-q72-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/what-is/gan/\">https://aws.amazon.com/what-is/gan/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>The company should use Amazon Comprehend, to interpret natural language inputs and generating coherent outputs, such as SQL queries, by leveraging its understanding of language patterns and structures</strong> - This option is incorrect because Amazon Comprehend is built for analyzing and extracting insights from text, such as identifying sentiment, entities, and key phrases. It does not have the capability to generate SQL queries from natural language input. Therefore, it does not meet the company’s need for text-to-SQL conversion.</p>\n\n<p><strong>The company should use a Residual Neural Network (ResNet), for generating text-based outputs like SQL queries, as it is specifically tailored for natural language understanding</strong> - This option is incorrect because ResNet is a deep neural network architecture used mainly in computer vision tasks, such as image classification and object detection. It is not capable of handling natural language input or generating text-based outputs like SQL queries, making it irrelevant to the company's needs.</p>\n\n<p><strong>The company should use WaveNet, which is suitable for understanding or generating text, and therefore can be used to create highly optimized SQL queries from input text</strong> - This option is incorrect because WaveNet is a deep generative model created by DeepMind to synthesize audio data, particularly for generating realistic-sounding speech. It is not built to handle text input or produce SQL queries, making it completely unsuitable for this task.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/what-is/gpt/\">https://aws.amazon.com/what-is/gpt/</a></p>\n\n<p><a href=\"https://aws.amazon.com/what-is/generative-ai/\">https://aws.amazon.com/what-is/generative-ai/</a></p>\n","answers":["<p>The company should use Amazon Comprehend, to interpret natural language inputs and generating coherent outputs, such as SQL queries, by leveraging its understanding of language patterns and structures</p>","<p>The company should use a Residual Neural Network (ResNet), for generating text-based outputs like SQL queries, as it is specifically tailored for natural language understanding</p>","<p>The company should use WaveNet, which is suitable for understanding or generating text, and therefore can be used to create highly optimized SQL queries from input text</p>","<p>The company should use GPT (Generative Pre-trained Transformer), to interpret natural language inputs and generating coherent outputs, such as SQL queries, by leveraging its understanding of language patterns and structures</p>"]},"correct_response":["d"],"section":"Fundamentals of Generative AI","question_plain":"A retail company wants to simplify how its employees access and analyze sales data stored in a large database. To achieve this, the company aims to implement a solution that automatically converts plain English text commands, such as \"show total sales for the last quarter\" or \"list top-selling products,\" into SQL queries. This would allow employees without technical skills to interact with the database seamlessly, improving efficiency and decision-making.\n\nWhich of the following solutions would be most suitable for this purpose?","related_lectures":[]},{"_class":"assessment","id":96322009,"assessment_type":"multiple-choice","prompt":{"question":"<p>An AI-driven healthcare company is focused on reducing its carbon footprint while running machine learning models to analyze large datasets for patient outcomes and research. To achieve this, the company needs to select an Amazon EC2 instance type that offers the highest energy efficiency for its computational workloads, minimizing environmental impact while still delivering the required performance for training complex machine learning models.</p>\n\n<p>Which of the following EC2 instance types would be the most suitable choice for achieving this goal?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>AWS Trainium instances</strong></p>\n\n<p>AWS Trainium instances are designed with energy efficiency in mind, providing optimal performance per watt for machine learning workloads. Trainium, AWS's custom-designed machine learning chip, is specifically engineered to offer the best performance at the lowest power consumption, reducing the carbon footprint of training large-scale models. This makes Trainium instances the most environmentally friendly choice among the options listed. Trn1 instances powered by Trainium are up to 25% more energy efficient for DL training than comparable accelerated computing EC2 instances.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt1-q73-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/machine-learning/trainium/\">https://aws.amazon.com/machine-learning/trainium/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Accelerated Computing P type instances</strong> - This option is incorrect because Accelerated Computing P type instances, powered by high-end GPUs like NVIDIA Tesla, are optimized for maximum computational throughput, particularly for machine learning and HPC tasks. However, they consume significant amounts of power and are not specifically designed with energy efficiency in mind, making them less suitable for an environmentally conscious choice.</p>\n\n<p><strong>Accelerated Computing G type instances</strong> - This option is incorrect because Accelerated Computing G type instances, such as those powered by NVIDIA GPUs, are designed for graphics-heavy applications like gaming, rendering, or video processing. While they offer high computational power for specific tasks, they are not specifically optimized for energy efficiency or low environmental impact, making them less suitable for a company focused on minimizing its carbon footprint.</p>\n\n<p><strong>Compute Optimized C type instances</strong> - This option is incorrect because Compute Optimized C type instances are designed to maximize compute performance for applications such as web servers, gaming, and scientific modeling. While they provide excellent compute power, they are not optimized for energy efficiency in the same way as AWS Trainium instances, making them less ideal for reducing environmental impact.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/machine-learning/trainium/\">https://aws.amazon.com/machine-learning/trainium/</a></p>\n\n<p><a href=\"https://aws.amazon.com/ec2/instance-types/\">https://aws.amazon.com/ec2/instance-types/</a></p>\n","answers":["<p>Accelerated Computing P type instances</p>","<p>AWS Trainium instances</p>","<p>Accelerated Computing G type instances</p>","<p>Compute Optimized C type instances</p>"]},"correct_response":["b"],"section":"Security, Compliance, and Governance for AI Solutions","question_plain":"An AI-driven healthcare company is focused on reducing its carbon footprint while running machine learning models to analyze large datasets for patient outcomes and research. To achieve this, the company needs to select an Amazon EC2 instance type that offers the highest energy efficiency for its computational workloads, minimizing environmental impact while still delivering the required performance for training complex machine learning models.\n\nWhich of the following EC2 instance types would be the most suitable choice for achieving this goal?","related_lectures":[]},{"_class":"assessment","id":96322005,"assessment_type":"multiple-choice","prompt":{"question":"<p>A media production company is looking to enhance its creative workflows by using AI to generate high-quality images from text prompts for marketing materials, storyboards, and content development. The company plans to use Amazon Bedrock for this purpose and wants to identify the most suitable Foundation Model to generate realistic and detailed images based on text descriptions provided by the creative team.</p>\n\n<p>Which of the following Foundation Models would you recommend for generating images from text prompts in this use case?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Stable Diffusion</strong></p>\n\n<p>Stable Diffusion is a generative artificial intelligence (generative AI) model that produces unique photorealistic images from text and image prompts.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Llama</strong> - Llama is a series of large language models trained on publicly available data. They are built on the transformer architecture, enabling them to handle input sequences of any length and produce output sequences of varying lengths. A notable feature of Llama models is their capacity to generate coherent and contextually appropriate text.</p>\n\n<p><strong>Jurassic</strong> - Jurassic family of models from AI21 Labs supported use cases such as question answering, summarization, draft generation, advanced information extraction, and ideation for tasks requiring intricate reasoning and logic.</p>\n\n<p><strong>Claude</strong> - Claude is Anthropic’s frontier, state-of-the-art large language model that offers important features for enterprises like advanced reasoning, vision analysis, code generation, and multilingual processing.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/what-is/stable-diffusion/\">https://aws.amazon.com/what-is/stable-diffusion/</a></p>\n\n<p><a href=\"https://aws.amazon.com/bedrock/\">https://aws.amazon.com/bedrock/</a></p>\n\n<p><a href=\"https://aws.amazon.com/bedrock/faqs/\">https://aws.amazon.com/bedrock/faqs/</a></p>\n\n<p><a href=\"https://aws.amazon.com/bedrock/claude/\">https://aws.amazon.com/bedrock/claude/</a></p>\n\n<p><a href=\"https://aws.amazon.com/bedrock/ai21/\">https://aws.amazon.com/bedrock/ai21/</a></p>\n","answers":["<p>Jurassic</p>","<p>Stable Diffusion</p>","<p>Llama</p>","<p>Claude</p>"]},"correct_response":["b"],"section":"Fundamentals of Generative AI","question_plain":"A media production company is looking to enhance its creative workflows by using AI to generate high-quality images from text prompts for marketing materials, storyboards, and content development. The company plans to use Amazon Bedrock for this purpose and wants to identify the most suitable Foundation Model to generate realistic and detailed images based on text descriptions provided by the creative team.\n\nWhich of the following Foundation Models would you recommend for generating images from text prompts in this use case?","related_lectures":[]},{"_class":"assessment","id":96322003,"assessment_type":"multiple-choice","prompt":{"question":"<p>A tech startup is customizing a Foundation Model using Amazon Bedrock to enhance its machine learning capabilities for analyzing customer behavior and predicting market trends. As part of this customization, the company needs to perform model validation to ensure the model is accurately trained and tuned for its specific use case. To facilitate this, the company must choose an appropriate dataset storage location that is fully supported by Amazon Bedrock for storing and accessing the large datasets required for validation.</p>\n\n<p>Which of the following storage options would be the most suitable for this task?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>The company should use Amazon S3, which is a scalable object storage service fully integrated with Amazon Bedrock</strong></p>\n\n<p>Amazon S3 is the recommended storage solution for datasets used in model validation when working with Amazon Bedrock. S3 provides a highly scalable and durable storage platform, and it is natively integrated with Amazon Bedrock, allowing easy access to large datasets required for model customization, training, and validation tasks. It supports a wide range of data formats and allows seamless access from various AWS services.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>The company should use Amazon EFS, which is a managed file storage service that allows shared access to file data for Amazon Bedrock</strong> - This option is incorrect because Amazon EFS is designed for file-based workloads that require shared access across multiple instances, such as content management or web serving. It is not optimized for storing large datasets used in machine learning workflows with Amazon Bedrock, and it does not provide native integration for this purpose.</p>\n\n<p><strong>The company should use Amazon EBS , a block storage service designed to provide persistent storage for Amazon Bedrock</strong> - This option is incorrect because Amazon EBS is designed for block storage and is typically attached to EC2 instances for use cases that require high performance and low latency, such as databases or enterprise applications. It is not suitable or supported for storing datasets used in model validation with Amazon Bedrock, as it lacks the scalability and native integration provided by Amazon S3.</p>\n\n<p><strong>The company should use Amazon RDS, which is a managed relational database service for structured data</strong> - This option is incorrect because Amazon RDS is designed for managing relational databases and is not intended for storing large, unstructured datasets typically used in machine learning and model validation. It is not integrated with Amazon Bedrock for storing datasets required for model customization and validation tasks.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/model-customization-prereq.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/model-customization-prereq.html</a></p>\n\n<p><a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/vpc-model-customization.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/vpc-model-customization.html</a></p>\n","answers":["<p>The company should use Amazon EFS, which is a managed file storage service that allows shared access to file data for Amazon Bedrock</p>","<p>The company should use Amazon S3, which is a scalable object storage service fully integrated with Amazon Bedrock</p>","<p>The company should use Amazon EBS , a block storage service designed to provide persistent storage for Amazon Bedrock</p>","<p>The company should use Amazon RDS, which is a managed relational database service for structured data</p>"]},"correct_response":["b"],"section":"Security, Compliance, and Governance for AI Solutions","question_plain":"A tech startup is customizing a Foundation Model using Amazon Bedrock to enhance its machine learning capabilities for analyzing customer behavior and predicting market trends. As part of this customization, the company needs to perform model validation to ensure the model is accurately trained and tuned for its specific use case. To facilitate this, the company must choose an appropriate dataset storage location that is fully supported by Amazon Bedrock for storing and accessing the large datasets required for validation.\n\nWhich of the following storage options would be the most suitable for this task?","related_lectures":[]},{"_class":"assessment","id":96322001,"assessment_type":"multi-select","prompt":{"question":"<p>A law firm is handling an increasing volume of legal documents, including contracts, agreements, and case files, and seeks to streamline its document review process by automatically extracting key information such as important clauses, dates, and entities. The firm wants to implement an automated solution that can efficiently handle this task, reducing the time and effort required for manual review while ensuring accuracy in identifying critical details within the documents.</p>\n\n<p>Which of the following options would you suggest for achieving this goal? (Select three)</p>\n","relatedLectureIds":"","feedbacks":["","","","","",""],"explanation":"<p>Correct option:</p>\n\n<p>AWS intelligent document processing (IDP), with AI services such as Amazon Textract, allows you to take advantage of industry-leading machine learning (ML) technology to quickly and accurately process data from any scanned document or image. Generative artificial intelligence (generative AI) complements Amazon Textract to further automate document processing workflows. Features such as normalizing key fields and summarizing input data support faster cycles for managing document process workflows, while reducing the potential for errors.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt1-q76-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/blogs/machine-learning/enhancing-aws-intelligent-document-processing-with-generative-ai/\">https://aws.amazon.com/blogs/machine-learning/enhancing-aws-intelligent-document-processing-with-generative-ai/</a></p>\n\n<p><strong>Generative AI powered summarization chatbot</strong></p>\n\n<p>Generative AI powered summarization chatbot leverages large language models to generate concise summaries of text. With prompt engineering, the summarization chatbot can be specifically tailored to accurately extract detailed key points, entities, or legal clauses from complex legal documents.</p>\n\n<p><strong>Amazon Comprehend</strong></p>\n\n<p>Amazon Comprehend is an effective choice because it is specifically designed to process large volumes of unstructured text data, such as legal documents, and extract key entities, phrases, and insights. It uses machine learning to accurately identify and extract relevant information, like names, dates, and specific legal clauses, making it well-suited for the law firm’s needs. The service can be integrated with other AWS tools to automate and scale the document review process, thereby enhancing efficiency.</p>\n\n<p><strong>Amazon Textract</strong></p>\n\n<p>Amazon Textract is also a suitable choice because it is designed to extract structured data from scanned documents, such as PDFs or images, which is common in legal settings. Textract can identify key fields, like dates, names, and amounts, and extract them into a structured format. This makes it particularly useful for handling large volumes of physical or scanned documents where the information is not readily accessible as text. Combined with NLP tools like Amazon Comprehend, Textract can provide a comprehensive solution for extracting both structured and unstructured information from legal documents.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Convolutional Neural Network (CNN)</strong> - This option is incorrect because CNNs are designed for tasks such as image and video recognition, object detection, and similar applications involving grid-like data (such as pixels in an image). While CNNs are excellent at feature extraction and classification in images, they are not inherently designed for document parsing or extraction tasks.</p>\n\n<p><strong>Amazon Personalize</strong> - Amazon Personalize is designed for building machine learning models to provide personalized recommendations, such as product or content suggestions. It does not have any built-in capabilities for text analysis or document processing, making it completely irrelevant for the law firm’s goal of extracting key points from legal documents.</p>\n\n<p><strong>WaveNet</strong> - This option is incorrect because WaveNet is tailored for audio data generation, specifically for tasks such as speech synthesis and audio signal processing. It does not have the capabilities to analyze legal documents or extract key information, making it an incorrect choice for this task.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://aws.amazon.com/blogs/machine-learning/enhancing-aws-intelligent-document-processing-with-generative-ai/\">https://aws.amazon.com/blogs/machine-learning/enhancing-aws-intelligent-document-processing-with-generative-ai/</a></p>\n","answers":["<p>Generative AI powered summarization chatbot</p>","<p>Amazon Comprehend</p>","<p>Amazon Textract</p>","<p>Convolutional Neural Network (CNN)</p>","<p>Amazon Personalize</p>","<p>WaveNet</p>"]},"correct_response":["a","b","c"],"section":"Applications of Foundation Models","question_plain":"A law firm is handling an increasing volume of legal documents, including contracts, agreements, and case files, and seeks to streamline its document review process by automatically extracting key information such as important clauses, dates, and entities. The firm wants to implement an automated solution that can efficiently handle this task, reducing the time and effort required for manual review while ensuring accuracy in identifying critical details within the documents.\n\nWhich of the following options would you suggest for achieving this goal? (Select three)","related_lectures":[]},{"_class":"assessment","id":96321999,"assessment_type":"multiple-choice","prompt":{"question":"<p>Which Amazon SageMaker service aggregates and displays data from Amazon SageMaker Model Cards, SageMaker Model Monitor and SageMaker Endpoint services?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Amazon SageMaker Model Dashboard</strong></p>\n\n<p>Amazon SageMaker Model Dashboard is a centralized repository of all models created in your account. The models are generally the outputs of SageMaker training jobs, but you can also import models trained elsewhere and host them on SageMaker. Model Dashboard provides a single interface for IT administrators, model risk managers, and business leaders to track all deployed models and aggregate data from multiple AWS services to provide indicators about how your models are performing.</p>\n\n<p>Model risk managers, ML practitioners, data scientists, and business leaders can get a comprehensive overview of models using the Model Dashboard. The dashboard aggregates and displays data from Amazon SageMaker Model Cards, Endpoints, and Model Monitor services to display valuable information such as model metadata from the model card and model registry, endpoints where the models are deployed, and insights from model monitoring.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Amazon SageMaker JumpStart</strong> - Amazon SageMaker JumpStart is a machine learning (ML) hub that can help you accelerate your ML journey. With SageMaker JumpStart, you can evaluate, compare, and select Foundation Models (FMs) quickly based on pre-defined quality and responsibility metrics to perform tasks like article summarization and image generation. Pretrained models are fully customizable for your use case with your data, and you can easily deploy them into production with the user interface or SDK.</p>\n\n<p><strong>Amazon SageMaker Feature Store</strong> - Amazon SageMaker Feature Store is a fully managed, purpose-built repository to store, share, and manage features for machine learning (ML) models. Features are inputs to ML models used during training and inference. For example, in an application that recommends a music playlist, features could include song ratings, listening duration, and listener demographics.</p>\n\n<p><strong>Amazon SageMaker Data Wrangler</strong> - Amazon SageMaker Data Wrangler reduces the time it takes to aggregate and prepare tabular and image data for ML from weeks to minutes. With SageMaker Data Wrangler, you can simplify the process of data preparation and feature engineering, and complete each step of the data preparation workflow (including data selection, cleansing, exploration, visualization, and processing at scale) from a single visual interface.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/sagemaker/latest/dg/model-dashboard-faqs.html\">https://docs.aws.amazon.com/sagemaker/latest/dg/model-dashboard-faqs.html</a></p>\n","answers":["<p>Amazon SageMaker JumpStart</p>","<p>Amazon SageMaker Model Dashboard</p>","<p>Amazon SageMaker Feature Store</p>","<p>Amazon SageMaker Data Wrangler</p>"]},"correct_response":["b"],"section":"Applications of Foundation Models","question_plain":"Which Amazon SageMaker service aggregates and displays data from Amazon SageMaker Model Cards, SageMaker Model Monitor and SageMaker Endpoint services?","related_lectures":[]},{"_class":"assessment","id":96321997,"assessment_type":"multiple-choice","prompt":{"question":"<p>A technology company is exploring AWS DeepRacer to introduce its employees to machine learning through an engaging and hands-on platform. The team wants to understand the key features and capabilities of AWS DeepRacer. Which of the following represents the CORRECT statement about AWS DeepRacer?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>The AWS DeepRacer vehicle is a Wi-Fi enabled, physical vehicle that can drive itself on a physical track</strong></p>\n\n<p>The AWS DeepRacer vehicle is a Wi-Fi-enabled, physical vehicle that can drive itself on a physical track by using a reinforcement learning model.</p>\n\n<ol>\n<li><p>You can manually control the vehicle or deploy a model for the vehicle to drive autonomously.</p></li>\n<li><p>The autonomous mode runs inference on the vehicle's compute module. Inference uses images that are captured from the camera that is mounted on the front.</p></li>\n<li><p>A Wi-Fi connection allows the vehicle to download software. The connection also allows the user to access the device console to operate the vehicle by using a computer or mobile device.</p></li>\n</ol>\n\n<p>Incorrect options:</p>\n\n<p><strong>You need an AWS DeepRacer car to use the AWS DeepRacer simulator</strong> - You don't need an AWS DeepRacer car to use the AWS DeepRacer simulator. You can train models, and evaluate them without owning an AWS DeepRacer car.</p>\n\n<p><strong>AWS DeepRacer car is based on a model that uses a supervised learning ML algorithm</strong> - AWS DeepRacer is a fully autonomous 1/18th scale race car driven by reinforcement learning, 3D racing simulator, and a global racing league.</p>\n\n<p><strong>AWS DeepRacer vehicle is only a virtual vehicle running on AWS DeepRacer simulator</strong> - The AWS DeepRacer vehicle is a Wi-Fi-enabled, physical vehicle (A 1/18th scale RC car) that can drive itself on a physical track by using a reinforcement learning model.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/deepracer/latest/developerguide/what-is-deepracer.html\">https://docs.aws.amazon.com/deepracer/latest/developerguide/what-is-deepracer.html</a></p>\n","answers":["<p>You need an AWS DeepRacer car to use the AWS DeepRacer simulator</p>","<p>AWS DeepRacer car is based on a model that uses a supervised learning ML algorithm</p>","<p>The AWS DeepRacer vehicle is a Wi-Fi enabled, physical vehicle that can drive itself on a physical track</p>","<p>AWS DeepRacer vehicle is only a virtual vehicle running on AWS DeepRacer simulator</p>"]},"correct_response":["c"],"section":"Applications of Foundation Models","question_plain":"A technology company is exploring AWS DeepRacer to introduce its employees to machine learning through an engaging and hands-on platform. The team wants to understand the key features and capabilities of AWS DeepRacer. Which of the following represents the CORRECT statement about AWS DeepRacer?","related_lectures":[]},{"_class":"assessment","id":96322007,"assessment_type":"multiple-choice","prompt":{"question":"<p>A financial services company is developing several machine learning models to handle fraud detection, credit scoring, and customer segmentation. To ensure consistent use of data and foster collaboration among its data scientists, the company needs an efficient way to share and manage the variables used in these models across different teams and projects. The goal is to create a centralized repository where these variables can be accessed and reused to maintain uniformity, reduce redundancy, and improve productivity.</p>\n\n<p>Which of the following AWS tools would be the most suitable for achieving this objective?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>SageMaker Feature Store</strong></p>\n\n<p>SageMaker Feature Store is specifically designed to store and manage machine learning features. It allows data scientists and engineers to create a centralized, consistent, and standardized set of features that can be easily accessed and reused across different teams and projects, making it the ideal choice for sharing variables during model development. SageMaker Feature Store also supports feature versioning and governance, which helps maintain the integrity and accuracy of the data used in model development.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>SageMaker Data Wrangler</strong> - SageMaker Data Wrangler is primarily a tool for data preparation and feature engineering, not for storing or sharing features across different teams. While Data Wrangler provides capabilities for cleaning, transforming, and visualizing data, it does not offer the functionality needed to maintain a centralized repository for sharing variables during model development.</p>\n\n<p><strong>SageMaker Clarify</strong> - SageMaker Clarify is focused on detecting bias in data and explaining model predictions to ensure transparency and fairness. It does not provide a mechanism for storing or sharing features and is not designed to support collaborative feature management, making it unsuitable for the company's goal of sharing variables for model development.</p>\n\n<p><strong>SageMaker Model Monitor</strong> - SageMaker Model Monitor is designed to track the performance of machine learning models in production by monitoring data drift, bias, and other deviations. It does not offer any features for storing or sharing variables during the development phase, and its purpose is primarily focused on post-deployment model monitoring rather than feature management.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/sagemaker/feature-store/\">https://aws.amazon.com/sagemaker/feature-store/</a></p>\n\n<p><a href=\"https://aws.amazon.com/sagemaker/data-wrangler/\">https://aws.amazon.com/sagemaker/data-wrangler/</a></p>\n","answers":["<p>SageMaker Data Wrangler</p>","<p>SageMaker Feature Store</p>","<p>SageMaker Clarify</p>","<p>SageMaker Model Monitor</p>"]},"correct_response":["b"],"section":"Security, Compliance, and Governance for AI Solutions","question_plain":"A financial services company is developing several machine learning models to handle fraud detection, credit scoring, and customer segmentation. To ensure consistent use of data and foster collaboration among its data scientists, the company needs an efficient way to share and manage the variables used in these models across different teams and projects. The goal is to create a centralized repository where these variables can be accessed and reused to maintain uniformity, reduce redundancy, and improve productivity.\n\nWhich of the following AWS tools would be the most suitable for achieving this objective?","related_lectures":[]},{"_class":"assessment","id":96322095,"assessment_type":"multiple-choice","prompt":{"question":"<p>A manufacturing company is developing a machine learning model to optimize its supply chain operations. The data science team needs to prepare the dataset by dividing it into train, test, and validation sets to ensure the model is trained effectively and performs well on unseen data.</p>\n\n<p>Which of the following is the best fit to create train, test, and validation splits on your data for machine learning?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Amazon SageMaker Data Wrangler</strong></p>\n\n<p>You can split a machine learning (ML) dataset into train, test, and validation datasets with Amazon SageMaker Data Wrangler.</p>\n\n<p>Data used for ML is typically split into the following datasets:</p>\n\n<p>Training – Used to train an algorithm or ML model. The model iteratively uses the data and learns to provide the desired result.</p>\n\n<p>Validation – Introduces new data to the trained model. You can use a validation set to periodically measure model performance as it trains and also tune any hyperparameters of the model. However, validation datasets are optional.</p>\n\n<p>Test – Used on the final trained model to assess its performance on unseen data. This helps determine how well the model generalizes.</p>\n\n<p>Data Wrangler is a capability of Amazon SageMaker that helps data scientists and data engineers quickly and easily prepare data for ML applications using a visual interface. It contains over 300 built-in data transformations so you can quickly normalize, transform, and combine features without writing code.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Amazon SageMaker Clarify</strong> - SageMaker Clarify is used to evaluate models and explain the model predictions.</p>\n\n<p><strong>Amazon SageMaker Feature Store</strong> - Amazon SageMaker Feature Store is a fully managed, purpose-built repository to store, share, and manage features for machine learning (ML) models.</p>\n\n<p><strong>Amazon SageMaker Ground Truth</strong> - Amazon SageMaker Ground Truth is a data labeling service provided by AWS that enables users to build highly accurate training datasets for machine learning quickly. The service helps automate the data labeling process through a combination of human labeling and machine learning.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/blogs/machine-learning/create-train-test-and-validation-splits-on-your-data-for-machine-learning-with-amazon-sagemaker-data-wrangler/\">https://aws.amazon.com/blogs/machine-learning/create-train-test-and-validation-splits-on-your-data-for-machine-learning-with-amazon-sagemaker-data-wrangler/</a></p>\n\n<p><a href=\"https://aws.amazon.com/sagemaker/feature-store/\">https://aws.amazon.com/sagemaker/feature-store/</a></p>\n\n<p><a href=\"https://aws.amazon.com/sagemaker/groundtruth/\">https://aws.amazon.com/sagemaker/groundtruth/</a></p>\n","answers":["<p>Amazon SageMaker Clarify</p>","<p>Amazon SageMaker Feature Store</p>","<p>Amazon SageMaker Data Wrangler</p>","<p>Amazon SageMaker Ground Truth</p>"]},"correct_response":["c"],"section":"Fundamentals of AI and ML","question_plain":"A manufacturing company is developing a machine learning model to optimize its supply chain operations. The data science team needs to prepare the dataset by dividing it into train, test, and validation sets to ensure the model is trained effectively and performs well on unseen data.\n\nWhich of the following is the best fit to create train, test, and validation splits on your data for machine learning?","related_lectures":[]},{"_class":"assessment","id":96322093,"assessment_type":"multiple-choice","prompt":{"question":"<p>A retail company is seeking to empower its business analysts to create data-driven dashboards without needing technical expertise in coding or data query languages. The company wants a solution that allows analysts to use natural language to generate reports, visualize key metrics, and build Business Intelligence (BI) dashboards to inform decision-making across departments. They are exploring options within AWS that can help streamline this process for non-technical users.</p>\n\n<p>Which of the following solutions allows business analysts to use natural language to build BI dashboards?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Amazon Q in QuickSight</strong></p>\n\n<p>With Amazon Q in QuickSight, customers get a generative BI assistant that allows business analysts to use natural language to build BI dashboards in minutes and easily create visualizations and complex calculations. These dashboard-authoring capabilities empower business analysts to swiftly build, uncover, and share valuable insights using natural language prompts. You can simplify data understanding for business users through a context-aware Q&amp;A experience, executive summaries, and customizable data stories — all designed to use insights to inform and drive decisions.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Amazon Q Developer</strong> - Amazon Q Developer assists developers and IT professionals with all their tasks—from coding, testing, and upgrading applications, to diagnosing errors, performing security scanning and fixes, and optimizing AWS resources.</p>\n\n<p><strong>Amazon Q Business</strong> - Amazon Q Business is a fully managed, generative-AI-powered assistant that you can configure to answer questions, provide summaries, generate content, and complete tasks based on your enterprise data. It allows end users to receive immediate, permissions-aware responses from enterprise data sources with citations, for use cases such as IT, HR, and benefits help desks.</p>\n\n<p><strong>Amazon Q in Connect</strong> - Amazon Connect is the contact center service from AWS. Amazon Q helps customer service agents provide better customer service. Amazon Q in Connect enriches real-time customer conversations with the relevant company content. It recommends what to say or what actions an agent should take to assist customers in a better way.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/q/\">https://aws.amazon.com/q/</a></p>\n\n<p><a href=\"https://docs.aws.amazon.com/amazonq/latest/qdeveloper-ug/what-is.html\">https://docs.aws.amazon.com/amazonq/latest/qdeveloper-ug/what-is.html</a></p>\n\n<p><a href=\"https://docs.aws.amazon.com/amazonq/latest/qbusiness-ug/what-is.html\">https://docs.aws.amazon.com/amazonq/latest/qbusiness-ug/what-is.html</a></p>\n","answers":["<p>Amazon Q Developer</p>","<p>Amazon Q Business</p>","<p>Amazon Q in QuickSight</p>","<p>Amazon Q in Connect</p>"]},"correct_response":["c"],"section":"Applications of Foundation Models","question_plain":"A retail company is seeking to empower its business analysts to create data-driven dashboards without needing technical expertise in coding or data query languages. The company wants a solution that allows analysts to use natural language to generate reports, visualize key metrics, and build Business Intelligence (BI) dashboards to inform decision-making across departments. They are exploring options within AWS that can help streamline this process for non-technical users.\n\nWhich of the following solutions allows business analysts to use natural language to build BI dashboards?","related_lectures":[]},{"_class":"assessment","id":96322091,"assessment_type":"multiple-choice","prompt":{"question":"<p>A healthcare analytics company has recently migrated to AWS Cloud and it is preparing to build several Machine Learning (ML) models to predict patient outcomes, optimize treatment plans, and analyze health data trends. The company wants to leverage the capabilities of various tools offered by Amazon SageMaker.</p>\n\n<p>Which of the following is a key use case addressed by Amazon SageMaker Data Wrangler?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Fix bias by balancing the dataset</strong></p>\n\n<p>When the number of samples in the majority class (bigger) is considerably larger than the number of samples in the minority (smaller) class, the dataset is considered imbalanced. This skew is challenging for ML algorithms and classifiers because the training process tends to be biased towards the majority class. Data Wrangler supports several balancing operators as part of the Balance data transform.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt1-q82-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/blogs/machine-learning/balance-your-data-for-machine-learning-with-amazon-sagemaker-data-wrangler/\">https://aws.amazon.com/blogs/machine-learning/balance-your-data-for-machine-learning-with-amazon-sagemaker-data-wrangler/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Monitor the quality of a model</strong> - This option is incorrect because monitoring model quality is a feature of SageMaker Model Monitor, not SageMaker Data Wrangler. SageMaker Model Monitor is designed to track model quality as well as performance in production.</p>\n\n<p><strong>Build ML models with no code</strong> - SageMaker Data Wrangler is not designed for building machine learning models without coding. SageMaker Canvas, another tool in the SageMaker suite, specifically targets no-code model building, allowing users to create and deploy models using a visual interface.</p>\n\n<p><strong>Store and share the features used for model development</strong> - SageMaker Feature Store is specifically designed to store and share machine learning features. It allows data scientists and engineers to create a centralized, consistent, and standardized set of features that can be easily accessed and reused across different teams and projects, making it the ideal choice for sharing features during model development. SageMaker Data Wrangler is not designed for this use case.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://aws.amazon.com/blogs/machine-learning/balance-your-data-for-machine-learning-with-amazon-sagemaker-data-wrangler/\">https://aws.amazon.com/blogs/machine-learning/balance-your-data-for-machine-learning-with-amazon-sagemaker-data-wrangler/</a></p>\n","answers":["<p>Monitor the quality of a model</p>","<p>Fix bias by balancing the dataset</p>","<p>Build ML models with no code</p>","<p>Store and share the features used for model development</p>"]},"correct_response":["b"],"section":"Guidelines for Responsible AI","question_plain":"A healthcare analytics company has recently migrated to AWS Cloud and it is preparing to build several Machine Learning (ML) models to predict patient outcomes, optimize treatment plans, and analyze health data trends. The company wants to leverage the capabilities of various tools offered by Amazon SageMaker.\n\nWhich of the following is a key use case addressed by Amazon SageMaker Data Wrangler?","related_lectures":[]},{"_class":"assessment","id":96322089,"assessment_type":"multiple-choice","prompt":{"question":"<p>A retail company is developing a machine learning model to improve its customer segmentation and targeting strategies. The data science team is working with both labeled and unlabeled customer data to train their models but needs to clearly understand the distinction between these two types of data to decide how best to use them. Understanding this difference is critical for selecting the appropriate machine learning techniques, such as supervised or unsupervised learning, for different stages of the project.</p>\n\n<p>What is a key difference between labeled data and unlabeled data in the context of machine learning?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Labeled data is annotated with output labels that provide specific information about each data point and is used for supervised learning, whereas, unlabeled data lacks such annotations and is used for unsupervised learning</strong></p>\n\n<p>Labeled data is data that comes with predefined labels or annotations. Each data point has an associated label that provides information about the data. This type of data is crucial for supervised learning, where the model learns to predict the output from the input data.</p>\n\n<p>Examples:\nImage classification: Images labeled with the objects they contain.\nSentiment analysis: Text labeled with the sentiment it expresses (e.g., positive, negative).\nSpam detection: Emails labeled as \"spam\" or \"not spam.\"</p>\n\n<p>Unlabeled data is data that does not come with any labels, annotations, or explicit instructions about what it represents. This type of data is often used in unsupervised learning, where the model attempts to find patterns or structures in the data without predefined labels.</p>\n\n<p>Examples:\nClustering: Grouping similar data points, such as customer segmentation based on purchasing behavior.\nDimensionality reduction: Reducing the number of features in a dataset while preserving important information, such as using Principal Component Analysis (PCA).</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Labeled data consists of raw information with no tags or annotations, while unlabeled data includes tags that provide meaning to the data</strong> - Labeled data includes annotations (labels) that provide information about each data point, while unlabeled data does not have these tags.</p>\n\n<p><strong>Labeled data can only be used for unsupervised learning algorithms, whereas, unlabeled data is exclusively for supervised learning algorithms</strong> - Labeled data is used for supervised learning, where the model learns from the labeled examples, while unlabeled data is used in unsupervised learning to find inherent structures without predefined labels.</p>\n\n<p><strong>Labeled data is inherently more complex to process due
