rious data sources and import it quickly. Next, you can use the data quality and insights report to automatically verify data quality and detect anomalies, such as duplicate rows and target leakage. SageMaker Data Wrangler contains over 300 built-in data transformations, so you can quickly transform data without writing code.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Amazon SageMaker Feature Store</strong> - Amazon SageMaker Feature Store is a fully managed, purpose-built repository to store, share, and manage features for machine learning (ML) models. Features are inputs to ML models used during training and inference. For example, in an application that recommends a music playlist, features could include song ratings, listening duration, and listener demographics.</p>\n\n<p><strong>Amazon SageMaker Clarify</strong> - SageMaker Clarify helps identify potential bias during data preparation without writing code. You specify input features, such as gender or age, and SageMaker Clarify runs an analysis job to detect potential bias in those features.</p>\n\n<p><strong>Amazon SageMaker Ground Truth</strong> - Amazon SageMaker Ground Truth offers the most comprehensive set of human-in-the-loop capabilities, allowing you to harness the power of human feedback across the ML lifecycle to improve the accuracy and relevancy of models. You can complete a variety of human-in-the-loop tasks with SageMaker Ground Truth, from data generation and annotation to model review, customization, and evaluation, either through a self-service or an AWS-managed offering.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/sagemaker/data-wrangler/\">https://aws.amazon.com/sagemaker/data-wrangler/</a></p>\n\n<p><a href=\"https://docs.aws.amazon.com/personalize/latest/dg/what-is-personalize.html\">https://docs.aws.amazon.com/personalize/latest/dg/what-is-personalize.html</a></p>\n","answers":["<p>Amazon SageMaker Data Wrangler</p>","<p>Amazon SageMaker Feature Store</p>","<p>Amazon SageMaker Clarify</p>","<p>Amazon SageMaker Ground Truth</p>"]},"correct_response":["a"],"section":"Applications of Foundation Models","question_plain":"A company is using Amazon Personalize to build a recommendations engine for its e-commerce application. As part of the process, the data from ten different sources needs to be processed and imported into Amazon Personalize.\n\nWhich AWS service will help import, prepare, and transform data before it is fed into Amazon Personalize?","related_lectures":[]},{"_class":"assessment","id":96322119,"assessment_type":"multiple-choice","prompt":{"question":"<p>A traffic monitoring application needs to detect license plate numbers for the vehicles that pass a certain location from 11 PM to 7 AM every day.</p>\n\n<p>Which ML-powered AWS service is the right fit for this requirement?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Amazon Rekognition</strong></p>\n\n<p>Amazon Rekognition is a cloud-based image and video analysis service that makes it easy to add advanced computer vision capabilities to your applications. The service is powered by proven deep learning technology and it requires no machine learning expertise to use. Amazon Rekognition includes a simple, easy-to-use API that can quickly analyze any image or video file that’s stored in Amazon S3.</p>\n\n<p>You can add features that detect objects, text, and unsafe content, analyze images/videos, and compare faces to your application using Rekognition's APIs. With Amazon Rekognition's face recognition APIs, you can detect, analyze, and compare faces for a wide variety of use cases, including user verification, cataloging, people counting, and public safety.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt2-q84-i1.jpg\">\nvia - <a href=\"https://docs.aws.amazon.com/rekognition/latest/dg/text-detection.html\">https://docs.aws.amazon.com/rekognition/latest/dg/text-detection.html</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Amazon Textract</strong> - Amazon Textract is a document analysis service that detects and extracts printed text, handwriting, structured data (such as fields of interest and their values), and tables from images and scans of documents. Amazon Textract's machine learning models have been trained on millions of documents so that virtually any document type you upload is automatically recognized and processed for text extraction.</p>\n\n<p>While Amazon Textract can detect text from images and documents from a wide range of file formats, Recognition is trained on locating and identifying even small text from moving videos and images at various angles. Hence, Recognition is optimal here.</p>\n\n<p><strong>Amazon SageMaker image classification algorithm</strong> - The Amazon SageMaker image classification algorithm is a supervised learning algorithm that supports multi-label classification. It takes an image as input and outputs one or more labels assigned to that image. It uses a convolutional neural network that can be trained from scratch or trained using transfer learning when a large number of training images are not available. SageMaker image classification algorithms need certain ML experience to train and tune the model whereas Rekognition is already trained to identify labels.</p>\n\n<p><strong>Amazon SageMaker JumpStart</strong> - Amazon SageMaker JumpStart is a machine learning (ML) hub that can help you accelerate your ML journey. With SageMaker JumpStart, you can evaluate, compare, and select Foundation Models (FMs) quickly based on pre-defined quality and responsibility metrics to perform tasks like article summarization and image generation. Pretrained models are fully customizable for your use case with your data, and you can easily deploy them into production with the user interface or SDK.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/rekognition/latest/dg/text-detection.html\">https://docs.aws.amazon.com/rekognition/latest/dg/text-detection.html</a></p>\n","answers":["<p>Amazon Textract</p>","<p>Amazon SageMaker image classification algorithm</p>","<p>Amazon SageMaker JumpStart</p>","<p>Amazon Rekognition</p>"]},"correct_response":["d"],"section":"Applications of Foundation Models","question_plain":"A traffic monitoring application needs to detect license plate numbers for the vehicles that pass a certain location from 11 PM to 7 AM every day.\n\nWhich ML-powered AWS service is the right fit for this requirement?","related_lectures":[]},{"_class":"assessment","id":96322045,"assessment_type":"multiple-choice","prompt":{"question":"<p>A large enterprise is looking to implement an AI-powered assistant to help employees across departments streamline their work by answering questions, summarizing reports, generating content, and securely accessing data from internal systems. The company needs a solution that can seamlessly integrate with its enterprise systems while ensuring data privacy and security. The team is exploring various generative AI-powered assistants that can fulfill these requirements.</p>\n\n<p>Which of the following is a generative AI–powered assistant that can answer questions, provide summaries, generate content, and securely complete tasks based on data and information in the enterprise systems?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Amazon Q Business</strong></p>\n\n<p>Amazon Q Business is a fully managed, generative-AI powered assistant that you can configure to answer questions, provide summaries, generate content, and complete tasks based on your enterprise data. It allows end users to receive immediate, permissions-aware responses from enterprise data sources with citations, for use cases such as IT, HR, and benefits help desks.</p>\n\n<p>Amazon Q Business also helps streamline tasks and accelerate problem-solving. You can use Amazon Q Business to create and share task automation applications or perform routine actions like submitting time-off requests and sending meeting invites.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Amazon Q Developer</strong> - Amazon Q Developer assists developers and IT professionals with all their tasks—from coding, testing, and upgrading applications, to diagnosing errors, performing security scanning and fixes, and optimizing AWS resources.</p>\n\n<p><strong>Amazon Q in QuickSight</strong> - With Amazon Q in QuickSight, customers get a generative BI assistant that allows business analysts to use natural language to build BI dashboards in minutes and easily create visualizations and complex calculations.</p>\n\n<p><strong>Amazon Q in Connect</strong> - Amazon Connect is the contact center service from AWS. Amazon Q helps customer service agents provide better customer service. Amazon Q in Connect uses real-time conversation with the customer along with relevant company content to automatically recommend what to say or what actions an agent should take to better assist customers.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/q/\">https://aws.amazon.com/q/</a></p>\n\n<p><a href=\"https://docs.aws.amazon.com/amazonq/latest/qdeveloper-ug/what-is.html\">https://docs.aws.amazon.com/amazonq/latest/qdeveloper-ug/what-is.html</a></p>\n\n<p><a href=\"https://docs.aws.amazon.com/amazonq/latest/qbusiness-ug/what-is.html\">https://docs.aws.amazon.com/amazonq/latest/qbusiness-ug/what-is.html</a></p>\n","answers":["<p>Amazon Q Developer</p>","<p>Amazon Q Business</p>","<p>Amazon Q in QuickSight</p>","<p>Amazon Q in Connect</p>"]},"correct_response":["b"],"section":"Fundamentals of Generative AI","question_plain":"A large enterprise is looking to implement an AI-powered assistant to help employees across departments streamline their work by answering questions, summarizing reports, generating content, and securely accessing data from internal systems. The company needs a solution that can seamlessly integrate with its enterprise systems while ensuring data privacy and security. The team is exploring various generative AI-powered assistants that can fulfill these requirements.\n\nWhich of the following is a generative AI–powered assistant that can answer questions, provide summaries, generate content, and securely complete tasks based on data and information in the enterprise systems?","related_lectures":[]},{"_class":"assessment","id":96322021,"assessment_type":"multiple-choice","prompt":{"question":"<p>A healthcare organization is deploying machine learning models to assist in patient diagnosis and treatment planning. To ensure responsible use and compliance with healthcare regulations, the data science team needs a tool that offers clear guidance on how each model should be used, along with an assessment of the potential risks associated with its deployment. Understanding these factors is critical for maintaining transparency and trust in the AI models used in such sensitive applications.</p>\n\n<p>Which AWS tool do you recommend for the given use case?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Amazon SageMaker Model Cards</strong></p>\n\n<p>Use Amazon SageMaker Model Cards to document critical details about your machine learning (ML) models in a single place for streamlined governance and reporting.</p>\n\n<p>Catalog details such as the intended use and risk rating of a model, training details and metrics, evaluation results and observations, and additional call-outs such as considerations, recommendations, and custom information. By creating model cards, you can do the following:</p>\n\n<ol>\n<li>Provide guidance on how a model should be used.</li>\n<li>Support audit activities with detailed descriptions of model training and performance.</li>\n<li>Communicate how a model is intended to support business goals.</li>\n</ol>\n\n<p>Model card JSON schema sample file:\n<img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt3-q66-i1.jpg\">\nvia - <a href=\"https://docs.aws.amazon.com/sagemaker/latest/dg/model-cards.html\">https://docs.aws.amazon.com/sagemaker/latest/dg/model-cards.html</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Amazon SageMaker Model Monitor</strong> - Amazon SageMaker Model Monitor monitors the quality of Amazon SageMaker machine learning models in production. With Model Monitor, you can set up: Continuous monitoring with a real-time endpoint, Continuous monitoring with a batch transform job that runs regularly, and On-schedule monitoring for asynchronous batch transform jobs.</p>\n\n<p><strong>Amazon SageMaker Ground Truth</strong> - Amazon SageMaker Ground Truth offers the most comprehensive set of human-in-the-loop capabilities, allowing you to harness the power of human feedback across the ML lifecycle to improve the accuracy and relevancy of models. You can complete a variety of human-in-the-loop tasks with SageMaker Ground Truth, from data generation and annotation to model review, customization, and evaluation, either through a self-service or an AWS-managed offering.</p>\n\n<p><strong>Amazon SageMaker Canvas</strong> - SageMaker Canvas offers a no-code interface that can be used to create highly accurate machine learning models - without any machine learning experience or writing a single line of code. SageMaker Canvas provides access to ready-to-use models including foundation models from Amazon Bedrock or Amazon SageMaker JumpStart or you can build your custom ML model using AutoML powered by SageMaker AutoPilot.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/sagemaker/latest/dg/model-cards.html\">https://docs.aws.amazon.com/sagemaker/latest/dg/model-cards.html</a></p>\n","answers":["<p>Amazon SageMaker Model Monitor</p>","<p>Amazon SageMaker Model Cards</p>","<p>Amazon SageMaker Ground Truth</p>","<p>Amazon SageMaker Canvas</p>"]},"correct_response":["b"],"section":"Applications of Foundation Models","question_plain":"A healthcare organization is deploying machine learning models to assist in patient diagnosis and treatment planning. To ensure responsible use and compliance with healthcare regulations, the data science team needs a tool that offers clear guidance on how each model should be used, along with an assessment of the potential risks associated with its deployment. Understanding these factors is critical for maintaining transparency and trust in the AI models used in such sensitive applications.\n\nWhich AWS tool do you recommend for the given use case?","related_lectures":[]},{"_class":"assessment","id":96322023,"assessment_type":"multiple-choice","prompt":{"question":"<p>A financial services company is scaling its machine learning operations on AWS to automate loan approvals and detect fraud. To ensure compliance with industry regulations and maintain model transparency, the data science team needs to implement governance tools provided by Amazon SageMaker to ensure models are used responsibly.</p>\n\n<p>Which of the following would you recommend as governance tools for the given use case?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Amazon SageMaker Role Manager, Amazon SageMaker Model Cards, Amazon SageMaker Model Dashboard</strong></p>\n\n<p>SageMaker provides purpose-built ML governance tools across the ML lifecycle. With Amazon SageMaker Role Manager, administrators can define minimum permissions in minutes. Amazon SageMaker Model Cards make it easier to capture, retrieve, and share essential model information from conception to deployment, and Amazon SageMaker Model Dashboard keeps you informed on production model behavior, all in one place.</p>\n\n<p>Simplify permissions for ML activities - SageMaker Role Manager provides a baseline set of permissions for ML activities and personas through a catalog of prebuilt AWS Identity and Access Management (IAM) policies.</p>\n\n<p>Capture model information - SageMaker Model Cards is a repository for model information in the Amazon SageMaker Console and helps you centralize and standardize model documentation so you can implement ML responsibly.</p>\n\n<p>Track model behavior - SageMaker Model Dashboard gives you a comprehensive overview of deployed models and endpoints so that you can track resources and model behavior violations in one place. You can monitor model behavior in four dimensions: data quality, model quality, bias drift, and feature attribution drift.</p>\n\n<p>Amazon SageMaker ML governance tools:\n<img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt3-q67-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/sagemaker/ml-governance/\">https://aws.amazon.com/sagemaker/ml-governance/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Amazon SageMaker Model Dashboard, Amazon SageMaker Role Manager, Amazon SageMaker Model Monitor</strong></p>\n\n<p><strong>Amazon SageMaker Role Manager, Amazon SageMaker Model Monitor, Amazon SageMaker Studio</strong></p>\n\n<p><strong>Amazon SageMaker Model Dashboard, Amazon SageMaker Role Manager, Amazon SageMaker Clarify</strong></p>\n\n<p>These three options contradict the explanation provided above, so these options are incorrect.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://aws.amazon.com/sagemaker/ml-governance/\">https://aws.amazon.com/sagemaker/ml-governance/</a></p>\n","answers":["<p>Amazon SageMaker Model Dashboard, Amazon SageMaker Role Manager, Amazon SageMaker Model Monitor</p>","<p>Amazon SageMaker Role Manager, Amazon SageMaker Model Monitor, Amazon SageMaker Studio</p>","<p>Amazon SageMaker Role Manager, Amazon SageMaker Model Cards, Amazon SageMaker Model Dashboard</p>","<p>Amazon SageMaker Model Dashboard, Amazon SageMaker Role Manager, Amazon SageMaker Clarify</p>"]},"correct_response":["c"],"section":"Applications of Foundation Models","question_plain":"A financial services company is scaling its machine learning operations on AWS to automate loan approvals and detect fraud. To ensure compliance with industry regulations and maintain model transparency, the data science team needs to implement governance tools provided by Amazon SageMaker to ensure models are used responsibly.\n\nWhich of the following would you recommend as governance tools for the given use case?","related_lectures":[]},{"_class":"assessment","id":96322025,"assessment_type":"multiple-choice","prompt":{"question":"<p>A media company is planning to leverage AWS for its AI and machine learning projects, and the development team is evaluating both Amazon Bedrock and Amazon SageMaker JumpStart to accelerate their workflows. The team needs to understand the primary differences between these two services, particularly in how they provide access to pre-trained models and offer customization options. This knowledge will help the company choose the right tool for their content generation and optimization tasks.</p>\n\n<p>Which of the following best addresses these requirements?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Amazon Bedrock provides foundational models for generative AI applications, whereas Amazon SageMaker JumpStart offers pre-built solutions and one-click deployment for various machine learning models</strong></p>\n\n<p>Amazon Bedrock is the easiest way to build and scale generative AI applications with foundation models. Amazon Bedrock is a fully managed service that offers a choice of high-performing foundation models (FMs) from leading AI companies like AI21 Labs, Anthropic, Cohere, Meta, Mistral AI, Stability AI, and Amazon through a single API, along with a broad set of capabilities you need to build generative AI applications with security, privacy, and responsible AI.</p>\n\n<p>Amazon SageMaker JumpStart is a machine learning (ML) hub that can help you accelerate your ML journey. With SageMaker JumpStart, you can evaluate, compare, and select FMs quickly based on pre-defined quality and responsibility metrics to perform tasks like article summarization and image generation. SageMaker JumpStart provides managed infrastructure and tools to accelerate scalable, reliable, and secure model building, training, and deployment of ML models.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Amazon SageMaker JumpStart is designed for building and scaling machine learning models, whereas Amazon Bedrock is used for real-time data analytics</strong></p>\n\n<p><strong>Amazon SageMaker JumpStart provides foundational models for generative AI applications, whereas Amazon Bedrock offers pre-built solutions and one-click deployment for various machine learning models</strong></p>\n\n<p><strong>Amazon Bedrock is designed for building and scaling machine learning models, whereas Amazon SageMaker JumpStart is used for real-time data analytics</strong></p>\n\n<p>These three options contradict the explanation provided above, so these options are incorrect.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/bedrock/\">https://aws.amazon.com/bedrock/</a></p>\n\n<p><a href=\"https://aws.amazon.com/sagemaker/jumpstart/\">https://aws.amazon.com/sagemaker/jumpstart/</a></p>\n\n<p><a href=\"https://aws.amazon.com/what-is/generative-ai/\">https://aws.amazon.com/what-is/generative-ai/</a></p>\n","answers":["<p>Amazon SageMaker JumpStart is designed for building and scaling machine learning models, whereas Amazon Bedrock is used for real-time data analytics</p>","<p>Amazon Bedrock provides foundational models for generative AI applications, whereas Amazon SageMaker JumpStart offers pre-built solutions and one-click deployment for various machine learning models</p>","<p>Amazon SageMaker JumpStart provides foundational models for generative AI applications, whereas Amazon Bedrock offers pre-built solutions and one-click deployment for various machine learning models</p>","<p>Amazon Bedrock is designed for building and scaling machine learning models, whereas Amazon SageMaker JumpStart is used for real-time data analytics</p>"]},"correct_response":["b"],"section":"Applications of Foundation Models","question_plain":"A media company is planning to leverage AWS for its AI and machine learning projects, and the development team is evaluating both Amazon Bedrock and Amazon SageMaker JumpStart to accelerate their workflows. The team needs to understand the primary differences between these two services, particularly in how they provide access to pre-trained models and offer customization options. This knowledge will help the company choose the right tool for their content generation and optimization tasks.\n\nWhich of the following best addresses these requirements?","related_lectures":[]},{"_class":"assessment","id":96322027,"assessment_type":"multiple-choice","prompt":{"question":"<p>A media company is developing generative AI models using Amazon Bedrock for content creation and wants to ensure the responsible use of AI by implementing safeguards to prevent misuse. The data science team is evaluating the use of Guardrails and watermark detection, since understanding the differences between these two approaches will help the company choose the right measures for content security and ethical AI practices.</p>\n\n<p>Given this context, which of the following summarizes the differences between Guardrails for Amazon Bedrock and watermark detection for Amazon Bedrock?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Guardrails helps control the interaction between users and FMs by filtering undesirable and harmful content, whereas, watermark detection identifies if an image was created by the Amazon Titan Image Generator model on Bedrock</strong></p>\n\n<p>Guardrails for Amazon Bedrock help you implement safeguards for your generative AI applications based on your use cases and responsible AI policies. Guardrails for Amazon Bedrock helps control the interaction between users and FMs by filtering undesirable and harmful content as well as redacting personally identifiable information (PII), enhancing content safety and privacy in generative AI applications.</p>\n\n<p>Watermark detection is a security feature in Amazon Bedrock that identifies if an image was created by the Amazon Titan Image Generator model on Bedrock.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Both Guardrails and watermark detection help control the interaction between users and FMs by filtering undesirable and harmful content</strong></p>\n\n<p><strong>Watermark detection helps control the interaction between users and FMs by filtering undesirable and harmful content, whereas, Guardrails identifies if an image was created by the Amazon Titan Image Generator model on Bedrock</strong></p>\n\n<p><strong>Both Guardrails and watermark detection help identify if an image was created by the Amazon Titan Image Generator model on Bedrock</strong></p>\n\n<p>These three options contradict the explanation provided above, so these options are incorrect.</p>\n\n<p>References:</p>\n","answers":["<p>Both Guardrails and watermark detection help control the interaction between users and FMs by filtering undesirable and harmful content</p>","<p>Guardrails helps control the interaction between users and FMs by filtering undesirable and harmful content, whereas, watermark detection identifies if an image was created by the Amazon Titan Image Generator model on Bedrock</p>","<p>Watermark detection helps control the interaction between users and FMs by filtering undesirable and harmful content, whereas, Guardrails identifies if an image was created by the Amazon Titan Image Generator model on Bedrock</p>","<p>Both Guardrails and watermark detection help identify if an image was created by the Amazon Titan Image Generator model on Bedrock</p>"]},"correct_response":["b"],"section":"Applications of Foundation Models","question_plain":"A media company is developing generative AI models using Amazon Bedrock for content creation and wants to ensure the responsible use of AI by implementing safeguards to prevent misuse. The data science team is evaluating the use of Guardrails and watermark detection, since understanding the differences between these two approaches will help the company choose the right measures for content security and ethical AI practices.\n\nGiven this context, which of the following summarizes the differences between Guardrails for Amazon Bedrock and watermark detection for Amazon Bedrock?","related_lectures":[]},{"_class":"assessment","id":96322029,"assessment_type":"multiple-choice","prompt":{"question":"<p>A healthcare analytics company is using Amazon SageMaker Automatic Model Tuning (AMT) to optimize its machine learning models for predicting patient outcomes. To ensure the models are performing at their best, the data science team is configuring the autotune settings but needs to understand which parameters are mandatory for successful tuning. Properly setting these configurations will allow the team to enhance model accuracy and performance efficiently.</p>\n\n<p>Which of the following options is mandatory for the given use case?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>None</strong></p>\n\n<p>Choosing the correct hyperparameters requires experience with machine learning techniques and can drastically affect your model performance. Even with hyperparameter tuning, you still need to specify multiple tuning configurations, such as hyperparameter ranges, search strategy, and number of training jobs to launch. Correcting such a setting is intricate and typically requires multiple experiments, which may incur additional training costs.</p>\n\n<p>Amazon SageMaker Automatic Model Tuning can automatically choose hyperparameter ranges, search strategy, maximum runtime of a tuning job, early stopping type for training jobs, number of times to retry a training job, and model convergence flag to stop a tuning job, based on the objective metric you provide. This minimizes the time required for you to kickstart your tuning process and increases the chances of finding more accurate models with a lower budget.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Hyperparameter ranges</strong></p>\n\n<p><strong>Tuning strategy</strong></p>\n\n<p><strong>Number of jobs</strong></p>\n\n<p>As mentioned above, none of these entities constitute mandatory configuration for Amazon SageMaker Automatic Model Tuning (AMT).</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://aws.amazon.com/about-aws/whats-new/2023/06/sagemaker-automatic-model-tuning-configurations/\">https://aws.amazon.com/about-aws/whats-new/2023/06/sagemaker-automatic-model-tuning-configurations/</a></p>\n","answers":["<p>Hyperparameter ranges</p>","<p>Tuning strategy</p>","<p>Number of jobs</p>","<p>None</p>"]},"correct_response":["d"],"section":"Applications of Foundation Models","question_plain":"A healthcare analytics company is using Amazon SageMaker Automatic Model Tuning (AMT) to optimize its machine learning models for predicting patient outcomes. To ensure the models are performing at their best, the data science team is configuring the autotune settings but needs to understand which parameters are mandatory for successful tuning. Properly setting these configurations will allow the team to enhance model accuracy and performance efficiently.\n\nWhich of the following options is mandatory for the given use case?","related_lectures":[]},{"_class":"assessment","id":96322031,"assessment_type":"multiple-choice","prompt":{"question":"<p>A media company is deploying machine learning models using Amazon SageMaker to generate personalized content recommendations. Since the company has intermittent workloads and it does not want to configure or manage the underlying infrastructure, the development team is evaluating different deployment models that offer cost savings by allowing for cold starts. Understanding which deployment model suits this use case will help them balance cost efficiency with operational needs.</p>\n\n<p>What do you suggest?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Serverless Inference</strong></p>\n\n<p>On-demand Serverless Inference is ideal for workloads that have idle periods between traffic spurts and can tolerate cold starts.</p>\n\n<p>Amazon SageMaker Serverless Inference is a purpose-built inference option that enables you to deploy and scale ML models without configuring or managing any of the underlying infrastructure.</p>\n\n<p>Serverless endpoints automatically launch compute resources and scale them in and out depending on traffic, eliminating the need to choose instance types or manage scaling policies. This takes away the undifferentiated heavy lifting of selecting and managing servers. Serverless Inference integrates with AWS Lambda to offer you high availability, built-in fault tolerance, and automatic scaling. With Serverless Inference, you can quickly deploy machine learning models for inference without having to configure or manage the underlying infrastructure, and you pay only for the compute capacity used to process inference requests, which is ideal for intermittent workloads. During times when there are no requests, Serverless Inference scales your endpoint down to 0, helping you to minimize your costs.</p>\n\n<p>Serverless Inference:\n<img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt3-q71-i1.jpg\">\nvia - <a href=\"https://docs.aws.amazon.com/sagemaker/latest/dg/serverless-endpoints.html\">https://docs.aws.amazon.com/sagemaker/latest/dg/serverless-endpoints.html</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Asynchronous Inference</strong> - Asynchronous Inference is used for requests with large payload sizes up to 1GB, long processing times, and near real-time latency requirements.</p>\n\n<p><strong>Batch transform</strong> - To get predictions for an entire dataset, use SageMaker batch transform.</p>\n\n<p><strong>Real-time hosting services</strong> - For persistent, real-time endpoints that make one prediction at a time, use SageMaker real-time hosting services.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/sagemaker/latest/dg/how-it-works-deployment.html\">https://docs.aws.amazon.com/sagemaker/latest/dg/how-it-works-deployment.html</a></p>\n","answers":["<p>Serverless Inference</p>","<p>Asynchronous Inference</p>","<p>Batch transform</p>","<p>Real-time hosting services</p>"]},"correct_response":["a"],"section":"Applications of Foundation Models","question_plain":"A media company is deploying machine learning models using Amazon SageMaker to generate personalized content recommendations. Since the company has intermittent workloads and it does not want to configure or manage the underlying infrastructure, the development team is evaluating different deployment models that offer cost savings by allowing for cold starts. Understanding which deployment model suits this use case will help them balance cost efficiency with operational needs.\n\nWhat do you suggest?","related_lectures":[]},{"_class":"assessment","id":96322033,"assessment_type":"multiple-choice","prompt":{"question":"<p>A company is using a generative AI model to summarize a text based on a given prompt without providing specific examples in the prompt instructions.</p>\n\n<p>What type of prompting technique does the given use case represent?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Zero shot Prompting</strong></p>\n\n<p>Zero-shot prompting is a technique used in generative AI where the model is asked to perform a task or generate content without having seen any examples of that specific task during training. Instead, the model relies on its general understanding and knowledge to provide a response.</p>\n\n<p>For example, classifying text into categories (e.g., sentiment analysis, topic detection) without providing specific training examples for those categories.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Negative prompting</strong> - Negative prompting refers to guiding a generative AI model to avoid certain outputs or behaviors when generating content. In the context of AWS generative AI, like those using Amazon Bedrock, negative prompting is used to refine and control the output of models by specifying what should not be included in the generated content. For example, when generating text for a marketing campaign, a company can use negative prompts to exclude competitive brand names or sensitive topics.</p>\n\n<p><strong>Chain-of-thought prompting</strong> - Chain-of-thought prompting is a technique that breaks down a complex question into smaller, logical parts that mimic a train of thought. This helps the model solve problems in a series of intermediate steps rather than directly answering the question. This enhances its reasoning ability. It involves guiding the model through a step-by-step process to arrive at a solution or generate content, thereby enhancing the quality and coherence of the output.</p>\n\n<p><strong>Few shot Prompting</strong> - In few shot prompting, you provide a few examples of a task to the model to guide its output.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://aws.amazon.com/what-is/prompt-engineering/\">https://aws.amazon.com/what-is/prompt-engineering/</a></p>\n","answers":["<p>Negative prompting</p>","<p>Chain-of-thought prompting</p>","<p>Zero shot Prompting</p>","<p>Few shot Prompting</p>"]},"correct_response":["c"],"section":"Fundamentals of Generative AI","question_plain":"A company is using a generative AI model to summarize a text based on a given prompt without providing specific examples in the prompt instructions.\n\nWhat type of prompting technique does the given use case represent?","related_lectures":[]},{"_class":"assessment","id":96322035,"assessment_type":"multiple-choice","prompt":{"question":"<p>A media company is using Amazon Bedrock to generate content such as headlines, articles, and social media posts. The data science team is particularly interested in understanding how adjusting the <code>Temperature</code> parameter can influence the model’s behavior to meet the company’s content generation goals.</p>\n\n<p>What do you recommend to the team regarding the <code>Temperature</code> parameter?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Influences the likelihood of the model selecting lower-probability outputs, thereby impacting the creativity of the model’s output</strong></p>\n\n<p>Temperature is a value between 0 and 1, and it regulates the creativity of the model's responses. Use a lower temperature if you want more deterministic responses, and use a higher temperature if you want more creative or different responses for the same prompt on Amazon Bedrock.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Specifies the sequences of characters that stop the model from generating further tokens</strong> - The inference parameter <code>Stop sequences</code> specifies the sequences of characters that stop the model from generating further tokens. If the model generates a stop sequence that you specify, it will stop generating after that sequence.</p>\n\n<p><strong>Influences the percentage of most-likely candidates that the model considers for the next token</strong> - The inference parameter <code>Top P</code> represents the percentage of most likely candidates that the model considers for the next token.</p>\n\n<p><strong>Influences the number of most-likely candidates that the model considers for the next token</strong> - The inference parameter <code>Top K</code> represents the number of most likely candidates that the model considers for the next token.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/inference-parameters.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/inference-parameters.html</a></p>\n\n<p><a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/general-guidelines-for-bedrock-users.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/general-guidelines-for-bedrock-users.html</a></p>\n","answers":["<p>Specifies the sequences of characters that stop the model from generating further tokens</p>","<p>Influences the percentage of most-likely candidates that the model considers for the next token</p>","<p>Influences the number of most-likely candidates that the model considers for the next token</p>","<p>Influences the likelihood of the model selecting lower-probability outputs, thereby impacting the creativity of the model’s output</p>"]},"correct_response":["d"],"section":"Fundamentals of Generative AI","question_plain":"A media company is using Amazon Bedrock to generate content such as headlines, articles, and social media posts. The data science team is particularly interested in understanding how adjusting the Temperature parameter can influence the model’s behavior to meet the company’s content generation goals.\n\nWhat do you recommend to the team regarding the Temperature parameter?","related_lectures":[]},{"_class":"assessment","id":96322037,"assessment_type":"multiple-choice","prompt":{"question":"<p>A company needs to process a large inference payload of several gigabytes (GBs) for its machine learning model built using Amazon SageMaker. The company's systems can tolerate some waiting time for the responses. Which inference method would be the most suitable for this scenario?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>The company should use batch inference, which processes multiple data points at once in large batches, suitable for processing large datasets in a single operation when immediate real-time responses are not required</strong></p>\n\n<p>Batch inference is the most suitable choice for processing a large payload of several gigabytes with Amazon SageMaker when there is no need for immediate responses. This method allows the company to run predictions on large volumes of data in a single batch job, which is more cost-effective and efficient than processing individual requests in real-time. Batch inference can handle large datasets and is ideal for scenarios where waiting for the responses is acceptable, making it the best fit for this use case.</p>\n\n<p>SageMaker Batch Transform will automatically split your input file of several gigabytes (GBs) into whatever payload size is specified if you use \"SplitType\": \"Line\" and \"BatchStrategy\": \"MultiRecord\".</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>The company should use asynchronous inference, which allows the model to handle large or complex payloads by queuing requests and processing them in the background, making it ideal when systems can wait for responses</strong> - While asynchronous inference is designed to handle longer-running tasks and large payloads by processing them in the background, this option is ideal for requests with large payload sizes (up to 1GB), long processing times (up to one hour), and near real-time latency requirements. Asynchronous Inference enables you to save on costs by autoscaling the instance count to zero when there are no requests to process, so you only pay when your endpoint is processing requests.</p>\n\n<p><strong>The company should use real-time inference, which is designed for low-latency predictions where responses are needed instantly</strong> - Real-time inference is optimized for scenarios where low latency is crucial, and responses are needed immediately. It is not suitable for processing large payloads of several gigabytes.</p>\n\n<p><strong>The company should use serverless inference, which automatically scales resources based on traffic</strong> - Serverless inference provides automatic scaling and is ideal for unpredictable traffic patterns or sporadic workloads, but it is not specifically designed for handling large, continuous payloads efficiently.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/sagemaker/latest/dg/how-it-works-deployment.html\">https://docs.aws.amazon.com/sagemaker/latest/dg/how-it-works-deployment.html</a></p>\n\n<p><a href=\"https://repost.aws/questions/QUlefH1ni4QOaulUT4870D5g/sagemaker-batch-transform\">https://repost.aws/questions/QUlefH1ni4QOaulUT4870D5g/sagemaker-batch-transform</a></p>\n\n<p><a href=\"https://docs.aws.amazon.com/sagemaker/latest/dg/async-inference.html\">https://docs.aws.amazon.com/sagemaker/latest/dg/async-inference.html</a></p>\n","answers":["<p>The company should use asynchronous inference, which allows the model to handle large or complex payloads by queuing requests and processing them in the background, making it ideal when systems can wait for responses</p>","<p>The company should use batch inference, which processes multiple data points at once in large batches, suitable for processing large datasets in a single operation when immediate real-time responses are not required</p>","<p>The company should use real-time inference, which is designed for low-latency predictions where responses are needed instantly</p>","<p>The company should use serverless inference, which automatically scales resources based on traffic</p>"]},"correct_response":["b"],"section":"Applications of Foundation Models","question_plain":"A company needs to process a large inference payload of several gigabytes (GBs) for its machine learning model built using Amazon SageMaker. The company's systems can tolerate some waiting time for the responses. Which inference method would be the most suitable for this scenario?","related_lectures":[]},{"_class":"assessment","id":96322039,"assessment_type":"multiple-choice","prompt":{"question":"<p>A company needs a solution that can convert text into human speech so that it can offer audio courses in multiple languages.</p>\n\n<p>Which AWS service is the best fit for this use case ?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Amazon Polly</strong></p>\n\n<p>Amazon Polly uses deep learning technologies to synthesize natural-sounding human speech, so you can convert articles to speech. With dozens of lifelike voices across a broad set of languages, use Amazon Polly to build speech-activated applications.</p>\n\n<p>Amazon Polly is a service that turns text into lifelike speech. Amazon Polly enables existing applications to speak as a first-class feature and creates the opportunity for entirely new categories of speech-enabled products, from mobile apps and cars to devices and appliances. Amazon Polly includes dozens of lifelike voices and support for multiple languages, so you can select the ideal voice and distribute your speech-enabled applications in many geographies. Amazon Polly is easy to use – you just send the text you want converted into speech to the Amazon Polly API, and Amazon Polly immediately returns the audio stream to your application so you can play it directly or store it in a standard audio file format, such as MP3.</p>\n\n<p>How Amazon Polly works:\n<img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt3-q75-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/polly/\">https://aws.amazon.com/polly/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Amazon Comprehend</strong> - Amazon Comprehend is a natural language processing (NLP) service that uses machine learning to find meaning and insights in text. Natural Language Processing (NLP) is a way for computers to analyze, understand, and derive meaning from textual information in a smart and useful way. By utilizing NLP, you can extract important phrases, sentiments, syntax, key entities such as brand, date, location, person, etc., and the language of the text.</p>\n\n<p><strong>Amazon Translate</strong> - Amazon Translate is a text translation service that uses advanced machine learning technologies to provide high-quality translation on demand. You can use Amazon Translate to translate unstructured text documents or to build applications that work in multiple languages.</p>\n\n<p><strong>Amazon Lex</strong> - Amazon Lex is a fully managed artificial intelligence (AI) service with advanced natural language models to design, build, test, and deploy conversational interfaces in applications. Amazon Lex leverages the power of Generative AI and Large Language Models (LLMs) to enhance the builder and customer experience. Lex integrates with AWS Lambda, used to easily trigger functions for execution of your back-end business logic for data retrieval and updates. Once built, your bot can be deployed directly to contact centers, chat and text platforms, and IoT devices. Lex provides rich insights and pre-built dashboards to track metrics for your choice.</p>\n\n<p>Amazon Comprehend and Amazon Translate cannot convert text into speech. Whereas, Amazon Polly converts text inputs to speech. Amazon Lex is a service for building conversational interfaces using voice and text.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/polly/faqs\">https://aws.amazon.com/polly/faqs</a></p>\n\n<p><a href=\"https://aws.amazon.com/lex/faqs\">https://aws.amazon.com/lex/faqs</a></p>\n","answers":["<p>Amazon Polly</p>","<p>Amazon Comprehend</p>","<p>Amazon Translate</p>","<p>Amazon Lex</p>"]},"correct_response":["a"],"section":"Applications of Foundation Models","question_plain":"A company needs a solution that can convert text into human speech so that it can offer audio courses in multiple languages.\n\nWhich AWS service is the best fit for this use case ?","related_lectures":[]},{"_class":"assessment","id":96322041,"assessment_type":"multiple-choice","prompt":{"question":"<p>A retail company needs a solution that can help in forecasting foot traffic, visitor counts, and channel demand to efficiently manage the operating costs.</p>\n\n<p>Which AWS ML service is the right fit for this use case?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Amazon Forecast</strong></p>\n\n<p>Amazon Forecast is a fully managed service that uses statistical and machine learning algorithms to deliver highly accurate time-series forecasts. Based on the same technology used for time-series forecasting at Amazon.com, Forecast provides state-of-the-art algorithms to predict future time-series data based on historical data and requires no machine learning experience.</p>\n\n<p>Time-series forecasting is useful in multiple fields, including retail, finance, logistics, and healthcare. You can also use Forecast to predict domain-specific metrics for your inventory, workforce, web traffic, server capacity, and finances.</p>\n\n<p>How Amazon Forecast works:\n<img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt3-q76-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/forecast/\">https://aws.amazon.com/forecast/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Amazon Lex</strong> - Amazon Lex is a fully managed artificial intelligence (AI) service with advanced natural language models to design, build, test, and deploy conversational interfaces in applications. Amazon Lex leverages the power of Generative AI and Large Language Models (LLMs) to enhance the builder and customer experience. Lex integrates with AWS Lambda, used to easily trigger functions for execution of your back-end business logic for data retrieval and updates. Once built, your bot can be deployed directly to contact centers, chat and text platforms, and IoT devices. Lex provides rich insights and pre-built dashboards to track metrics for your choice.</p>\n\n<p><strong>Amazon Personalize</strong> - Amazon Personalize is a fully managed machine learning (ML) service that uses your data to generate product and content recommendations for your users. You provide data about your end-users (e.g., age, location, device type), items in your catalog (e.g., genre, price), and interactions between users and items (e.g., clicks, purchases). Personalize uses this data to train custom, private models that generate recommendations that can be surfaced via an API. The service uses algorithms to analyze customer behavior and recommend products, content, and services that are likely to be of interest to them.</p>\n\n<p><strong>Amazon SageMaker Feature Store</strong> - Amazon SageMaker Feature Store is a fully managed, purpose-built repository to store, share, and manage features for machine learning (ML) models. Features are inputs to ML models used during training and inference. For example, in an application that recommends a music playlist, features could include song ratings, listening duration, and listener demographics.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/forecast/latest/dg/what-is-forecast.html\">https://docs.aws.amazon.com/forecast/latest/dg/what-is-forecast.html</a></p>\n","answers":["<p>Amazon Forecast</p>","<p>Amazon Lex</p>","<p>Amazon Personalize</p>","<p>Amazon SageMaker Feature Store</p>"]},"correct_response":["a"],"section":"Applications of Foundation Models","question_plain":"A retail company needs a solution that can help in forecasting foot traffic, visitor counts, and channel demand to efficiently manage the operating costs.\n\nWhich AWS ML service is the right fit for this use case?","related_lectures":[]},{"_class":"assessment","id":96322043,"assessment_type":"multiple-choice","prompt":{"question":"<p>A software development company is evaluating Amazon Q Developer to enhance its application development process by leveraging AI-driven tools for automation, code generation, and workflow optimization. The company is looking to understand the key features and capabilities of Amazon Q Developer. Gaining clarity on its core functionalities will help the company decide if it aligns with their development needs.</p>\n\n<p>What would you suggest to the company regarding the capabilities of Amazon Q Developer?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Amazon Q Developer can be used in integrated development environments (IDEs) as well as the AWS Management Console</strong></p>\n\n<p>You can use Amazon Q Developer in the AWS Management Console, AWS Console Mobile Application, AWS Marketing website, AWS Documentation website, and chat channels integrated with AWS Chatbot to ask questions about AWS. You can ask Amazon Q about AWS architecture, best practices, support, and documentation. Amazon Q can also help with code that you're writing with the AWS SDKs and AWS Command Line Interface (AWS CLI).</p>\n\n<p>You can also use Amazon Q Developer in integrated development environments (IDEs) to learn about AWS and get assistance with your software development needs. In IDEs, Amazon Q includes capabilities to provide guidance and support across various aspects of software development, such as answering questions about building on AWS, generating and updating code, security scanning, and optimizing and refactoring code.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Amazon Q Developer can only be used in the integrated development environments (IDEs)</strong></p>\n\n<p><strong>Amazon Q Developer can only be used in the AWS Management Console</strong></p>\n\n<p><strong>Amazon Q Developer can neither be used in the integrated development environments (IDEs) nor the AWS Management Console</strong></p>\n\n<p>These three options contradict the explanation provided above, so these are incorrect.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/amazonq/latest/qdeveloper-ug/q-on-aws.html\">https://docs.aws.amazon.com/amazonq/latest/qdeveloper-ug/q-on-aws.html</a></p>\n\n<p><a href=\"https://docs.aws.amazon.com/amazonq/latest/qdeveloper-ug/q-in-IDE.html\">https://docs.aws.amazon.com/amazonq/latest/qdeveloper-ug/q-in-IDE.html</a></p>\n","answers":["<p>Amazon Q Developer can be used in integrated development environments (IDEs) as well as the AWS Management Console</p>","<p>Amazon Q Developer can only be used in the integrated development environments (IDEs)</p>","<p>Amazon Q Developer can only be used in the AWS Management Console</p>","<p>Amazon Q Developer can neither be used in the integrated development environments (IDEs) nor the AWS Management Console</p>"]},"correct_response":["a"],"section":"Applications of Foundation Models","question_plain":"A software development company is evaluating Amazon Q Developer to enhance its application development process by leveraging AI-driven tools for automation, code generation, and workflow optimization. The company is looking to understand the key features and capabilities of Amazon Q Developer. Gaining clarity on its core functionalities will help the company decide if it aligns with their development needs.\n\nWhat would you suggest to the company regarding the capabilities of Amazon Q Developer?","related_lectures":[]},{"_class":"assessment","id":96322071,"assessment_type":"multi-select","prompt":{"question":"<p>A legal firm is digitizing a large volume of contracts and other legal documents to streamline document management and analysis. The firm is looking for AWS machine learning services that can automatically detect and extract text from scanned images and photos of these documents. Understanding which services specialize in text extraction from images will help the firm choose the right solution for automating its document processing workflow.</p>\n\n<p>Which AWS ML services will you recommend to the firm? (Select two)</p>\n","relatedLectureIds":"","feedbacks":["","","","",""],"explanation":"<p>Correct options:</p>\n\n<p><strong>Amazon Rekognition</strong></p>\n\n<p><strong>Amazon Textract</strong></p>\n\n<p>Both Rekognition and Textract possess the ability to detect text within images.</p>\n\n<p>Rekognition specializes in identifying text located spatially within an image, for instance, words displayed on street signs, t-shirts, or license plates. Its typical use cases encompass visual search, content filtering, and deriving insights from content, among others. However, it's not the ideal choice for images containing more than 100 words, as this exceeds its limitation.</p>\n\n<p>On the other hand, Textract is tailored more towards processing documents and PDFs, offering a comprehensive suite for Optical Character Recognition (OCR). It proves useful in scenarios involving financial reports, medical records, receipts, ID documents, and more.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Amazon Comprehend</strong> - Amazon Comprehend is a natural language processing (NLP) service that uses machine learning to find meaning and insights in text. By utilizing NLP, you can extract important phrases, sentiments, syntax, key entities such as brand, date, location, person, etc., and the language of the text. Comprehend can analyze text, but cannot extract it from documents or images.</p>\n\n<p><strong>Amazon Lex</strong> - Amazon Lex is a fully managed artificial intelligence (AI) service with advanced natural language models to design, build, test, and deploy conversational interfaces in applications. Amazon Lex leverages the power of Generative AI and Large Language Models (LLMs) to enhance the builder and customer experience. Lex is a powerful service for building bots, but it cannot extract text from documents or images.</p>\n\n<p><strong>Amazon Polly</strong> - Amazon Polly uses deep learning technologies to synthesize natural-sounding human speech, so you can convert articles to speech.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://repost.aws/questions/QUsCXe41EtTYq3QDaY18EnSg/textract-vs-rekognition-in-detect-text-in-picture\">https://repost.aws/questions/QUsCXe41EtTYq3QDaY18EnSg/textract-vs-rekognition-in-detect-text-in-picture</a></p>\n","answers":["<p>Amazon Rekognition</p>","<p>Amazon Textract</p>","<p>Amazon Comprehend</p>","<p>Amazon Lex</p>","<p>Amazon Polly</p>"]},"correct_response":["a","b"],"section":"Applications of Foundation Models","question_plain":"A legal firm is digitizing a large volume of contracts and other legal documents to streamline document management and analysis. The firm is looking for AWS machine learning services that can automatically detect and extract text from scanned images and photos of these documents. Understanding which services specialize in text extraction from images will help the firm choose the right solution for automating its document processing workflow.\n\nWhich AWS ML services will you recommend to the firm? (Select two)","related_lectures":[]},{"_class":"assessment","id":96322047,"assessment_type":"multiple-choice","prompt":{"question":"<p>Which AWS service helps you set up a cloud contact center in just a few clicks and onboard agents to help customers?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Amazon Connect</strong></p>\n\n<p>Amazon Connect is an AI-powered cloud contact center. It automatically detects customer issues, and provides agents with contextual customer information and suggested responses and actions for faster resolution of issues.</p>\n\n<p>You can set up a contact center in a few steps, add agents who are located anywhere, and start engaging with your customers. Amazon Connect supports the following communication channels:</p>\n\n<ol>\n<li>Voice (phone)</li>\n<li>Chat/SMS</li>\n<li>Web calling/video</li>\n<li>Tasks</li>\n</ol>\n\n<p>An agent workspace in Amazon Connect:\n<img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt3-q79-i1.jpg\">\nvia - <a href=\"https://docs.aws.amazon.com/connect/latest/adminguide/what-is-amazon-connect.html\">https://docs.aws.amazon.com/connect/latest/adminguide/what-is-amazon-connect.html</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Amazon Personalize</strong> - Amazon Personalize is a fully managed machine learning (ML) service that uses your data to generate product and content recommendations for your users. You provide data about your end-users (e.g., age, location, device type), items in your catalog (e.g., genre, price), and interactions between users and items (e.g., clicks, purchases). Personalize uses this data to train custom, private models that generate recommendations that can be surfaced via an API. The service uses algorithms to analyze customer behavior and recommend products, content, and services that are likely to be of interest to them.</p>\n\n<p><strong>Amazon SageMaker Clarify</strong> - SageMaker Clarify helps identify potential bias during data preparation without writing code. You specify input features, such as gender or age, and SageMaker Clarify runs an analysis job to detect potential bias in those features.</p>\n\n<p><strong>Amazon Lex</strong> - Amazon Lex is a fully managed artificial intelligence (AI) service with advanced natural language models to design, build, test, and deploy conversational interfaces in applications. Amazon Lex leverages the power of Generative AI and Large Language Models (LLMs) to enhance the builder and customer experience. Lex integrates with AWS Lambda, used to easily trigger functions for execution of your back-end business logic for data retrieval and updates. Once built, your bot can be deployed directly to contact centers, chat and text platforms, and IoT devices. Lex provides rich insights and pre-built dashboards to track metrics for your choice.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/connect/latest/adminguide/what-is-amazon-connect.html\">https://docs.aws.amazon.com/connect/latest/adminguide/what-is-amazon-connect.html</a></p>\n","answers":["<p>Amazon Personalize</p>","<p>Amazon SageMaker Clarify</p>","<p>Amazon Lex</p>","<p>Amazon Connect</p>"]},"correct_response":["d"],"section":"Applications of Foundation Models","question_plain":"Which AWS service helps you set up a cloud contact center in just a few clicks and onboard agents to help customers?","related_lectures":[]},{"_class":"assessment","id":96322049,"assessment_type":"multiple-choice","prompt":{"question":"<p>Which of the following use cases is addressed by Amazon Personalize?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Generate recommendations for items that are similar to an item you specify</strong></p>\n\n<p>Amazon Personalize accelerates your digital transformation with ML, making it easier to integrate personalized recommendations into existing websites, applications, email marketing systems, and more.</p>\n\n<p>Improve the discoverability of your catalog by surfacing similar items to your users. The Similar-Items (aws-similar-items) generates recommendations for items that are similar to an item you specify. Use Similar-Items to help customers discover new items in your catalog based on their previous behavior and item metadata. Recommending similar items can increase user engagement, click-through rate, and conversion rate for your application.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>To offer personalized experiences for mobile subscriber activities such as activating a SIM card, adding a phone line, purchasing prepaid cards, requesting a service change</strong> - Use Amazon Lex pre-built bots to offer personalized experiences for mobile subscriber activities such as activating a SIM card, adding a phone line, purchasing prepaid cards, requesting a service change, or reporting a lost phone device.</p>\n\n<p><strong>Extract layout elements such as paragraphs, titles, lists, and more from documents</strong> - Amazon Textract provides you with the ability to extract layout elements such as paragraphs, titles, lists, headers, footers, and more from documents. Layout is a feature type in the Analyze Document API. Customers can use Layout as a stand-alone feature or in combination with other Analyze Document feature types.</p>\n\n<p><strong>Offers highly accurate and easy-to-use enterprise search service that’s powered by machine learning</strong> - Amazon Kendra is a highly accurate and easy-to-use enterprise search service that’s powered by machine learning (ML). It allows developers to add search capabilities to their applications so their end users can discover information stored within the vast amount of content spread across their company.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://aws.amazon.com/personalize/features/\">https://aws.amazon.com/personalize/features/</a></p>\n","answers":["<p>To offer personalized experiences for mobile subscriber activities such as activating a SIM card, adding a phone line, purchasing prepaid cards, requesting a service change</p>","<p>Generate recommendations for items that are similar to an item you specify</p>","<p>Extract layout elements such as paragraphs, titles, lists, and more from documents</p>","<p>Offers highly accurate and easy-to-use enterprise search service that’s powered by machine learning</p>"]},"correct_response":["b"],"section":"Applications of Foundation Models","question_plain":"Which of the following use cases is addressed by Amazon Personalize?","related_lectures":[]},{"_class":"assessment","id":96322051,"assessment_type":"multiple-choice","prompt":{"question":"<p>Which type of Machine Learning algorithm is used by the models that are trained, evaluated, and tuned on AWS DeepRacer?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Reinforcement Learning</strong></p>\n\n<p>AWS DeepRacer is the fastest way to get rolling with reinforcement learning (RL), literally, with a fully autonomous 1/18th scale race car driven by reinforcement learning, a 3D racing simulator, and a global racing league. Developers can train, evaluate, and tune RL models in the online simulator, deploy their models onto AWS DeepRacer for a real-world autonomous experience, and compete in the AWS DeepRacer League for a chance to win the AWS DeepRacer Championship Cup.</p>\n\n<p>AWS DeepRacer gives developers a simple way to learn RL, experiment with new RL algorithms and simulation-to-real domain transfer methods, and experience RL in the real world.</p>\n\n<p>What is reinforcement learning?:\n<img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt3-q81-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/what-is/reinforcement-learning/\">https://aws.amazon.com/what-is/reinforcement-learning/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Deep Learning</strong> - Deep learning is a type of machine learning technique that is modeled on the human brain. Deep learning algorithms analyze data with a logic structure similar to that used by humans. They use artificial neural networks to process information in layers.</p>\n\n<p><strong>Semi-supervised Learning</strong> - As the name suggests, this method combines supervised and unsupervised learning. The technique relies on using a small amount of labeled data and a large amount of unlabeled data to train systems. First, the labeled data is used to partially train the machine learning algorithm. After that, the partially trained algorithm labels the unlabeled data. This process is called pseudo-labeling. The model is then re-trained on the resulting data mix without being explicitly programmed.</p>\n\n<p><strong>Unsupervised Learning</strong> - Unsupervised learning algorithms train on unlabeled data. They scan through new data, trying to establish meaningful connections between the inputs and predetermined outputs. They can spot patterns and categorize data. For example, unsupervised algorithms could group news articles from different news sites into common categories like sports, crime, etc.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/deepracer/faqs/\">https://aws.amazon.com/deepracer/faqs/</a></p>\n\n<p><a href=\"https://aws.amazon.com/what-is/reinforcement-learning/\">https://aws.amazon.com/what-is/reinforcement-learning/</a></p>\n\n<p><a href=\"https://aws.amazon.com/what-is/machine-learning/\">https://aws.amazon.com/what-is/machine-learning/</a></p>\n","answers":["<p>Reinforcement Learning</p>","<p>Deep Learning</p>","<p>Semi-supervised Learning</p>","<p>Unsupervised Learning</p>"]},"correct_response":["a"],"section":"Applications of Foundation Models","question_plain":"Which type of Machine Learning algorithm is used by the models that are trained, evaluated, and tuned on AWS DeepRacer?","related_lectures":[]},{"_class":"assessment","id":96322053,"assessment_type":"multiple-choice","prompt":{"question":"<p>A healthcare company wants to extract relevant health information from unstructured clinical data such as physician's notes, discharge summaries, and test results from multiple hospitals.</p>\n\n<p>Which ML-powered AWS service is the right fit to extract this data?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Amazon Comprehend Medical</strong></p>\n\n<p>Amazon Comprehend Medical detects and returns useful information in unstructured clinical text such as physician's notes, discharge summaries, test results, and case notes. Amazon Comprehend Medical uses natural language processing (NLP) models to detect entities, which are textual references to medical information such as medical conditions, medications, or Protected Health Information(PHI).</p>\n\n<p>You can use the extracted medical information and their relationships to build applications for use cases, like clinical decision support, revenue cycle management (medical coding), and clinical trial management. Because Comprehend Medical is HIPAA-eligible and can quickly identify protected health information (PHI), such as name, age, and medical record number, you can also use it to create applications that securely process, maintain, and transmit PHI.</p>\n\n<p>Amazon Comprehend Medical also enables users to link these detected entities to standardized medical knowledge bases such as RxNorm and ICD-10-CM through ontology linking operations.</p>\n\n<p>How Amazon Comprehend Medical works:\n<img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt3-q82-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/comprehend/medical/\">https://aws.amazon.com/comprehend/medical/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Amazon Comprehend</strong> - Amazon Comprehend is a natural language processing (NLP) service that uses machine learning to find meaning and insights in text. Natural Language Processing (NLP) is a way for computers to analyze, understand, and derive meaning from textual information in a smart and useful way. By utilizing NLP, you can extract important phrases, sentiments, syntax, key entities such as brand, date, location, person, etc., and the language of the text. While Comprehend is a perfect fit for finding insights from data, Amazon Comprehend Medical is trained for medical data and connected to standardized medical knowledge bases.</p>\n\n<p><strong>Amazon Rekognition</strong> - Amazon Rekognition is a cloud-based image and video analysis service that makes it easy to add advanced computer vision capabilities to your applications. You can add features that detect objects, text, and unsafe content, analyze images/videos, and compare faces to your application using Rekognition's APIs. Rekognition cannot unearth patterns and link them to an outcome like Amazon Comprehend can.</p>\n\n<p><strong>Amazon SageMaker</strong> - Amazon SageMaker is a fully managed machine learning (ML) service. With SageMaker, data scientists and developers can quickly and confidently build, train, and deploy ML models into a production-ready hosted environment. It provides a UI experience for running ML workflows that makes SageMaker ML tools available across multiple integrated development environments (IDEs).</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://aws.amazon.com/comprehend/medical/\">https://aws.amazon.com/comprehend/medical/</a></p>\n","answers":["<p>Amazon Comprehend</p>","<p>Amazon Rekognition</p>","<p>Amazon SageMaker</p>","<p>Amazon Comprehend Medical</p>"]},"correct_response":["d"],"section":"Applications of Foundation Models","question_plain":"A healthcare company wants to extract relevant health information from unstructured clinical data such as physician's notes, discharge summaries, and test results from multiple hospitals.\n\nWhich ML-powered AWS service is the right fit to extract this data?","related_lectures":[]},{"_class":"assessment","id":96322055,"assessment_type":"multiple-choice","prompt":{"question":"<p>A company needs to extract handwritten words and letters from scanned documents. Which ML-powered AWS service is the right fit for this requirement?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Amazon Textract</strong></p>\n\n<p>Amazon Textract is a machine learning (ML) service that automatically extracts text, handwriting, layout elements, and data from scanned documents. It goes beyond simple optical character recognition (OCR) to identify, understand, and extract data from forms and tables. All extracted data is returned with bounding box coordinates—polygon frames that encompass each piece of identified data, such as a word, a line, a table, or individual cells within a table.</p>\n\n<p>Amazon Textract currently supports PNG, JPEG, TIFF, and PDF formats. For synchronous APIs, you can submit images either as an S3 object or as a byte array. For asynchronous APIs, you can submit S3 objects.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Amazon Kendra</strong> - Amazon Kendra is a highly accurate and easy-to-use enterprise search service that’s powered by machine learning (ML). It allows developers to add search capabilities to their applications so their end users can discover information stored within the vast amount of content spread across their company. Kendra doesn't search through handwritten text.</p>\n\n<p><strong>Amazon Rekognition</strong> - Amazon Rekognition is a cloud-based image and video analysis service that makes it easy to add advanced computer vision capabilities to your applications. The service is powered by proven deep learning technology and it requires no machine learning expertise to use. Amazon Rekognition includes a simple, easy-to-use API that can quickly analyze any image or video file that’s stored in Amazon S3. Rekognition does not support PDF file formats.</p>\n\n<p><strong>Amazon Transcribe</strong> - Amazon Transcribe is an automatic speech recognition service that uses machine learning models to convert audio to text. You can use Amazon Transcribe as a standalone transcription service or add speech-to-text capabilities to any application.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://aws.amazon.com/textract/faqs/\">https://aws.amazon.com/textract/faqs/</a></p>\n","answers":["<p>Amazon Kendra</p>","<p>Amazon Rekognition</p>","<p>Amazon Textract</p>","<p>Amazon Transcribe</p>"]},"correct_response":["c"],"section":"Applications of Foundation Models","question_plain":"A company needs to extract handwritten words and letters from scanned documents. Which ML-powered AWS service is the right fit for this requirement?","related_lectures":[]},{"_class":"assessment","id":96322057,"assessment_type":"multiple-choice","prompt":{"question":"<p>A company needs to support human reviews and audits for its ML model predictions. The solution should be easy to implement and have the facility to add multiple reviewers.</p>\n\n<p>Which AWS service do you recommend for this use case?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Amazon Augmented AI (A2I)</strong></p>\n\n<p>Amazon Augmented AI (Amazon A2I) is a service that makes it easy to build the workflows required for human review of ML predictions. Amazon A2I brings human review to all developers, removing the undifferentiated heavy lifting associated with building human review systems or managing large numbers of human reviewers.</p>\n\n<p>Many machine learning applications require humans to review low-confidence predictions to ensure the results are correct. However building human review systems can be time-consuming and expensive because it involves implementing complex processes or “workflows”, writing custom software to manage review tasks and results, and in many cases, managing large groups of reviewers.</p>\n\n<p>Amazon A2I makes it easy to build and manage human reviews for machine learning applications. Amazon A2I provides built-in human review workflows for common machine learning use cases. You can also create your workflows for ML models built on Amazon SageMaker or any other tools. Using Amazon A2I, you can allow human reviewers to step in when a model is unable to make a high-confidence prediction or to audit its predictions on an ongoing basis.</p>\n\n<p>How Amazon A2I works:\n<img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt3-q84-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/augmented-ai/\">https://aws.amazon.com/augmented-ai/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Amazon Forecast</strong> - Amazon Forecast is a fully managed service that uses statistical and machine learning algorithms to deliver highly accurate time-series forecasts. Based on the same technology used for time-series forecasting at Amazon.com, Forecast provides state-of-the-art algorithms to predict future time-series data based on historical data and requires no machine learning experience.</p>\n\n<p><strong>AWS DeepRacer</strong> - AWS DeepRacer is an autonomous 1/18th scale race car designed to test RL models by racing on a physical track. Using cameras to view the track and a reinforcement model to control throttle and steering, the car shows how a model trained in a simulated environment can be transferred to the real world.</p>\n\n<p><strong>Amazon SageMaker Ground Truth</strong> - Amazon SageMaker Ground Truth offers the most comprehensive set of human-in-the-loop capabilities, allowing you to harness the power of human feedback across the ML lifecycle to improve the accuracy and relevancy of models. You can complete a variety of human-in-the-loop tasks with SageMaker Ground Truth, from data generation and annotation to model review, customization, and evaluation, either through a self-service or an AWS-managed offering.</p>\n\n<p>Amazon SageMaker Ground Truth is a fully managed data labeling service that makes it easy to build highly accurate training datasets for machine learning. Amazon Augmented AI (Amazon A2I) makes it easy to build the workflows required for human review of ML predictions.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/sagemaker/latest/dg/a2i-use-augmented-ai-a2i-human-review-loops.html\">https://docs.aws.amazon.com/sagemaker/latest/dg/a2i-use-augmented-ai-a2i-human-review-loops.html</a></p>\n\n<p><a href=\"https://aws.amazon.com/about-aws/whats-new/2020/07/amazon-sagemaker-ground-truth-amazon-augmented-ai-support-openid-connect-authentication-private-workers/\">https://aws.amazon.com/about-aws/whats-new/2020/07/amazon-sagemaker-ground-truth-amazon-augmented-ai-support-openid-connect-authentication-private-workers/</a></p>\n","answers":["<p>Amazon SageMaker Ground Truth</p>","<p>Amazon Forecast</p>","<p>AWS DeepRacer</p>","<p>Amazon Augmented AI (A2I)</p>"]},"correct_response":["d"],"section":"Applications of Foundation Models","question_plain":"A company needs to support human reviews and audits for its ML model predictions. The solution should be easy to implement
