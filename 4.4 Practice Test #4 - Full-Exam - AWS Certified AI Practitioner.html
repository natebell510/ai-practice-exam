 and have the facility to add multiple reviewers.\n\nWhich AWS service do you recommend for this use case?","related_lectures":[]},{"_class":"assessment","id":96322059,"assessment_type":"multiple-choice","prompt":{"question":"<p>A media company is developing a machine learning model to categorize its vast library of content. The data science team is trying to decide between using multi-class or multi-label classification based on the complexity of the content categories. Understanding the differences between multi-class and multi-label classification will help the team choose the most appropriate approach for organizing their content effectively.</p>\n\n<p>What do you recommend to the company?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Multi-class classification assigns each instance to one of several possible classes, while multi-label classification assigns each instance to one or more classes</strong></p>\n\n<p>With multi-label classification, you can train models and classify your documents with more than one label. For example, you can use multi-label classification to categorize customer contact transcripts with one or more labels to identify departments within your company like Payments, Renewals, or Tech Support. These labels can then be mapped to relevant content in your support library or directed towards the appropriate contacts within your company. ML models for multiclass classification problems allow you to generate predictions for multiple classes (predict one of more than two outcomes).</p>\n\n<p>Therefore, the key difference is that multi-class classification assigns each instance to one of several possible classes (e.g., an image classified as either a cat, dog, or bird), whereas multi-label classification can assign each instance to multiple classes simultaneously (e.g., a document classified as both \"science\" and \"technology\").</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Multi-class classification allows each instance to belong to multiple classes simultaneously, whereas multi-label classification restricts each instance to one class only</strong> - Multi-class classification restricts each instance to one class, while multi-label classification allows each instance to belong to multiple classes. So, this option is incorrect.</p>\n\n<p><strong>Multi-class classification is used exclusively for image data, whereas multi-label classification is used exclusively for text data</strong> - Both multi-class and multi-label classification can be applied to various data types, including images and text.</p>\n\n<p><strong>Multi-class classification does not require labeled data, whereas multi-label classification requires labeled data for training</strong> - Both types of classification require labeled data for training the models effectively.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/blogs/machine-learning/amazon-comprehend-now-supports-multi-label-custom-classification/\">https://aws.amazon.com/blogs/machine-learning/amazon-comprehend-now-supports-multi-label-custom-classification/</a></p>\n\n<p><a href=\"https://docs.aws.amazon.com/machine-learning/latest/dg/types-of-ml-models.html\">https://docs.aws.amazon.com/machine-learning/latest/dg/types-of-ml-models.html</a></p>\n","answers":["<p>Multi-class classification allows each instance to belong to multiple classes simultaneously, whereas multi-label classification restricts each instance to one class only</p>","<p>Multi-class classification assigns each instance to one of several possible classes, while multi-label classification assigns each instance to one or more classes</p>","<p>Multi-class classification is used exclusively for image data, whereas multi-label classification is used exclusively for text data</p>","<p>Multi-class classification does not require labeled data, whereas multi-label classification requires labeled data for training</p>"]},"correct_response":["b"],"section":"Fundamentals of AI and ML","question_plain":"A media company is developing a machine learning model to categorize its vast library of content. The data science team is trying to decide between using multi-class or multi-label classification based on the complexity of the content categories. Understanding the differences between multi-class and multi-label classification will help the team choose the most appropriate approach for organizing their content effectively.\n\nWhat do you recommend to the company?","related_lectures":[]},{"_class":"assessment","id":96322061,"assessment_type":"multiple-choice","prompt":{"question":"<p>A call center has introduced a chatbot to help employees respond to customer inquiries more efficiently during calls. The goal is to improve overall efficiency and reduce time spent on calls.</p>\n\n<p>Which of the following metrics should be monitored to evaluate the success of this initiative?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Average Call Duration</strong></p>\n\n<p>The purpose of introducing a chatbot is to assist employees in handling customer inquiries more efficiently. By monitoring Average Call Duration, the company can track whether the chatbot is helping reduce the amount of time agents spend on each call. A decrease in average call duration would indicate that the chatbot is enabling quicker resolution of customer issues, thus improving overall efficiency.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt4-q61-i1.jpg\">\nvia - <a href=\"https://docs.aws.amazon.com/connect/latest/adminguide/what-is-amazon-connect.html\">https://docs.aws.amazon.com/connect/latest/adminguide/what-is-amazon-connect.html</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Average Chat Sessions per Day</strong> - While this metric tracks how often the chatbot is being utilized, it does not directly measure how much the chatbot is improving efficiency during phone calls. More chat sessions could indicate higher usage of the chatbot, but this does not necessarily mean that call duration is being reduced or that agents are working more efficiently.</p>\n\n<p><strong>Chat API Calls per Day</strong> - Chat API Calls per Day measures the technical usage of the chatbot’s API, such as the number of requests being made to the chatbot system. This is a technical performance metric rather than an efficiency metric. While it’s important to ensure the chatbot is functional, this metric does not provide direct insight into how effectively the chatbot is improving agent efficiency during calls.</p>\n\n<p><strong>First-Call Resolution Rate</strong> - This is a partially relevant option, but incorrect for this specific question. First-Call Resolution Rate measures the percentage of customer issues that are resolved in the first interaction, without the need for follow-up calls. Although this is an important metric for call center performance, the focus of this question is on efficiency improvements, and Average Call Duration is a more direct measure of how well the chatbot helps reduce time spent on calls.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/connect/latest/adminguide/what-is-amazon-connect.html\">https://docs.aws.amazon.com/connect/latest/adminguide/what-is-amazon-connect.html</a></p>\n","answers":["<p>Average Call Duration</p>","<p>Average Chat Sessions per Day</p>","<p>Chat API Calls per Day</p>","<p>First-Call Resolution Rate</p>"]},"correct_response":["a"],"section":"Fundamentals of Generative AI","question_plain":"A call center has introduced a chatbot to help employees respond to customer inquiries more efficiently during calls. The goal is to improve overall efficiency and reduce time spent on calls.\n\nWhich of the following metrics should be monitored to evaluate the success of this initiative?","related_lectures":[]},{"_class":"assessment","id":96322063,"assessment_type":"multiple-choice","prompt":{"question":"<p>A customer support system frequently encounters database errors that result in incomplete sentences in the logs. The company wants to implement a machine learning model to automatically suggest missing words in these sentences to help resolve issues faster.</p>\n\n<p>Which type of model should be used to suggest the missing words?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Bidirectional Encoder Representations from Transformers (BERT) based Model</strong></p>\n\n<p>A BERT-based model (Bidirectional Encoder Representations from Transformers) is specifically designed for understanding the context of words in a sentence. BERT uses deep learning techniques to predict missing words by considering the words before and after the gap. This makes it an ideal choice for suggesting missing words in text due to database errors, as it can understand the context and provide accurate word suggestions.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Rule-based NLP Model</strong> - A rule-based NLP model operates on predefined linguistic rules and patterns. While rule-based models can handle some basic sentence structure issues, they are not effective in predicting missing words based on context, especially in complex or diverse sentences. These models are not adaptable enough to handle the variability of human language as effectively as modern deep learning models like BERT, which can understand and predict words based on surrounding text.</p>\n\n<p><strong>Prescriptive AI Model</strong> - Prescriptive AI models provide recommendations on what actions to take in a given situation, often using optimization or decision-making algorithms. While prescriptive AI can be useful for decision-making processes, it is not suitable for filling in missing words in text data, as it does not specialize in natural language processing or understanding.</p>\n\n<p><strong>Clustering Model</strong> - A clustering model groups similar data points into clusters based on certain features. In the context of text, clustering could group similar documents or sentences, but it does not have the ability to fill in missing words in a sentence. Clustering models are not designed for handling incomplete text or predicting missing parts of a sentence.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://aws.amazon.com/blogs/machine-learning/reduce-inference-time-for-bert-models-using-neural-architecture-search-and-sagemaker-automated-model-tuning/\">https://aws.amazon.com/blogs/machine-learning/reduce-inference-time-for-bert-models-using-neural-architecture-search-and-sagemaker-automated-model-tuning/</a></p>\n","answers":["<p>Rule-based NLP Model</p>","<p>Bidirectional Encoder Representations from Transformers (BERT) based Model</p>","<p>Prescriptive AI Model</p>","<p>Clustering Model</p>"]},"correct_response":["b"],"section":"Fundamentals of Generative AI","question_plain":"A customer support system frequently encounters database errors that result in incomplete sentences in the logs. The company wants to implement a machine learning model to automatically suggest missing words in these sentences to help resolve issues faster.\n\nWhich type of model should be used to suggest the missing words?","related_lectures":[]},{"_class":"assessment","id":96322065,"assessment_type":"multiple-choice","prompt":{"question":"<p>A large e-commerce company uses a language model (LLM) to assist its customer service agents by generating responses to customer queries. However, the company is concerned about prompt engineering attacks, where malicious users craft inputs to manipulate the LLM into producing incorrect or harmful responses.</p>\n\n<p>What is the best approach to mitigate this issue?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Create a prompt template that teaches the LLM to detect attack patterns</strong></p>\n\n<p>Creating a prompt template that specifically guides the LLM to detect and respond appropriately to potential attack patterns is an effective way to mitigate prompt engineering attacks. This template can include predefined instructions that condition the LLM to recognize malicious patterns and avoid generating unintended or harmful responses. By embedding defense mechanisms within the prompts themselves, the system becomes more robust and resilient to such attacks. Additionally, continuous refinement of these templates, based on known attack techniques, can further strengthen the defense.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt4-q63-i1.jpg\">\nvia - <a href=\"https://docs.aws.amazon.com/prescriptive-guidance/latest/llm-prompt-engineering-best-practices/best-practices.html\">https://docs.aws.amazon.com/prescriptive-guidance/latest/llm-prompt-engineering-best-practices/best-practices.html</a></p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt4-q63-i2.jpg\">\nvia - <a href=\"https://docs.aws.amazon.com/prescriptive-guidance/latest/llm-prompt-engineering-best-practices/common-attacks.html\">https://docs.aws.amazon.com/prescriptive-guidance/latest/llm-prompt-engineering-best-practices/common-attacks.html</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Restrict LLM output to a fixed set of predefined responses</strong> - While limiting the LLM to a fixed set of responses could theoretically reduce harmful outputs, it would significantly undermine the flexibility and usefulness of the model. The strength of an LLM lies in its ability to generate dynamic, context-aware responses. Restricting the model in this way defeats the purpose of using an advanced LLM and would limit the user experience, particularly in complex customer service scenarios.</p>\n\n<p><strong>Monitor the length of the prompts to prevent overly long inputs</strong> - While excessively long prompts can sometimes be problematic, simply limiting the length of the input does not prevent prompt engineering attacks. Attackers can craft concise, malicious prompts that can still trick the LLM into generating harmful outputs. Monitoring prompt length is a good practice for performance optimization, but it is not an effective standalone defense against prompt engineering attacks.</p>\n\n<p><strong>Disable user-generated inputs and rely solely on internal data for prompts</strong> - Disabling user-generated inputs would remove a significant portion of the functionality of the LLM, especially in customer-facing applications. The power of using LLMs in customer service lies in their ability to handle and respond to a wide variety of user queries. Relying solely on internal data would severely restrict the LLM's utility, and it does not address the issue of detecting and preventing maliciously crafted prompts.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/prescriptive-guidance/latest/llm-prompt-engineering-best-practices/best-practices.html\">https://docs.aws.amazon.com/prescriptive-guidance/latest/llm-prompt-engineering-best-practices/best-practices.html</a></p>\n\n<p><a href=\"https://docs.aws.amazon.com/prescriptive-guidance/latest/llm-prompt-engineering-best-practices/common-attacks.html\">https://docs.aws.amazon.com/prescriptive-guidance/latest/llm-prompt-engineering-best-practices/common-attacks.html</a></p>\n\n<p><a href=\"https://aws.amazon.com/blogs/machine-learning/secure-rag-applications-using-prompt-engineering-on-amazon-bedrock/\">https://aws.amazon.com/blogs/machine-learning/secure-rag-applications-using-prompt-engineering-on-amazon-bedrock/</a></p>\n","answers":["<p>Restrict LLM output to a fixed set of predefined responses</p>","<p>Monitor the length of the prompts to prevent overly long inputs</p>","<p>Create a prompt template that teaches the LLM to detect attack patterns</p>","<p>Disable user-generated inputs and rely solely on internal data for prompts</p>"]},"correct_response":["c"],"section":"Fundamentals of Generative AI","question_plain":"A large e-commerce company uses a language model (LLM) to assist its customer service agents by generating responses to customer queries. However, the company is concerned about prompt engineering attacks, where malicious users craft inputs to manipulate the LLM into producing incorrect or harmful responses.\n\nWhat is the best approach to mitigate this issue?","related_lectures":[]},{"_class":"assessment","id":96322067,"assessment_type":"multiple-choice","prompt":{"question":"<p>A company is building an image recognition model to automate its quality assurance process. High accuracy in image annotation is critical to ensure the model can correctly identify defective products. To minimize the risk of incorrect annotations, the company needs a reliable labeling solution.</p>\n\n<p>What is the best approach to achieve high accuracy and reduce the risk of errors in image annotations?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Use GroundTruth Plus to label the data</strong></p>\n\n<p>Amazon SageMaker GroundTruth Plus provides a fully managed data labeling service that helps deliver high-quality annotations. It uses a combination of human labelers and machine learning-assisted labeling to ensure accuracy and consistency in the labels. GroundTruth Plus also offers the ability to monitor labeling workflows and conduct quality assurance checks, significantly reducing the risk of incorrect annotations. It is an ideal solution for businesses looking to create accurate training datasets at scale while minimizing manual errors.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt4-q64-i1.jpg\">\nvia - <a href=\"https://docs.aws.amazon.com/sagemaker/latest/dg/gtp.html\">https://docs.aws.amazon.com/sagemaker/latest/dg/gtp.html</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Automatically generate labels using an existing pre-trained model</strong> - While pre-trained models can be useful in generating labels automatically, they are often not as accurate as human labeling, especially when dealing with domain-specific images or fine-grained details that are critical for the project. Moreover, if the pre-trained model was trained on a different dataset, it may introduce biases or errors, leading to inaccurate annotations.</p>\n\n<p><strong>Allow a small team of internal employees to manually label the images</strong> - Relying on a small group of internal employees for manual labeling can introduce a high risk of inconsistency and errors, especially when large volumes of images need to be processed. Additionally, manual labeling by a small team can be time-consuming, and without specialized expertise in labeling, accuracy may be compromised. GroundTruth Plus offers a more scalable and reliable solution.</p>\n\n<p><strong>Use a simple rule-based algorithm to assign labels based on image characteristics</strong> - Rule-based algorithms work well for simple, structured data but are generally not suited for complex image annotation tasks. Images can contain varied and nuanced features that require human understanding or sophisticated machine learning techniques to interpret correctly. Using a rule-based system would likely result in inaccurate labels and fail to capture important details in the images.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/sagemaker/latest/dg/gtp.html\">https://docs.aws.amazon.com/sagemaker/latest/dg/gtp.html</a></p>\n","answers":["<p>Automatically generate labels using an existing pre-trained model</p>","<p>Allow a small team of internal employees to manually label the images</p>","<p>Use a simple rule-based algorithm to assign labels based on image characteristics</p>","<p>Use GroundTruth Plus to label the data</p>"]},"correct_response":["d"],"section":"Fundamentals of AI and ML","question_plain":"A company is building an image recognition model to automate its quality assurance process. High accuracy in image annotation is critical to ensure the model can correctly identify defective products. To minimize the risk of incorrect annotations, the company needs a reliable labeling solution.\n\nWhat is the best approach to achieve high accuracy and reduce the risk of errors in image annotations?","related_lectures":[]},{"_class":"assessment","id":96322069,"assessment_type":"multiple-choice","prompt":{"question":"<p>A tech startup is developing a new foundation model (FM) for image classification, aiming to deploy it for use in various applications, from identifying product defects to recognizing objects in photos. The team needs to assess the accuracy of the model to ensure it meets performance requirements before deployment.</p>\n\n<p>What is the best way to assess the accuracy of the foundation model for image classification?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Use a benchmark dataset for evaluation</strong></p>\n\n<p>The most reliable way to assess the accuracy of a foundation model for image classification is by evaluating it on a benchmark dataset. Benchmark datasets consist of standardized sets of labeled images that are widely used in the research community for model comparison and performance evaluation. These datasets, such as ImageNet or CIFAR-10, provide a controlled environment to test the model's accuracy and allow developers to compare their model's performance against other existing models. Using a benchmark dataset ensures the evaluation process is consistent, objective, and provides a clear indication of how the model will perform in real-world scenarios.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Evaluate the model using only a small subset of the training data</strong> - Evaluating the model on a small subset of the training data would likely lead to overfitting, as the model has already been trained on this data. While the model might show high accuracy on the training set, this does not indicate how well it will generalize to unseen data. Proper assessment should be done using a separate validation set or a benchmark dataset that the model has not been trained on.</p>\n\n<p><strong>Deploy the model in a live production environment and gather user feedback</strong> - While gathering user feedback in a production environment can provide insights into how well the model works in real-world applications, it is not an effective way to assess accuracy. By the time the model is deployed, issues such as low accuracy could have significant consequences. Proper evaluation should be completed before deployment using a benchmark dataset or test data to ensure the model meets performance expectations.</p>\n\n<p><strong>Manually test the model by running random images through it</strong> - Manually running random images through the model might give some anecdotal evidence about its performance, but it is not a rigorous or systematic way to assess accuracy. This method would lack consistency and is prone to bias. To ensure accurate and reliable results, the model needs to be tested on a large, diverse, and standardized dataset, such as a benchmark dataset, to get meaningful performance metrics.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://github.com/aws-samples/foundation-model-benchmarking-tool\">https://github.com/aws-samples/foundation-model-benchmarking-tool</a></p>\n\n<p><a href=\"https://docs.aws.amazon.com/sagemaker/latest/dg/image-classification-data-format-and-metric.html\">https://docs.aws.amazon.com/sagemaker/latest/dg/image-classification-data-format-and-metric.html</a></p>\n","answers":["<p>Use a benchmark dataset for evaluation</p>","<p>Evaluate the model using only a small subset of the training data</p>","<p>Deploy the model in a live production environment and gather user feedback</p>","<p>Manually test the model by running random images through it</p>"]},"correct_response":["a"],"section":"Fundamentals of Generative AI","question_plain":"A tech startup is developing a new foundation model (FM) for image classification, aiming to deploy it for use in various applications, from identifying product defects to recognizing objects in photos. The team needs to assess the accuracy of the model to ensure it meets performance requirements before deployment.\n\nWhat is the best way to assess the accuracy of the foundation model for image classification?","related_lectures":[]}]};

      function main() {

        const passPercentElement = document.getElementById('pass-percent');

        totalNumberOfQuestions = questionData.length;
        // shuffle the questionData to randomize the order of the questions
        for (let i = questionData.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [questionData[i], questionData[j]] = [questionData[j], questionData[i]];
        }

        let formattedQuestions = questionData.map(formatSingleQuestionData);
        updateScore();
        // display the formattedQuestions
        formattedQuestions.forEach((question, idx) => {
          renderSingleQuestion(question, idx + 1);
        });
      }

      /**
       * Formats the question data from the given QuizData object.
       *
       * @param {Object} singleQuizData - The singleQuizData object containing prompt and correct_response.
       * @return {Object} The formatted question object with the following properties:
       *   - id: The ID of the question.
       *   - question: The text of the question.
       *   - answers: The array of answer options.
       *   - correctAnswer: The text of the correct answer.
       *   - explanation: The explanation of the correct answer.
       */
      function formatSingleQuestionData(singleQuizData = null) {
        const { prompt, correct_response, id } = singleQuizData;
        const questionText = prompt.question;
        const answers = prompt.answers;
        const correctAnswer = correct_response[0];
        const correctAnswerText = answers[correctAnswer.toLowerCase().charCodeAt(0) - 97];
        const questionObj = {
          id: id,
          question: questionText,
          answers: answers,
          correctAnswer,
          explanation: prompt?.explanation || '',
        };
        return questionObj;
      }

      /**
       * Renders a single question with its options and submit button.
       *
       * @param {Object} singleQuestionData - The data of the question to render.
       * @param {number} rootIndex - The index of the question in the quiz.
       * @return {void} return nothing.
       */

      const renderSingleQuestion = (singleQuestionData = {}, rootIndex = 1) => {
        const { id, explanation, answers, correctAnswer, question } = singleQuestionData;
        // shuffle the answers to randomize the order of the answers
        // for (let i = answers.length - 1; i > 0; i--) {
        //   const j = Math.floor(Math.random() * (i + 1));
        //   [answers[i], answers[j]] = [answers[j], answers[i]];
        // }
        const alphabet = 'abcdefghijklmnopqrstuvwxyz'.split('');
        const optionsHTML = answers
          .map((option, index) => {
            const optionId = `${id}_${index}`;

            return `
        <div class="question-lable">
          <input type="radio" id="${optionId}" name="${'answer'}" value="${alphabet[index]}" />
          <label for="${optionId}">${option}</label>
        </div>
      `;
          })

          .join('');

        const container = document.createElement('div');
        container.innerHTML = `
        <form data-correct-answer="${correctAnswer}" data-question-id="${id}" class="single-question-container" onsubmit="submitButtonListener(event)">
          <div style="display: flex;justify-content: space-between;">
            <p style="font-weight: 600">Question ${rootIndex}:</p>
            <button type="button" onclick="renderExplanation(event)" id="${`explanation-${id}`}" data-explanation="${'tt'}" data-explanation-id=${id} class="explanation-btn">View Explanation</button>
          </div>
          <p style="margin-bottom: 8px;line-height: 1.5">${question}</p>
          <div class="options-container">
            ${optionsHTML}
          </div>
          <div style="display: flex; gap: 8px;">
            <button type="submit" id="submit-button" class="button">Submit</button>
          </div>
        </form>
      `;
        quizContainerElement.appendChild(container);
      };

      /**
       * Updates the score on the page based on the number of correct and incorrect answers.
       *
       * @return {void} This function does not return a value.
       */
      function updateScore() {
        const currentParcentageElement = document.getElementById('current-score');
        const correctAnswerElement = document.getElementById('correct-answers');
        const wrongAnswerElement = document.getElementById('wrong-answers');
        correctAnswerElement.innerHTML = correct.size;
        wrongAnswerElement.innerHTML = incorrect.size;
        const score = Number((correct.size / totalNumberOfQuestions) * 100).toFixed(2);
        currentParcentageElement.innerHTML = score;
      }

      /**
       * Handles the event when the submit button is clicked.
       *
       * @param {Event} e - The event object.
       * @return {void} This function does not return anything.
       */
      const submitButtonListener = e => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const form = e.target;
        const selectedOption = e.target.querySelector('input[type="radio"]:checked');
        if (!selectedOption) {
          alert('Please select an answer!');
          return;
        }

        let isCorrect = false;
        const { answer: userAnswer } = Object.fromEntries(formData.entries());
        const correctAnswer = e.target.dataset.correctAnswer;
        const questionId = e.target.dataset.questionId;
        if (userAnswer == correctAnswer) {
          correct.add(questionId);
          incorrect.delete(questionId);
          isCorrect = true;
        } else {
          incorrect.add(e.target.dataset.questionId);
          correct.delete(questionId);
        }
        updateScore();

        const resultClass = isCorrect ? 'correct-answer' : 'incorrect-answer';

        form.querySelectorAll('.question-lable').forEach(label => {
          label.classList.remove('correct-answer', 'incorrect-answer');
        });
        selectedOption.closest('.question-lable').classList.add(resultClass);
      };

      function renderExplanation(ev) {
        const dataid = ev.target.dataset.explanationId;
        const quiz = quizData.questions.find(q => q.id === Number(dataid));
        modalTextElement.innerHTML =
          quiz && quiz.prompt.explanation ? quiz.prompt.explanation : 'no explanation found';
        // modalTextElement.innerHTML = ev.target.dataset?.explanation || 'no explanation found';
        dialog.showModal();
        dialog.addEventListener('click', event => {
          if (event.target === dialog) {
            dialog.close();
          }
        });
      }
    </script>
  </body>
</html>
