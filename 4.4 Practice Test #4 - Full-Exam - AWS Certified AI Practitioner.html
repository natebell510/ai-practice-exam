 to the lack of structure, whereas unlabeled data is easier to handle because it has clear annotations</strong> - Labeled data is easier to process for specific tasks because of the provided annotations, while unlabeled data requires algorithms to identify patterns without any predefined labels.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/what-is/data-labeling/\">https://aws.amazon.com/what-is/data-labeling/</a></p>\n\n<p><a href=\"https://aws.amazon.com/compare/the-difference-between-machine-learning-supervised-and-unsupervised/\">https://aws.amazon.com/compare/the-difference-between-machine-learning-supervised-and-unsupervised/</a></p>\n","answers":["<p>Labeled data consists of raw information with no tags or annotations, while unlabeled data includes tags that provide meaning to the data</p>","<p>Labeled data is annotated with output labels that provide specific information about each data point and is used for supervised learning, whereas, unlabeled data lacks such annotations and is used for unsupervised learning</p>","<p>Labeled data can only be used for unsupervised learning algorithms, whereas, unlabeled data is exclusively for supervised learning algorithms</p>","<p>Labeled data is inherently more complex to process due to the lack of structure, whereas unlabeled data is easier to handle because it has clear annotations</p>"]},"correct_response":["b"],"section":"Fundamentals of AI and ML","question_plain":"A retail company is developing a machine learning model to improve its customer segmentation and targeting strategies. The data science team is working with both labeled and unlabeled customer data to train their models but needs to clearly understand the distinction between these two types of data to decide how best to use them. Understanding this difference is critical for selecting the appropriate machine learning techniques, such as supervised or unsupervised learning, for different stages of the project.\n\nWhat is a key difference between labeled data and unlabeled data in the context of machine learning?","related_lectures":[]},{"_class":"assessment","id":96322087,"assessment_type":"multiple-choice","prompt":{"question":"<p>A healthcare company is using machine learning models in Amazon SageMaker to predict patient outcomes based on various health indicators. To comply with regulatory requirements and build trust with medical professionals, the company needs to understand and explain how different input features, such as age, blood pressure, and medical history, contribute to the model’s predictions. The company is exploring which Amazon SageMaker service can provide this level of transparency and interpretability for their machine learning models.</p>\n\n<p>Which Amazon SageMaker service will help the company understand how an input feature contributes to the predictions of a machine learning model?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Amazon SageMaker Clarify</strong></p>\n\n<p>SageMaker Clarify automatically evaluates foundation models for your generative AI use case with metrics such as accuracy, robustness, and toxicity to support your responsible AI initiative. SageMaker Clarify explains how input features contribute to your model predictions during model development and inference. Evaluate your FM during customization using automatic and human-based evaluations.</p>\n\n<p>SageMaker Clarify is integrated with SageMaker Experiments to provide a feature importance graph detailing the importance of each input for your model’s overall decision-making process after the model has been trained. These details can help determine if a particular model input has more influence than it should on overall model behavior. SageMaker Clarify also makes explanations for individual predictions available through an API.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Amazon SageMaker Ground Truth</strong> - Amazon SageMaker Ground Truth offers the most comprehensive set of human-in-the-loop capabilities, allowing you to harness the power of human feedback across the ML lifecycle to improve the accuracy and relevancy of models. You can complete a variety of human-in-the-loop tasks with SageMaker Ground Truth, from data generation and annotation to model review, customization, and evaluation, either through a self-service or an AWS-managed offering.</p>\n\n<p><strong>Amazon SageMaker Canvas</strong> - SageMaker Canvas offers a no-code interface that can be used to create highly accurate machine-learning models  - without any machine-learning experience or writing a single line of code. SageMaker Canvas provides access to ready-to-use models including foundation models from Amazon Bedrock or Amazon SageMaker JumpStart or you can build your own custom ML model using AutoML powered by SageMaker AutoPilot.</p>\n\n<p><strong>Amazon SageMaker JumpStart</strong> - Amazon SageMaker JumpStart is a machine learning (ML) hub that can help you accelerate your ML journey. With SageMaker JumpStart, you can evaluate, compare, and select Foundation Models (FMs) quickly based on pre-defined quality and responsibility metrics to perform tasks like article summarization and image generation. Pretrained models are fully customizable for your use case with your data, and you can easily deploy them into production with the user interface or SDK.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://aws.amazon.com/sagemaker/clarify/\">https://aws.amazon.com/sagemaker/clarify/</a></p>\n","answers":["<p>Amazon SageMaker Ground Truth</p>","<p>Amazon SageMaker Canvas</p>","<p>Amazon SageMaker Clarify</p>","<p>Amazon SageMaker JumpStart</p>"]},"correct_response":["c"],"section":"Guidelines for Responsible AI","question_plain":"A healthcare company is using machine learning models in Amazon SageMaker to predict patient outcomes based on various health indicators. To comply with regulatory requirements and build trust with medical professionals, the company needs to understand and explain how different input features, such as age, blood pressure, and medical history, contribute to the model’s predictions. The company is exploring which Amazon SageMaker service can provide this level of transparency and interpretability for their machine learning models.\n\nWhich Amazon SageMaker service will help the company understand how an input feature contributes to the predictions of a machine learning model?","related_lectures":[]},{"_class":"assessment","id":96322085,"assessment_type":"multiple-choice","prompt":{"question":"<p>A software development company is migrating its operations to the AWS Cloud and is evaluating its security responsibilities under different generative AI use cases as outlined in the Generative AI Security Scoping Matrix. The company wants to identify the scenario where it would have the highest level of security ownership, including managing data protection, overseeing the underlying infrastructure, and ensuring compliance with relevant regulations. Understanding these security implications is critical for the company to implement appropriate controls and safeguard its operations.</p>\n\n<p>Which of the following scenarios would require the company to assume the maximum level of security ownership?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Building and training a generative AI model from scratch</strong></p>\n\n<p>This option involves the company designing, developing, and training a generative AI model entirely from the ground up. It requires the company to take full responsibility for managing the entire machine learning pipeline, including data collection, preprocessing, model design, training, and deployment. Additionally, the company is responsible for securing all the underlying infrastructure, data storage, access controls, and ensuring compliance with relevant security and privacy regulations. This scenario entails the maximum level of security ownership because the company controls all aspects of the AI development lifecycle.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt1-q85-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/blogs/security/securing-generative-ai-an-introduction-to-the-generative-ai-security-scoping-matrix/\">https://aws.amazon.com/blogs/security/securing-generative-ai-an-introduction-to-the-generative-ai-security-scoping-matrix/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Refining an existing third-party generative AI foundation model by fine-tuning it with data specific to the company</strong> - In this scenario, the company leverages an existing third-party foundation model and fine-tunes it with its own proprietary data. While this reduces some of the security responsibilities related to the initial model development and training, the company still bears significant security responsibilities. These responsibilities include securing its proprietary data, managing the infrastructure where the fine-tuning occurs, and ensuring compliance with data protection regulations. However, since the foundation model is pre-built by a third party, the overall security ownership is less than when building a model from scratch.</p>\n\n<p><strong>Building its own application using an existing third-party generative AI foundation model</strong> - This option involves the company using a third-party generative AI foundation model to build a custom application. While the company retains some security responsibilities, such as securing the application and managing the infrastructure where it runs, it does not have to manage the security of the model itself or the foundational aspects of the AI service. Therefore, the security ownership is shared with the third-party provider, and the company's responsibilities are more limited compared to scenarios that involve training or fine-tuning models.</p>\n\n<p><strong>Consuming a public third-party generative AI service</strong> - In this scenario, the company consumes a fully managed, public third-party generative AI service where the third-party provider is responsible for most security aspects, including data protection, model security, and infrastructure management. The company's responsibilities are limited to securing its own data before sending it to the service and managing user access. This scenario entails the least amount of security ownership since the third-party provider handles the majority of the security controls.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://aws.amazon.com/blogs/security/securing-generative-ai-an-introduction-to-the-generative-ai-security-scoping-matrix/\">https://aws.amazon.com/blogs/security/securing-generative-ai-an-introduction-to-the-generative-ai-security-scoping-matrix/</a></p>\n","answers":["<p>Building and training a generative AI model from scratch</p>","<p>Refining an existing third-party generative AI foundation model by fine-tuning it with data specific to the company</p>","<p>Building its own application using an existing third-party generative AI foundation model</p>","<p>Consuming a public third-party generative AI service</p>"]},"correct_response":["a"],"section":"Security, Compliance, and Governance for AI Solutions","question_plain":"A software development company is migrating its operations to the AWS Cloud and is evaluating its security responsibilities under different generative AI use cases as outlined in the Generative AI Security Scoping Matrix. The company wants to identify the scenario where it would have the highest level of security ownership, including managing data protection, overseeing the underlying infrastructure, and ensuring compliance with relevant regulations. Understanding these security implications is critical for the company to implement appropriate controls and safeguard its operations.\n\nWhich of the following scenarios would require the company to assume the maximum level of security ownership?","related_lectures":[]},{"_class":"assessment","id":96322083,"assessment_type":"multiple-choice","prompt":{"question":"<p>A financial services company is developing machine learning models to improve fraud detection and credit risk assessment. However, given the complexity of these tasks, the team wants to incorporate human input at key stages of the machine learning lifecycle to ensure that the models are accurate and relevant. The company is looking for an AWS service that allows human input and feedback to be integrated into the model development process, improving the overall performance and trustworthiness of the models.</p>\n\n<p>What do you suggest?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Amazon SageMaker Ground Truth</strong></p>\n\n<p>Human-in-the-loop is the process of harnessing human input across the ML lifecycle to improve the accuracy and relevancy of models. Humans can perform a variety of tasks, from data generation and annotation, to model review and customization. Human intervention is especially important for generative AI applications, where humans are typically both the requester and consumer of the content. It is therefore critical that humans train foundation models (FMs) how to respond accurately, safely, and relevantly to users’ prompts. Human feedback can be applied to help you complete multiple tasks.</p>\n\n<p>Amazon SageMaker Ground Truth offers the most comprehensive set of human-in-the-loop capabilities. There are two ways to use Amazon SageMaker Ground Truth, a self-service offering and an AWS-managed offering. In the self-service offering, your data annotators, content creators, and prompt engineers (in-house, vendor-managed, or leveraging the public crowd) can use our low-code user interface to accelerate human-in-the-loop tasks, while having the flexibility to build and manage your custom workflows.</p>\n\n<p>In the AWS-managed offering (SageMaker Ground Truth Plus), AWS handles the heavy lifting, which includes selecting and managing the right workforce for your use case. SageMaker Ground Truth Plus designs and customizes an end-to-end workflow (including detailed workforce training and quality assurance steps) and provides a skilled AWS-managed team that is trained on the specific tasks and meets your data quality, security, and compliance requirements.</p>\n\n<p>AWS-Managed Amazon SageMaker Ground Truth:\n<img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt2-q66-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/sagemaker/groundtruth/\">https://aws.amazon.com/sagemaker/groundtruth/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Amazon SageMaker Role Manager</strong> - You use Amazon SageMaker Role Manager to build and manage persona-based IAM roles for common machine learning needs directly through the Amazon SageMaker console. Amazon SageMaker Role Manager provides 3 preconfigured role personas and predefined permissions for 12 common ML activities.</p>\n\n<p><strong>Amazon SageMaker Feature Store</strong> - Amazon SageMaker Feature Store is a fully managed, purpose-built repository to store, share, and manage features for machine learning (ML) models. Features are inputs to ML models used during training and inference. For example, in an application that recommends a music playlist, features could include song ratings, listening duration, and listener demographics.</p>\n\n<p><strong>Amazon SageMaker Clarify</strong> - SageMaker Clarify helps identify potential bias during data preparation without writing code. You specify input features, such as gender or age, and SageMaker Clarify runs an analysis job to detect potential bias in those features.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://aws.amazon.com/sagemaker/groundtruth/\">https://aws.amazon.com/sagemaker/groundtruth/</a></p>\n","answers":["<p>Amazon SageMaker Role Manager</p>","<p>Amazon SageMaker Feature Store</p>","<p>Amazon SageMaker Clarify</p>","<p>Amazon SageMaker Ground Truth</p>"]},"correct_response":["d"],"section":"Applications of Foundation Models","question_plain":"A financial services company is developing machine learning models to improve fraud detection and credit risk assessment. However, given the complexity of these tasks, the team wants to incorporate human input at key stages of the machine learning lifecycle to ensure that the models are accurate and relevant. The company is looking for an AWS service that allows human input and feedback to be integrated into the model development process, improving the overall performance and trustworthiness of the models.\n\nWhat do you suggest?","related_lectures":[]},{"_class":"assessment","id":96322081,"assessment_type":"multiple-choice","prompt":{"question":"<p>Which of the following represents the CORRECT statement regarding Amazon SageMaker Model Cards?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Describes how a model should be used in a production environment</strong></p>\n\n<p>Use Amazon SageMaker Model Cards to document critical details about your machine learning (ML) models in a single place for streamlined governance and reporting.</p>\n\n<p>Catalog details such as the intended use and risk rating of a model, training details and metrics, evaluation results and observations, and additional call-outs such as considerations, recommendations, and custom information.</p>\n\n<p>Model cards provide prescriptive guidance on what information to document and include fields for custom information. Specifying the intended uses of a model helps ensure that model developers and users have the information they need to train or deploy the model responsibly.</p>\n\n<p>The intended uses of a model go beyond technical details and describe how a model should be used in production, the scenarios in which is appropriate to use a model, and additional considerations such as the type of data to use with the model or any assumptions made during development.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Model cards cannot be created for models not trained on Amazon SageMaker</strong> - You can create model cards for models not trained in SageMaker, but no information is automatically populated in the card.</p>\n\n<p><strong>The purpose of a Model card is to describe the technical requirements to which an ML model should be deployed</strong> - As discussed above, a Model card provides more than just the technical details required to run/deploy the ML model.</p>\n\n<p><strong>Model Cards can be customized to meet the business needs</strong> - Amazon SageMaker Model Cards have a defined structure that cannot be modified. This structure gives guidance on what information should be captured in a model card.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/sagemaker/latest/dg/model-cards.html\">https://docs.aws.amazon.com/sagemaker/latest/dg/model-cards.html</a></p>\n\n<p><a href=\"https://docs.aws.amazon.com/sagemaker/latest/dg/model-cards-faqs.html\">https://docs.aws.amazon.com/sagemaker/latest/dg/model-cards-faqs.html</a></p>\n","answers":["<p>Model cards cannot be created for models not trained on Amazon SageMaker</p>","<p>The purpose of a Model card is to describe the technical requirements to which an ML model should be deployed</p>","<p>Describes how a model should be used in a production environment</p>","<p>Model Cards can be customized to meet the business needs</p>"]},"correct_response":["c"],"section":"Applications of Foundation Models","question_plain":"Which of the following represents the CORRECT statement regarding Amazon SageMaker Model Cards?","related_lectures":[]},{"_class":"assessment","id":96322079,"assessment_type":"multiple-choice","prompt":{"question":"<p>A technology company is considering using Large Language Models (LLMs) to enhance its AI-driven customer support system. The development team is particularly interested in understanding the nature of LLMs, as this knowledge will help the team make decisions on how to manage the variability of responses and how best to apply the models in customer-facing applications.</p>\n\n<p>Which of the following is correct regarding Large Language Models (LLMs)?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>The Large Language Models (LLMs) are non-deterministic</strong></p>\n\n<p>Large Language Models (LLMs) are non-deterministic, which implies that the generated text may be different for every user that uses the same prompt.</p>\n\n<p>You can use the inference parameter <code>Temperature</code> (having a value between 0 and 1), which regulates the creativity of LLMs’ responses. Use a lower temperature if you want more deterministic responses, and use a higher temperature if you want creative or different responses for the same prompt from LLMs on Amazon Bedrock.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>The Large Language Models (LLMs) are deterministic</strong> - As explained above, LLMs are non-deterministic, so this option is incorrect.</p>\n\n<p><strong>The Large Language Models (LLMs) are discriminative</strong> - Discriminative models are used for classification. They focus on distinguishing between different categories based on the features they observe. Generative models are used for creation. They learn the patterns and features of the data they have seen and can generate new, similar data. LLMs are generative models.</p>\n\n<p><strong>Foundation Models (FMs) are a class of Large Language Models (LLMs)</strong> - Large language models (LLMs) are one class of FMs. So, this option is incorrect.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/general-guidelines-for-bedrock-users.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/general-guidelines-for-bedrock-users.html</a></p>\n\n<p><a href=\"https://aws.amazon.com/what-is/generative-ai/\">https://aws.amazon.com/what-is/generative-ai/</a></p>\n\n<p><a href=\"https://aws.amazon.com/what-is/large-language-model/\">https://aws.amazon.com/what-is/large-language-model/</a></p>\n","answers":["<p>The Large Language Models (LLMs) are non-deterministic</p>","<p>The Large Language Models (LLMs) are deterministic</p>","<p>The Large Language Models (LLMs) are discriminative</p>","<p>Foundation Models (FMs) are a class of Large Language Models (LLMs)</p>"]},"correct_response":["a"],"section":"Fundamentals of Generative AI","question_plain":"A technology company is considering using Large Language Models (LLMs) to enhance its AI-driven customer support system. The development team is particularly interested in understanding the nature of LLMs, as this knowledge will help the team make decisions on how to manage the variability of responses and how best to apply the models in customer-facing applications.\n\nWhich of the following is correct regarding Large Language Models (LLMs)?","related_lectures":[]},{"_class":"assessment","id":96322077,"assessment_type":"multiple-choice","prompt":{"question":"<p>A research-focused AI company is developing a suite of machine learning models for tasks such as classification and content generation. The data science team needs to choose between discriminative and generative models depending on the specific use case. To make the right decision, they need to understand the fundamental differences between these two types of models, particularly in the context of generative AI, and how each model type fits into their project goals.</p>\n\n<p>What is the primary distinction between discriminative models and generative models in the context of generative AI?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Generative models focus on generating new data from learned patterns, whereas discriminative models classify data by distinguishing between different classes</strong></p>\n\n<p>Generative models learn the underlying patterns of data to create new, similar data, while discriminative models learn to distinguish between different classes of data. Generative models, such as GPT-3, can generate new content, whereas discriminative models are used for classification tasks. The former focuses on understanding and replicating the data distribution, while the latter focuses on decision boundaries to classify inputs.</p>\n\n<p>For example, discriminative models look at images - known data like pixel arrangement, line, color, and shape — and then map them to an outcome — the unknown factor. Mathematically, these models work by identifying equations that could numerically map unknown and known factors as x and y variables.</p>\n\n<p>Generative models take this one step further. Instead of predicting a label given some features, they try to predict features given a certain label. Mathematically, generative modeling calculates the probability of x and y occurring together. It learns the distribution of different data features and their relationships. For example, generative models analyze animal images to record variables like different ear shapes, eye shapes, tail features, and skin patterns. They learn features and their relations to understand what different animals look like in general. They can then recreate new animal images that were not in the training set.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Discriminative models are used to generate new data, while generative models are used only for classification</strong> - Discriminative models are used primarily for classification, not for generating new data.</p>\n\n<p><strong>Discriminative models are only used for text classification, while generative models are only used for image classification</strong> - Discriminative models can be used for both text and image classification, while generative models learn the underlying patterns of data to create new data.</p>\n\n<p><strong>Generative models are trained on labeled data, while discriminative models can be trained on both labeled and unlabeled data</strong> - The training data type (labeled vs. unlabeled) is not the primary distinction between generative and discriminative models.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://aws.amazon.com/what-is/generative-ai/\">https://aws.amazon.com/what-is/generative-ai/</a></p>\n","answers":["<p>Discriminative models are used to generate new data, while generative models are used only for classification</p>","<p>Discriminative models are only used for text classification, while generative models are only used for image classification</p>","<p>Generative models are trained on labeled data, while discriminative models can be trained on both labeled and unlabeled data</p>","<p>Generative models focus on generating new data from learned patterns, whereas discriminative models classify data by distinguishing between different classes</p>"]},"correct_response":["d"],"section":"Fundamentals of Generative AI","question_plain":"A research-focused AI company is developing a suite of machine learning models for tasks such as classification and content generation. The data science team needs to choose between discriminative and generative models depending on the specific use case. To make the right decision, they need to understand the fundamental differences between these two types of models, particularly in the context of generative AI, and how each model type fits into their project goals.\n\nWhat is the primary distinction between discriminative models and generative models in the context of generative AI?","related_lectures":[]},{"_class":"assessment","id":96322075,"assessment_type":"multiple-choice","prompt":{"question":"<p>A financial services company is developing machine learning models using Amazon SageMaker to automate loan approvals and fraud detection. To ensure transparency and compliance with industry regulations, the data science team needs a tool that documents the model’s intended uses, performance metrics, and any assumptions made during development. This documentation is crucial for maintaining accountability and ensuring that the models are used appropriately.</p>\n\n<p>Which Amazon SageMaker tool meets these requirements?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Amazon SageMaker Model Cards</strong></p>\n\n<p>Use Amazon SageMaker Model Cards to document critical details about your machine learning (ML) models in a single place for streamlined governance and reporting.</p>\n\n<p>Catalog details such as the intended use and risk rating of a model, training details and metrics, evaluation results and observations, and additional call-outs such as considerations, recommendations, and custom information.</p>\n\n<p>Specifying the intended uses of a model helps ensure that model developers and users have the information they need to train or deploy the model responsibly. The intended uses of a model go beyond technical details and describe how a model should be used in production, the scenarios in which is appropriate to use a model, and additional considerations such as the type of data to use with the model or any assumptions made during development.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Amazon SageMaker Clarify</strong> - SageMaker Clarify helps identify potential bias during data preparation without writing code. You specify input features, such as gender or age, and SageMaker Clarify runs an analysis job to detect potential bias in those features.</p>\n\n<p><strong>Amazon SageMaker Canvas</strong> - SageMaker Canvas offers a no-code interface that can be used to create highly accurate machine learning models —without any machine learning experience or writing a single line of code. SageMaker Canvas provides access to ready-to-use models including foundation models from Amazon Bedrock or Amazon SageMaker JumpStart or you can build your custom ML model using AutoML powered by SageMaker AutoPilot.</p>\n\n<p><strong>Amazon SageMaker Model Monitor</strong> - Amazon SageMaker Model Monitor monitors the quality of Amazon SageMaker machine learning models in production. With Model Monitor, you can set up: Continuous monitoring with a real-time endpoint, Continuous monitoring with a batch transform job that runs regularly, and On-schedule monitoring for asynchronous batch transform jobs.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/sagemaker/latest/dg/model-cards.html\">https://docs.aws.amazon.com/sagemaker/latest/dg/model-cards.html</a></p>\n","answers":["<p>Amazon SageMaker Clarify</p>","<p>Amazon SageMaker Model Cards</p>","<p>Amazon SageMaker Canvas</p>","<p>Amazon SageMaker Model Monitor</p>"]},"correct_response":["b"],"section":"Applications of Foundation Models","question_plain":"A financial services company is developing machine learning models using Amazon SageMaker to automate loan approvals and fraud detection. To ensure transparency and compliance with industry regulations, the data science team needs a tool that documents the model’s intended uses, performance metrics, and any assumptions made during development. This documentation is crucial for maintaining accountability and ensuring that the models are used appropriately.\n\nWhich Amazon SageMaker tool meets these requirements?","related_lectures":[]},{"_class":"assessment","id":96322121,"assessment_type":"multiple-choice","prompt":{"question":"<p>A healthcare analytics company is developing a machine learning model to provide patient risk assessments based on incoming medical data. The team needs to deploy the model in a way that supports continuous, low-latency predictions, where each request receives a response immediately, such as during patient check-ins. The team is evaluating deployment options within Amazon SageMaker and needs a solution that offers persistent endpoints to handle these individual prediction requests.</p>\n\n<p>What do you recommend?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Real-time hosting services</strong></p>\n\n<p>The real-time inference is ideal for inference workloads where you have real-time, interactive, low latency requirements. You can deploy your model to SageMaker hosting services and get an endpoint that can be used for inference. These endpoints are fully managed and support autoscaling.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Serverless Inference</strong> - Used for workloads that have idle periods between traffic spikes and can tolerate cold starts.</p>\n\n<p><strong>Asynchronous Inference</strong> - Used for requests with large payload sizes up to 1GB, long processing times, and near real-time latency requirements.</p>\n\n<p><strong>Batch transform</strong> - To get predictions for an entire dataset, use SageMaker batch transform.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/sagemaker/latest/dg/how-it-works-deployment.html\">https://docs.aws.amazon.com/sagemaker/latest/dg/how-it-works-deployment.html</a></p>\n\n<p><a href=\"https://docs.aws.amazon.com/sagemaker/latest/dg/realtime-endpoints.html\">https://docs.aws.amazon.com/sagemaker/latest/dg/realtime-endpoints.html</a></p>\n","answers":["<p>Serverless Inference</p>","<p>Asynchronous Inference</p>","<p>Real-time hosting services</p>","<p>Batch transform</p>"]},"correct_response":["c"],"section":"Applications of Foundation Models","question_plain":"A healthcare analytics company is developing a machine learning model to provide patient risk assessments based on incoming medical data. The team needs to deploy the model in a way that supports continuous, low-latency predictions, where each request receives a response immediately, such as during patient check-ins. The team is evaluating deployment options within Amazon SageMaker and needs a solution that offers persistent endpoints to handle these individual prediction requests.\n\nWhat do you recommend?","related_lectures":[]},{"_class":"assessment","id":96322073,"assessment_type":"multiple-choice","prompt":{"question":"<p>A tech company is building machine learning models using Amazon SageMaker Studio and wants to streamline its development process. The data science team prefers using familiar Integrated Development Environments (IDEs) to write, test, and debug code more efficiently. To ensure a smooth workflow, the team is exploring which IDEs are supported within SageMaker Studio to maximize productivity and compatibility with their existing tools.</p>\n\n<p>Which of the following address the given requirement?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>All</strong></p>\n\n<p>Amazon SageMaker Studio offers a broad set of fully managed integrated development environments (IDEs) for ML development, including JupyterLab, Code Editor based on Code-OSS (Visual Studio Code – Open Source), and RStudio.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>JupyterLab</strong></p>\n\n<p><strong>Code Editor</strong></p>\n\n<p><strong>RStudio</strong></p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://aws.amazon.com/sagemaker/studio/\">https://aws.amazon.com/sagemaker/studio/</a></p>\n","answers":["<p>JupyterLab</p>","<p>Code Editor</p>","<p>RStudio</p>","<p>All</p>"]},"correct_response":["d"],"section":"Applications of Foundation Models","question_plain":"A tech company is building machine learning models using Amazon SageMaker Studio and wants to streamline its development process. The data science team prefers using familiar Integrated Development Environments (IDEs) to write, test, and debug code more efficiently. To ensure a smooth workflow, the team is exploring which IDEs are supported within SageMaker Studio to maximize productivity and compatibility with their existing tools.\n\nWhich of the following address the given requirement?","related_lectures":[]},{"_class":"assessment","id":96322097,"assessment_type":"multi-select","prompt":{"question":"<p>A global technology company has deployed several AI systems, including generative AI solutions that range from pre-trained models to fine-tuned, domain-specific models. As part of their commitment to ethical AI practices, the company wants to implement governance strategies to ensure the responsible development, deployment, and usage of these models. The development team is tasked with identifying key governance strategies to address concerns such as data privacy, fairness, and accountability in their AI systems.</p>\n\n<p>Which two governance strategies should the team prioritize to meet these objectives? (Select two)</p>\n","relatedLectureIds":"","feedbacks":["","","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Establish ethical AI guidelines for developers to follow</strong></p>\n\n<p>Ethical AI guidelines help define principles and practices for responsible AI development and deployment, ensuring alignment with company values and regulatory requirements.</p>\n\n<p><strong>Implement robust auditing processes for AI outputs</strong></p>\n\n<p>Auditing processes ensure transparency and accountability by regularly evaluating model outputs for issues like bias, misuse, or unintended consequences.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Use only open-source models without further evaluation</strong> - Relying solely on open-source models without evaluation may lead to issues such as data privacy violations, bias, or model performance that does not align with the company's goals. Governance requires evaluating and monitoring all models, even open-source ones.</p>\n\n<p><strong>Allow unrestricted fine-tuning by all team members</strong> - Allowing unrestricted fine-tuning can lead to inconsistent or irresponsible model behavior. Governance requires clear restrictions and approvals for modifying models to prevent misuse or unintended impacts.</p>\n\n<p><strong>Rely on user feedback alone to identify issues with the AI system</strong> - Relying solely on user feedback to identify issues is a reactive approach and does not align with proactive governance strategies. While user feedback can be valuable, governance requires systematic processes such as audits, ethical guidelines, and bias reviews to prevent issues before they arise. Depending only on feedback could result in delayed responses to critical problems and harm the system's reliability or public trust.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/whitepapers/latest/ml-best-practices-public-sector-organizations/management-and-governance.html\">https://docs.aws.amazon.com/whitepapers/latest/ml-best-practices-public-sector-organizations/management-and-governance.html</a></p>\n\n<p><a href=\"https://aws.amazon.com/blogs/enterprise-strategy/data-governance-in-the-age-of-generative-ai/\">https://aws.amazon.com/blogs/enterprise-strategy/data-governance-in-the-age-of-generative-ai/</a></p>\n","answers":["<p>Establish ethical AI guidelines for developers to follow</p>","<p>Use only open-source models without further evaluation</p>","<p>Implement robust auditing processes for AI outputs</p>","<p>Allow unrestricted fine-tuning by all team members</p>","<p>Rely on user feedback alone to identify issues with the AI system</p>"]},"correct_response":["a","c"],"section":"Security, Compliance, and Governance for AI Solutions","question_plain":"A global technology company has deployed several AI systems, including generative AI solutions that range from pre-trained models to fine-tuned, domain-specific models. As part of their commitment to ethical AI practices, the company wants to implement governance strategies to ensure the responsible development, deployment, and usage of these models. The development team is tasked with identifying key governance strategies to address concerns such as data privacy, fairness, and accountability in their AI systems.\n\nWhich two governance strategies should the team prioritize to meet these objectives? (Select two)","related_lectures":[]},{"_class":"assessment","id":96322099,"assessment_type":"multiple-choice","prompt":{"question":"<p>Consider a scenario where a fully-managed AWS service needs to be used for automating the extraction of insights from legal briefs such as contracts and court records.</p>\n\n<p>What do you recommend?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Amazon Comprehend</strong></p>\n\n<p>Amazon Comprehend is a natural language processing (NLP) service that uses machine learning to find meaning and insights in text. Natural Language Processing (NLP) is a way for computers to analyze, understand, and derive meaning from textual information in a smart and useful way. By utilizing NLP, you can extract important phrases, sentiments, syntax, key entities such as brand, date, location, person, etc., and the language of the text.</p>\n\n<p>You can use Amazon Comprehend to identify the language of the text, extract key phrases, places, people, brands, or events, understand sentiment about products or services, and identify the main topics from a library of documents. The source of this text could be web pages, social media feeds, emails, or articles. You can also feed Amazon Comprehend a set of text documents, and it will identify topics (or groups of words) that best represent the information in the collection. The output from Amazon Comprehend can be used to understand customer feedback, provide a better search experience through search filters, and use topics to categorize documents.</p>\n\n<p>How Amazon Comprehend works:\n<img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt2-q74-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/comprehend/\">https://aws.amazon.com/comprehend/</a></p>\n\n<p>Comprehend use cases:\n<img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt2-q74-i2.jpg\">\nvia - <a href=\"https://aws.amazon.com/comprehend/\">https://aws.amazon.com/comprehend/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Amazon Transcribe</strong> - Amazon Transcribe is an automatic speech recognition service that uses machine learning models to convert audio to text. You can use Amazon Transcribe as a standalone transcription service or add speech-to-text capabilities to any application.</p>\n\n<p><strong>Amazon Translate</strong> - Amazon Translate is a text translation service that uses advanced machine learning technologies to provide high-quality translation on demand. You can use Amazon Translate to translate unstructured text documents or to build applications that work in multiple languages.</p>\n\n<p><strong>Amazon Rekognition</strong> - Amazon Rekognition is a cloud-based image and video analysis service that makes it easy to add advanced computer vision capabilities to your applications. You can add features that detect objects, text, and unsafe content, analyze images/videos, and compare faces to your application using Rekognition's APIs.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://aws.amazon.com/comprehend/\">https://aws.amazon.com/comprehend/</a></p>\n","answers":["<p>Amazon Transcribe</p>","<p>Amazon Comprehend</p>","<p>Amazon Translate</p>","<p>Amazon Rekognition</p>"]},"correct_response":["b"],"section":"Applications of Foundation Models","question_plain":"Consider a scenario where a fully-managed AWS service needs to be used for automating the extraction of insights from legal briefs such as contracts and court records.\n\nWhat do you recommend?","related_lectures":[]},{"_class":"assessment","id":96322101,"assessment_type":"multiple-choice","prompt":{"question":"<p>A financial services company is developing a machine-learning model to classify loan applications as either \"approved\" or \"denied.\" To ensure the model performs effectively, the company wants to evaluate how accurately it predicts these outcomes. Specifically, they are interested in knowing the overall percentage of correct predictions, including both approved and denied applications. The company is considering several metrics to assess the model's performance in terms of the number of correct outcomes.</p>\n\n<p>Which metric would be most appropriate for this purpose?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>The company should use Accuracy, which measures the proportion of correctly predicted instances (both true positives and true negatives) out of the total number of instances</strong></p>\n\n<p>Accuracy is the most appropriate metric when the goal is to understand the proportion of correct outcomes in a binary classification problem. It provides a straightforward measure of how often the model correctly predicts the positive and negative classes. Accuracy is a suitable choice when the dataset is balanced (i.e., the number of positive and negative instances is approximately equal) and when the company wants a simple, overall performance measure of the model's correctness.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>The company should use Root Mean Squared Error (RMSE), a metric that calculates the square root of the average of the squared differences between predicted and actual values</strong> - RMSE is a metric used to measure the average magnitude of errors in a regression model's predictions. It is not appropriate for binary classification tasks because it is designed to assess continuous numeric predictions rather than categorical outcomes. Therefore, RMSE does not provide meaningful insights into the correct or incorrect outcomes in a classification context.</p>\n\n<p><strong>The company should use R-squared, a statistical measure that indicates the proportion of variance in the dependent variable explained by the independent variables</strong> - R-squared is a metric that measures the goodness of fit in regression models. It shows how well the independent variables explain the variance in the dependent variable. Since R-squared is specific to regression tasks and not applicable to classification problems, it is not a suitable metric for evaluating the correct outcomes in a binary classification scenario.</p>\n\n<p><strong>The company should use F1 Score, a metric that considers both precision and recall by calculating their harmonic mean</strong> - The F1 Score is a useful metric when dealing with imbalanced datasets in binary classification, as it balances precision (the proportion of true positive predictions among all positive predictions) and recall (the proportion of true positives among all actual positive instances). However, if the primary focus is simply to measure the correct outcomes without concern for the balance between precision and recall, then accuracy is a more straightforward metric. F1 Score is most appropriate when both false positives and false negatives need to be minimized, but it may not be necessary if the dataset is balanced and the company only wants to know the overall proportion of correct predictions.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/blogs/big-data/building-a-binary-classification-model-with-amazon-machine-learning-and-amazon-redshift/\">https://aws.amazon.com/blogs/big-data/building-a-binary-classification-model-with-amazon-machine-learning-and-amazon-redshift/</a></p>\n\n<p><a href=\"https://docs.aws.amazon.com/machine-learning/latest/dg/binary-classification.html\">https://docs.aws.amazon.com/machine-learning/latest/dg/binary-classification.html</a></p>\n","answers":["<p>The company should use Root Mean Squared Error (RMSE), a metric that calculates the square root of the average of the squared differences between predicted and actual values</p>","<p>The company should use R-squared, a statistical measure that indicates the proportion of variance in the dependent variable explained by the independent variables</p>","<p>The company should use Accuracy, which measures the proportion of correctly predicted instances (both true positives and true negatives) out of the total number of instances</p>","<p>The company should use F1 Score, a metric that considers both precision and recall by calculating their harmonic mean</p>"]},"correct_response":["c"],"section":"Security, Compliance, and Governance for AI Solutions","question_plain":"A financial services company is developing a machine-learning model to classify loan applications as either \"approved\" or \"denied.\" To ensure the model performs effectively, the company wants to evaluate how accurately it predicts these outcomes. Specifically, they are interested in knowing the overall percentage of correct predictions, including both approved and denied applications. The company is considering several metrics to assess the model's performance in terms of the number of correct outcomes.\n\nWhich metric would be most appropriate for this purpose?","related_lectures":[]},{"_class":"assessment","id":96322103,"assessment_type":"multiple-choice","prompt":{"question":"<p>A software development team is exploring tools to improve their coding efficiency and streamline their workflow. They are particularly interested in leveraging Amazon Q Developer to support their development processes, but they want to understand its specific capabilities.</p>\n\n<p>Which of the following accurately describes what Amazon Q Developer can do to enhance the team's development efforts?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Amazon Q Developer can suggest code snippets, providing developers with recommendations for code based on specific tasks or requirements</strong></p>\n\n<p>This is the correct option because Amazon Q Developer is designed to assist developers by providing code suggestions and recommendations that align with their coding tasks. It leverages machine learning models trained on vast datasets to suggest code snippets, optimize code efficiency, and help developers follow best practices. This functionality helps speed up development processes and enhances productivity.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Amazon Q Developer can deploy applications, automating the entire process of application deployment from development to production environments</strong> - While Amazon Web Services (AWS) offers several tools for application deployment, such as AWS CodeDeploy or AWS Elastic Beanstalk, Amazon Q Developer is not specifically designed to handle the full deployment process of applications. Its primary function is to provide code recommendations and insights, not to manage deployment pipelines.</p>\n\n<p><strong>Amazon Q Developer can create SageMaker models, allowing users to develop, train, and deploy machine learning models within the Amazon SageMaker environment</strong> - Creating, training, and deploying machine learning models in Amazon SageMaker is not within the capabilities of Amazon Q Developer. Amazon SageMaker itself is a comprehensive platform specifically built for end-to-end machine learning tasks, whereas Amazon Q Developer focuses on assisting developers with code suggestions and best practices.</p>\n\n<p><strong>Amazon Q Developer can create Large Language Model (LLM) chatbots, enabling the design and deployment of large language model-based conversational agents</strong> - While Amazon provides tools like Amazon Lex and Amazon Bedrock for creating and deploying large language model (LLM) chatbots, Amazon Q Developer does not have the capability to build or deploy chatbots. It is designed to provide intelligent code suggestions rather than develop or manage conversational agents.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/amazonq/latest/qdeveloper-ug/what-is.html\">https://docs.aws.amazon.com/amazonq/latest/qdeveloper-ug/what-is.html</a></p>\n\n<p><a href=\"https://aws.amazon.com/bedrock/\">https://aws.amazon.com/bedrock/</a></p>\n","answers":["<p>Amazon Q Developer can suggest code snippets, providing developers with recommendations for code based on specific tasks or requirements</p>","<p>Amazon Q Developer can deploy applications, automating the entire process of application deployment from development to production environments</p>","<p>Amazon Q Developer can create SageMaker models, allowing users to develop, train, and deploy machine learning models within the Amazon SageMaker environment</p>","<p>Amazon Q Developer can create Large Language Model (LLM) chatbots, enabling the design and deployment of large language model-based conversational agents</p>"]},"correct_response":["a"],"section":"Applications of Foundation Models","question_plain":"A software development team is exploring tools to improve their coding efficiency and streamline their workflow. They are particularly interested in leveraging Amazon Q Developer to support their development processes, but they want to understand its specific capabilities.\n\nWhich of the following accurately describes what Amazon Q Developer can do to enhance the team's development efforts?","related_lectures":[]},{"_class":"assessment","id":96322105,"assessment_type":"multiple-choice","prompt":{"question":"<p>A company has recently migrated to AWS Cloud and it wants to optimize the hardware used for its AI workflows.</p>\n\n<p>Which of the following would you suggest?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Leverage AWS Trainium for high-performance, cost-effective Deep Learning training. Leverage AWS Inferentia for the deep learning (DL) and generative AI inference applications</strong></p>\n\n<p>AWS Inferentia accelerators are designed by AWS to deliver high performance at the lowest cost in Amazon EC2 for your deep learning (DL) and generative AI inference applications. The first-generation AWS Inferentia accelerator powers Amazon Elastic Compute Cloud (Amazon EC2) Inf1 instances, which deliver up to 2.3x higher throughput and up to 70% lower cost per inference than comparable Amazon EC2 instances.</p>\n\n<p>AWS Trainium is the machine learning (ML) chip that AWS purpose-built for deep learning (DL) training of 100B+ parameter models. Each Amazon Elastic Compute Cloud (Amazon EC2) Trn1 instance deploys up to 16 Trainium accelerators to deliver a high-performance, low-cost solution for DL training in the cloud.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Leverage either AWS Trainium or AWS Inferentia for the deep learning (DL) and generative AI inference applications</strong></p>\n\n<p><strong>Leverage either AWS Trainium or AWS Inferentia for high-performance, cost-effective Deep Learning training</strong></p>\n\n<p><strong>Leverage AWS Inferentia for high-performance, cost-effective Deep Learning training. Leverage AWS Trainium for the deep learning (DL) and generative AI inference applications</strong></p>\n\n<p>These three options contradict the explanation provided above, so these options are incorrect.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/machine-learning/inferentia/\">https://aws.amazon.com/machine-learning/inferentia/</a></p>\n\n<p><a href=\"https://aws.amazon.com/machine-learning/trainium/\">https://aws.amazon.com/machine-learning/trainium/</a></p>\n","answers":["<p>Leverage either AWS Trainium or AWS Inferentia for the deep learning (DL) and generative AI inference applications</p>","<p>Leverage either AWS Trainium or AWS Inferentia for high-performance, cost-effective Deep Learning training</p>","<p>Leverage AWS Trainium for high-performance, cost-effective Deep Learning training. Leverage AWS Inferentia for the deep learning (DL) and generative AI inference applications</p>","<p>Leverage AWS Inferentia for high-performance, cost-effective Deep Learning training. Leverage AWS Trainium for the deep learning (DL) and generative AI inference applications</p>"]},"correct_response":["c"],"section":"Fundamentals of AI and ML","question_plain":"A company has recently migrated to AWS Cloud and it wants to optimize the hardware used for its AI workflows.\n\nWhich of the following would you suggest?","related_lectures":[]},{"_class":"assessment","id":96322107,"assessment_type":"multiple-choice","prompt":{"question":"<p>A business needs an automated solution that can extract text from thousands of receipts and invoices generated across all its stores.</p>\n\n<p>Which AWS Machine Learning (ML) service can offer the most optimal solution for this use case ?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Amazon Textract</strong></p>\n\n<p>Amazon Textract is a machine learning (ML) service that automatically extracts text, handwriting, layout elements, and data from scanned documents. It goes beyond simple optical character recognition (OCR) to identify, understand, and extract specific data from documents. Today, many companies manually extract data from scanned documents such as PDFs, images, tables, and forms, or through simple OCR software that requires manual configuration (which often must be updated when the form changes). To overcome these manual and expensive processes, Textract uses ML to read and process any type of document, accurately extracting text, handwriting, tables, and other data with no manual effort.</p>\n\n<p>You can use one of AWS's pre-trained or custom features to quickly automate document processing, whether you’re automating loan processing or extracting information from invoices and receipts. Textract provides you the ability to customize the pre-trained features to meet the document processing needs specific to your business. Textract can extract the data in minutes instead of hours or days.</p>\n\n<p>Textract use cases:\n<img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt2-q78-i1.jpg\">\nvia - <a href=\"https://docs.aws.amazon.com/textract/latest/dg/what-is.html\">https://docs.aws.amazon.com/textract/latest/dg/what-is.html</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Amazon Transcribe</strong> - Amazon Transcribe is an automatic speech recognition service that uses machine learning models to convert audio to text. You can use Amazon Transcribe as a standalone transcription service or add speech-to-text capabilities to any application.</p>\n\n<p><strong>Amazon Comprehend</strong> - Amazon Comprehend is a natural language processing (NLP) service that uses machine learning to find meaning and insights in text. Natural Language Processing (NLP) is a way for computers to analyze, understand, and derive meaning from textual information in a smart and useful way. By utilizing NLP, you can extract important phrases, sentiments, syntax, key entities such as brand, date, location, person, etc., and the language of the text.</p>\n\n<p><strong>Amazon Rekognition</strong> - Amazon Rekognition is a cloud-based image and video analysis service that makes it easy to add advanced computer vision capabilities to your applications. The service is powered by proven deep learning technology and it requires no machine learning expertise to use. Amazon Rekognition includes a simple, easy-to-use API that can quickly analyze any image or video file that’s stored in Amazon S3. While Rekognition can be used to extract text from images, Rekognition specializes in identifying text located spatially within an image, for instance, words displayed on street signs, t-shirts, or license plates. It's not the ideal choice for images containing more than 100 words, as this exceeds its limitation.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/textract/latest/dg/what-is.html\">https://docs.aws.amazon.com/textract/latest/dg/what-is.html</a></p>\n\n<p><a href=\"https://repost.aws/questions/QUsCXe41EtTYq3QDaY18EnSg/textract-vs-rekognition-in-detect-text-in-picture\">https://repost.aws/questions/QUsCXe41EtTYq3QDaY18EnSg/textract-vs-rekognition-in-detect-text-in-picture</a></p>\n","answers":["<p>Amazon Rekognition</p>","<p>Amazon Comprehend</p>","<p>Amazon Transcribe</p>","<p>Amazon Textract</p>"]},"correct_response":["d"],"section":"Applications of Foundation Models","question_plain":"A business needs an automated solution that can extract text from thousands of receipts and invoices generated across all its stores.\n\nWhich AWS Machine Learning (ML) service can offer the most optimal solution for this use case ?","related_lectures":[]},{"_class":"assessment","id":96322109,"assessment_type":"multiple-choice","prompt":{"question":"<p>A wildlife research organization has gathered thousands of images from camera traps in natural reserves worldwide, capturing various animal species. To support their research and conservation efforts, the organization wants to build a system that can automatically identify and categorize each animal in these images accurately and efficiently. The organization is evaluating different AI and machine learning techniques to achieve this goal.</p>\n\n<p>Which approach would you suggest to effectively recognize and categorize the various animal species in their image dataset?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>The company should use object detection, which involves identifying and locating specific objects within an image</strong></p>\n\n<p>Object detection is the correct concept for this use case. It is a computer vision technique that identifies instances of objects within images and videos, such as detecting and classifying different types of animals. Object detection models, such as those based on Convolutional Neural Networks (CNNs) like YOLO (You Only Look Once) or Faster R-CNN, can analyze visual data to accurately locate and identify various animal species within an image, making it the most appropriate choice for this task.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>The company should use named entity recognition, a technique for identifying entities like names, places, or dates</strong> - Named Entity Recognition (NER) is a text-based natural language processing technique, not a computer vision method. It identifies and classifies named entities in text, such as people, organizations, or locations. Since NER does not handle visual data or the identification of objects in images, it is not suitable for recognizing different types of animals in images.</p>\n\n<p><strong>The company should use face recognition, a computer vision technique specifically designed to identify faces in images or videos</strong> - Face recognition is a computer vision technique that focuses exclusively on detecting and verifying human faces in images or video streams. It uses algorithms to match facial features against a database of known faces but is not designed to recognize or classify non-human objects, such as different animal species. As a result, face recognition cannot be applied effectively for identifying various types of animals in images.</p>\n\n<p><strong>The company should use thermal imaging, a technique that detects heat patterns and variations, which can identify living beings in low-visibility conditions</strong> - This option acts as a distractor. Thermal imaging detects heat emitted by objects or living beings and is useful for identifying animals in conditions where visibility is low, such as at night or in dense foliage. However, it does not provide detailed visual information necessary for distinguishing between different animal species, as it primarily shows heat patterns rather than detailed features needed for accurate classification.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/sagemaker/latest/dg/algo-object-detection-tech-notes.html\">https://docs.aws.amazon.com/sagemaker/latest/dg/algo-object-detection-tech-notes.html</a></p>\n\n<p><a href=\"https://aws.amazon.com/blogs/machine-learning/training-a-custom-single-class-object-detection-model-with-amazon-rekognition-custom-labels/\">https://aws.amazon.com/blogs/machine-learning/training-a-custom-single-class-object-detection-model-with-amazon-rekognition-custom-labels/</a></p>\n\n<p><a href=\"https://aws.amazon.com/blogs/machine-learning/detect-population-variance-of-endangered-species-using-amazon-rekognition/\">https://aws.amazon.com/blogs/machine-learning/detect-population-variance-of-endangered-species-using-amazon-rekognition/</a></p>\n","answers":["<p>The company should use object detection, which involves identifying and locating specific objects within an image</p>","<p>The company should use named entity recognition, a technique for identifying entities like names, places, or dates</p>","<p>The company should use face recognition, a computer vision technique specifically designed to identify faces in images or videos</p>","<p>The company should use thermal imaging, a technique that detects heat patterns and variations, which can identify living beings in low-visibility conditions</p>"]},"correct_response":["a"],"section":"Fundamentals of AI and ML","question_plain":"A wildlife research organization has gathered thousands of images from camera traps in natural reserves worldwide, capturing various animal species. To support their research and conservation efforts, the organization wants to build a system that can automatically identify and categorize each animal in these images accurately and efficiently. The organization is evaluating different AI and machine learning techniques to achieve this goal.\n\nWhich approach would you suggest to effectively recognize and categorize the various animal species in their image dataset?","related_lectures":[]},{"_class":"assessment","id":96322111,"assessment_type":"multiple-choice","prompt":{"question":"<p>Match the following AWS services to the respective use cases:</p>\n\n<p>A) Amazon Textract</p>\n\n<p>B) Amazon Forecast</p>\n\n<p>C) Amazon Kendra</p>\n\n<p>1) Easy-to-use enterprise search service that’s powered by machine learning</p>\n\n<p>2) Automatically extract printed text, handwriting, layout elements, and data from any document</p>\n\n<p>3) Forecast business outcomes easily and accurately using machine learning</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>A-2, B-3, C-1</strong></p>\n\n<p>Amazon Textract - Automatically extract printed text, handwriting, layout elements, and data from any document. Amazon Textract is a machine learning (ML) service that automatically extracts text, handwriting, layout elements, and data from scanned documents. It goes beyond simple optical character recognition (OCR) to identify, understand, and extract specific data from documents.</p>\n\n<p>Amazon Forecast - Forecast business outcomes easily and accurately using machine learning. Amazon Forecast uses machine learning (ML) to generate more accurate demand forecasts with just a few clicks, without requiring any prior ML experience. Amazon Forecast uses ML to learn not only the best algorithm for each item but the best ensemble of algorithms for each item, automatically creating the best model for your data.</p>\n\n<p>Amazon Kendra - Easy-to-use enterprise search service that’s powered by machine learning. Amazon Kendra is a highly accurate and easy-to-use enterprise search service that’s powered by machine learning (ML). It allows developers to add search capabilities to their applications so their end users can discover information stored within the vast amount of content spread across their company.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>A-2, B-1, C-3</strong></p>\n\n<p><strong>A-1, B-3, C-2</strong></p>\n\n<p><strong>A-3, B-2, C-1</strong></p>\n\n<p>These three options contradict the explanation provided above, so these options are incorrect.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/textract/\">https://aws.amazon.com/textract/</a></p>\n\n<p><a href=\"https://aws.amazon.com/forecast/features/\">https://aws.amazon.com/forecast/features/</a></p>\n\n<p><a href=\"https://aws.amazon.com/kendra/faqs/\">https://aws.amazon.com/kendra/faqs/</a></p>\n","answers":["<p>A-2, B-1, C-3</p>","<p>A-1, B-3, C-2</p>","<p>A-3, B-2, C-1</p>","<p>A-2, B-3, C-1</p>"]},"correct_response":["d"],"section":"Applications of Foundation Models","question_plain":"Match the following AWS services to the respective use cases:\n\nA) Amazon Textract\n\nB) Amazon Forecast\n\nC) Amazon Kendra\n\n1) Easy-to-use enterprise search service that’s powered by machine learning\n\n2) Automatically extract printed text, handwriting, layout elements, and data from any document\n\n3) Forecast business outcomes easily and accurately using machine learning","related_lectures":[]},{"_class":"assessment","id":96322113,"assessment_type":"multiple-choice","prompt":{"question":"<p>A company is creating a custom search solution that will bring together the company's data repositories, FAQs, and support tickets. The support tickets might contain personally identifiable information (PII) that needs to be redacted before the tickets are processed to create the search indexes.</p>\n\n<p>Which AWS service will help you redact the PII in support tickets?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Amazon Comprehend</strong></p>\n\n<p>Amazon Comprehend is a natural language processing (NLP) service that uses machine learning to discover insights from text. Amazon Comprehend provides Custom Entity Recognition, Custom Classification, Key Phrase Extraction, Sentiment Analysis, Entity Recognition, and more APIs so you can easily integrate natural language processing into your applications. You simply call the Amazon Comprehend APIs in your application and provide the location of the source document or text. The APIs will output entities, key phrases, sentiment, and language in a JSON format, which you can use in your application.</p>\n\n<p>Amazon Comprehend ML capabilities can be used to detect and redact personally identifiable information (PII) in customer emails, support tickets, product reviews, social media, and more. No ML experience is required. For example, you can analyze support tickets and knowledge articles to detect PII entities and redact the text before you index the documents in the search solution. After that, search solutions are free of PII entities in documents. Redacting PII entities helps you protect privacy and comply with local laws and regulations.</p>\n\n<p>How Comprehend works:\n<img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt2-q81-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/comprehend/\">https://aws.amazon.com/comprehend/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Amazon Textract</strong> - Amazon Textract is a machine learning (ML) service that automatically extracts text, handwriting, layout elements, and data from scanned documents. It goes beyond simple optical character recognition (OCR) to identify, understand, and extract specific data from documents. Text extracted from images can be sent to Amazon Comprehend to recognize PII.</p>\n\n<p><strong>Amazon Lex</strong> - Amazon Lex is a fully managed artificial intelligence (AI) service with advanced natural language models to design, build, test, and deploy conversational interfaces in applications. Amazon Lex leverages the power of Generative AI and Large Language Models (LLMs) to enhance the builder and customer experience.</p>\n\n<p><strong>Amazon Kendra</strong> - Amazon Kendra is a highly accurate and easy-to-use enterprise search service that’s powered by machine learning (ML). It allows developers to add search capabilities to their applications so their end users can discover information stored within the vast amount of content spread across their company. Companies use Amazon Comprehend to filter out PII before pushing the documents/data to Kendra.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://aws.amazon.com/comprehend/features/\">https://aws.amazon.com/comprehend/features/</a></p>\n","answers":["<p>Amazon Textract</p>","<p>Amazon Lex</p>","<p>Amazon Comprehend</p>","<p>Amazon Kendra</p>"]},"correct_response":["c"],"section":"Applications of Foundation Models","question_plain":"A company is creating a custom search solution that will bring together the company's data repositories, FAQs, and support tickets. The support tickets might contain personally identifiable information (PII) that needs to be redacted before the tickets are processed to create the search indexes.\n\nWhich AWS service will help you redact the PII in support tickets?","related_lectures":[]},{"_class":"assessment","id":96322115,"assessment_type":"multiple-choice","prompt":{"question":"<p>An e-learning company is developing a Large Language Model (LLM) chatbot using Amazon Bedrock to enhance the personalized learning experience on its platform. The chatbot needs to dynamically tailor its responses based on the user's age group. By leveraging Amazon Bedrock's foundation models, the company aims to create an adaptive learning tool that delivers relevant, engaging, and age-appropriate support to a diverse user base.</p>\n\n<p>As an AI Practitioner, which of the following solutions would you recommend?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Implement dynamic prompt engineering to customize responses based on user characteristics like age</strong></p>\n\n<p>Dynamic prompt engineering involves modifying the input prompts to the Large Language Model (LLM) to customize the chatbot's responses based on the user's age. By altering the prompt dynamically, you can provide specific instructions or context to the LLM to generate age-appropriate responses. For example, if the user is a child, the prompt might include instructions to use simpler language or a friendly tone. This approach does not require changing the model itself and leverages Amazon Bedrock’s ability to interpret context from customized prompts effectively.</p>\n\n<p>To provide custom responses via an LLM chatbot built using Amazon Bedrock based on the user's age, you can implement a strategy that dynamically adjusts the chatbot's responses according to the age group of the user. For the given use case, you can leverage Amazon Bedrock to build a custom prompt logic for the LLM that dynamically adjusts the input prompt based on the user's age category, like the following example in Python:</p>\n\n<pre><code>def generate_prompt(age_group, user_input):\n    if age_group == 'Children':\n        prompt = f\"Respond in a friendly and simple manner suitable for children: {user_input}\"\n    elif age_group == 'Teens':\n        prompt = f\"Respond in a fun and engaging way suitable for teens, using popular culture references: {user_input}\"\n    elif age_group == 'Adults':\n        prompt = f\"Provide a concise and informative response suitable for adults: {user_input}\"\n    else: # Seniors\n        prompt = f\"Provide a clear and respectful response with detailed explanations suitable for seniors: {user_input}\"\n    return prompt\n</code></pre>\n\n<p>Then, use the Amazon Bedrock API to send the customized prompts to the foundation model. The Bedrock service will generate responses based on the context provided in each prompt, adapting the output to fit the desired style and tone for the specific age group.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Leverage Retrieval-Augmented Generation (RAG) to customize responses based on user characteristics like age</strong> - RAG is a technique that combines a retrieval mechanism (which fetches relevant documents or data from a knowledge base) with a generation model to provide more factual and context-rich responses. While RAG can enhance response accuracy by adding external context, it is not specifically designed for customizing responses based on user characteristics like age. RAG focuses on improving the relevance and factual accuracy of outputs, not on adapting the style or complexity of the language to suit different age groups.</p>\n\n<p><strong>Perform model re-training for tailoring responses based on user age</strong> - Re-training the model involves using a large dataset to update the entire model's parameters, which is time-consuming, costly, and unnecessary for simply tailoring responses based on user age. Amazon Bedrock provides access to pre-trained foundation models that are already capable of generating diverse outputs based on the input prompts. Re-training is overkill for this task and is not the appropriate solution for generating age-specific responses dynamically.</p>\n\n<p><strong>Perform fine-tuning for the model to adjust the style or tone of responses based on user age</strong> - Fine-tuning involves training the LLM on a specialized dataset to improve its performance on specific tasks or domains. However, this method is more suited for developing domain-specific expertise in the model rather than adjusting the style or tone of responses based on user age. Fine-tuning can be resource-intensive and time-consuming, and it is not necessary for generating age-appropriate responses when prompt engineering can dynamically handle the customization without modifying the model itself.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/prompt-engineering-guidelines.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/prompt-engineering-guidelines.html</a></p>\n\n<p><a href=\"https://aws.amazon.com/what-is/retrieval-augmented-generation/\">https://aws.amazon.com/what-is/retrieval-augmented-generation/</a></p>\n","answers":["<p>Implement dynamic prompt engineering to customize responses based on user characteristics like age</p>","<p>Leverage Retrieval-Augmented Generation (RAG) to customize responses based on user characteristics like age</p>","<p>Perform model re-training for tailoring responses based on user age</p>","<p>Perform fine-tuning for the model to adjust the style or tone of responses based on user age</p>"]},"correct_response":["a"],"section":"Applications of Foundation Models","question_plain":"An e-learning company is developing a Large Language Model (LLM) chatbot using Amazon Bedrock to enhance the personalized learning experience on its platform. The chatbot needs to dynamically tailor its responses based on the user's age group. By leveraging Amazon Bedrock's foundation models, the company aims to create an adaptive learning tool that delivers relevant, engaging, and age-appropriate support to a diverse user base.\n\nAs an AI Practitioner, which of the following solutions would you recommend?","related_lectures":[]},{"_class":"assessment","id":96322117,"assessment_type":"multiple-choice","prompt":{"question":"<p>A company is using Amazon Personalize to build a recommendations engine for its e-commerce application. As part of the process, the data from ten different sources needs to be processed and imported into Amazon Personalize.</p>\n\n<p>Which AWS service will help import, prepare, and transform data before it is fed into Amazon Personalize?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Amazon SageMaker Data Wrangler</strong></p>\n\n<p>Amazon SageMaker Data Wrangler reduces the time it takes to aggregate and prepare tabular and image data for ML from weeks to minutes. With SageMaker Data Wrangler, you can simplify the process of data preparation and feature engineering, and complete each step of the data preparation workflow (including data selection, cleansing, exploration, visualization, and processing at scale) from a single visual interface. You can use SQL to select the data that you want from va
