on-sagemaker-data-wrangler/</a></p>\n","answers":["<p>Exploratory Data Analysis (EDA)</p>","<p>Data Preparation</p>","<p>Data Augmentation</p>","<p>Model Evaluation</p>"]},"correct_response":["a"],"section":"Fundamentals of AI and ML","question_plain":"A retail analytics company is analyzing a large dataset containing customer purchase history, product details, and sales trends to gain insights into customer behavior and optimize inventory management. To achieve this, the team is focused on calculating various statistical measures to summarize data characteristics and using visualizations to uncover patterns and trends. These tasks are critical for understanding the underlying structure and dynamics of the data before proceeding to model development or predictive analysis.\n\nWhich phase of the data science process does this work primarily belong to?","related_lectures":[]},{"_class":"assessment","id":93243909,"assessment_type":"multi-select","prompt":{"question":"<p>A company is exploring Amazon Q to streamline its internal business processes through automation and generative AI capabilities. The team is particularly interested in understanding how Amazon Q integrates generative AI techniques within its web application workflow to enhance tasks such as automating report generation, creating summaries, and analyzing large datasets. They want to know which specific generative AI techniques are employed in Amazon Q to achieve these outcomes.</p>\n\n<p>Which of the following generative AI techniques are used in the Amazon Q Business web application workflow? (Select two)</p>\n","relatedLectureIds":"","feedbacks":["","","","",""],"explanation":"<p>Correct options:</p>\n\n<p><strong>Large Language Model (LLM)</strong></p>\n\n<p>Large language models (LLMs) are a class of Foundation Models (FMs). For example, OpenAI's generative pre-trained transformer (GPT) models are LLMs. LLMs are specifically focused on language-based tasks such as such as summarization, text generation, classification, open-ended conversation, and information extraction.</p>\n\n<p><strong>Retrieval-Augmented Generation (RAG)</strong></p>\n\n<p>Retrieval-Augmented Generation (RAG) is the process of optimizing the output of a large language model, so it references an authoritative knowledge base outside of its training data sources before generating a response. Large Language Models (LLMs) are trained on vast volumes of data and use billions of parameters to generate original output for tasks like answering questions, translating languages, and completing sentences. RAG extends the already powerful capabilities of LLMs to specific domains or an organization's internal knowledge base, all without the need to retrain the model. It is a cost-effective approach to improving LLM output so it remains relevant, accurate, and useful in various contexts.</p>\n\n<p>Depending on the configuration, Amazon Q Business web application workflow can use LLM/RAG or both.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt1-q19-i1.jpg\">\nvia - <a href=\"https://docs.aws.amazon.com/amazonq/latest/qbusiness-ug/how-it-works.html\">https://docs.aws.amazon.com/amazonq/latest/qbusiness-ug/how-it-works.html</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Diffusion Model</strong> - Diffusion models create new data by iteratively making controlled random changes to an initial data sample. They start with the original data and add subtle changes (noise), progressively making it less similar to the original. This noise is carefully controlled to ensure the generated data remains coherent and realistic. After adding noise over several iterations, the diffusion model reverses the process. Reverse denoising gradually removes the noise to produce a new data sample that resembles the original.</p>\n\n<p><strong>Generative adversarial network (GAN)</strong> - GANs work by training two neural networks in a competitive manner. The first network, known as the generator, generates fake data samples by adding random noise. The second network, called the discriminator, tries to distinguish between real data and the fake data produced by the generator. During training, the generator continually improves its ability to create realistic data while the discriminator becomes better at telling real from fake. This adversarial process continues until the generator produces data that is so convincing that the discriminator can't differentiate it from real data.</p>\n\n<p><strong>Variational autoencoders (VAE)</strong> - VAEs use two neural networks—the encoder and the decoder. The encoder neural network maps the input data to a mean and variance for each dimension of the latent space. It generates a random sample from a Gaussian (normal) distribution. This sample is a point in the latent space and represents a compressed, simplified version of the input data. The decoder neural network takes this sampled point from the latent space and reconstructs it back into data that resembles the original input.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/what-is/generative-ai/\">https://aws.amazon.com/what-is/generative-ai/</a></p>\n\n<p><a href=\"https://aws.amazon.com/what-is/retrieval-augmented-generation/\">https://aws.amazon.com/what-is/retrieval-augmented-generation/</a></p>\n\n<p><a href=\"https://docs.aws.amazon.com/amazonq/latest/qbusiness-ug/how-it-works.html\">https://docs.aws.amazon.com/amazonq/latest/qbusiness-ug/how-it-works.html</a></p>\n","answers":["<p>Large Language Model (LLM)</p>","<p>Diffusion Model</p>","<p>Retrieval-Augmented Generation (RAG)</p>","<p>Generative adversarial network (GAN)</p>","<p>Variational autoencoders (VAE)</p>"]},"correct_response":["a","c"],"section":"Applications of Foundation Models","question_plain":"A company is exploring Amazon Q to streamline its internal business processes through automation and generative AI capabilities. The team is particularly interested in understanding how Amazon Q integrates generative AI techniques within its web application workflow to enhance tasks such as automating report generation, creating summaries, and analyzing large datasets. They want to know which specific generative AI techniques are employed in Amazon Q to achieve these outcomes.\n\nWhich of the following generative AI techniques are used in the Amazon Q Business web application workflow? (Select two)","related_lectures":[]},{"_class":"assessment","id":93243907,"assessment_type":"multiple-choice","prompt":{"question":"<p>A software development company is interested in using Amazon Q Developer to enhance its applications by integrating AI-driven features such as automated code suggestions, task automation, and content generation. To understand the technical foundation behind Amazon Q Developer and how it leverages cloud-based services for its capabilities, the development team is looking to identify which AWS service powers its core functionalities.</p>\n\n<p>Which of the following AWS services powers Amazon Q Developer?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Amazon Bedrock</strong></p>\n\n<p>Amazon Q Developer is a generative artificial intelligence (AI) powered conversational assistant that can help you understand, build, extend, and operate AWS applications. You can ask questions about AWS architecture, your AWS resources, best practices, documentation, support, and more. Amazon Q is constantly updating its capabilities so your questions get the most contextually relevant and actionable answers.</p>\n\n<p>Amazon Q Developer is powered by Amazon Bedrock.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt1-q20-i1.jpg\">\nvia - <a href=\"https://docs.aws.amazon.com/amazonq/latest/qbusiness-ug/what-is.html\">https://docs.aws.amazon.com/amazonq/latest/qbusiness-ug/what-is.html</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Amazon Q Apps</strong> - Amazon Q Apps is a capability within Amazon Q Business for users to create generative artificial intelligence (generative AI)–powered apps based on the organization’s data. Users can build apps using natural language and securely publish them to the organization’s app library for everyone to use.</p>\n\n<p><strong>Amazon SageMaker Jumpstart</strong> - Amazon SageMaker JumpStart is a machine learning hub with foundation models, built-in algorithms, and prebuilt ML solutions that you can deploy with just a few clicks With SageMaker JumpStart, you can access pre-trained models, including foundation models, to perform tasks like article summarization and image generation.</p>\n\n<p><strong>Amazon Kendra</strong> - Amazon Kendra is an intelligent search service that uses natural language processing and advanced machine learning algorithms to return specific answers to search questions from your data.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/amazonq/latest/qbusiness-ug/what-is.html\">https://docs.aws.amazon.com/amazonq/latest/qbusiness-ug/what-is.html</a></p>\n\n<p><a href=\"https://docs.aws.amazon.com/amazonq/latest/qbusiness-ug/concepts-terms.html\">https://docs.aws.amazon.com/amazonq/latest/qbusiness-ug/concepts-terms.html</a></p>\n\n<p><a href=\"https://docs.aws.amazon.com/kendra/latest/dg/what-is-kendra.html\">https://docs.aws.amazon.com/kendra/latest/dg/what-is-kendra.html</a></p>\n\n<p><a href=\"https://aws.amazon.com/blogs/aws/amazon-q-apps-now-generally-available-enables-users-to-build-their-own-generative-ai-apps/\">https://aws.amazon.com/blogs/aws/amazon-q-apps-now-generally-available-enables-users-to-build-their-own-generative-ai-apps/</a></p>\n","answers":["<p>Amazon Q Apps</p>","<p>Amazon Bedrock</p>","<p>Amazon SageMaker Jumpstart</p>","<p>Amazon Kendra</p>"]},"correct_response":["b"],"section":"Applications of Foundation Models","question_plain":"A software development company is interested in using Amazon Q Developer to enhance its applications by integrating AI-driven features such as automated code suggestions, task automation, and content generation. To understand the technical foundation behind Amazon Q Developer and how it leverages cloud-based services for its capabilities, the development team is looking to identify which AWS service powers its core functionalities.\n\nWhich of the following AWS services powers Amazon Q Developer?","related_lectures":[]},{"_class":"assessment","id":93243905,"assessment_type":"multiple-choice","prompt":{"question":"<p>The marketing department at a media company wants to leverage Amazon Bedrock for making creative scripts for an upcoming ad campaign.</p>\n\n<p>What do you recommend?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Use higher <code>Temperature</code> to get more creative responses for the same prompt on Amazon Bedrock</strong></p>\n\n<p>Temperature is a value between 0 and 1, and it regulates the creativity of the model's responses. Use a lower temperature if you want more deterministic responses, and use a higher temperature if you want creative or different responses for the same prompt on Amazon Bedrock.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt1-q21-i1.jpg\">\nvia - <a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/inference-parameters.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/inference-parameters.html</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Use higher <code>Top-P</code> to get more creative responses for the same prompt on Amazon Bedrock</strong></p>\n\n<p><strong>Use lower <code>Top-P</code> to get more creative responses for the same prompt on Amazon Bedrock</strong></p>\n\n<p>The inference parameter <code>Top P</code> represents the percentage of most likely candidates that the model considers for the next token. So, both these options serve as distractors for the given use case.</p>\n\n<p><strong>Use lower <code>Temperature</code> to get more creative responses for the same prompt on Amazon Bedrock</strong> - Use lower temperature if you want more deterministic responses, and use higher temperature if you want creative or different responses for the same prompt on Amazon Bedrock. So, this option is incorrect.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/inference-parameters.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/inference-parameters.html</a></p>\n\n<p><a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/general-guidelines-for-bedrock-users.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/general-guidelines-for-bedrock-users.html</a></p>\n","answers":["<p>Use higher <code>Top-P</code> to get more creative responses for the same prompt on Amazon Bedrock</p>","<p>Use lower <code>Temperature</code> to get more creative responses for the same prompt on Amazon Bedrock</p>","<p>Use higher <code>Temperature</code> to get more creative responses for the same prompt on Amazon Bedrock</p>","<p>Use lower <code>Top-P</code> to get more creative responses for the same prompt on Amazon Bedrock</p>"]},"correct_response":["c"],"section":"Fundamentals of AI and ML","question_plain":"The marketing department at a media company wants to leverage Amazon Bedrock for making creative scripts for an upcoming ad campaign.\n\nWhat do you recommend?","related_lectures":[]},{"_class":"assessment","id":93243903,"assessment_type":"multiple-choice","prompt":{"question":"<p>A streaming service company is developing a machine learning model to automatically classify its extensive movie library, which includes thousands of titles, into 20 distinct categories based on such as characteristics such as language, director, cast, runtime, etc. To enhance user experience and improve content recommendations, the company needs a model that not only accurately classifies the movies but also provides clear insights into how the classification decisions are made. This transparency will help the team understand which features most influence the categorization, ensuring that the model's decision-making process is fully documented and interpretable.</p>\n\n<p>Which of the following machine learning algorithms would be the most suitable for achieving this goal?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Decision Trees</strong></p>\n\n<p>Decision Trees are highly interpretable models that provide a clear and straightforward visualization of the decision-making process. Decision Trees work by splitting the data into subsets based on the most significant features, resulting in a tree-like structure where each branch represents a decision rule. This makes it easy to understand how different characteristics of movies contribute to the final classification, making Decision Trees the most suitable choice for this task. So, Decision Trees offer high interpretability and transparency, which aligns with the company's need to document the inner mechanisms of how the model affects the output.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt1-q84-i1.jpg\">\nvia - <a href=\"https://docs.aws.amazon.com/whitepapers/latest/model-explainability-aws-ai-ml/interpretability-versus-explainability.html\">https://docs.aws.amazon.com/whitepapers/latest/model-explainability-aws-ai-ml/interpretability-versus-explainability.html</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Logistic Regression</strong> - Logistic Regression is primarily designed for binary classification problems. While it can be adapted for multiclass classification, it may not perform effectively with a large number of categories or a complex dataset like a massive movie database. Additionally, logistic regression does not provide an easily interpretable structure that illustrates how each feature influences the final output, making it less suitable for the company's requirements.</p>\n\n<p><strong>Neural Networks</strong> - This option is incorrect because, although neural networks are powerful tools for handling large and complex datasets, they are often considered \"black-box\" models due to their lack of transparency. Neural networks involve multiple layers of neurons and nonlinear transformations, making it difficult to understand and document the inner workings of the model. Given the company’s need for transparency and an understanding of how the model affects the output, neural networks are not the best choice.</p>\n\n<p><strong>Support Vector Machines (SVMs)</strong> - This option is incorrect because, while SVMs are effective for classification tasks, especially in high-dimensional spaces, they do not inherently provide an interpretable way to understand the decision-making process. SVMs create a hyperplane to separate classes, but it is not straightforward to explain how individual features impact the final classification. This lack of interpretability makes SVMs less suitable for a company that wants to document and understand the inner workings of the model.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/whitepapers/latest/model-explainability-aws-ai-ml/interpretability-versus-explainability.html\">https://docs.aws.amazon.com/whitepapers/latest/model-explainability-aws-ai-ml/interpretability-versus-explainability.html</a></p>\n","answers":["<p>Logistic Regression</p>","<p>Neural Networks</p>","<p>Support Vector Machines (SVMs)</p>","<p>Decision Trees</p>"]},"correct_response":["d"],"section":"Guidelines for Responsible AI","question_plain":"A streaming service company is developing a machine learning model to automatically classify its extensive movie library, which includes thousands of titles, into 20 distinct categories based on such as characteristics such as language, director, cast, runtime, etc. To enhance user experience and improve content recommendations, the company needs a model that not only accurately classifies the movies but also provides clear insights into how the classification decisions are made. This transparency will help the team understand which features most influence the categorization, ensuring that the model's decision-making process is fully documented and interpretable.\n\nWhich of the following machine learning algorithms would be the most suitable for achieving this goal?","related_lectures":[]},{"_class":"assessment","id":93243901,"assessment_type":"multiple-choice","prompt":{"question":"<p>A company needs large, high-quality, and labeled datasets for training its machine learning models. Which Amazon SageMaker service helps build high-quality training datasets?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Amazon SageMaker Ground Truth</strong></p>\n\n<p>To train a machine learning model, you need a large, high-quality, labeled dataset. Ground Truth helps you build high-quality training datasets for your machine learning models. With Ground Truth, you can use workers from either Amazon Mechanical Turk, a vendor company that you choose, or an internal, private workforce along with machine learning to enable you to create a labeled dataset. You can use the labeled dataset output from Ground Truth to train your models. You can also use the output as a training dataset for an Amazon SageMaker model.</p>\n\n<p>Depending on your ML application, you can choose from one of the Ground Truth built-in task types to have workers generate specific types of labels for your data. You can also build a custom labeling workflow to provide your UI and tools to workers labeling your data. You can choose your workforce from:</p>\n\n<ol>\n<li><p>The Amazon Mechanical Turk workforce of over 500,000 independent contractors worldwide.</p></li>\n<li><p>A private workforce that you create from your employees or contractors for handling data within your organization.</p></li>\n<li><p>A vendor company that you can find in the AWS Marketplace that specializes in data labeling services.</p></li>\n</ol>\n\n<p>How SageMaker Ground Truth works:\n<img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt1-q23-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/sagemaker/groundtruth/\">https://aws.amazon.com/sagemaker/groundtruth/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Amazon SageMaker Feature Store</strong> - Amazon SageMaker Feature Store is a fully managed, purpose-built repository to store, share, and manage features for machine learning (ML) models. Features are inputs to ML models used during training and inference. For example, in an application that recommends a music playlist, features could include song ratings, listening duration, and listener demographics.</p>\n\n<p><strong>Amazon SageMaker JumpStart</strong> - Amazon SageMaker JumpStart is a machine learning (ML) hub that can help you accelerate your ML journey. With SageMaker JumpStart, you can evaluate, compare, and select Foundation Models (FMs) quickly based on pre-defined quality and responsibility metrics to perform tasks like article summarization and image generation. Pretrained models are fully customizable for your use case with your data, and you can easily deploy them into production with the user interface or SDK.</p>\n\n<p><strong>Amazon SageMaker Canvas</strong> - SageMaker Canvas offers a no-code interface that can be used to create highly accurate machine learning models —without any machine learning experience or writing a single line of code. SageMaker Canvas provides access to ready-to-use models including foundation models from Amazon Bedrock or Amazon SageMaker JumpStart or you can build your custom ML model using AutoML powered by SageMaker AutoPilot.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://aws.amazon.com/sagemaker/groundtruth/\">https://aws.amazon.com/sagemaker/groundtruth/</a></p>\n","answers":["<p>Amazon SageMaker Feature Store</p>","<p>Amazon SageMaker JumpStart</p>","<p>Amazon SageMaker Canvas</p>","<p>Amazon SageMaker Ground Truth</p>"]},"correct_response":["d"],"section":"Applications of Foundation Models","question_plain":"A company needs large, high-quality, and labeled datasets for training its machine learning models. Which Amazon SageMaker service helps build high-quality training datasets?","related_lectures":[]},{"_class":"assessment","id":93243899,"assessment_type":"multiple-choice","prompt":{"question":"<p>A technology company is developing a natural language processing (NLP) solution and exploring different model architectures for tasks such as language translation, summarization, and text generation. The team is particularly interested in understanding how Transformer models, which are widely used in state-of-the-art generative AI applications, process and generate text. To ensure they select the right architecture for their use case, the company needs a clear explanation of how Transformer models function.</p>\n\n<p>Which of the following best summarizes the way Transformer models work?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Transformer models use a self-attention mechanism and implement contextual embeddings</strong></p>\n\n<p>Transformer models are a type of neural network architecture designed to handle sequential data, such as language, in an efficient and scalable way. They rely on a mechanism called self-attention to process input data, allowing them to understand and generate language effectively. Self-attention allows the model to weigh the importance of different words in a sentence when encoding a particular word. This helps the model capture relationships and dependencies between words, regardless of their position in the sequence.</p>\n\n<p>Transformer models use self-attention to weigh the importance of different words in a sentence, allowing them to capture complex dependencies. Positional encodings provide information about word order, and the encoder-decoder architecture enables effective processing and generation of sequences. This makes transformers highly effective for tasks like language translation, text generation, and more.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt1-q24-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/what-is/generative-ai/\">https://aws.amazon.com/what-is/generative-ai/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Transformer models work by training two neural networks in a competitive manner</strong> - Generative Adversarial Networks (GANs) work by training two neural networks in a competitive manner. The first network, known as the generator, generates fake data samples by adding random noise. The second network, called the discriminator, tries to distinguish between real data and the fake data produced by the generator.</p>\n\n<p><strong>Transformer models work by learning a compact representation of data called latent space</strong> - Variational autoencoders (VAEs) learn a compact representation of data called latent space. You can think of it as a unique code representing the data based on all its attributes. VAEs use two neural networks—the encoder and the decoder. The encoder neural network maps the input data to a mean and variance for each dimension of the latent space. The decoder neural network takes this sampled point from the latent space and reconstructs it back into data that resembles the original input.</p>\n\n<p><strong>Transformer models create new data by iteratively making controlled random changes to an initial data sample</strong> - Diffusion models work by first corrupting data with noise through a forward diffusion process and then learning to reverse this process to denoise the data. They use neural networks to predict and remove the noise step by step, ultimately generating new, structured data from random noise.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://aws.amazon.com/what-is/generative-ai/\">https://aws.amazon.com/what-is/generative-ai/</a></p>\n","answers":["<p>Transformer models work by training two neural networks in a competitive manner</p>","<p>Transformer models use a self-attention mechanism and implement contextual embeddings</p>","<p>Transformer models work by learning a compact representation of data called latent space</p>","<p>Transformer models create new data by iteratively making controlled random changes to an initial data sample</p>"]},"correct_response":["b"],"section":"Fundamentals of AI and ML","question_plain":"A technology company is developing a natural language processing (NLP) solution and exploring different model architectures for tasks such as language translation, summarization, and text generation. The team is particularly interested in understanding how Transformer models, which are widely used in state-of-the-art generative AI applications, process and generate text. To ensure they select the right architecture for their use case, the company needs a clear explanation of how Transformer models function.\n\nWhich of the following best summarizes the way Transformer models work?","related_lectures":[]},{"_class":"assessment","id":93243897,"assessment_type":"multiple-choice","prompt":{"question":"<p>A media company has developed an AI-based image generation model to create promotional materials, but it has noticed that the model consistently produces biased outputs, such as generating fewer images representing certain demographic groups. This issue stems from the input data used to train the model, which is imbalanced and underrepresents these groups. To ensure fair representation and mitigate bias in the generated images, the company needs to implement an effective approach to address the data imbalance in its training dataset.</p>\n\n<p>What would be the most suitable strategy to achieve this goal?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Augment the data by generating new instances of data for underrepresented groups</strong></p>\n\n<p>This option involves creating additional examples to balance the dataset. This approach helps to increase the representation of underrepresented groups in the training data, thereby reducing bias in the model's outputs. By augmenting the dataset, the model is exposed to a more diverse set of inputs, improving its ability to generate fair and unbiased images. By ensuring that all groups are adequately represented in the training data, the model learns to generate unbiased images that fairly reflect the diversity of the population. Data augmentation is a widely used technique to address data imbalance and mitigate bias in machine learning models, particularly in tasks involving image generation.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt1-q83-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/what-is/data-augmentation/\">https://aws.amazon.com/what-is/data-augmentation/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Use another model that can handle the imbalance in data</strong> - Switching to a different model architecture or algorithm does not directly address the underlying problem of biased input data. While some models may be more robust to data imbalance, they cannot fully eliminate bias without correcting the data itself. The effectiveness of this approach is limited if the data remains inherently biased.</p>\n\n<p><strong>Leverage human intervention to manually correct the imbalanced dataset</strong> - While manual intervention can target specific instances of bias, it is not practical for large datasets and is prone to human error. Additionally, it is a time-consuming process that may not be scalable or comprehensive enough to address all forms of bias in the data. Augmenting the data is a more effective and scalable solution.</p>\n\n<p><strong>Apply model regularization techniques to address the imbalance in data</strong> - Regularization techniques, such as L1 or L2 regularization, are designed to prevent overfitting by adding a penalty to the loss function during training. These techniques do not address the issue of data imbalance or bias, and therefore do not solve the problem of biased outputs from the image generation model.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://aws.amazon.com/what-is/data-augmentation/\">https://aws.amazon.com/what-is/data-augmentation/</a></p>\n","answers":["<p>Use another model that can handle the imbalance in data</p>","<p>Leverage human intervention to manually correct the imbalanced dataset</p>","<p>Augment the data by generating new instances of data for underrepresented groups</p>","<p>Apply model regularization techniques to address the imbalance in data</p>"]},"correct_response":["c"],"section":"Security, Compliance, and Governance for AI Solutions","question_plain":"A media company has developed an AI-based image generation model to create promotional materials, but it has noticed that the model consistently produces biased outputs, such as generating fewer images representing certain demographic groups. This issue stems from the input data used to train the model, which is imbalanced and underrepresents these groups. To ensure fair representation and mitigate bias in the generated images, the company needs to implement an effective approach to address the data imbalance in its training dataset.\n\nWhat would be the most suitable strategy to achieve this goal?","related_lectures":[]},{"_class":"assessment","id":93243895,"assessment_type":"multi-select","prompt":{"question":"<p>A financial services company is building machine learning models to predict customer churn and detect fraudulent transactions. The data science team is exploring different machine learning approaches and needs to understand which methods fall under supervised learning, where the model is trained on labeled data with known outcomes. Identifying the correct supervised learning techniques will help the team select the most appropriate models for their predictive tasks.</p>\n\n<p>Which of the following are examples of supervised learning? (Select two)</p>\n","relatedLectureIds":"","feedbacks":["","","","",""],"explanation":"<p>Correct options:</p>\n\n<p>Supervised learning algorithms train on sample data that specifies both the algorithm's input and output. For example, the data could be images of handwritten numbers that are annotated to indicate which numbers they represent. Given sufficient labeled data, the supervised learning system would eventually recognize the clusters of pixels and shapes associated with each handwritten number.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt1-q26-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/compare/the-difference-between-machine-learning-supervised-and-unsupervised/\">https://aws.amazon.com/compare/the-difference-between-machine-learning-supervised-and-unsupervised/</a></p>\n\n<p><strong>Linear regression</strong></p>\n\n<p>Linear regression refers to supervised learning models that, based on one or more inputs, predict a value from a continuous scale. An example of linear regression is predicting a house price. You could predict a house’s price based on its location, age, and number of rooms after you train a model on a set of historical sales training data with those variables.</p>\n\n<p><strong>Neural network</strong></p>\n\n<p>A neural network solution is a more complex supervised learning technique. To produce a given outcome, it takes some given inputs and performs one or more layers of mathematical transformation based on adjusting data weightings. An example of a neural network technique is predicting a digit from a handwritten image.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Document classification</strong> - This is an example of semi-supervised learning. Semi-supervised learning is when you apply both supervised and unsupervised learning techniques to a common problem. This technique relies on using a small amount of labeled data and a large amount of unlabeled data to train systems. When applying categories to a large document base, there may be too many documents to physically label. For example, these could be countless reports, transcripts, or specifications. Training on the unlabeled data helps identify similar documents for labeling.</p>\n\n<p><strong>Association rule learning</strong> - This is an example of unsupervised learning. Association rule learning techniques uncover rule-based relationships between inputs in a dataset. For example, the Apriori algorithm conducts market basket analysis to identify rules like coffee and milk often being purchased together.</p>\n\n<p><strong>Clustering</strong> - Clustering is an unsupervised learning technique that groups certain data inputs, so they may be categorized as a whole. There are various types of clustering algorithms depending on the input data. An example of clustering is identifying different types of network traffic to predict potential security incidents.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/what-is/machine-learning/\">https://aws.amazon.com/what-is/machine-learning/</a></p>\n\n<p><a href=\"https://aws.amazon.com/compare/the-difference-between-machine-learning-supervised-and-unsupervised/\">https://aws.amazon.com/compare/the-difference-between-machine-learning-supervised-and-unsupervised/</a></p>\n","answers":["<p>Linear regression</p>","<p>Document classification</p>","<p>Association rule learning</p>","<p>Neural network</p>","<p>Clustering</p>"]},"correct_response":["a","d"],"section":"Fundamentals of AI and ML","question_plain":"A financial services company is building machine learning models to predict customer churn and detect fraudulent transactions. The data science team is exploring different machine learning approaches and needs to understand which methods fall under supervised learning, where the model is trained on labeled data with known outcomes. Identifying the correct supervised learning techniques will help the team select the most appropriate models for their predictive tasks.\n\nWhich of the following are examples of supervised learning? (Select two)","related_lectures":[]},{"_class":"assessment","id":93243893,"assessment_type":"multiple-choice","prompt":{"question":"<p>A company has fine-tuned a Foundation Model on Amazon Bedrock, and the training data used for fine-tuning includes some confidential information. The company wants to ensure that the customized model's responses do not contain any of this confidential information to maintain data privacy and security.</p>\n\n<p>What is the most efficient approach to achieve this goal?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>The company should mask the confidential information from the model responses by leveraging Amazon Bedrock Guardrails</strong></p>\n\n<p>Amazon Bedrock Guardrails detects sensitive information such as personally identifiable information (PIIs) in input prompts or model responses. You can also configure sensitive information specific to your use case or organization by defining it with regular expressions (regex).</p>\n\n<p>This option dynamically scans and redacts confidential information from the model's responses and it provides a practical and efficient solution. It allows the company to continue using the fine-tuned model without the need to retrain or delete it. This method provides real-time filtering of outputs, ensuring that any sensitive data is removed before it is presented to the end user, effectively maintaining data privacy and security.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt1-q80-i1.jpg\">\nvia - <a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/guardrails-sensitive-filters.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/guardrails-sensitive-filters.html</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>The company should delete the customized model, remove confidential information from the training data, and fine-tune the model again</strong> - Retraining the model from scratch is highly resource-intensive and time-consuming. Additionally, if the fine-tuning process has been extensive, the cost and effort required to retrain may outweigh the benefits, especially when there are other less costly and more efficient methods available. This is not an efficient solution.</p>\n\n<p><strong>The company should use encryption to protect the confidential information in the model responses</strong> - This option is incorrect because encryption protects data during storage and transmission but does not prevent the model from generating responses that may contain confidential information. The primary concern is to avoid the disclosure of sensitive data in the model outputs, which encryption does not address. Encryption would not prevent the model from exposing confidential information, making it an ineffective solution for this particular problem.</p>\n\n<p><strong>The company should swap Amazon Bedrock with Amazon SageMaker and rebuild the model using Amazon SageMaker built-in algorithms</strong> - This option acts as a distractor. Swapping Amazon Bedrock with Amazon SageMaker involves significant model development, training and testing effort. This is not an efficient solution.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/guardrails-sensitive-filters.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/guardrails-sensitive-filters.html</a></p>\n","answers":["<p>The company should delete the customized model, remove confidential information from the training data, and fine-tune the model again</p>","<p>The company should use encryption to protect the confidential information in the model responses</p>","<p>The company should swap Amazon Bedrock with Amazon SageMaker and rebuild the model using Amazon SageMaker built-in algorithms</p>","<p>The company should mask the confidential information from the model responses by leveraging Amazon Bedrock Guardrails</p>"]},"correct_response":["d"],"section":"Applications of Foundation Models","question_plain":"A company has fine-tuned a Foundation Model on Amazon Bedrock, and the training data used for fine-tuning includes some confidential information. The company wants to ensure that the customized model's responses do not contain any of this confidential information to maintain data privacy and security.\n\nWhat is the most efficient approach to achieve this goal?","related_lectures":[]},{"_class":"assessment","id":93243891,"assessment_type":"multiple-choice","prompt":{"question":"<p>A robotics company is exploring different machine learning techniques to improve the decision-making capabilities of its autonomous robots. The team is particularly interested in reinforcement learning as a way to enable the robots to learn from their interactions with the environment and improve performance over time. To ensure they understand the underlying mechanics and applicability of this approach, they need a clear explanation of how reinforcement learning works and how it differs from other machine learning methods.</p>\n\n<p>How does reinforcement learning work?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Reinforcement learning involves an agent interacting with an environment by taking actions and receiving rewards or penalties, learning a policy to maximize cumulative rewards over time</strong></p>\n\n<p>Reinforcement learning works by having an agent take actions in an environment, receiving rewards or penalties based on the actions, and learning a policy that aims to maximize cumulative rewards over time. This process involves continuously adjusting actions based on the feedback received to improve performance.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt1-q28-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/what-is/reinforcement-learning/\">https://aws.amazon.com/what-is/reinforcement-learning/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Reinforcement learning uses supervised learning algorithms to label data and make predictions based on those labels</strong> - Reinforcement learning does not use supervised learning algorithms to label data. Rather, it focuses on learning from interaction with the environment.</p>\n\n<p><strong>Reinforcement learning relies on unsupervised learning techniques to cluster data points into groups without any specific feedback mechanism</strong> - Reinforcement learning is not an unsupervised learning technique and does not cluster data points without feedback.</p>\n\n<p><strong>Reinforcement learning transforms raw data into a new feature space to reduce dimensionality and improve the accuracy of the model</strong> - While data transformation can be part of feature engineering, reinforcement learning specifically involves learning optimal actions based on feedback from the environment rather than transforming data into a new feature space.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://aws.amazon.com/what-is/reinforcement-learning/\">https://aws.amazon.com/what-is/reinforcement-learning/</a></p>\n","answers":["<p>Reinforcement learning uses supervised learning algorithms to label data and make predictions based on those labels</p>","<p>Reinforcement learning relies on unsupervised learning techniques to cluster data points into groups without any specific feedback mechanism</p>","<p>Reinforcement learning involves an agent interacting with an environment by taking actions and receiving rewards or penalties, learning a policy to maximize cumulative rewards over time</p>","<p>Reinforcement learning transforms raw data into a new feature space to reduce dimensionality and improve the accuracy of the model</p>"]},"correct_response":["c"],"section":"Fundamentals of AI and ML","question_plain":"A robotics company is exploring different machine learning techniques to improve the decision-making capabilities of its autonomous robots. The team is particularly interested in reinforcement learning as a way to enable the robots to learn from their interactions with the environment and improve performance over time. To ensure they understand the underlying mechanics and applicability of this approach, they need a clear explanation of how reinforcement learning works and how it differs from other machine learning methods.\n\nHow does reinforcement learning work?","related_lectures":[]},{"_class":"assessment","id":93243889,"assessment_type":"multi-select","prompt":{"question":"<p>Which of the following are correct statements regarding the AWS Global Infrastructure? (Select two)</p>\n","relatedLectureIds":"","feedbacks":["","","","",""],"explanation":"<p>Correct options:</p>\n\n<p><strong>Each AWS Region consists of a minimum of three Availability Zones (AZ)</strong></p>\n\n<p><strong>Each Availability Zone (AZ) consists of one or more discrete data centers</strong></p>\n\n<p>AWS has the concept of a Region, which is a physical location around the world where AWS clusters its data centers. AWS calls each group of logical data centers an Availability Zone (AZ). Each AWS Region consists of a minimum of three, isolated, and physically separate AZs within a geographic area. Each AZ has independent power, cooling, and physical security and is connected via redundant, ultra-low-latency networks.</p>\n\n<p>An Availability Zone (AZ) is one or more discrete data centers with redundant power, networking, and connectivity in an AWS Region. All AZs in an AWS Region are interconnected with high-bandwidth, low-latency networking, over fully redundant, dedicated metro fiber providing high-throughput, low-latency networking between AZs.</p>\n\n<p>AWS Regions and Availability Zones Overview:\n<img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt1-q29-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/about-aws/global-infrastructure/regions_az/\">https://aws.amazon.com/about-aws/global-infrastructure/regions_az/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Each AWS Region consists of a minimum of two Availability Zones (AZ)</strong></p>\n\n<p><strong>Each Availability Zone (AZ) consists of two or more discrete data centers</strong></p>\n\n<p><strong>Each AWS Region consists of two or more Edge Locations</strong></p>\n\n<p>These three options contradict the details provided earlier in the explanation, so these options are incorrect.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://aws.amazon.com/about-aws/global-infrastructure/regions_az/\">https://aws.amazon.com/about-aws/global-infrastructure/regions_az/</a></p>\n","answers":["<p>Each AWS Region consists of a minimum of two Availability Zones (AZ)</p>","<p>Each AWS Region consists of a minimum of three Availability Zones (AZ)</p>","<p>Each Availability Zone (AZ) consists of one or more discrete data centers</p>","<p>Each Availability Zone (AZ) consists of two or more discrete data centers</p>","<p>Each AWS Region consists of two or more Edge Locations</p>"]},"correct_response":["b","c"],"section":"Security, Compliance, and Governance for AI Solutions","question_plain":"Which of the following are correct statements regarding the AWS Global Infrastructure? (Select two)","related_lectures":[]},{"_class":"assessment","id":93243887,"assessment_type":"multiple-choice","prompt":{"question":"<p>In the context of the shared responsibility model for AWS cloud services, which of the following best describes the division of responsibilities between the customer and AWS?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>AWS is responsible for the security \"of\" the cloud, including infrastructure, hardware, and software, while the customer is responsible for security \"in\" the cloud, including data, applications, and access management</strong></p>\n\n<p>In the shared responsibility model, AWS is responsible for the security of the cloud, which includes the physical security of data centers, networking infrastructure, and hardware. The customer is responsible for security in the cloud, which includes securing their data, managing access and identity, configuring network settings, and ensuring application security.</p>\n\n<p>Shared Responsibility Model Overview:\n<img src=\"https://d1.awsstatic.com/security-center/Shared_Responsibility_Model_V2.59d1eccec334b366627e9295b304202faf7b899b.jpg\">\nvia - <a href=\"https://aws.amazon.com/compliance/shared-responsibility-model/\">https://aws.amazon.com/compliance/shared-responsibility-model/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>AWS is responsible for configuring and managing the security settings of the customer's applications, while the customer is responsible for the underlying hardware infrastructure</strong> - AWS manages the underlying infrastructure, including the hardware, but the customer is responsible for configuring and managing the security settings of their applications.</p>\n\n<p><strong>AWS handles all security aspects including data encryption, user access management, and application security, while the customer only needs to manage their virtual machines</strong> - AWS does not handle all aspects of security; customers must manage their own data encryption, user access management, and application security.</p>\n\n<p><strong>Customers are responsible for ensuring the physical security of data centers, while AWS is responsible for monitoring network traffic and managing user identities</strong> - Customers do not manage the physical security of data centers; AWS is responsible for this aspect of security.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://aws.amazon.com/compliance/shared-responsibility-model/\">https://aws.amazon.com/compliance/shared-responsibility-model/</a></p>\n","answers":["<p>AWS is responsible for configuring and managing the security settings of the customer's applications, while the customer is responsible for the underlying hardware infrastructure</p>","<p>AWS is responsible for the security \"of\" the cloud, including infrastructure, hardware, and software, while the customer is responsible for security \"in\" the cloud, including data, applications, and access management</p>","<p>AWS handles all security aspects including data encryption, user access management, and application security, while the customer only needs to manage their virtual machines</p>","<p>Customers are responsible for ensuring the physical security of data centers, while AWS is responsible for monitoring network traffic and managing user identities</p>"]},"correct_response":["b"],"section":"Security, Compliance, and Governance for AI Solutions","question_plain":"In the context of the shared responsibility model for AWS cloud services, which of the following best describes the division of responsibilities between the customer and AWS?","related_lectures":[]},{"_class":"assessment","id":93243963,"assessment_type":"multiple-choice","prompt":{"question":"<p>Which of the following services is specifically designed to provide insights into model predictions by explaining how input features contribute to the final output?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Amazon SageMaker Clarify</strong></p>\n\n<p>Amazon SageMaker Clarify provides tools to help explain how machine learning (ML) models make predictions. These tools can help ML modelers and developers and other internal stakeholders understand model characteristics as a whole prior to deployment and to debug predictions provided by the model after it's deployed.</p>\n\n<p>SageMaker Clarify uses a model-agnostic feature attribution approach. You can use this to understand why a model made a prediction after training, and to provide per-instance explanation during inference. The implementation includes a scalable and efficient implementation of SHAP. This is based on the concept of a Shapley value, from the field of cooperative game theory, that assigns each feature an importance value for a particular prediction.</p>\n\n<p>Clarify produces partial dependence plots (PDPs) that show the marginal effect features have on the predicted outcome of a machine learning model. Partial dependence helps explain target response given a set of input features.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt1-q31-i1.jpg\">\nvia - <a href=\"https://docs.aws.amazon.com/sagemaker/latest/dg/clarify-model-explainability.html\">https://docs.aws.amazon.com/sagemaker/latest/dg/clarify-model-explainability.html</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Amazon SageMaker Canvas</strong> - Through the no-code interface of SageMaker Canvas, you can create highly accurate machine-learning models — without any machine-learning experience or writing a single line of code. SageMaker Canvas provides access to ready-to-use models including foundation models from Amazon Bedrock or Amazon SageMaker JumpStart or you can build your custom ML model using AutoML powered by SageMaker AutoPilot. With SageMaker Canvas, you can use SageMaker Data Wrangler to easily access and import data from 50+ sources, prepare data using natural language and 300+ built-in transforms, build and train highly accurate models, generate predictions, and deploy models to production.</p>\n\n<p><strong>Amazon SageMaker Feature Store</strong> - Amazon SageMaker Feature Store is a fully managed, purpose-built repository to store, share, and manage features for machine learning (ML) models. Features are inputs to ML models used during training and inference. For example, in an application that recommends a music playlist, features could include song ratings, listening duration, and listener demographics.</p>\n\n<p><strong>Amazon SageMaker Model Monitor</strong> - Amazon SageMaker Model Monitor monitors the quality of Amazon SageMaker machine learning models in production.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/sagemaker/latest/dg/clarify-model-explainability.html\">https://docs.aws.amazon.com/sagemaker/latest/dg/clarify-model-explainability.html</a></p>\n","answers":["<p>Amazon SageMaker Canvas</p>","<p>Amazon SageMaker Feature Store</p>","<p>Amazon SageMaker Clarify</p>","<p>Amazon SageMaker Model Monitor</p>"]},"correct_response":["c"],"section":"Fundamentals of Generative AI","question_plain":"Which of the following services is specifically designed to provide insights into model predictions by explaining how input features contribute to the final output?","related_lectures":[]},{"_class":"assessment","id":93243965,"assessment_type":"multiple-choice","prompt":{"question":"<p>Which of the following explanations BEST describes the differences between Shapley values and Partial Dependence Plots (PDP) in the context of model explainability, and how you might use them for this purpose?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Shapley values provide a local explanation by quantifying the contribution of each feature to the prediction for a specific instance, while PDP provides a global explanation by showing the marginal effect of a feature on the model’s predictions across the dataset. Use Shapley values to explain individual predictions and PDP to understand the model's behavior at a dataset level</strong></p>\n\n<p>This option correctly captures the differences between Shapley values and PDP in the context of model explainability:</p>\n\n<p>Shapley values are a local interpretability method that explains individual predictions by assigning each feature a contribution score based on its marginal effect on the prediction. This method is useful for understanding the impact of each feature on a specific instance's prediction.</p>\n\n<p>Partial Dependence Plots (PDP), on the other hand, provide a global view of the model’s behavior by illustrating how the predicted outcome changes as a single feature is varied across its range, holding all other features constant. PDPs help understand the overall relationship between a feature and the model output across the entire dataset.</p>\n\n<p>Thus, Shapley values are suited for explaining individual decisions, while PDP is used to understand broader trends in model behavior.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt1-q32-i1.jpg\">\nvia - <a href=\"https://docs.aws.amazon.com/sagemaker/latest/dg/clarify-model-explainability.html\">https://docs.aws.amazon.com/sagemaker/latest/dg/clarify-model-explainability.html</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Shapley values provide a global view of the model’s behavior by measuring the average effect of each feature across all instances, while PDP offers a local view by showing the effect of a single feature on the model’s prediction for a specific instance. Use Shapley values to understand overall feature importance and PDP to interpret individual predictions</strong> - This option is incorrect because it reverses the concepts of local and global explainability methods. PDP is a global method, while Shapley values provide local explanations.</p>\n\n<p><strong>Shapley values and PDP are both global explainability methods that show the average effect of features on model predictions. Use either method to understand overall feature importance, but Shapley values are computationally less expensive than PDP</strong> - Both methods are not purely global explainability tools. Shapley values are computationally more intensive than PDP due to the requirement to compute contributions for each feature across multiple permutations</p>\n\n<p><strong>Shapley values provide a visual interpretation of feature importance using plots, while PDP provides numeric values indicating the marginal contribution of features to the model's predictions. Use Shapley values for visual analysis and PDP for quantitative analysis</strong> - This option is incorrect because Shapley values are not just visual; they provide quantitative contributions of features to predictions, while PDP provides visual insight into the marginal effects, not numeric values alone.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/sagemaker/latest/dg/clarify-model-explainability.html\">https://docs.aws.amazon.com/sagemaker/latest/dg/clarify-model-explainability.html</a></p>\n","answers":["<p>Shapley values provide a global view of the model’s behavior by measuring the average effect of each feature across all instances, while PDP offers a local view by showing the effect of a single feature on the model’s prediction for a specific instance. Use Shapley values to understand overall feature importance and PDP to interpret individual predictions</p>","<p>Shapley values provide a local explanation by quantifying the contribution of each feature to the prediction for a specific instance, while PDP provides a global explanation by showing the marginal effect of a feature on the model’s predictions across the dataset. Use Shapley values to explain individual predictions and PDP to understand the model's behavior at a dataset level</p>","<p>Shapley values and PDP are both global explainability methods that show the average effect of features on model predictions. Use either method to understand overall feature importance, but Shapley values are computationally less expensive than PDP</p>","<p>Shapley values provide a visual interpretation of feature importance using plots, while PDP provides numeric values indicating the marginal contribution of features to the model's predictions. Use Shapley values for visual analysis and PDP for quantitative analysis</p>"]},"correct_response":["b"],"section":"Fundamentals of AI and ML","question_plain":"Which of the following explanations BEST describes the differences between Shapley values and Partial Dependence Plots (PDP) in the context of model explainability, and how you might use them for this purpose?","related_lectures":[]},{"_class":"assessment","id":93243967,"assessment_type":"multi-select","prompt":{"question":"<p>An e-commerce company wants to analyze thousands of customer reviews it receives daily to understand customer sentiment — whether positive, negative, neutral, or mixed. The goal is to gain insights into customer opinions, identify potential issues, and refine product offerings and marketing strategies. To achieve this, the company's data science team is exploring AWS AI services that can perform sentiment analysis on the written customer reviews.</p>\n\n<p>Which of the following would you recommend? (Select two)</p>\n","relatedLectureIds":"","feedbacks":["","","","",""],"explanation":"<p>Correct options:</p>\n\n<p><strong>Amazon Comprehend</strong></p>\n\n<p>Amazon Comprehend is a natural language processing (NLP) service that uses machine learning to uncover insights and relationships in text. It is specifically designed for tasks such as sentiment analysis, entity recognition, key phrase extraction, and language detection. For the scenario of analyzing customer reviews, Amazon Comprehend can directly determine the overall sentiment of a text (positive, negative, neutral, or mixed), making it the ideal service for this purpose. By using Amazon Comprehend, e-commerce platforms can effectively analyze customer feedback, understand customer satisfaction levels, and identify common themes or concerns.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt1-q33-i1.jpg\">\nvia - <a href=\"https://docs.aws.amazon.com/comprehend/latest/dg/how-sentiment.html\">https://docs.aws.amazon.com/comprehend/latest/dg/how-sentiment.html</a></p>\n\n<p><strong>Amazon Bedrock</strong></p>\n\n<p>Amazon Bedrock is an AI service that provides access to foundation models (large language models, including those for NLP tasks) via an API. While Amazon Bedrock is not specifically an NLP service like Amazon Comprehend, it can be used to fine-tune pre-trained foundation models for various tasks, including sentiment analysis. With the proper configuration and fine-tuning, Bedrock can analyze text data to determine sentiment, making it a versatile option for advanced users who may need more customizable solutions than Amazon Comprehend.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt1-q33-i2.jpg\">\nvia - <a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/prompt-templates-and-examples.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/prompt-templates-and-examples.html</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Amazon Rekognition</strong> - Amazon Rekognition is a service designed for analyzing images and videos, not text. It can identify objects, people, text within images, and even detect inappropriate content in images and videos. However, it does not provide any capabilities for natural language processing or sentiment analysis, making it unsuitable for analyzing written customer reviews.</p>\n\n<p><strong>Amazon Textract</strong> - Amazon Textract is an OCR (Optical Character Recognition) service that extracts printed or handwritten text from scanned documents, PDFs, and images. It is useful for digitizing text but does not offer any features for analyzing or interpreting the sentiment of the extracted text. Since Textract focuses on text extraction rather than understanding or analyzing the content, it is not suitable for sentiment analysis tasks.</p>\n\n<p><strong>Amazon Personalize</strong> - Amazon Personalize is a service that provides personalized recommendations, search, and ranking for websites and applications based on user behavior and preferences. While it can help improve customer experience by suggesting products or content based on historical data, it does not offer natural language processing or sentiment analysis capabilities. Thus, it is not the correct choice for analyzing written customer reviews to determine sentiment.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/comprehend/latest/dg/how-sentiment.html\">https://docs.aws.amazon.com/comprehend/latest/dg/how-sentiment.html</a></p>\n\n<p><a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/prompt-templates-and-examples.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/prompt-templates-and-examples.html</a></p>\n","answers":["<p>Amazon Comprehend</p>","<p>Amazon Bedrock</p>","<p>Amazon Rekognition</p>","<p>Amazon Textract</p>","<p>Amazon Personalize</p>"]},"correct_response":["a","b"],"section":"Fundamentals of AI and ML","question_plain":"An e-commerce company wants to analyze thousands of customer reviews it receives daily to understand customer sentiment — whether positive, negative, neutral, or mixed. The goal is to gain insights into customer opinions, identify potential issues, and refine product offerings and marketing strategies. To achieve this, the company's data science team is exploring AWS AI services that can perform sentiment analysis on the written customer reviews.\n\nWhich of the following would you recommend? (Select two)","related_lectures":[]},{"_class":"assessment","id":93243969,"assessment_type":"multiple-choice","prompt":{"question":"<p>A company has deployed several machine learning models on Amazon Bedrock to provide real-time predictions and analytics for its clients. To maintain operational transparency and ensure compliance with regulatory requirements, the company needs to monitor the input data sent to these models and the output responses generated. This monitoring is crucial for tracking usage, auditing access patterns, and troubleshooting any issues that may arise during model execution. The company is looking for a solution that provides detailed visibility into all model invocations to maintain effective oversight.</p>\n\n<p>Which of the following solutions would be the most suitable for achieving this goal?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>The company should enable model invocation logging, which allows for detailed logging of all requests and responses during model invocations in Amazon Bedrock</strong></p>\n\n<p>You can use model invocation logging to collect invocation logs, model input data, and model output data for all invocations in your AWS account used in Amazon Bedrock. With invocation logging, you can collect the full request data, response data, and metadata associated with all calls performed in your account. Logging can be configured to provide the destination resources where the log data will be published. Supported destinations include Amazon CloudWatch Logs and Amazon Simple Storage Service (Amazon S3). Only destinations from the same account and region are supported. Model invocation logging is disabled by default.</p>\n\n<p>This is the correct option because enabling invocation logging on Amazon Bedrock allows the company to capture detailed logs of all model requests and responses, including input data, output predictions, and any errors that occur during model execution. This method provides comprehensive monitoring capabilities, enabling the company to effectively track, audit, and troubleshoot model performance and usage.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt1-q78-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/blogs/mt/monitoring-generative-ai-applications-using-amazon-bedrock-and-amazon-cloudwatch-integration/\">https://aws.amazon.com/blogs/mt/monitoring-generative-ai-applications-using-amazon-bedrock-and-amazon-cloudwatch-integration/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>The company should use AWS CloudTrail logs for tracking Amazon Bedrock API calls, which records API activities and calls made to various AWS services, including Amazon Bedrock</strong> - While AWS CloudTrail is useful for tracking API calls and monitoring who accessed which AWS resources, it does not capture the actual input and output data involved in model invocations. CloudTrail logs are primarily intended for auditing access and managing security rather than monitoring detailed data flow or model performance on Amazon Bedrock.</p>\n\n<p><strong>The company should analyze Amazon Bedrock model invocation events in Amazon EventBridge</strong> - Amazon EventBridge is designed to react to changes and events across AWS resources and trigger workflows or automate responses. Although it can track when a model invocation occurs, it does not provide detailed logging of the input and output data associated with these invocations, limiting its usefulness for comprehensive monitoring purposes.</p>\n\n<p><strong>The company should use AWS Config to monitor changes in resource configurations initiated by Amazon Bedrock</strong> - AWS Config is specifically designed for monitoring and managing AWS resource configurations and compliance, not for tracking or logging the input and output data of machine learning models on Amazon Bedrock. AWS Config focuses on configuration management and does not provide the level of detail required to monitor data traffic or model performance in machine learning applications.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/model-invocation-logging.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/model-invocation-logging.html</a></p>\n\n<p><a href=\"https://aws.amazon.com/blogs/mt/monitoring-generative-ai-applications-using-amazon-bedrock-and-amazon-cloudwatch-integration/\">https://aws.amazon.com/blogs/mt/monitoring-generative-ai-applications-using-amazon-bedrock-and-amazon-cloudwatch-integration/</a></p>\n","answers":["<p>The company should enable model invocation logging, which allows for detailed logging of all requests and responses during model invocations in Amazon Bedrock</p>","<p>The company should use AWS CloudTrail logs for tracking Amazon Bedrock API calls, which records API activities and calls made to various AWS services, including Amazon Bedrock</p>","<p>The company should analyze Amazon Bedrock model invocation events in Amazon EventBridge</p>","<p>The company should use AWS Config to monitor changes in resource configurations initiated by Amazon Bedrock</p>"]},"correct_response":["a"],"section":"Security, Compliance, and Governance for AI Solutions","question_plain":"A company has deployed several machine learning models on Amazon Bedrock to provide real-time predictions and analytics for its clients. To maintain operational transparency and ensure compliance with regulatory requirements, the company needs to monitor the input data sent to these models and the output responses generated. This monitoring is crucial for tracking usage, auditing access patterns, and troubleshooting any issues that may arise during model execution. The company is looking for a solution that provides detailed visibility into all model invocations to maintain effective oversight.\n\nWhich of the following solutions would be the most suitable for achieving this goal?","related_lectures":[]},{"_class":"assessment","id":93243971,"assessment_type":"multiple-choice","prompt":{"question":"<p>A retail company has a collection of product catalogs in the form of PDFs and aims to provide the most current and relevant responses to customer inquiries through its Large Language Model (LLM) chatbot powered by Amazon Bedrock.</p>\n\n<p>Which of the following approaches represents the most cost-effective solution?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Utilize a Retrieval-Augmented Generation (RAG) system by indexing all product catalog PDFs and configuring the LLM chatbot to reference this system for answering queries</strong></p>\n\n<p>Using a RAG approach is the least costly and most efficient solution for providing up-to-date and relevant responses. In this approach, you convert all product catalog PDFs into a searchable knowledge base. When a customer query comes in, the RAG framework first retrieves the most relevant pieces of information from this knowledge base and then uses an LLM to generate a coherent response based on the retrieved context. This method does not require re-training the model or modifying every incoming query with large datasets, making it significantly more cost-effective. It ensures that the chatbot always has access to the most recent information without needing expensive updates or processing every time.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt1-q35-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/bedrock/knowledge-bases/\">https://aws.amazon.com/bedrock/knowledge-bases/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Attach the contents of all product catalog PDFs to each customer query request to ensure the LLM has all available information for generating responses</strong> - Attaching all PDF content to every query is highly inefficient and expensive. This method significantly increases data transmission costs, processing time, and latency because the LLM would have to parse extensive amounts of information with each query, making it impractical for real-time interactions. It also burdens the LLM's context window, potentially degrading the quality of responses.</p>\n\n<p><strong>Attach the contents of the single product catalog PDF to each customer query request to ensure the LLM has the relevant information for generating responses</strong> - This option acts as a distractor. There is no low-cost way of identifying the single product catalog PDF that is relevant to the given query request. You would need to code a custom solution to search the most relevant PDF for each query and then attach it to the query context.</p>\n\n<p><strong>Fine-tune the LLM with data extracted from the product catalog PDFs to enhance its ability to provide accurate responses</strong> - Fine-tuning the LLM using product PDF data is a costly and resource-intensive approach. It requires substantial computational resources and time to adjust the model's parameters to a specific dataset. Moreover, this solution is not scalable; the model would need to be re-fine-tuned frequently whenever the product literature is updated, resulting in recurring costs and downtime.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/bedrock/knowledge-bases/\">https://aws.amazon.com/bedrock/knowledge-bases/</a></p>\n\n<p><a href=\"https://aws.amazon.com/what-is/retrieval-augmented-generation/\">https://aws.amazon.com/what-is/retrieval-augmented-generation/</a></p>\n","answers":["<p>Attach the contents of all product catalog PDFs to each customer query request to ensure the LLM has all available information for generating responses</p>","<p>Attach the contents of the single product catalog PDF to each customer query request to ensure the LLM has the relevant information for generating responses</p>","<p>Fine-tune the LLM with data extracted from the product catalog PDFs to enhance its ability to provide accurate responses</p>","<p>Utilize a Retrieval-Augmented Generation (RAG) system by indexing all product catalog PDFs and configuring the LLM chatbot to reference this system for answering queries</p>"]},"correct_response":["d"],"section":"Applications of Foundation Models","question_plain":"A retail company has a collection of product catalogs in the form of PDFs and aims to provide the most current and relevant responses to customer inquiries through its Large Language Model (LLM) chatbot powered by Amazon Bedrock.\n\nWhich of the following approaches represents the most cost-effective solution?","related_lectures":[]},{"_class":"assessment","id":93243973,"assessment_type":"multiple-choice","prompt":{"question":"<p>A Large Language Model (LLM) chatbot is generating responses that appear plausible and factual but are actually incorrect. What is this phenomenon called?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>This is known as a hallucination, where the model generates seemingly accurate information that is, in fact, incorrect or fabricated</strong></p>\n\n<p>The term \"hallucination\" refers to a phenomenon in which a language model generates responses that sound plausible and appear factual but are actually false or unsupported by any underlying data. Hallucinations occur because the model relies on patterns learned during training rather than verified knowledge. This is a known limitation of LLMs, which can create convincing text that may mislead users if not carefully monitored or verified against reliable sources.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt1-q36-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/blogs/machine-learning/best-practices-to-build-generative-ai-applications-on-aws/\">https://aws.amazon.com/blogs/machine-learning/best-practices-to-build-generative-ai-applications-on-aws/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>This is known as data drift, where the statistical properties of the input data change over time, causing the model's predictions to become less accurate</strong> - Data drift occurs when the distribution or characteristics of the input data change over time, which can cause the model’s performance to degrade. However, data drift does not explain why an LLM would produce plausible but incorrect responses; it is more related to changes in the data environment rather than the inherent behavior of the model in generating misleading information.</p>\n\n<p><strong>This is referred to as overfitting, where the model performs exceptionally well on the training data but fails to generalize to new, unseen data</strong> - Overfitting occurs when a model learns the training data too well, capturing noise or irrelevant details, which results in poor performance on new data. However, overfitting does not specifically describe the generation of plausible but incorrect responses; rather, it is about the model's failure to generalize beyond the examples it has been trained on.</p>\n\n<p><strong>This is an example of underfitting, where the model fails to capture the underlying patterns in the data, resulting in poor performance on both training and new data</strong> - Underfitting happens when a model is too simple to learn the complexities of the data, leading to poor performance on both training and unseen datasets. While underfitting does cause incorrect responses, it is due to the model's inability to learn from data, not because it is generating fabricated or misleadingly plausible information.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/blogs/machine-learning/best-practices-to-build-generative-ai-applications-on-aws/\">https://aws.amazon.com/blogs/machine-learning/best-practices-to-build-generative-ai-applications-on-aws/</a></p>\n\n<p><a href=\"https://aws.amazon.com/what-is/generative-ai/\">https://aws.amazon.com/what-is/generative-ai/</a></p>\n","answers":["<p>This is known as data drift, where the statistical properties of the input data change over time, causing the model's predictions to become less accurate</p>","<p>This is known as a hallucination, where the model generates seemingly accurate information that is, in fact, incorrect or fabricated</p>","<p>This is referred to as overfitting, where the model performs exceptionally well on the training data but fails to generalize to new, unseen data</p>","<p>This is an example of underfitting, where the model fails to capture the und
