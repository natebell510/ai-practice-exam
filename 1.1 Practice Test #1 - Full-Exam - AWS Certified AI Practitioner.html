"<p>Word2Vec</p>","<p>Singular Value Decomposition (SVD)</p>"]},"correct_response":["b"],"section":"Fundamentals of Generative AI","question_plain":"Which of the following embedding models would be most suitable for differentiating the contextual meanings of words when applied to different phrases?","related_lectures":[]},{"_class":"assessment","id":93243961,"assessment_type":"multiple-choice","prompt":{"question":"<p>A security company is evaluating Amazon Rekognition to enhance its Machine Learning (ML) capabilities. However, the data science team needs to identify scenarios where Amazon Rekognition may not be the most suitable solution. Understanding these limitations will help the team select the right tools for different aspects of their security system.</p>\n\n<p>Given this context, which of the following use cases is NOT the right fit for Amazon Rekognition?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Enable multilingual user experiences in your applications</strong></p>\n\n<p>Amazon Translate is a text translation service that uses advanced machine learning technologies to provide high-quality translation on demand. You can enable multilingual user experiences in your applications by integrating Amazon Translate.</p>\n\n<p>Amazon Rekognition cannot be used to create multilingual user experiences.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Face-based user identity verification</strong></p>\n\n<p><strong>Searchable media libraries</strong></p>\n\n<p><strong>Celebrity recognition</strong></p>\n\n<p>Face-based user identity verification, searchable media libraries, and celebrity recognition are classic use cases of Amazon Rekognition.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/translate/latest/dg/what-is.html\">https://docs.aws.amazon.com/translate/latest/dg/what-is.html</a></p>\n","answers":["<p>Face-based user identity verification</p>","<p>Searchable media libraries</p>","<p>Enable multilingual user experiences in your applications</p>","<p>Celebrity recognition</p>"]},"correct_response":["c"],"section":"Applications of Foundation Models","question_plain":"A security company is evaluating Amazon Rekognition to enhance its Machine Learning (ML) capabilities. However, the data science team needs to identify scenarios where Amazon Rekognition may not be the most suitable solution. Understanding these limitations will help the team select the right tools for different aspects of their security system.\n\nGiven this context, which of the following use cases is NOT the right fit for Amazon Rekognition?","related_lectures":[]},{"_class":"assessment","id":93243941,"assessment_type":"multiple-choice","prompt":{"question":"<p>A retail company is using an Amazon SageMaker machine learning model to analyze customer purchasing patterns and predict future buying behavior. The data scientists at the company regularly need to process datasets of less than 1 GB, such as daily sales records and customer interaction logs. The company does not require immediate responses and can afford some delay in receiving the analysis results, as the insights are primarily used for weekly strategy meetings.</p>\n\n<p>Which inference method would be the most suitable for the company in this scenario?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Asynchronous inference</strong></p>\n\n<p>Asynchronous inference is the most suitable choice for this scenario. It allows the company to process smaller payloads without requiring real-time responses by queuing the requests and handling them in the background. This method is cost-effective and efficient when some delay is acceptable, as it frees up resources and optimizes compute usage. Asynchronous inference is ideal for scenarios where the payload size is less than 1 GB and immediate results are not critical.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt1-q56-i1.jpg\">\nvia - <a href=\"https://docs.aws.amazon.com/sagemaker/latest/dg/async-inference.html\">https://docs.aws.amazon.com/sagemaker/latest/dg/async-inference.html</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Batch inference</strong> - Batch inference is generally used for processing large datasets all at once. While it does not require immediate responses, it is typically more efficient for handling larger payloads (several gigabytes or more). For smaller payloads of less than 1 GB, batch inference might be overkill and less cost-efficient compared to asynchronous inference.</p>\n\n<p><strong>Real-time inference</strong> - Real-time inference is optimized for scenarios where low latency is essential, and responses are needed immediately. It is not suitable for cases where the system can afford to wait for responses, as it might lead to higher costs and resource consumption without providing any additional benefit for this particular use case.</p>\n\n<p><strong>Serverless inference</strong> - Serverless inference is a good choice for workloads with unpredictable traffic or sporadic requests, as it scales automatically based on demand. However, it may not be as cost-effective for scenarios where workloads are predictable, and some waiting time is acceptable. Asynchronous inference provides a more targeted solution for handling delayed responses at a lower cost.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/sagemaker/latest/dg/how-it-works-deployment.html\">https://docs.aws.amazon.com/sagemaker/latest/dg/how-it-works-deployment.html</a></p>\n\n<p><a href=\"https://repost.aws/questions/QUlefH1ni4QOaulUT4870D5g/sagemaker-batch-transform\">https://repost.aws/questions/QUlefH1ni4QOaulUT4870D5g/sagemaker-batch-transform</a></p>\n\n<p><a href=\"https://docs.aws.amazon.com/sagemaker/latest/dg/async-inference.html\">https://docs.aws.amazon.com/sagemaker/latest/dg/async-inference.html</a></p>\n","answers":["<p>Batch inference</p>","<p>Real-time inference</p>","<p>Serverless inference</p>","<p>Asynchronous inference</p>"]},"correct_response":["d"],"section":"Applications of Foundation Models","question_plain":"A retail company is using an Amazon SageMaker machine learning model to analyze customer purchasing patterns and predict future buying behavior. The data scientists at the company regularly need to process datasets of less than 1 GB, such as daily sales records and customer interaction logs. The company does not require immediate responses and can afford some delay in receiving the analysis results, as the insights are primarily used for weekly strategy meetings.\n\nWhich inference method would be the most suitable for the company in this scenario?","related_lectures":[]},{"_class":"assessment","id":93243943,"assessment_type":"multiple-choice","prompt":{"question":"<p>A company is deploying a generative AI model on Amazon Bedrock and needs to reduce the cost of usage while using prompt examples of up to 10 sample tasks as part of each input.</p>\n\n<p>Which approach would be the most effective in minimizing the costs associated with model usage?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>The company should reduce the number of tokens in the input</strong></p>\n\n<p>For the given use case, reducing the number of tokens in the input is the most effective way to minimize costs associated with the use of a generative AI model on Amazon Bedrock. Each token represents a piece of text that the model processes, and the cost is directly proportional to the number of tokens in the input. By reducing the input length, the company can decrease the amount of computational power required for each request, thereby lowering the cost of usage.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt1-q57-i1.jpg\">\nvia - <a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/bedrock-pricing.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/bedrock-pricing.html</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>The company should reduce the <code>temperature</code> inference parameter for the model</strong> - Reducing the <code>temperature</code> affects the creativity and randomness of the model's output but has no effect on the cost related to input processing. The cost of using a generative AI model is primarily determined by the number of tokens processed, not by the temperature setting. Thus, adjusting the temperature is irrelevant to cost reduction.</p>\n\n<p><strong>The company should reduce the <code>top-P</code> inference parameter for the model</strong> - Reducing the top-P value affects the diversity and variety of the model's generated output but does not influence the cost of processing the input. Since the cost is based on the number of tokens in the input, changing the top-P value does not contribute to reducing expenses.</p>\n\n<p><strong>The company should reduce the batch size while training the model</strong> - This option acts as a distractor. Modifying the batch size while training the model has no impact on the cost of model usage during inference. You should also note that you cannot train the base Foundation Models (FMs) using Amazon Bedrock, rather you can only customize the base FMs wherein you create your own private copy of the base FM using Provisioned Throughput mode.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/bedrock-pricing.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/bedrock-pricing.html</a></p>\n\n<p><a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/inference-parameters.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/inference-parameters.html</a></p>\n\n<p><a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/model-customization-guidelines.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/model-customization-guidelines.html</a></p>\n","answers":["<p>The company should reduce the number of tokens in the input</p>","<p>The company should reduce the <code>temperature</code> inference parameter for the model</p>","<p>The company should reduce the <code>top-P</code> inference parameter for the model</p>","<p>The company should reduce the batch size while training the model</p>"]},"correct_response":["a"],"section":"Applications of Foundation Models","question_plain":"A company is deploying a generative AI model on Amazon Bedrock and needs to reduce the cost of usage while using prompt examples of up to 10 sample tasks as part of each input.\n\nWhich approach would be the most effective in minimizing the costs associated with model usage?","related_lectures":[]},{"_class":"assessment","id":93243945,"assessment_type":"multiple-choice","prompt":{"question":"<p>A retail company is looking to streamline its machine learning workflows and improve collaboration between data science teams. The team is considering using MLflow with Amazon SageMaker to manage the end-to-end machine learning lifecycle. Understanding how MLflow integrates with Amazon SageMaker will help the team decide if this combination is the right fit for their machine learning project management needs.</p>\n\n<p>Given this context, which statement best defines the use of MLflow with Amazon SageMaker?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Manage machine learning experiments</strong></p>\n\n<p>Machine learning is an iterative process that requires experimenting with various combinations of data, algorithms, and parameters while observing their impact on model accuracy. The iterative nature of ML experimentation results in numerous model training runs and versions, making it challenging to track the best-performing models and their configurations.</p>\n\n<p>Use MLflow with Amazon SageMaker to track, organize, view, analyze, and compare iterative ML experimentation to gain comparative insights and register and deploy your best-performing models.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Perform automatic model tuning</strong> - Automatic model tuning can be performed using SageMaker Automatic Model Tuning (AMT).</p>\n\n<p><strong>Label data using human-in-the-loop</strong> - Labeling data with a human-in-the-loop is performed using SageMaker Ground Truth.</p>\n\n<p><strong>Leverage no-code ML</strong> - SageMaker Canvas offers a no-code interface that can be used to create highly accurate machine learning models.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/sagemaker/latest/dg/mlflow.html\">https://docs.aws.amazon.com/sagemaker/latest/dg/mlflow.html</a></p>\n","answers":["<p>Manage machine learning experiments</p>","<p>Perform automatic model tuning</p>","<p>Label data using human-in-the-loop</p>","<p>Leverage no-code ML</p>"]},"correct_response":["a"],"section":"Applications of Foundation Models","question_plain":"A retail company is looking to streamline its machine learning workflows and improve collaboration between data science teams. The team is considering using MLflow with Amazon SageMaker to manage the end-to-end machine learning lifecycle. Understanding how MLflow integrates with Amazon SageMaker will help the team decide if this combination is the right fit for their machine learning project management needs.\n\nGiven this context, which statement best defines the use of MLflow with Amazon SageMaker?","related_lectures":[]},{"_class":"assessment","id":93243947,"assessment_type":"multiple-choice","prompt":{"question":"<p>A financial services company is developing machine learning models to predict customer credit risk and detect fraudulent transactions. After deploying the models, the company observes that the predictions are not as accurate as desired, leading to potential financial losses or missed fraud detections. To improve the accuracy of these models, the company has hired you as an AI Practitioner.</p>\n\n<p>Which approach would you recommend to enhance the accuracy of the company's machine learning models?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>The company should increase the number of epochs, which involves training the model for more iterations over the dataset</strong></p>\n\n<p>Increasing the number of epochs allows the model to learn from the training data for a longer period, potentially capturing more complex patterns and relationships, which can improve accuracy. Multiple epochs are run until the accuracy of the model reaches an acceptable level, or when the error rate drops below an acceptable level.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt1-q59-i1.jpg\">\nvia - <a href=\"https://docs.aws.amazon.com/sagemaker/latest/dg/jumpstart-fine-tune.html\">https://docs.aws.amazon.com/sagemaker/latest/dg/jumpstart-fine-tune.html</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>The company should reduce the batch size, which means processing fewer samples in each training step</strong> - Reducing the batch size can make the training process noisier, as each update to the model weights is based on fewer examples. While this might help the model escape local minima during optimization, it does not necessarily lead to an improvement in accuracy and could even slow down convergence or lead to less stable training.</p>\n\n<p><strong>The company should increase regularization to improve the accuracy of the model</strong> - Increasing regularization is beneficial when the model is overfitting, as it adds constraints that penalize complexity, encouraging the model to generalize better. However, if the model is already underfitting (not capturing the patterns in the data well), increasing regularization could further decrease its performance, and it might not improve accuracy.</p>\n\n<p><strong>The company should decrease the learning rate, which reduces the size of the steps taken during optimization</strong> - Decreasing the learning rate can help the model converge more slowly and steadily, potentially avoiding overshooting the optimal point. However, too small of a learning rate can significantly slow down training and cause the model to get stuck in local minima, thereby not necessarily improving accuracy. It's more of a fine-tuning step once other hyperparameters are appropriately set.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/sagemaker/latest/dg/jumpstart-fine-tune.html\">https://docs.aws.amazon.com/sagemaker/latest/dg/jumpstart-fine-tune.html</a></p>\n","answers":["<p>The company should reduce the batch size, which means processing fewer samples in each training step</p>","<p>The company should increase regularization to improve the accuracy of the model</p>","<p>The company should increase the number of epochs, which involves training the model for more iterations over the dataset</p>","<p>The company should decrease the learning rate, which reduces the size of the steps taken during optimization</p>"]},"correct_response":["c"],"section":"Fundamentals of AI and ML","question_plain":"A financial services company is developing machine learning models to predict customer credit risk and detect fraudulent transactions. After deploying the models, the company observes that the predictions are not as accurate as desired, leading to potential financial losses or missed fraud detections. To improve the accuracy of these models, the company has hired you as an AI Practitioner.\n\nWhich approach would you recommend to enhance the accuracy of the company's machine learning models?","related_lectures":[]},{"_class":"assessment","id":93243949,"assessment_type":"multiple-choice","prompt":{"question":"<p>A healthcare analytics company has developed a machine learning model to predict patient outcomes based on historical medical data. During testing, the model demonstrates high accuracy and performs well on the training dataset, but once deployed in a real-world production environment, its accuracy drops significantly when processing new, unseen patient records. The company needs to improve the model's ability to generalize and perform well on new data, ensuring reliable predictions in the production setting.</p>\n\n<p>What would be the most effective approach to fix this problem?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>The company should use hyperparameters for model tuning, which involves adjusting parameters such as regularization, learning rates, and dropout rates to enhance the model's ability to generalize well to new data</strong></p>\n\n<p>Hyperparameter tuning is the most effective solution in this scenario because it allows the company to adjust the settings that control the learning process of the model. By fine-tuning hyperparameters, such as increasing regularization or early stopping or adjusting dropout rates, the model can avoid overfitting to the training data and better generalize to new, unseen data in production. This approach helps improve the model's performance across various data distributions.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt1-q60-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/what-is/overfitting/\">https://aws.amazon.com/what-is/overfitting/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>The company should increase the amount of training data, which can help the model learn more diverse patterns and improve its performance on new, unseen data by exposing it to a wider range of examples</strong> - Increasing the amount of training data can improve a model's generalization by providing it with more examples and reducing the risk of overfitting. However, this approach is only effective if additional data is representative of the new data encountered in production. It is a less direct and potentially more resource-intensive solution compared to hyperparameter tuning, which specifically targets the overfitting problem.</p>\n\n<p><strong>The company should reduce the amount of training data, which can help eliminate noise in the data</strong> - Reducing the amount of training data is generally not a recommended approach for improving model generalization, as it can result in underfitting. Underfitting occurs when a model is too simple or does not have enough information to learn meaningful patterns, leading to poor performance on both training and new data. Therefore, reducing the training data would likely exacerbate the problem rather than solve it.</p>\n\n<p><strong>The company should swap the existing model with a state-of-the-art generative AI model</strong> - This options acts as a distractor, as it does not address the underlying issue of model-overfitting.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/what-is/overfitting/\">https://aws.amazon.com/what-is/overfitting/</a></p>\n\n<p><a href=\"https://docs.aws.amazon.com/sagemaker/latest/dg/jumpstart-fine-tune.html\">https://docs.aws.amazon.com/sagemaker/latest/dg/jumpstart-fine-tune.html</a></p>\n\n<p><a href=\"https://docs.aws.amazon.com/whitepapers/latest/ml-best-practices-public-sector-organizations/model-training-and-tuning.html\">https://docs.aws.amazon.com/whitepapers/latest/ml-best-practices-public-sector-organizations/model-training-and-tuning.html</a></p>\n","answers":["<p>The company should use hyperparameters for model tuning, which involves adjusting parameters such as regularization, learning rates, and dropout rates to enhance the model's ability to generalize well to new data</p>","<p>The company should increase the amount of training data, which can help the model learn more diverse patterns and improve its performance on new, unseen data by exposing it to a wider range of examples</p>","<p>The company should reduce the amount of training data, which can help eliminate noise in the data</p>","<p>The company should swap the existing model with a state-of-the-art generative AI model</p>"]},"correct_response":["a"],"section":"Fundamentals of AI and ML","question_plain":"A healthcare analytics company has developed a machine learning model to predict patient outcomes based on historical medical data. During testing, the model demonstrates high accuracy and performs well on the training dataset, but once deployed in a real-world production environment, its accuracy drops significantly when processing new, unseen patient records. The company needs to improve the model's ability to generalize and perform well on new data, ensuring reliable predictions in the production setting.\n\nWhat would be the most effective approach to fix this problem?","related_lectures":[]},{"_class":"assessment","id":93243951,"assessment_type":"multi-select","prompt":{"question":"<p>A biotechnology company is using a Foundation Model (FM) in Amazon Bedrock to analyze complex genetic data and provide insights for new drug development. However, the company wants to enhance the model's performance to make it an expert specifically in the domain of genomics, enabling it to better understand domain-specific terminology, patterns, and datasets.</p>\n\n<p>Which of these approaches would be the most effective for turning the Foundation Model into a domain-specific expert? (Select two)</p>\n","relatedLectureIds":"","feedbacks":["","","","",""],"explanation":"<p>Correct options:</p>\n\n<p><strong>The company should use Domain Adaptation Fine-Tuning, which involves fine-tuning the model on domain-specific data to adapt its knowledge to that particular domain</strong></p>\n\n<p>Domain Adaptation Fine-Tuning is an effective approach because it takes a pre-trained Foundation Model and further adjusts its parameters using domain-specific data. This process helps the model learn the nuances, terminology, and context specific to the domain, enhancing its ability to generate accurate and relevant outputs in that field. Fine-tuning allows the model to specialize while retaining the general knowledge acquired during initial training.</p>\n\n<p><strong>The company should use Continued Pre-Training, which involves further training the model on a large corpus of domain-specific data, enhancing its ability to understand domain-specific terms, jargon, and context</strong></p>\n\n<p>Continued Pre-Training is another appropriate strategy for making a Foundation Model an expert in a specific domain. By pre-training the model on a large dataset specifically from the target domain, the model can learn the distinct characteristics, language patterns, and specialized knowledge relevant to that domain. This approach effectively builds upon the model's existing knowledge, enhancing its domain expertise without starting training from scratch.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt1-q61-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/blogs/aws/customize-models-in-amazon-bedrock-with-your-own-data-using-fine-tuning-and-continued-pre-training/\">https://aws.amazon.com/blogs/aws/customize-models-in-amazon-bedrock-with-your-own-data-using-fine-tuning-and-continued-pre-training/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>The company should use Supervised Learning, which involves training the model using labeled data to predict specific outputs and improve the expertise of the model in the given domain</strong> - While Supervised Learning can be used to train models for specific tasks, it is less effective for turning a Foundation Model into a domain expert unless a large amount of labeled domain-specific data is available. This approach is more task-specific and does not generalize as well as fine-tuning or continued pre-training for overall domain expertise.</p>\n\n<p><strong>The company should use Incremental Learning, which allows the model to learn new data without forgetting the previously learned information for specializing in the given domain</strong> - Incremental Learning is designed to help models adapt to new data over time without forgetting previously learned knowledge, but it is not specifically tailored for domain specialization. It may help in scenarios where the model needs to adapt continuously, but it lacks the focused, intensive learning required to make the model an expert in a specific domain.</p>\n\n<p><strong>The company should use Reinforcement Learning, a method where the model learns through trial and error by receiving rewards for correct actions, thereby adapting the model to a specific domain</strong> - Reinforcement Learning is not suitable for making a model an expert in a specific domain, as it focuses on learning optimal behaviors through rewards and penalties in interactive scenarios. It does not involve training the model with domain-specific data or knowledge, making it ineffective for enhancing domain expertise.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/blogs/aws/customize-models-in-amazon-bedrock-with-your-own-data-using-fine-tuning-and-continued-pre-training/\">https://aws.amazon.com/blogs/aws/customize-models-in-amazon-bedrock-with-your-own-data-using-fine-tuning-and-continued-pre-training/</a></p>\n\n<p><a href=\"https://aws.amazon.com/blogs/machine-learning/domain-adaptation-fine-tuning-of-foundation-models-in-amazon-sagemaker-jumpstart-on-financial-data/\">https://aws.amazon.com/blogs/machine-learning/domain-adaptation-fine-tuning-of-foundation-models-in-amazon-sagemaker-jumpstart-on-financial-data/</a></p>\n\n<p><a href=\"https://aws.amazon.com/about-aws/whats-new/2023/11/continued-pre-training-amazon-bedrock-preview/\">https://aws.amazon.com/about-aws/whats-new/2023/11/continued-pre-training-amazon-bedrock-preview/</a></p>\n","answers":["<p>The company should use Supervised Learning, which involves training the model using labeled data to predict specific outputs and improve the expertise of the model in the given domain</p>","<p>The company should use Incremental Learning, which allows the model to learn new data without forgetting the previously learned information for specializing in the given domain</p>","<p>The company should use Reinforcement Learning, a method where the model learns through trial and error by receiving rewards for correct actions, thereby adapting the model to a specific domain</p>","<p>The company should use Domain Adaptation Fine-Tuning, which involves fine-tuning the model on domain-specific data to adapt its knowledge to that particular domain</p>","<p>The company should use Continued Pre-Training, which involves further training the model on a large corpus of domain-specific data, enhancing its ability to understand domain-specific terms, jargon, and context</p>"]},"correct_response":["d","e"],"section":"Applications of Foundation Models","question_plain":"A biotechnology company is using a Foundation Model (FM) in Amazon Bedrock to analyze complex genetic data and provide insights for new drug development. However, the company wants to enhance the model's performance to make it an expert specifically in the domain of genomics, enabling it to better understand domain-specific terminology, patterns, and datasets.\n\nWhich of these approaches would be the most effective for turning the Foundation Model into a domain-specific expert? (Select two)","related_lectures":[]},{"_class":"assessment","id":93243953,"assessment_type":"multiple-choice","prompt":{"question":"<p>A marketing company is researching generative AI technologies to better understand how they work and what makes them suitable for automating creative tasks. Understanding the core principles of generative AI will help the company determine if it’s the right fit for their content creation needs.</p>\n\n<p>Given this context, which of the following best describes generative AI?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Generative AI encompasses models and algorithms capable of creating new content such as text, images, and audio based on patterns learned from existing data</strong></p>\n\n<p>Generative artificial intelligence (generative AI) is a type of AI that can create new content and ideas, including conversations, stories, images, videos, and music. AI technologies attempt to mimic human intelligence in nontraditional computing tasks like image recognition, natural language processing (NLP), and translation.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Generative AI refers to algorithms that analyze existing data to generate new insights without creating new content</strong> - Generative AI is not just about generating insights but also about creating new content based on learned patterns.</p>\n\n<p><strong>Generative AI refers to AI systems that are limited to performing predefined tasks without adapting to new data or contexts</strong> - Generative AI is capable of adapting and creating new content, not just performing predefined tasks.</p>\n\n<p><strong>Generative AI is a subset of AI that focuses exclusively on improving data retrieval efficiency</strong> - Generative AI is not limited to improving data retrieval; it is focused on content creation.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://aws.amazon.com/what-is/generative-ai/\">https://aws.amazon.com/what-is/generative-ai/</a></p>\n","answers":["<p>Generative AI refers to algorithms that analyze existing data to generate new insights without creating new content</p>","<p>Generative AI refers to AI systems that are limited to performing predefined tasks without adapting to new data or contexts</p>","<p>Generative AI is a subset of AI that focuses exclusively on improving data retrieval efficiency</p>","<p>Generative AI encompasses models and algorithms capable of creating new content such as text, images, and audio based on patterns learned from existing data</p>"]},"correct_response":["d"],"section":"Fundamentals of Generative AI","question_plain":"A marketing company is researching generative AI technologies to better understand how they work and what makes them suitable for automating creative tasks. Understanding the core principles of generative AI will help the company determine if it’s the right fit for their content creation needs.\n\nGiven this context, which of the following best describes generative AI?","related_lectures":[]},{"_class":"assessment","id":93243955,"assessment_type":"multiple-choice","prompt":{"question":"<p>A financial services company is deploying multiple machine learning models on Amazon SageMaker to provide real-time credit risk assessments and fraud detection. The data science team needs a tool to monitor and track the performance and usage of these models hosted on endpoints, ensuring that they can easily manage and troubleshoot any issues related to real-time inference. To streamline this process, they are exploring which Amazon SageMaker service can help them track and manage their deployed models effectively.</p>\n\n<p>What do you recommend?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Amazon SageMaker Model Dashboard</strong></p>\n\n<p>Amazon SageMaker Model Dashboard is a centralized portal, accessible from the SageMaker console, where you can view, search, and explore all of the models in your account. You can track which models are deployed for inference and if they are used in batch transform jobs or hosted on endpoints. If you set up monitors with Amazon SageMaker Model Monitor, you can also track the performance of your models as they make real-time predictions on live data.</p>\n\n<p>The Model Dashboard view extracts high-level details from each model to provide a comprehensive summary of every model in your account. If your model is deployed for inference, the dashboard helps you track the performance of your model and endpoint in real time. Within the Model Dashboard, you can select the endpoint column to view performance metrics such as CPU, GPU, disk, and memory utilization of your endpoints in real time to help you track the performance of your compute instances.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Amazon SageMaker Clarify</strong> - SageMaker Clarify helps identify potential bias during data preparation without writing code. You specify input features, such as gender or age, and SageMaker Clarify runs an analysis job to detect potential bias in those features.</p>\n\n<p><strong>Amazon SageMaker JumpStart</strong> - Amazon SageMaker JumpStart is a machine learning (ML) hub that can help you accelerate your ML journey. With SageMaker JumpStart, you can evaluate, compare, and select Foundation Models (FMs) quickly based on pre-defined quality and responsibility metrics to perform tasks like article summarization and image generation. Pretrained models are fully customizable for your use case with your data, and you can easily deploy them into production with the user interface or SDK.</p>\n\n<p><strong>Amazon SageMaker Ground Truth</strong> - Amazon SageMaker Ground Truth offers the most comprehensive set of human-in-the-loop capabilities, allowing you to harness the power of human feedback across the ML lifecycle to improve the accuracy and relevancy of models. You can complete a variety of human-in-the-loop tasks with SageMaker Ground Truth, from data generation and annotation to model review, customization, and evaluation, either through a self-service or an AWS-managed offering.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/sagemaker/latest/dg/model-dashboard.html\">https://docs.aws.amazon.com/sagemaker/latest/dg/model-dashboard.html</a></p>\n","answers":["<p>Amazon SageMaker Clarify</p>","<p>Amazon SageMaker JumpStart</p>","<p>Amazon SageMaker Ground Truth</p>","<p>Amazon SageMaker Model Dashboard</p>"]},"correct_response":["d"],"section":"Applications of Foundation Models","question_plain":"A financial services company is deploying multiple machine learning models on Amazon SageMaker to provide real-time credit risk assessments and fraud detection. The data science team needs a tool to monitor and track the performance and usage of these models hosted on endpoints, ensuring that they can easily manage and troubleshoot any issues related to real-time inference. To streamline this process, they are exploring which Amazon SageMaker service can help them track and manage their deployed models effectively.\n\nWhat do you recommend?","related_lectures":[]},{"_class":"assessment","id":93243957,"assessment_type":"multiple-choice","prompt":{"question":"<p>A customer support company is using a large language model developed with Amazon Bedrock to enhance its automated chatbot's ability to understand and respond accurately to customer queries. To improve the chatbot's performance, the company wants the model to correctly identify the intent behind various user interactions, such as whether a user is asking for a refund, seeking product information, or needing technical support. To achieve this, the company decides to use few-shots prompting to train the model effectively.</p>\n\n<p>Given this goal, what type of data should be included in the few-shots examples to help the model accurately recognize and distinguish the correct user intent?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>The data should include user-input along with the correct user intent, providing examples of user queries and the corresponding intent</strong></p>\n\n<p>This is the correct answer because few-shots prompting involves providing the model with examples that include both the user-input and the correct user intent. These examples help the model understand and learn how to map various user queries to their appropriate intents. By repeatedly seeing this pairing, the model can generalize from these examples and improve its ability to recognize user intent in new, unseen queries.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt1-q64-i1.jpg\">\nvia - <a href=\"https://docs.aws.amazon.com/amazonq/latest/qdeveloper-ug/what-is.html\">https://docs.aws.amazon.com/amazonq/latest/qdeveloper-ug/what-is.html</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>The data should include user-input along with model-response, where the model's generated output is paired with the initial user-input</strong> - This option is incorrect because simply matching the user-input with the model-response does not necessarily guide the model toward understanding the user's intent. The model needs to learn the relationship between user queries and their intended meaning, not just the outputs generated from previous interactions.</p>\n\n<p><strong>The data should consist of model-response along with the correct user intent, where the model's output is matched with the intended user intent</strong> - This option is incorrect because it does not include the original user-input, which is essential for training the model to recognize intent. The relationship between the user's input and the correct intent is crucial for the model to learn how to interpret queries accurately.</p>\n\n<p><strong>The data should contain user-input along with the correct model-response, focusing on matching input to the specific response</strong> - This option is incorrect because it centers on generating the correct responses rather than understanding the intent behind the user-input. While matching inputs to outputs can be useful for certain tasks, it does not specifically teach the model how to recognize and differentiate user intents.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/what-is-a-prompt.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/what-is-a-prompt.html</a></p>\n\n<p><a href=\"https://aws.amazon.com/blogs/machine-learning/few-shot-prompt-engineering-and-fine-tuning-for-llms-in-amazon-bedrock/\">https://aws.amazon.com/blogs/machine-learning/few-shot-prompt-engineering-and-fine-tuning-for-llms-in-amazon-bedrock/</a></p>\n","answers":["<p>The data should include user-input along with model-response, where the model's generated output is paired with the initial user-input</p>","<p>The data should include user-input along with the correct user intent, providing examples of user queries and the corresponding intent</p>","<p>The data should consist of model-response along with the correct user intent, where the model's output is matched with the intended user intent</p>","<p>The data should contain user-input along with the correct model-response, focusing on matching input to the specific response</p>"]},"correct_response":["b"],"section":"Security, Compliance, and Governance for AI Solutions","question_plain":"A customer support company is using a large language model developed with Amazon Bedrock to enhance its automated chatbot's ability to understand and respond accurately to customer queries. To improve the chatbot's performance, the company wants the model to correctly identify the intent behind various user interactions, such as whether a user is asking for a refund, seeking product information, or needing technical support. To achieve this, the company decides to use few-shots prompting to train the model effectively.\n\nGiven this goal, what type of data should be included in the few-shots examples to help the model accurately recognize and distinguish the correct user intent?","related_lectures":[]},{"_class":"assessment","id":93244009,"assessment_type":"multiple-choice","prompt":{"question":"<p>A technology company is deploying AI systems on AWS to automate its business processes and improve decision-making. The IT team wants to ensure that their AWS environment is optimized for governance, cost savings, performance, security, and fault tolerance. To achieve this, they are looking for a tool that provides recommendations and best practices to enhance the overall efficiency and security of their AI systems.</p>\n\n<p>Which AWS tool do you recommend for the given use case?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>AWS Trusted Advisor</strong></p>\n\n<p>AWS Trusted Advisor is a service that provides guidance to help you provision your resources following AWS best practices. It helps optimize your AWS environment in areas such as cost savings, performance, security, and fault tolerance, making it an essential tool for governance in AI systems.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>AWS Config</strong> - AWS Config is a service for assessing, auditing, and evaluating the configurations of your AWS resources. It helps with continuous monitoring and compliance but does not provide the broad optimization and guidance offered by AWS Trusted Advisor.</p>\n\n<p><strong>AWS Audit Manager</strong> - AWS Audit Manager helps you continuously audit your AWS usage to assess risk and compliance with regulations and industry standards. It focuses on compliance reporting rather than providing optimization and guidance.</p>\n\n<p><strong>AWS CloudTrail</strong> - AWS CloudTrail records AWS API calls and delivers log files for auditing purposes. While it is essential for tracking user activity and compliance, it does not offer the optimization and best practice recommendations provided by AWS Trusted Advisor.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://aws.amazon.com/premiumsupport/technology/trusted-advisor/\">https://aws.amazon.com/premiumsupport/technology/trusted-advisor/</a></p>\n","answers":["<p>AWS Config</p>","<p>AWS Audit Manager</p>","<p>AWS CloudTrail</p>","<p>AWS Trusted Advisor</p>"]},"correct_response":["d"],"section":"Security, Compliance, and Governance for AI Solutions","question_plain":"A technology company is deploying AI systems on AWS to automate its business processes and improve decision-making. The IT team wants to ensure that their AWS environment is optimized for governance, cost savings, performance, security, and fault tolerance. To achieve this, they are looking for a tool that provides recommendations and best practices to enhance the overall efficiency and security of their AI systems.\n\nWhich AWS tool do you recommend for the given use case?","related_lectures":[]}]};
      let correct = new Set();
      let incorrect = new Set();
      let totalNumberOfQuestions = 0;
      const quizTitle = quizData.quiz_title;
      const quizDescription = quizData.quiz_description;
      const questionData = quizData.questions;
      const passPercent = quizData.pass_percent;
      const modalTextElement = document.getElementById('modal-text');
      const quizContainerElement = document.getElementById('quiz-container');

      const dialog = document.querySelector('dialog');
      const showButton = document.getElementById('view-explanatin');
      const closeButton = document.getElementById('close-modal-btn');
      const quizTitleElement = document.getElementById('quiz-title');
      const quizDescriptionElement = document.getElementById('quiz-description');

      function main() {
        // update quiz meta data
        document.title = quizTitle;
        quizTitleElement.innerHTML = quizTitle;
        quizDescriptionElement.innerHTML = quizDescription;

        const passPercentElement = document.getElementById('pass-percent');
        passPercentElement.innerHTML = passPercent + '%';
        totalNumberOfQuestions = questionData.length;
        // shuffle the questionData to randomize the order of the questions
        for (let i = questionData.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [questionData[i], questionData[j]] = [questionData[j], questionData[i]];
        }

        let formattedQuestions = questionData.map(formatSingleQuestionData);
        updateScore();
        // display the formattedQuestions
        formattedQuestions.forEach((question, idx) => {
          renderSingleQuestion(question, idx + 1);
        });
      }

      /**
       * Formats the question data from the given QuizData object.
       *
       * @param {Object} singleQuizData - The singleQuizData object containing prompt and correct_response.
       * @return {Object} The formatted question object with the following properties:
       *   - id: The ID of the question.
       *   - question: The text of the question.
       *   - answers: The array of answer options.
       *   - correctAnswer: The text of the correct answer.
       *   - explanation: The explanation of the correct answer.
       */
      function formatSingleQuestionData(singleQuizData = null) {
        const { prompt, correct_response, id } = singleQuizData;
        const questionText = prompt.question;
        const answers = prompt.answers;
        const correctAnswer = correct_response[0];
        const correctAnswerText = answers[correctAnswer.toLowerCase().charCodeAt(0) - 97];
        const questionObj = {
          id: id,
          question: questionText,
          answers: answers,
          correctAnswer,
          explanation: prompt?.explanation || '',
        };
        return questionObj;
      }

      /**
       * Renders a single question with its options and submit button.
       *
       * @param {Object} singleQuestionData - The data of the question to render.
       * @param {number} rootIndex - The index of the question in the quiz.
       * @return {void} return nothing.
       */

      const renderSingleQuestion = (singleQuestionData = {}, rootIndex = 1) => {
        const { id, explanation, answers, correctAnswer, question } = singleQuestionData;
        // shuffle the answers to randomize the order of the answers
        // for (let i = answers.length - 1; i > 0; i--) {
        //   const j = Math.floor(Math.random() * (i + 1));
        //   [answers[i], answers[j]] = [answers[j], answers[i]];
        // }
        const alphabet = 'abcdefghijklmnopqrstuvwxyz'.split('');
        const optionsHTML = answers
          .map((option, index) => {
            const optionId = `${id}_${index}`;

            return `
        <div class="question-lable">
          <input type="radio" id="${optionId}" name="${'answer'}" value="${alphabet[index]}" />
          <label for="${optionId}">${option}</label>
        </div>
      `;
          })

          .join('');

        const container = document.createElement('div');
        container.innerHTML = `
        <form data-correct-answer="${correctAnswer}" data-question-id="${id}" class="single-question-container" onsubmit="submitButtonListener(event)">
          <div style="display: flex;justify-content: space-between;">
            <p style="font-weight: 600">Question ${rootIndex}:</p>
            <button type="button" onclick="renderExplanation(event)" id="${`explanation-${id}`}" data-explanation="${'tt'}" data-explanation-id=${id} class="explanation-btn">View Explanation</button>
          </div>
          <p style="margin-bottom: 8px;line-height: 1.5">${question}</p>
          <div class="options-container">
            ${optionsHTML}
          </div>
          <div style="display: flex; gap: 8px;">
            <button type="submit" id="submit-button" class="button">Submit</button>
          </div>
        </form>
      `;
        quizContainerElement.appendChild(container);
      };

      /**
       * Updates the score on the page based on the number of correct and incorrect answers.
       *
       * @return {void} This function does not return a value.
       */
      function updateScore() {
        const currentParcentageElement = document.getElementById('current-score');
        const correctAnswerElement = document.getElementById('correct-answers');
        const wrongAnswerElement = document.getElementById('wrong-answers');
        correctAnswerElement.innerHTML = correct.size;
        wrongAnswerElement.innerHTML = incorrect.size;
        const score = Number((correct.size / totalNumberOfQuestions) * 100).toFixed(2);
        currentParcentageElement.innerHTML = score;
      }

      /**
       * Handles the event when the submit button is clicked.
       *
       * @param {Event} e - The event object.
       * @return {void} This function does not return anything.
       */
      const submitButtonListener = e => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const form = e.target;
        const selectedOption = e.target.querySelector('input[type="radio"]:checked');
        if (!selectedOption) {
          alert('Please select an answer!');
          return;
        }

        let isCorrect = false;
        const { answer: userAnswer } = Object.fromEntries(formData.entries());
        const correctAnswer = e.target.dataset.correctAnswer;
        const questionId = e.target.dataset.questionId;
        if (userAnswer == correctAnswer) {
          correct.add(questionId);
          incorrect.delete(questionId);
          isCorrect = true;
        } else {
          incorrect.add(e.target.dataset.questionId);
          correct.delete(questionId);
        }
        updateScore();

        const resultClass = isCorrect ? 'correct-answer' : 'incorrect-answer';

        form.querySelectorAll('.question-lable').forEach(label => {
          label.classList.remove('correct-answer', 'incorrect-answer');
        });
        selectedOption.closest('.question-lable').classList.add(resultClass);
      };

      function renderExplanation(ev) {
        const dataid = ev.target.dataset.explanationId;
        const quiz = quizData.questions.find(q => q.id === Number(dataid));
        modalTextElement.innerHTML =
          quiz && quiz.prompt.explanation ? quiz.prompt.explanation : 'no explanation found';
        // modalTextElement.innerHTML = ev.target.dataset?.explanation || 'no explanation found';
        dialog.showModal();
        dialog.addEventListener('click', event => {
          if (event.target === dialog) {
            dialog.close();
          }
        });
      }
    </script>
