<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz</title>
    <style>
      * {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu,
          Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-size: 16px;
      }

      main {
        padding-top: 48px;
      }

      :root {
        --large-device-width: 850px;
        --primary-color: #0f172a;
        --secondary-color: #020617;
        --primary-text-color: #c7d1dd;
        --secondary-text-color: #061602;
        --success-background: hsl(159, 82%, 24%);
        --success-foreground: hsl(164, 86%, 16%);
        --success: hsl(160, 84%, 39%);
        --danger: #ef4444;
        --warning: #f59e0b;
        --info-background: hsl(218, 81%, 8%);
        --info-foreground: hsl(217, 91%, 85%);
        --border-color: #d1d7dc;
        --check-box-size: 20px;
        /* control the size */
        --check-box-color: var(--info-foreground);
        /* the active color */
      }

      body {
        position: relative;
        background-color: #020617;
        color: var(--primary-text-color);
      }

      #score-stats-container {
        position: fixed;
        z-index: 10;
        top: 0;
        height: 40px;
        width: 100%;
        background-color: var(--info-background);

        padding: 0px 16px;
        color: var(--info-foreground);
        font-weight: 600;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      #quiz-container {
        border-radius: 8px;
        display: flex;
        gap: 16px;
        flex-direction: column;
      }

      input[type='radio'] {
        height: var(--check-box-size);
        aspect-ratio: 1;
        border: calc(var(--check-box-size) / 8) solid #939393;
        padding: calc(var(--check-box-size) / 8);
        background: radial-gradient(farthest-side, var(--check-box-color) 94%, #0000) 50%/0 0 no-repeat
          content-box;
        border-radius: 50%;
        outline-offset: calc(var(--check-box-size) / 10);
        -webkit-appearance: none;
        -moz-appearance: none;
        appearance: none;
        cursor: pointer;
        font-size: inherit;
        transition: 0.3s;
      }

      input[type='radio']:checked {
        border-color: var(--check-box-color);
        background-size: 100% 100%;
      }

      input[type='radio']:disabled {
        background: linear-gradient(#939393 0 0) 50%/100% 20% no-repeat content-box;
        opacity: 0.5;
        cursor: not-allowed;
      }

      label {
        /* display: inline-flex; */
        align-items: center;
        gap: 10px;
        cursor: pointer;
        padding: 4px 6px;
        border-radius: 4px;
      }

      @media (max-width: 767px) {
        input[type='radio'],
        label {
          cursor: default;
        }

        #quiz-container {
          margin-left: 8px;
          margin-right: 8px;
        }
      }

      /* PC (Desktop devices) */
      @media (min-width: 768px) {
        body {
          display: flex;
          justify-content: center;
        }

        main {
          max-width: var(--large-device-width);
        }

        #score-stats-container {
          max-width: var(--large-device-width);
        }

        dialog {
          max-width: var(--large-device-width);
        }
      }

      @media print {
        input[type='radio'] {
          background: none !important;
          border-color: #939393 !important;
        }

        input[type='radio']:checked {
          border-color: #939393 !important;
        }
      }

      .question-lable {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      button {
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
        outline: none;
        position: relative;
        overflow: hidden;
        cursor: pointer;
      }

      .button {
        background-color: var(--success-background);
        border: none;
        color: #f4f5f7;
        opacity: 0.8;
        font-size: 18px;
        flex-grow: 1;
        padding: 8px 16px;
        border-radius: 8px;
      }

      .button:hover {
        opacity: 1;
      }

      .explanation-btn {
        border: none;
        color: var(--success);
        background-color: transparent;
      }

      #submit-button:active::after {
        background-color: #ef4444;
      }

      .single-question-container {
        background-color: var(--primary-color);
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding: 16px;
        border-radius: 8px;
      }

      #modal-content {
        padding: 16px;
        line-height: 24px;
      }

      dialog::backdrop {
        background: rgba(0, 0, 0, 0.5);
      }

      dialog {
        position: fixed;
        border: 1px solid var(--border-color);
        background-color: var(--primary-color);
        color: rgb(240, 241, 248);
        padding: 16px;
        border-radius: 8px;
        width: 80vw;
        max-height: 80vh;
        overflow: auto;
        top: 50%;
        left: 50%;
        -webkit-transform: translateX(-50%) translateY(-50%);
        -moz-transform: translateX(-50%) translateY(-50%);
        -ms-transform: translateX(-50%) translateY(-50%);
        transform: translateX(-50%) translateY(-50%);
      }

      #close-modal-btn {
        position: absolute;
        top: 4px;
        right: 4px;
        padding: 2px 8px;
        border-radius: 2px;
        border: none;
        background-color: var(--danger);
      }

      .correct-answer label {
        border: 2px solid var(--success);
        width: 100%;
      }

      .incorrect-answer label {
        border: 2px solid var(--danger);
        width: 100%;
      }

      .options-container {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      #quiz-meta-container {
        border-radius: 8px;
        background-color: var(--primary-color);
        margin-bottom: 12px;
        padding: 8px;
      }

      #quiz-title {
        text-align: center;
        font-size: 24px;
        margin-bottom: 8px;
      }

      #quiz-description {
        line-height: 1.5;
        padding: 2px 6px;
      }
      img {
        width: 100%;
      }
    </style>
  </head>

  <body onload="main()">
    <main>
      <section id="quiz-meta-container">
        <h1 id="quiz-title"></h1>

      </section>
      <section id="score-stats-container">
        <div id="score-card">
          Score: <span id="current-score">999</span> of
          <span id="pass-percent">999%</span>
        </div>
        <div>Correct: <span id="correct-answers">999</span></div>
        <div>Incorrect: <span id="wrong-answers">999</span></div>
      </section>

      <section id="quiz-container"></section>

      <dialog id="modal" class="modal-container">
        <div id="modal-content">
          <p id="modal-text"></p>
        </div>
      </dialog>
    </main>

    <script>
      const quizData = {"quiz_id":6463755,"quiz_title":"Practice Test #1 - Full-Exam - AWS Certified AI Practitioner","questions":[{"_class":"assessment","id":93243883,"assessment_type":"multiple-choice","prompt":{"question":"<p>A healthcare company is considering leveraging generative AI to enhance its data analysis and patient care services. The team is exploring the AWS cloud environment as a platform for deploying generative AI solutions and wants to understand the key benefits of using AWS for these purposes. They are particularly interested in how AWS can support the scalability, security, and flexibility needed to integrate AI models into their existing workflows and handle large amounts of sensitive data.</p>\n\n<p>What is one of the primary advantages of using generative AI in the AWS cloud environment?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Generative AI can automate the creation of new data based on existing patterns, enhancing productivity and innovation</strong></p>\n\n<p>Generative AI in the AWS cloud environment is advantageous because it automates the creation of new data from existing patterns, which can significantly boost productivity and drive innovation. This capability allows businesses to generate new insights, designs, and solutions more efficiently.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt1-q1-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/what-is/generative-ai/\">https://aws.amazon.com/what-is/generative-ai/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Generative AI can replace all human roles in software development</strong> - Generative AI is not designed to replace all human roles in software development but to assist and enhance human capabilities by automating certain tasks and creating new data based on patterns. So, this option is incorrect.</p>\n\n<p><strong>Generative AI ensures 100% security against all cyber threats</strong> - While generative AI can improve security by identifying patterns and anomalies, it does not guarantee 100% security against all cyber threats. Security in the cloud involves a combination of multiple strategies and tools. Therefore, this option is incorrect.</p>\n\n<p><strong>Generative AI can perform all cloud maintenance tasks without any human intervention</strong> - Generative AI can assist in cloud maintenance tasks by predicting issues and suggesting solutions, but it cannot perform all maintenance tasks without human oversight and intervention. So, this option is not the right fit.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/what-is/generative-ai/\">https://aws.amazon.com/what-is/generative-ai/</a></p>\n\n<p><a href=\"https://aws.amazon.com/ai/generative-ai/services/\">https://aws.amazon.com/ai/generative-ai/services/</a></p>\n","answers":["<p>Generative AI can replace all human roles in software development</p>","<p>Generative AI can automate the creation of new data based on existing patterns, enhancing productivity and innovation</p>","<p>Generative AI ensures 100% security against all cyber threats</p>","<p>Generative AI can perform all cloud maintenance tasks without any human intervention</p>"]},"correct_response":["b"],"section":"Fundamentals of Generative AI","question_plain":"A healthcare company is considering leveraging generative AI to enhance its data analysis and patient care services. The team is exploring the AWS cloud environment as a platform for deploying generative AI solutions and wants to understand the key benefits of using AWS for these purposes. They are particularly interested in how AWS can support the scalability, security, and flexibility needed to integrate AI models into their existing workflows and handle large amounts of sensitive data.\n\nWhat is one of the primary advantages of using generative AI in the AWS cloud environment?","related_lectures":[]},{"_class":"assessment","id":93243885,"assessment_type":"multiple-choice","prompt":{"question":"<p>A technology consulting firm is working with clients to implement generative AI solutions and needs to help them understand the differences between various AI models. In particular, the firm is evaluating the use of Foundation Models (FMs) and Large Language Models (LLMs) for tasks such as text generation, image creation, and data summarization. The firm wants to clarify the distinctions between these two types of models, especially in terms of their design, capabilities, and application scope.</p>\n\n<p>What is a key difference between Foundation Models (FMs) and Large Language Models (LLMs) in the context of generative AI?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Foundation Models serve as a broad base for various AI applications by providing generalized capabilities, whereas Large Language Models are specialized for understanding and generating human language</strong></p>\n\n<p>Foundation Models provide a broad base with generalized capabilities that can be applied to various tasks such as natural language processing (NLP), question answering, and image classification. The size and general-purpose nature of FMs make them different from traditional ML models, which typically perform specific tasks, like analyzing text for sentiment, classifying images, and forecasting trends.</p>\n\n<p>Generally, an FM uses learned patterns and relationships to predict the next item in a sequence. For example, with image generation, the model analyzes the image and creates a sharper, more clearly defined version of the image. Similarly, with text, the model predicts the next word in a string of text based on the previous words and their context. It then selects the next word using probability distribution techniques.</p>\n\n<p>In contrast, Large Language Models are specifically designed for tasks involving the understanding and generation of human language, making them more specialized. LLMs are specifically focused on language-based tasks such as summarization, text generation, classification, open-ended conversation, and information extraction.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt1-q2-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/what-is/generative-ai/\">https://aws.amazon.com/what-is/generative-ai/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Foundation Models are specifically designed for text generation, while Large Language Models can generate images, videos, and audio</strong> - Foundation Models and Large Language Models (LLMs) can both be used for a variety of generative tasks, not limited to specific types like text generation or multimedia content.</p>\n\n<p><strong>Large Language Models are pre-trained on massive datasets and can be fine-tuned for specific tasks, whereas Foundation Models are not pre-trained and are built from scratch for each application</strong> - Both Foundation Models and LLMs are pre-trained on massive datasets. The distinction is more about their general purpose versus their specialized nature.</p>\n\n<p><strong>Foundation Models are only used in academic research, while Large Language Models are used in commercial applications</strong> - Both Foundation Models and Large Language Models are used in various settings, including academic research and commercial applications.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/what-is/generative-ai/\">https://aws.amazon.com/what-is/generative-ai/</a></p>\n\n<p><a href=\"https://aws.amazon.com/what-is/foundation-models/\">https://aws.amazon.com/what-is/foundation-models/</a></p>\n\n<p><a href=\"https://aws.amazon.com/what-is/large-language-model/\">https://aws.amazon.com/what-is/large-language-model/</a></p>\n","answers":["<p>Foundation Models serve as a broad base for various AI applications by providing generalized capabilities, whereas Large Language Models are specialized for understanding and generating human language</p>","<p>Foundation Models are specifically designed for text generation, while Large Language Models can generate images, videos, and audio</p>","<p>Large Language Models are pre-trained on massive datasets and can be fine-tuned for specific tasks, whereas Foundation Models are not pre-trained and are built from scratch for each application</p>","<p>Foundation Models are only used in academic research, while Large Language Models are used in commercial applications</p>"]},"correct_response":["a"],"section":"Fundamentals of Generative AI","question_plain":"A technology consulting firm is working with clients to implement generative AI solutions and needs to help them understand the differences between various AI models. In particular, the firm is evaluating the use of Foundation Models (FMs) and Large Language Models (LLMs) for tasks such as text generation, image creation, and data summarization. The firm wants to clarify the distinctions between these two types of models, especially in terms of their design, capabilities, and application scope.\n\nWhat is a key difference between Foundation Models (FMs) and Large Language Models (LLMs) in the context of generative AI?","related_lectures":[]},{"_class":"assessment","id":93243881,"assessment_type":"multiple-choice","prompt":{"question":"<p>A developer is working on an AI application for predicting customer churn. The developer is collaborating with a research team to ensure the best model is selected for the application. The application needs to accurately identify customers who are likely to leave the service within the next six months.</p>\n\n<p>What should the developer ask the research team to do in order to ensure that the best model is selected for the AI application?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Define the use case of the application narrowly</strong></p>\n\n<p>A narrowly defined use case provides clear and specific requirements for the application, helping the research team understand exactly what the model needs to accomplish. This clarity is crucial for selecting the most appropriate model that fits the specific needs and constraints of the application.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Define the target audience of the application broadly</strong> - Defining the target audience broadly can lead to ambiguity and lack of focus on the specific requirements of the application. It can make it challenging to tailor the model to meet precise needs.</p>\n\n<p><strong>Identify potential data sources for the application</strong> - While identifying data sources is important, it does not directly ensure the selection of the best model. It is a preliminary step that supports data collection rather than model selection.</p>\n\n<p><strong>Determine the cost constraints for model training</strong> - Determining cost constraints is important for budget management, but it does not directly influence the selection of the best model for the application. Cost constraints affect the resources available for model training rather than the suitability of the model itself.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://aws.amazon.com/what-is/machine-learning/\">https://aws.amazon.com/what-is/machine-learning/</a></p>\n","answers":["<p>Define the target audience of the application broadly</p>","<p>Define the use case of the application narrowly</p>","<p>Identify potential data sources for the application</p>","<p>Determine the cost constraints for model training</p>"]},"correct_response":["b"],"section":"Fundamentals of AI and ML","question_plain":"A developer is working on an AI application for predicting customer churn. The developer is collaborating with a research team to ensure the best model is selected for the application. The application needs to accurately identify customers who are likely to leave the service within the next six months.\n\nWhat should the developer ask the research team to do in order to ensure that the best model is selected for the AI application?","related_lectures":[]},{"_class":"assessment","id":93243939,"assessment_type":"multi-select","prompt":{"question":"<p>As a developer specializing in Large Language Models (LLMs) at a technology company, you have been tasked with migrating the company’s AI infrastructure to AWS Cloud to support the development of LLM-based solutions for various applications, such as natural language processing, text generation, and chatbots. The company is looking for AWS services that offer robust support for training, deploying, and managing LLMs while ensuring scalability, security, and integration with other cloud services.</p>\n\n<p>Which AWS services would you recommend for developing LLM-based solutions in this environment? (Select two)</p>\n","relatedLectureIds":"","feedbacks":["","","","",""],"explanation":"<p>Correct options:</p>\n\n<p>Large language models (LLM) are very large deep learning models that are pre-trained on vast amounts of data. The underlying transformer is a set of neural networks that consist of an encoder and a decoder with self-attention capabilities. The encoder and decoder extract meanings from a sequence of text and understand the relationships between words and phrases in it.</p>\n\n<p>Large language models (LLMs) are one class of Foundation Models. For example, OpenAI's generative pre-trained transformer (GPT) models are LLMs. LLMs are specifically focused on language-based tasks such as such as summarization, text generation, classification, open-ended conversation, and information extraction.</p>\n\n<p>AWS recommends AWS Bedrock and Amazon SageMaker JumpStart as the best-fit services for developing LLM based solutions.</p>\n\n<p><strong>Amazon Bedrock</strong></p>\n\n<p>Amazon Bedrock is the easiest way to build and scale generative AI applications with foundation models. Amazon Bedrock is a fully managed service that makes foundation models from Amazon and leading AI startups available through an API, so you can choose from various FMs to find the model that's best suited for your use case. With Bedrock, you can speed up developing and deploying scalable, reliable, and secure generative AI applications without managing infrastructure.</p>\n\n<p><strong>Amazon SageMaker JumpStart</strong></p>\n\n<p>Amazon SageMaker JumpStart is a machine learning hub with foundation models, built-in algorithms, and prebuilt ML solutions that you can deploy with just a few clicks. With SageMaker JumpStart, you can access pre-trained models, including foundation models, to perform tasks like article summarization and image generation. Pretrained models are fully customizable for your use case with your data, and you can easily deploy them into production with the user interface or SDK.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Amazon Q</strong> - Amazon Q is a generative AI–powered assistant for accelerating software development and leveraging companies' internal data. Amazon Q generates code, tests, and debugs. It has multistep planning and reasoning capabilities that can transform and implement new code generated from developer requests.</p>\n\n<p><strong>AWS Trainium</strong> - AWS Trainium is the machine learning (ML) chip that AWS purpose-built for deep learning (DL) training of 100B+ parameter models. Each Amazon Elastic Compute Cloud (Amazon EC2) Trn1 instance deploys up to 16 Trainium accelerators to deliver a high-performance, low-cost solution for DL training in the cloud.</p>\n\n<p><strong>AWS Inferentia</strong> - AWS Inferentia is an ML chip purpose-built by AWS to deliver high-performance inference at a low cost. AWS Inferentia accelerators are designed by AWS to deliver high performance at the lowest cost in Amazon EC2 for your deep learning (DL) and generative AI inference applications.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/what-is/large-language-model/\">https://aws.amazon.com/what-is/large-language-model/</a></p>\n\n<p><a href=\"https://aws.amazon.com/bedrock/\">https://aws.amazon.com/bedrock/</a></p>\n\n<p><a href=\"https://aws.amazon.com/sagemaker/jumpstart/\">https://aws.amazon.com/sagemaker/jumpstart/</a></p>\n\n<p><a href=\"https://aws.amazon.com/q/\">https://aws.amazon.com/q/</a></p>\n\n<p><a href=\"https://aws.amazon.com/machine-learning/trainium/\">https://aws.amazon.com/machine-learning/trainium/</a></p>\n","answers":["<p>Amazon Bedrock</p>","<p>Amazon SageMaker JumpStart</p>","<p>AWS Trainium</p>","<p>Amazon Q</p>","<p>AWS Inferentia</p>"]},"correct_response":["a","b"],"section":"Fundamentals of Generative AI","question_plain":"As a developer specializing in Large Language Models (LLMs) at a technology company, you have been tasked with migrating the company’s AI infrastructure to AWS Cloud to support the development of LLM-based solutions for various applications, such as natural language processing, text generation, and chatbots. The company is looking for AWS services that offer robust support for training, deploying, and managing LLMs while ensuring scalability, security, and integration with other cloud services.\n\nWhich AWS services would you recommend for developing LLM-based solutions in this environment? (Select two)","related_lectures":[]},{"_class":"assessment","id":93243937,"assessment_type":"multiple-choice","prompt":{"question":"<p>A large shopping mall has implemented a security camera system equipped with AI to analyze live footage and automatically flag suspicious behavior. Recently, the system has been consistently flagging individuals from a specific ethnic group more frequently than others, leading to concerns among the mall management and community members about potential bias in the AI model. The team suspects that this issue might be due to certain groups being overrepresented or underrepresented in the data used to train the model, resulting in biased outcomes.</p>\n\n<p>Given this situation, which type of bias is most likely responsible for the system disproportionately flagging individuals based on their ethnic group?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Sampling bias</strong></p>\n\n<p>This is the correct answer because sampling bias occurs when the data used to train the model does not accurately reflect the diversity of the real-world population. If certain ethnic groups are underrepresented or overrepresented in the training data, the model may learn biased patterns, causing it to flag individuals from those groups more frequently. In this scenario, sampling bias leads to discriminatory outcomes and unfairly targets specific groups based on ethnicity.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Measurement bias</strong> - Measurement bias is not the correct explanation because it involves inaccuracies in data collection, such as faulty equipment or inconsistent measurement processes. This type of bias does not inherently affect the demographic composition of the dataset and, therefore, is not directly responsible for bias based on ethnicity in the model's outputs.</p>\n\n<p><strong>Observer bias</strong> - Observer bias is irrelevant in this context because it relates to human errors or subjectivity during data analysis or observation. Since the AI model processes the data autonomously without human intervention, observer bias is not a factor in the biased outcomes of the model.</p>\n\n<p><strong>Confirmation bias</strong> - Confirmation bias involves selectively searching for or interpreting information to confirm existing beliefs. This type of bias does not apply to the AI system in this scenario, as there is no indication that the model is designed to reinforce any preconceptions or assumptions related to ethnicity.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://aws.amazon.com/about-aws/whats-new/2020/12/detect-bias-in-ml-models-and-explain-model-behavior-with-amazon-sagemaker-clarify/\">https://aws.amazon.com/about-aws/whats-new/2020/12/detect-bias-in-ml-models-and-explain-model-behavior-with-amazon-sagemaker-clarify/</a></p>\n","answers":["<p>Measurement bias</p>","<p>Observer bias</p>","<p>Sampling bias</p>","<p>Confirmation bias</p>"]},"correct_response":["c"],"section":"Guidelines for Responsible AI","question_plain":"A large shopping mall has implemented a security camera system equipped with AI to analyze live footage and automatically flag suspicious behavior. Recently, the system has been consistently flagging individuals from a specific ethnic group more frequently than others, leading to concerns among the mall management and community members about potential bias in the AI model. The team suspects that this issue might be due to certain groups being overrepresented or underrepresented in the data used to train the model, resulting in biased outcomes.\n\nGiven this situation, which type of bias is most likely responsible for the system disproportionately flagging individuals based on their ethnic group?","related_lectures":[]},{"_class":"assessment","id":93243935,"assessment_type":"multiple-choice","prompt":{"question":"<p>A financial services company is exploring the use of generative AI to automate report generation and enhance customer insights. As part of this effort, the team is evaluating different AI models and technologies, including Foundation Models (FMs), to understand their capabilities and how they can be applied to improve efficiency. The team needs to clarify key characteristics and features of Foundation Models to determine if they align with the company's objectives.</p>\n\n<p>Which of the following statements is correct regarding Foundation Models (FMs) in the context of generative AI?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>FMs use self-supervised learning to create labels from input data, however, fine-tuning an FM is a supervised learning process</strong></p>\n\n<p>In supervised learning, you train the model with a set of input data and a corresponding set of paired labeled output data. Unsupervised machine learning is when you give the algorithm input data without any labeled output data. Then, on its own, the algorithm identifies patterns and relationships in and between the data. Self-supervised learning is a machine learning approach that applies unsupervised learning methods to tasks usually requiring supervised learning. Instead of using labeled datasets for guidance, self-supervised models create implicit labels from unstructured data.</p>\n\n<p>Foundation models use self-supervised learning to create labels from input data. This means no one has instructed or trained the model with labeled training data sets.</p>\n\n<p>Fine-tuning a pre-trained foundation model is an affordable way to take advantage of their broad capabilities while customizing a model on your own small, corpus. Fine-tuning involves further training a pre-trained language model on a specific task or domain-specific dataset, allowing it to address business requirements. Fine-tuning is a customization method that does change the weights of your model.</p>\n\n<p>Fine-tuning an FM is a supervised learning process.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>FMs use supervised learning to create labels from input data and fine-tuning an FM is a supervised learning process as well</strong></p>\n\n<p><strong>FMs use self-supervised learning to create labels from input data and fine-tuning an FM is a self-supervised learning process as well</strong></p>\n\n<p><strong>FMs use supervised learning to create labels from input data, however, fine-tuning an FM is a self-supervised learning process</strong></p>\n\n<p>These three options contradict the explanation provided above, so these options are incorrect.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/what-is/foundation-models/\">https://aws.amazon.com/what-is/foundation-models/</a></p>\n\n<p><a href=\"https://docs.aws.amazon.com/sagemaker/latest/dg/jumpstart-foundation-models-fine-tuning.html\">https://docs.aws.amazon.com/sagemaker/latest/dg/jumpstart-foundation-models-fine-tuning.html</a></p>\n\n<p><a href=\"https://aws.amazon.com/compare/the-difference-between-machine-learning-supervised-and-unsupervised/\">https://aws.amazon.com/compare/the-difference-between-machine-learning-supervised-and-unsupervised/</a></p>\n","answers":["<p>FMs use supervised learning to create labels from input data and fine-tuning an FM is a supervised learning process as well</p>","<p>FMs use self-supervised learning to create labels from input data and fine-tuning an FM is a self-supervised learning process as well</p>","<p>FMs use supervised learning to create labels from input data, however, fine-tuning an FM is a self-supervised learning process</p>","<p>FMs use self-supervised learning to create labels from input data, however, fine-tuning an FM is a supervised learning process</p>"]},"correct_response":["d"],"section":"Fundamentals of Generative AI","question_plain":"A financial services company is exploring the use of generative AI to automate report generation and enhance customer insights. As part of this effort, the team is evaluating different AI models and technologies, including Foundation Models (FMs), to understand their capabilities and how they can be applied to improve efficiency. The team needs to clarify key characteristics and features of Foundation Models to determine if they align with the company's objectives.\n\nWhich of the following statements is correct regarding Foundation Models (FMs) in the context of generative AI?","related_lectures":[]},{"_class":"assessment","id":93243933,"assessment_type":"multiple-choice","prompt":{"question":"<p>The admissions committee at an Ivy League university has noticed an increasing use of generative AI tools, such as language models, by applicants to draft their application essays. Concerned that some students may be using these tools to produce content that is not their original work, the committee aims to implement measures to detect the use of AI in essay creation. Their goal is to ensure that all submissions reflect the genuine thoughts and abilities of the applicants, thus maintaining the integrity and fairness of the admissions process.</p>\n\n<p>What specific issue is the admissions committee primarily trying to address by detecting the use of generative AI in application essays?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Plagiarism</strong></p>\n\n<p>Plagiarism involves presenting someone else's work, ideas, or creations as one's own without proper attribution. Detecting the use of generative AI tools to produce essays would help the committee identify instances where applicants might have submitted content that is not genuinely their own, thus maintaining the integrity of the admissions process. Plagiarism detection tools are intended to identify copied or non-original content, and the use of generative AI to produce essays could result in plagiarism if applicants do not properly attribute the AI's role in generating the content.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Hallucination</strong> - This option is incorrect because \"hallucination\" in AI refers to the creation of false information, which is not the main issue the admissions committee is dealing with. The committee is focused on detecting essays that are not genuinely authored by the applicants, not on the factual accuracy of the content itself.</p>\n\n<p><strong>Bias</strong> - This option is incorrect because the admissions committee is not concerned with bias in this context. Bias in AI-generated outputs would involve content that unfairly favors or discriminates against certain groups, which is not the same issue as ensuring that essays are the original work of the applicants.</p>\n\n<p><strong>Misinterpretation</strong> - Misinterpretation occurs when the meaning or intent of a text is misunderstood or conveyed incorrectly. While misinterpretation might affect how an essay is read, it is not the core issue the admissions committee is focused on; their primary goal is to verify that the content is original and authored by the applicant.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://www.amazon.science/blog/responsible-ai-in-the-generative-era\">https://www.amazon.science/blog/responsible-ai-in-the-generative-era</a></p>\n\n<p><a href=\"https://aws.amazon.com/bedrock/titan/\">https://aws.amazon.com/bedrock/titan/</a></p>\n","answers":["<p>Hallucination</p>","<p>Bias</p>","<p>Misinterpretation</p>","<p>Plagiarism</p>"]},"correct_response":["d"],"section":"Guidelines for Responsible AI","question_plain":"The admissions committee at an Ivy League university has noticed an increasing use of generative AI tools, such as language models, by applicants to draft their application essays. Concerned that some students may be using these tools to produce content that is not their original work, the committee aims to implement measures to detect the use of AI in essay creation. Their goal is to ensure that all submissions reflect the genuine thoughts and abilities of the applicants, thus maintaining the integrity and fairness of the admissions process.\n\nWhat specific issue is the admissions committee primarily trying to address by detecting the use of generative AI in application essays?","related_lectures":[]},{"_class":"assessment","id":93243931,"assessment_type":"multiple-choice","prompt":{"question":"<p>A healthcare technology company is exploring Amazon Bedrock to develop AI-driven solutions for personalized patient care and predictive diagnostics. The team is particularly interested in customizing Foundation Models (FMs) to align with their proprietary medical data and specific use cases. To make an informed decision, they need to understand the available methods for customizing models within Amazon Bedrock to meet their unique requirements.</p>\n\n<p>Which of the following statements is correct regarding the model customization methods for Amazon Bedrock?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Continued pre-training uses <code>unlabeled</code> data to pre-train a model, whereas, fine-tuning uses <code>labeled</code> data to train a model</strong></p>\n\n<p>Model customization involves further training and changing the weights of the model to enhance its performance. You can use <code>continued pre-training</code> or <code>fine-tuning</code> for model customization in Amazon Bedrock.</p>\n\n<p>In the continued pre-training process,  you provide <code>unlabeled</code> data to pre-train a model by familiarizing it with certain types of inputs. You can provide data from specific topics to expose a model to those areas. The Continued Pre-training process will tweak the model parameters to accommodate the input data and improve its domain knowledge.</p>\n\n<p>For example, you can train a model with private data, such as business documents, that are not publicly available for training large language models. Additionally, you can continue to improve the model by retraining the model with more unlabeled data as it becomes available.</p>\n\n<p>While fine-tuning a model, you provide <code>labeled</code> data to train a model to improve performance on specific tasks. By providing a training dataset of labeled examples, the model learns to associate what types of outputs should be generated for certain types of inputs. The model parameters are adjusted in the process and the model's performance is improved for the tasks represented by the training dataset.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt1-q8-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/blogs/machine-learning/best-practices-to-build-generative-ai-applications-on-aws/\">https://aws.amazon.com/blogs/machine-learning/best-practices-to-build-generative-ai-applications-on-aws/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Continued pre-training uses <code>unlabeled</code> data to pre-train a model and fine-tuning also uses <code>unlabeled</code> data to train a model</strong></p>\n\n<p><strong>Continued pre-training uses <code>labeled</code> data to pre-train a model and fine-tuning also uses <code>labeled</code> data to train a model</strong></p>\n\n<p><strong>Continued pre-training uses <code>labeled</code> data to pre-train a model, whereas, fine-tuning uses <code>unlabeled</code> data to train a model</strong></p>\n\n<p>These three options contradict the explanation provided above, so these options are incorrect.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/custom-models.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/custom-models.html</a></p>\n\n<p><a href=\"https://aws.amazon.com/blogs/machine-learning/best-practices-to-build-generative-ai-applications-on-aws/\">https://aws.amazon.com/blogs/machine-learning/best-practices-to-build-generative-ai-applications-on-aws/</a></p>\n","answers":["<p>Continued pre-training uses <code>unlabeled</code> data to pre-train a model and fine-tuning also uses <code>unlabeled</code> data to train a model</p>","<p>Continued pre-training uses <code>labeled</code> data to pre-train a model and fine-tuning also uses <code>labeled</code> data to train a model</p>","<p>Continued pre-training uses <code>unlabeled</code> data to pre-train a model, whereas, fine-tuning uses <code>labeled</code> data to train a model</p>","<p>Continued pre-training uses <code>labeled</code> data to pre-train a model, whereas, fine-tuning uses <code>unlabeled</code> data to train a model</p>"]},"correct_response":["c"],"section":"Fundamentals of Generative AI","question_plain":"A healthcare technology company is exploring Amazon Bedrock to develop AI-driven solutions for personalized patient care and predictive diagnostics. The team is particularly interested in customizing Foundation Models (FMs) to align with their proprietary medical data and specific use cases. To make an informed decision, they need to understand the available methods for customizing models within Amazon Bedrock to meet their unique requirements.\n\nWhich of the following statements is correct regarding the model customization methods for Amazon Bedrock?","related_lectures":[]},{"_class":"assessment","id":93243929,"assessment_type":"multiple-choice","prompt":{"question":"<p>A legal research firm is seeking to implement a cutting-edge AI solution that can generate detailed responses to complex legal queries by retrieving relevant information from their extensive database of legal documents. The company wants to use Amazon Bedrock to deploy a fully managed solution that supports an end-to-end Retrieval Augmented Generation (RAG) workflow, ensuring that the AI can pull contextually accurate information and generate high-quality answers efficiently.</p>\n\n<p>What solution or approach would you recommend for implementing fully managed support for a RAG workflow in Amazon Bedrock?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Knowledge Bases for Amazon Bedrock</strong></p>\n\n<p>With Knowledge Bases for Amazon Bedrock, you can give FMs and agents contextual information from your company’s private data sources for RAG to deliver more relevant, accurate, and customized responses</p>\n\n<p>Knowledge Bases for Amazon Bedrock takes care of the entire ingestion workflow of converting your documents into embeddings (vector) and storing the embeddings in a specialized vector database. Knowledge Bases for Amazon Bedrock supports popular databases for vector storage, including vector engine for Amazon OpenSearch Serverless, Pinecone, Redis Enterprise Cloud, Amazon Aurora (coming soon), and MongoDB (coming soon). If you do not have an existing vector database, Amazon Bedrock creates an OpenSearch Serverless vector store for you.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt1-q9-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/bedrock/knowledge-bases/\">https://aws.amazon.com/bedrock/knowledge-bases/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Watermark detection for Amazon Bedrock</strong> -  The watermark detection mechanism allows you to identify images generated by Amazon Titan Image Generator, a foundation model that allows users to create realistic, studio-quality images in large volumes and at low cost, using natural language prompts. With watermark detection, you can increase transparency around AI-generated content by mitigating harmful content generation and reducing the spread of misinformation. You cannot use a watermark detection mechanism to implement RAG workflow in Amazon Bedrock.</p>\n\n<p><strong>Continued pretraining in Amazon Bedrock</strong> - In the continued pretraining process, you provide unlabeled data to pre-train a model by familiarizing it with certain types of inputs. You can provide data from specific topics to expose a model to those areas. The continued pretraining process will tweak the model parameters to accommodate the input data and improve its domain knowledge. You can use <code>continued pretraining</code> or <code>fine-tuning</code> for model customization in Amazon Bedrock. You cannot use continued pretraining to implement RAG workflow in Amazon Bedrock.</p>\n\n<p><strong>Guardrails for Amazon Bedrock</strong> - Guardrails for Amazon Bedrock help you implement safeguards for your generative AI applications based on your use cases and responsible AI policies. It helps control the interaction between users and FMs by filtering undesirable and harmful content, redacts personally identifiable information (PII), and enhances content safety and privacy in generative AI applications. You cannot use guardrails to implement RAG workflow in Amazon Bedrock.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/bedrock/faqs/\">https://aws.amazon.com/bedrock/faqs/</a></p>\n\n<p><a href=\"https://aws.amazon.com/bedrock/knowledge-bases/\">https://aws.amazon.com/bedrock/knowledge-bases/</a></p>\n\n<p><a href=\"https://aws.amazon.com/about-aws/whats-new/2024/04/watermark-detection-amazon-titan-image-generator-bedrock/\">https://aws.amazon.com/about-aws/whats-new/2024/04/watermark-detection-amazon-titan-image-generator-bedrock/</a></p>\n","answers":["<p>Knowledge Bases for Amazon Bedrock</p>","<p>Watermark detection for Amazon Bedrock</p>","<p>Continued pretraining in Amazon Bedrock</p>","<p>Guardrails for Amazon Bedrock</p>"]},"correct_response":["a"],"section":"Fundamentals of Generative AI","question_plain":"A legal research firm is seeking to implement a cutting-edge AI solution that can generate detailed responses to complex legal queries by retrieving relevant information from their extensive database of legal documents. The company wants to use Amazon Bedrock to deploy a fully managed solution that supports an end-to-end Retrieval Augmented Generation (RAG) workflow, ensuring that the AI can pull contextually accurate information and generate high-quality answers efficiently.\n\nWhat solution or approach would you recommend for implementing fully managed support for a RAG workflow in Amazon Bedrock?","related_lectures":[]},{"_class":"assessment","id":93243927,"assessment_type":"multiple-choice","prompt":{"question":"<p>A manufacturing company aims to leverage Amazon Bedrock to create a generative AI application that automates the monitoring of inventory levels, sales data, and supply chain information. The application should also recommend optimal reorder points and quantities to enhance operational efficiency.</p>\n\n<p>What do you recommend?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Agents for Amazon Bedrock</strong></p>\n\n<p>Agents for Amazon Bedrock are fully managed capabilities that make it easier for developers to create generative AI-based applications that can complete complex tasks for a wide range of use cases and deliver up-to-date answers based on proprietary knowledge sources.</p>\n\n<p>Agents are software components or entities designed to autonomously or semi-autonomously perform specific actions or tasks based on predefined rules or algorithms. With Amazon Bedrock, agents are utilized to manage and execute various multi-step tasks related to infrastructure provisioning, application deployment, and operational activities. For example, you can create an agent that helps customers process insurance claims or an agent that helps customers make travel reservations. You don't have to provision capacity, manage infrastructure, or write custom code. Amazon Bedrock manages prompt engineering, memory, monitoring, encryption, user permissions, and API invocation.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt1-q10-i1.jpg\">\nvia - <a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/agents.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/agents.html</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Knowledge Bases for Amazon Bedrock</strong> - With Knowledge Bases for Amazon Bedrock, you can give FMs and agents contextual information from your company’s private data sources for Retrieval Augmented Generation (RAG) to deliver more relevant, accurate, and customized responses. You cannot use Knowledge Bases for Amazon Bedrock for the given use case.</p>\n\n<p><strong>Watermark detection for Amazon Bedrock</strong> - The watermark detection mechanism allows you to identify images generated by Amazon Titan Image Generator, a foundation model that allows users to create realistic, studio-quality images in large volumes and at low cost, using natural language prompts. With watermark detection, you can increase transparency around AI-generated content by mitigating harmful content generation and reducing the spread of misinformation. You cannot use watermark detection for the given use case.</p>\n\n<p><strong>Guardrails for Amazon Bedrock</strong> - Guardrails for Amazon Bedrock help you implement safeguards for your generative AI applications based on your use cases and responsible AI policies. It helps control the interaction between users and FMs by filtering undesirable and harmful content, redacts personally identifiable information (PII), and enhances content safety and privacy in generative AI applications. You cannot use Guardrails for Amazon Bedrock for the given use case.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/bedrock/agents/\">https://aws.amazon.com/bedrock/agents/</a></p>\n\n<p><a href=\"https://aws.amazon.com/bedrock/faqs/\">https://aws.amazon.com/bedrock/faqs/</a></p>\n","answers":["<p>Knowledge Bases for Amazon Bedrock</p>","<p>Watermark detection for Amazon Bedrock</p>","<p>Agents for Amazon Bedrock</p>","<p>Guardrails for Amazon Bedrock</p>"]},"correct_response":["c"],"section":"Fundamentals of Generative AI","question_plain":"A manufacturing company aims to leverage Amazon Bedrock to create a generative AI application that automates the monitoring of inventory levels, sales data, and supply chain information. The application should also recommend optimal reorder points and quantities to enhance operational efficiency.\n\nWhat do you recommend?","related_lectures":[]},{"_class":"assessment","id":93243925,"assessment_type":"multiple-choice","prompt":{"question":"<p>A data analytics company is developing a knowledge management system using Amazon Bedrock to power its AI-driven insights. As part of this project, the company needs to store and retrieve embeddings efficiently for a variety of use cases, including natural language processing and document search. To ensure optimal performance, they want to understand which vector database is natively supported by Knowledge Bases in Amazon Bedrock for storing and managing these embeddings.</p>\n\n<p>Which is the default vector database supported by Knowledge Bases for Amazon Bedrock?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>OpenSearch Serverless vector store</strong></p>\n\n<p>Knowledge Bases for Amazon Bedrock takes care of the entire ingestion workflow of converting your documents into embeddings (vector) and storing the embeddings in a specialized vector database. Knowledge Bases for Amazon Bedrock supports popular databases for vector storage, including vector engine for Amazon OpenSearch Serverless, Pinecone, Redis Enterprise Cloud, Amazon Aurora, and MongoDB.</p>\n\n<p>If you do not have an existing vector database, Amazon Bedrock creates an OpenSearch Serverless vector store for you.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt1-q11-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/bedrock/knowledge-bases/\">https://aws.amazon.com/bedrock/knowledge-bases/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Redis Enterprise Cloud</strong></p>\n\n<p><strong>Amazon Aurora</strong></p>\n\n<p><strong>MongoDB</strong></p>\n\n<p>These three options contradict the explanation provided above, so these options are incorrect.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/bedrock/knowledge-bases/\">https://aws.amazon.com/bedrock/knowledge-bases/</a></p>\n\n<p><a href=\"https://aws.amazon.com/about-aws/whats-new/2024/04/watermark-detection-amazon-titan-image-generator-bedrock/\">https://aws.amazon.com/about-aws/whats-new/2024/04/watermark-detection-amazon-titan-image-generator-bedrock/</a></p>\n","answers":["<p>OpenSearch Serverless vector store</p>","<p>Redis Enterprise Cloud</p>","<p>Amazon Aurora</p>","<p>MongoDB</p>"]},"correct_response":["a"],"section":"Fundamentals of Generative AI","question_plain":"A data analytics company is developing a knowledge management system using Amazon Bedrock to power its AI-driven insights. As part of this project, the company needs to store and retrieve embeddings efficiently for a variety of use cases, including natural language processing and document search. To ensure optimal performance, they want to understand which vector database is natively supported by Knowledge Bases in Amazon Bedrock for storing and managing these embeddings.\n\nWhich is the default vector database supported by Knowledge Bases for Amazon Bedrock?","related_lectures":[]},{"_class":"assessment","id":93243923,"assessment_type":"multiple-choice","prompt":{"question":"<p>A software development company is building generative AI solutions for its clients, including applications for content creation and automated responses. As part of the development process, the team needs to clearly understand the distinctions between model inference and model evaluation to ensure accurate performance tracking and deployment. Model inference is required for generating outputs from the model, while model evaluation is necessary for assessing how well the model performs based on specific metrics.</p>\n\n<p>Which of the following options best summarizes the differences between model inference and model evaluation in the context of generative AI?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Model evaluation is the process of evaluating and comparing model outputs to determine the model that is best suited for a use case, whereas, model inference is the process of a model generating an output (response) from a given input (prompt)</strong></p>\n\n<p>Model inference is the process of a model generating an output (response) from a given input (prompt).</p>\n\n<p>Model evaluation is the process of evaluating and comparing model outputs to determine the model that is best suited for a use case.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt1-q12-i1.jpg\">\nvia - <a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/key-definitions.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/key-definitions.html</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Model inference is the process of evaluating and comparing model outputs to determine the model that is best suited for a use case, whereas, model evaluation is the process of a model generating an output (response) from a given input (prompt)</strong></p>\n\n<p><strong>Both model inference and model evaluation refer to the process of evaluating and comparing model outputs to determine the model that is best suited for a use case</strong></p>\n\n<p><strong>Both model inference and model evaluation refer to the process of a model generating an output (response) from a given input (prompt)</strong></p>\n\n<p>These three options contradict the explanation provided above, so these options are incorrect.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/key-definitions.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/key-definitions.html</a></p>\n","answers":["<p>Model inference is the process of evaluating and comparing model outputs to determine the model that is best suited for a use case, whereas, model evaluation is the process of a model generating an output (response) from a given input (prompt)</p>","<p>Model evaluation is the process of evaluating and comparing model outputs to determine the model that is best suited for a use case, whereas, model inference is the process of a model generating an output (response) from a given input (prompt)</p>","<p>Both model inference and model evaluation refer to the process of evaluating and comparing model outputs to determine the model that is best suited for a use case</p>","<p>Both model inference and model evaluation refer to the process of a model generating an output (response) from a given input (prompt)</p>"]},"correct_response":["b"],"section":"Fundamentals of AI and ML","question_plain":"A software development company is building generative AI solutions for its clients, including applications for content creation and automated responses. As part of the development process, the team needs to clearly understand the distinctions between model inference and model evaluation to ensure accurate performance tracking and deployment. Model inference is required for generating outputs from the model, while model evaluation is necessary for assessing how well the model performs based on specific metrics.\n\nWhich of the following options best summarizes the differences between model inference and model evaluation in the context of generative AI?","related_lectures":[]},{"_class":"assessment","id":93243921,"assessment_type":"multiple-choice","prompt":{"question":"<p>A marketing analytics company is using generative AI to create custom reports and insights based on client data. The team is focused on improving the quality and relevance of the AI-generated content by refining how they interact with the model through prompts. To ensure the AI consistently produces high-quality and accurate outputs, they want to understand the best practices for crafting effective prompts that guide the model efficiently.</p>\n\n<p>What are the key constituents of a good prompting technique in this context?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Instructions, Context, Input data, Output Indicator</strong></p>\n\n<p>The following are the constituents of a good prompting technique:\n• Instructions – a task for the model to do (description, how the model should perform)\n• Context – external information to guide the model\n• Input data – the input for which you want a response\n• Output Indicator – the output type or format</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt1-q13-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/what-is/prompt-engineering/\">https://aws.amazon.com/what-is/prompt-engineering/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Instructions, Parameters, Input data, Output Indicator</strong></p>\n\n<p><strong>Hyperparameters, Context, Input data, Output Indicator</strong></p>\n\n<p><strong>Instructions, Hyperparameters, Input data, Output Indicator</strong></p>\n\n<p>Hyperparameters are values that can be adjusted for model customization to control the training process and, consequently, the output custom model. In other words, hyperparameters are external configurations set before the training process begins. They control the training process and the structure of the model but are not adjusted by the training algorithm itself. Examples include the learning rate, the number of layers in a neural network, etc.</p>\n\n<p>Model parameters are values that define a model and its behavior in interpreting input and generating responses. Model parameters are controlled and updated by providers. You can also update model parameters to create a new model through the process of model customization. In other words, Model parameters are the internal variables of the model that are learned and adjusted during the training process. These parameters directly influence the output of the model for a given input. Examples include the weights and biases in a neural network.</p>\n\n<p>Hyperparameters and parameters are not part of the prompting technique, so these three options are incorrect.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://aws.amazon.com/what-is/prompt-engineering/\">https://aws.amazon.com/what-is/prompt-engineering/</a></p>\n","answers":["<p>Instructions, Context, Input data, Output Indicator</p>","<p>Instructions, Parameters, Input data, Output Indicator</p>","<p>Hyperparameters, Context, Input data, Output Indicator</p>","<p>Instructions, Hyperparameters, Input data, Output Indicator</p>"]},"correct_response":["a"],"section":"Fundamentals of AI and ML","question_plain":"A marketing analytics company is using generative AI to create custom reports and insights based on client data. The team is focused on improving the quality and relevance of the AI-generated content by refining how they interact with the model through prompts. To ensure the AI consistently produces high-quality and accurate outputs, they want to understand the best practices for crafting effective prompts that guide the model efficiently.\n\nWhat are the key constituents of a good prompting technique in this context?","related_lectures":[]},{"_class":"assessment","id":93243919,"assessment_type":"multiple-choice","prompt":{"question":"<p>The marketing department at a retail company is working on a campaign for the upcoming Thanksgiving holidays. The department wants to exclude competitive brand names or sensitive topics from the content produced via generative AI prompts.</p>\n\n<p>What type of prompting technique does the given use case represent?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Negative prompting</strong></p>\n\n<p>Negative prompting refers to guiding a generative AI model to avoid certain outputs or behaviors when generating content. In the context of AWS generative AI, like those using Amazon Bedrock, negative prompting is used to refine and control the output of models by specifying what should not be included in the generated content.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt1-q14-i1.jpg\"></p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt1-q14-i2.jpg\"></p>\n\n<p>via - <a href=\"https://aws.amazon.com/what-is/prompt-engineering/\">https://aws.amazon.com/what-is/prompt-engineering/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Few-shot Prompting</strong> - In few-shot prompting, you provide a few examples of a task to the model to guide its output.</p>\n\n<p><strong>Chain-of-thought prompting</strong> - Chain-of-thought prompting is a technique that breaks down a complex question into smaller, logical parts that mimic a train of thought. This helps the model solve problems in a series of intermediate steps rather than directly answering the question. This enhances its reasoning ability. It involves guiding the model through a step-by-step process to arrive at a solution or generate content, thereby enhancing the quality and coherence of the output.</p>\n\n<p><strong>Zero-shot Prompting</strong> - Zero-shot prompting is a technique used in generative AI where the model is asked to perform a task or generate content without having seen any examples of that specific task during training. Instead, the model relies on its general understanding and knowledge to respond.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://aws.amazon.com/what-is/prompt-engineering/\">https://aws.amazon.com/what-is/prompt-engineering/</a></p>\n","answers":["<p>Few-shot Prompting</p>","<p>Chain-of-thought prompting</p>","<p>Zero-shot Prompting</p>","<p>Negative prompting</p>"]},"correct_response":["d"],"section":"Fundamentals of AI and ML","question_plain":"The marketing department at a retail company is working on a campaign for the upcoming Thanksgiving holidays. The department wants to exclude competitive brand names or sensitive topics from the content produced via generative AI prompts.\n\nWhat type of prompting technique does the given use case represent?","related_lectures":[]},{"_class":"assessment","id":93243917,"assessment_type":"multiple-choice","prompt":{"question":"<p>A company is using Amazon Bedrock and it wants to regulate the number of most-likely candidates considered for the next word in the model's output.</p>\n\n<p>Which of the following inference parameters would you recommend for the given use case?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Top K</strong></p>\n\n<p>Top K represents the number of most likely candidates that the model considers for the next token. Choose a lower value to decrease the size of the pool and limit the options to more likely outputs. Choose a higher value to increase the size of the pool and allow the model to consider less likely outputs.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt1-q15-i1.jpg\"></p>\n\n<p>via - <a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/inference-parameters.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/inference-parameters.html</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Temperature</strong> - Temperature is a value between 0 and 1, and it regulates the creativity of the model's responses. Use a lower temperature if you want more deterministic responses, and use a higher temperature if you want more creative or different responses for the same prompt on Amazon Bedrock.</p>\n\n<p><strong>Top P</strong> - Top P represents the percentage of most likely candidates that the model considers for the next token. Choose a lower value to decrease the size of the pool and limit the options to more likely outputs. Choose a higher value to increase the size of the pool and allow the model to consider less likely outputs.</p>\n\n<p><strong>Stop sequences</strong> - Stop sequences specify the sequences of characters that stop the model from generating further tokens. If the model generates a stop sequence that you specify, it will stop generating after that sequence.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/inference-parameters.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/inference-parameters.html</a></p>\n\n<p><a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/general-guidelines-for-bedrock-users.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/general-guidelines-for-bedrock-users.html</a></p>\n","answers":["<p>Temperature</p>","<p>Top P</p>","<p>Top K</p>","<p>Stop sequences</p>"]},"correct_response":["c"],"section":"Fundamentals of AI and ML","question_plain":"A company is using Amazon Bedrock and it wants to regulate the number of most-likely candidates considered for the next word in the model's output.\n\nWhich of the following inference parameters would you recommend for the given use case?","related_lectures":[]},{"_class":"assessment","id":93243915,"assessment_type":"multiple-choice","prompt":{"question":"<p>A financial services company is leveraging Amazon Bedrock to generate AI-driven insights and recommendations for its clients. The development team is fine-tuning the model's behavior to produce more accurate and relevant responses. As part of this process, they are experimenting with various inference parameters, including <code>Top P</code>, to control how the model generates text. The team needs to understand how adjusting the <code>Top P</code> parameter can influence the diversity and quality of the model's responses during inference.</p>\n\n<p>How does the inference parameter <code>Top P</code> influence the model response for Amazon Bedrock?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Influences the percentage of most-likely candidates that the model considers for the next token</strong></p>\n\n<p><code>Top P</code> represents the percentage of most likely candidates that the model considers for the next token. Choose a lower value to decrease the size of the pool and limit the options to more likely outputs. Choose a higher value to increase the size of the pool and allow the model to consider less likely outputs.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt1-q16-i1.jpg\"></p>\n\n<p>via - <a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/inference-parameters.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/inference-parameters.html</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Specifies the sequences of characters that stop the model from generating further tokens</strong> - The inference parameter <code>Stop sequences</code> specifies the sequences of characters that stop the model from generating further tokens. If the model generates a stop sequence that you specify, it will stop generating after that sequence.</p>\n\n<p><strong>Influences the number of most-likely candidates that the model considers for the next token</strong> - The inference parameter <code>Top K</code> represents the number of most likely candidates that the model considers for the next token.</p>\n\n<p><strong>Influences the likelihood of the model selecting lower-probability outputs, thereby impacting the creativity of the model’s output</strong> - The inference parameter <code>Temperature</code> is a value between 0 and 1, and it regulates the creativity of the model's responses.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/inference-parameters.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/inference-parameters.html</a></p>\n\n<p><a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/general-guidelines-for-bedrock-users.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/general-guidelines-for-bedrock-users.html</a></p>\n","answers":["<p>Specifies the sequences of characters that stop the model from generating further tokens</p>","<p>Influences the percentage of most-likely candidates that the model considers for the next token</p>","<p>Influences the number of most-likely candidates that the model considers for the next token</p>","<p>Influences the likelihood of the model selecting lower-probability outputs, thereby impacting the creativity of the model’s output</p>"]},"correct_response":["b"],"section":"Applications of Foundation Models","question_plain":"A financial services company is leveraging Amazon Bedrock to generate AI-driven insights and recommendations for its clients. The development team is fine-tuning the model's behavior to produce more accurate and relevant responses. As part of this process, they are experimenting with various inference parameters, including Top P, to control how the model generates text. The team needs to understand how adjusting the Top P parameter can influence the diversity and quality of the model's responses during inference.\n\nHow does the inference parameter Top P influence the model response for Amazon Bedrock?","related_lectures":[]},{"_class":"assessment","id":93243913,"assessment_type":"multiple-choice","prompt":{"question":"<p>A manufacturing company has developed a machine learning model to automate the process of identifying and classifying different types of materials — such as metals, plastics, and fabrics — in images captured from its production line. To ensure that the model accurately differentiates between these materials and performs reliably in real-world conditions, the company needs to evaluate its performance using an appropriate method that can provide detailed insights into the model's accuracy and classification errors.</p>\n\n<p>Which of the following options would be the most suitable for assessing the performance of the classification model?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Confusion matrix</strong></p>\n\n<p>Confusion matrix is a tool specifically designed to evaluate the performance of classification models by displaying the number of true positives, true negatives, false positives, and false negatives. This matrix provides a detailed breakdown of the model's performance across all classes, making it the most suitable choice for evaluating a classification model's accuracy and identifying potential areas for improvement. It provides a comprehensive overview of the model's performance by detailing how many instances were correctly or incorrectly classified in each category. This enables the company to understand where the model is performing well and where it may need adjustments, such as improving the classification of specific material types.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Root Mean Squared Error (RMSE)</strong> - Root Mean Squared Error (RMSE) is a metric commonly used to measure the average error in regression models by calculating the square root of the average squared differences between predicted and actual values. However, RMSE is not suitable for classification tasks, as it is designed to measure continuous outcomes, not discrete class predictions.</p>\n\n<p><strong>Mean Absolute Error (MAE)</strong> - Mean Absolute Error (MAE) measures the average magnitude of errors in a set of predictions without considering their direction. MAE is typically used in regression tasks to quantify the accuracy of a continuous variable's predictions, not for classification tasks where the outputs are categorical rather than continuous.</p>\n\n<p><strong>Correlation matrix</strong> - Correlation matrix measures the statistical correlation between different variables or features in a dataset, typically used to understand the relationships between continuous variables. A correlation matrix is not designed to evaluate the performance of a classification model, as it does not provide any insight into the accuracy or errors of categorical predictions.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/machine-learning/latest/dg/multiclass-model-insights.html\">https://docs.aws.amazon.com/machine-learning/latest/dg/multiclass-model-insights.html</a></p>\n","answers":["<p>Root Mean Squared Error (RMSE)</p>","<p>Mean Absolute Error (MAE)</p>","<p>Confusion matrix</p>","<p>Correlation matrix</p>"]},"correct_response":["c"],"section":"Fundamentals of AI and ML","question_plain":"A manufacturing company has developed a machine learning model to automate the process of identifying and classifying different types of materials — such as metals, plastics, and fabrics — in images captured from its production line. To ensure that the model accurately differentiates between these materials and performs reliably in real-world conditions, the company needs to evaluate its performance using an appropriate method that can provide detailed insights into the model's accuracy and classification errors.\n\nWhich of the following options would be the most suitable for assessing the performance of the classification model?","related_lectures":[]},{"_class":"assessment","id":93243911,"assessment_type":"multiple-choice","prompt":{"question":"<p>A retail analytics company is analyzing a large dataset containing customer purchase history, product details, and sales trends to gain insights into customer behavior and optimize inventory management. To achieve this, the team is focused on calculating various statistical measures to summarize data characteristics and using visualizations to uncover patterns and trends. These tasks are critical for understanding the underlying structure and dynamics of the data before proceeding to model development or predictive analysis.</p>\n\n<p>Which phase of the data science process does this work primarily belong to?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Exploratory Data Analysis (EDA)</strong></p>\n\n<p>The company is in the Exploratory Data Analysis (EDA) phase, which involves examining the data through statistical summaries and visualizations to identify patterns, detect anomalies, and form hypotheses. This phase is crucial for understanding the dataset’s structure and characteristics, making it the most appropriate description of the current activities. Tasks like calculating statistics and visualizing data are fundamental to EDA, helping to uncover patterns, detect outliers, and gain insights into the data before any modeling is done. EDA serves as the foundation for building predictive models by providing a deep understanding of the data.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Data Preparation</strong> - This option is incorrect because data preparation involves cleaning and preprocessing the data to make it suitable for analysis or modeling. This may include handling missing values, removing duplicates, or transforming variables, but it does not typically involve calculating statistics and visualizing data. While data preparation is an important step, it does not encompass the exploratory analysis activities described in the question.</p>\n\n<p><strong>Data Augmentation</strong> - Data augmentation is a technique used primarily in machine learning to artificially increase the size and variability of the training dataset by creating modified versions of the existing data, such as flipping images or adding noise. It is not related to the tasks of calculating statistics or visualizing data, which are part of EDA.</p>\n\n<p><strong>Model Evaluation</strong> - Model evaluation refers to assessing the performance of a machine learning model using specific metrics such as accuracy, precision, recall, or F1 score. Model evaluation does not involve exploratory tasks like calculating statistics or visualizing data; instead, it focuses on validating the effectiveness of a trained model. Therefore, this phase does not align with the company's current activities.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/sagemaker/latest/dg/canvas-analyses.html\">https://docs.aws.amazon.com/sagemaker/latest/dg/canvas-analyses.html</a></p>\n\n<p><a href=\"https://aws.amazon.com/blogs/machine-learning/exploratory-data-analysis-feature-engineering-and-operationalizing-your-data-flow-into-your-ml-pipeline-with-amazon-sagemaker-data-wrangler/\">https://aws.amazon.com/blogs/machine-learning/exploratory-data-analysis-feature-engineering-and-operationalizing-your-data-flow-into-your-ml-pipeline-with-amaz
