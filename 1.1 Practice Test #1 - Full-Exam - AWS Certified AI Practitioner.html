erlying patterns in the data, resulting in poor performance on both training and new data</p>"]},"correct_response":["b"],"section":"Guidelines for Responsible AI","question_plain":"A Large Language Model (LLM) chatbot is generating responses that appear plausible and factual but are actually incorrect. What is this phenomenon called?","related_lectures":[]},{"_class":"assessment","id":93243975,"assessment_type":"multiple-choice","prompt":{"question":"<p>Which of the following represents a valid use case for a generative AI-powered model?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Using generative AI to create photorealistic images from textual descriptions</strong></p>\n\n<p>This is a legitimate use case for a generative AI model. Generative models such as DALL-E, Midjourney, and Stable Diffusion are designed to transform text prompts into high-quality, photorealistic images. These models use advanced techniques like Generative Adversarial Networks (GANs) or diffusion models to generate novel visual content based on the input description. This capability is at the core of what generative AI is designed to achieve, enabling applications in digital art, marketing, media creation, and other creative industries.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt1-q37-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/what-is/generative-ai/\">https://aws.amazon.com/what-is/generative-ai/</a></p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt1-q37-i2.jpg\">\nvia - <a href=\"https://aws.amazon.com/what-is/generative-ai/\">https://aws.amazon.com/what-is/generative-ai/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Utilizing generative AI to predict housing prices based on historical market data</strong> - This is not a valid use case for generative AI. Predicting housing prices involves analyzing structured data, such as historical sales data, economic indicators, and location factors, typically using regression models or supervised learning algorithms. These predictive models are designed to find patterns and relationships within data to forecast future values, which is fundamentally different from generating new content.</p>\n\n<p><strong>Applying generative AI for financial analysis to forecast stock market trends</strong> - Financial analysis and stock market forecasting rely on time-series analysis and other statistical methods that are designed to interpret historical data and predict future outcomes. Techniques such as Long Short-Term Memory (LSTM) networks or ARIMA models are commonly used for these tasks. Generative AI, which is primarily focused on creating new content like text, images, or music, is not suitable for this kind of predictive analysis.</p>\n\n<p><strong>Classifying medical images to detect anomalies or diagnose diseases using generative AI</strong> - This is another example of a task that is outside the scope of generative AI. Classifying medical images involves discriminative models designed for classification and detection, such as Convolutional Neural Networks (CNNs). These models are trained to recognize patterns in labeled data and are used for diagnostic purposes, not for generating new images or content.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://aws.amazon.com/what-is/generative-ai/\">https://aws.amazon.com/what-is/generative-ai/</a></p>\n","answers":["<p>Utilizing generative AI to predict housing prices based on historical market data</p>","<p>Applying generative AI for financial analysis to forecast stock market trends</p>","<p>Using generative AI to create photorealistic images from textual descriptions</p>","<p>Classifying medical images to detect anomalies or diagnose diseases using generative AI</p>"]},"correct_response":["c"],"section":"Fundamentals of Generative AI","question_plain":"Which of the following represents a valid use case for a generative AI-powered model?","related_lectures":[]},{"_class":"assessment","id":93243977,"assessment_type":"multiple-choice","prompt":{"question":"<p>A company wants a unified search solution that can connect the company's multiple data repositories, third-party document repositories, and FAQs to create a new search experience so that the employees can efficiently find the right answers for their queries.</p>\n\n<p>Which Machine Learning powered AWS service offers these search features?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Amazon Kendra</strong></p>\n\n<p>Amazon Kendra is a highly accurate and easy-to-use enterprise search service that’s powered by machine learning (ML). It allows developers to add search capabilities to their applications so their end users can discover information stored within the vast amount of content spread across their company. This includes data from manuals, research reports, FAQs, human resources (HR) documentation, and customer service guides, which may be found across various systems such as Amazon Simple Storage Service (S3), Microsoft SharePoint, Salesforce, ServiceNow, RDS databases, or Microsoft OneDrive.</p>\n\n<p>When you type a question, the service uses ML algorithms to understand the context and return the most relevant results, whether that means a precise answer or an entire document. For example, you can ask a question such as \"How much is the cash reward on the corporate credit card?” and Amazon Kendra will map to the relevant documents and return a specific answer (such as “2%”). Kendra provides sample code so you can get started quickly and easily integrate highly accurate searches into your new or existing applications.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Amazon Textract</strong> - Amazon Textract is a machine learning (ML) service that automatically extracts text, handwriting, layout elements, and data from scanned documents. It goes beyond simple optical character recognition (OCR) to identify, understand, and extract specific data from documents. Textract is not a search service.</p>\n\n<p><strong>Amazon SageMaker Data Wrangler</strong> - Amazon SageMaker Data Wrangler reduces the time it takes to aggregate and prepare tabular and image data for ML from weeks to minutes. With SageMaker Data Wrangler, you can simplify the process of data preparation and feature engineering, and complete each step of the data preparation workflow (including data selection, cleansing, exploration, visualization, and processing at scale) from a single visual interface.</p>\n\n<p><strong>Amazon Comprehend</strong> - Amazon Comprehend is a natural language processing (NLP) service that uses machine learning to find meaning and insights in text. By utilizing NLP, you can extract important phrases, sentiments, syntax, key entities such as brand, date, location, person, etc., and the language of the text. Comprehend can analyze text, but cannot extract it from documents or images.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://aws.amazon.com/kendra/faqs/\">https://aws.amazon.com/kendra/faqs/</a></p>\n","answers":["<p>Amazon Textract</p>","<p>Amazon Kendra</p>","<p>Amazon SageMaker Data Wrangler</p>","<p>Amazon Comprehend</p>"]},"correct_response":["b"],"section":"Applications of Foundation Models","question_plain":"A company wants a unified search solution that can connect the company's multiple data repositories, third-party document repositories, and FAQs to create a new search experience so that the employees can efficiently find the right answers for their queries.\n\nWhich Machine Learning powered AWS service offers these search features?","related_lectures":[]},{"_class":"assessment","id":93243979,"assessment_type":"multiple-choice","prompt":{"question":"<p>A retail company is looking to optimize its supply chain planning and reduce stockouts. The team is exploring various AWS services to support this effort and is particularly interested in using machine learning for accurate resource planning. The team needs to ensure that the service is well-suited to address their specific use cases.</p>\n\n<p>Which of the following is the best-fit for the Amazon Forecast service?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Predict product demand to accurately vary inventory and pricing at different store locations</strong></p>\n\n<p>Amazon Forecast is a fully managed service that uses statistical and machine learning algorithms to deliver highly accurate time-series forecasts. Based on the same technology used for time-series forecasting at Amazon.com, Forecast provides state-of-the-art algorithms to predict future time-series data based on historical data and requires no machine learning experience.</p>\n\n<p>Here are some common use cases for Amazon Forecast:</p>\n\n<ol>\n<li><p>Retail demand planning – Predict product demand, allowing you to accurately vary inventory and pricing at different store locations.</p></li>\n<li><p>Supply chain planning – Predict the quantity of raw goods, services, or other inputs required by manufacturing.</p></li>\n<li><p>Resource planning – Predict requirements for staffing, advertising, energy consumption, and server capacity.</p></li>\n<li><p>Operational planning – Predict levels of web traffic, AWS usage, and IoT sensor usage.</p></li>\n</ol>\n\n<p>Incorrect options:</p>\n\n<p><strong>Detect and categorize toxic audio and foster a safe and inclusive online environment</strong> - You can use Amazon Transcribe to detect and categorize toxic audio and foster a safe and inclusive online environment.</p>\n\n<p><strong>Recommendations tailored to a user’s profile, behavior, preferences, and history</strong> - You can use Amazon Personalize for recommendations that are tailored to a user’s profile, behavior, preferences, and history.</p>\n\n<p><strong>Design conversational solutions that respond to frequently asked questions for technical support, and HR benefits</strong> - Amazon Lex is the right fit for this option. Amazon Lex is a fully managed artificial intelligence (AI) service with advanced natural language models to design, build, test, and deploy conversational interfaces in applications.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://aws.amazon.com/forecast/\">https://aws.amazon.com/forecast/</a></p>\n","answers":["<p>Detect and categorize toxic audio and foster a safe and inclusive online environment</p>","<p>Recommendations tailored to a user’s profile, behavior, preferences, and history</p>","<p>Predict product demand to accurately vary inventory and pricing at different store locations</p>","<p>Design conversational solutions that respond to frequently asked questions for technical support, and HR benefits</p>"]},"correct_response":["c"],"section":"Fundamentals of AI and ML","question_plain":"A retail company is looking to optimize its supply chain planning and reduce stockouts. The team is exploring various AWS services to support this effort and is particularly interested in using machine learning for accurate resource planning. The team needs to ensure that the service is well-suited to address their specific use cases.\n\nWhich of the following is the best-fit for the Amazon Forecast service?","related_lectures":[]},{"_class":"assessment","id":93243981,"assessment_type":"multiple-choice","prompt":{"question":"<p>An e-commerce company uses a chatbot powered by Amazon Bedrock to handle customer inquiries and assist with orders. To enhance customer satisfaction, the company wants the chatbot to continuously learn and improve from real-time customer interactions, adapting its responses to become more accurate and effective over time.</p>\n\n<p>Which approach would be the most suitable for enabling ongoing self-improvement of the chatbot based on its conversations with customers?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>The company should leverage reinforcement learning (RL), where rewards are generated from positive customer feedback to train the chatbot in optimizing its responses</strong></p>\n\n<p>Reinforcement learning is the most suitable approach for self-improvement in this context. By leveraging RL, the chatbot can learn from customer interactions in real-time. Positive customer feedback serves as a reward signal that guides the chatbot to improve its responses over time. The chatbot adapts its behavior based on rewards or penalties, refining its conversational skills through continuous feedback loops. This dynamic learning process is effective for environments where responses need to be optimized based on direct user interaction and satisfaction.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt1-q40-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/what-is/reinforcement-learning/\">https://aws.amazon.com/what-is/reinforcement-learning/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>The company should leverage supervised learning, using the latest datasets containing both positive and negative customer interactions to improve the chatbot's response quality</strong> - While supervised learning can be effective for training chatbots with labeled data (such as examples of positive and negative customer interactions), it is not ideal for ongoing self-improvement. Supervised learning requires extensive datasets and retraining the model whenever new data is available, making it less adaptive in real-time environments. Additionally, this approach does not directly learn from the immediate feedback provided by customers, which is crucial for dynamic improvement.</p>\n\n<p><strong>The company should leverage incremental training, a method that allows the chatbot to adapt over time by learning from new data without forgetting previously learned information</strong> - Incremental training allows a model to update itself with new data while retaining knowledge from old data. However, it may not be sufficient for optimizing chatbot performance in real-time, especially without incorporating direct feedback signals like those in reinforcement learning. Incremental learning is less dynamic than reinforcement learning and may struggle to keep up with fast-changing customer preferences or conversation styles.</p>\n\n<p><strong>The company should leverage transfer learning, which involves applying knowledge gained from one domain to enhance performance in another related domain</strong> - Transfer learning is used when a model trained in one domain or task can benefit from applying its knowledge to a different but related domain. While transfer learning can improve chatbot performance by leveraging pre-trained models, it does not provide the framework for continuous, self-improvement based on ongoing customer interactions. Therefore, it is not the most effective approach for a chatbot seeking to improve through real-time conversations.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/what-is/reinforcement-learning/\">https://aws.amazon.com/what-is/reinforcement-learning/</a></p>\n\n<p><a href=\"https://aws.amazon.com/what-is/machine-learning/\">https://aws.amazon.com/what-is/machine-learning/</a></p>\n\n<p><a href=\"https://aws.amazon.com/blogs/machine-learning/incremental-training-with-amazon-sagemaker-jumpstart/\">https://aws.amazon.com/blogs/machine-learning/incremental-training-with-amazon-sagemaker-jumpstart/</a></p>\n","answers":["<p>The company should leverage supervised learning, using the latest datasets containing both positive and negative customer interactions to improve the chatbot's response quality</p>","<p>The company should leverage reinforcement learning (RL), where rewards are generated from positive customer feedback to train the chatbot in optimizing its responses</p>","<p>The company should leverage incremental training, a method that allows the chatbot to adapt over time by learning from new data without forgetting previously learned information</p>","<p>The company should leverage transfer learning, which involves applying knowledge gained from one domain to enhance performance in another related domain</p>"]},"correct_response":["b"],"section":"Fundamentals of AI and ML","question_plain":"An e-commerce company uses a chatbot powered by Amazon Bedrock to handle customer inquiries and assist with orders. To enhance customer satisfaction, the company wants the chatbot to continuously learn and improve from real-time customer interactions, adapting its responses to become more accurate and effective over time.\n\nWhich approach would be the most suitable for enabling ongoing self-improvement of the chatbot based on its conversations with customers?","related_lectures":[]},{"_class":"assessment","id":93243983,"assessment_type":"multiple-choice","prompt":{"question":"<p>A technology company is utilizing multiple machine learning models across different departments, such as marketing, customer support, and product development, to address various business needs. To enhance overall performance, the company wants these models to learn from each other by sharing the latest data insights and patterns discovered by each model. The goal is to optimize the models' accuracy and efficiency by effectively using the most up-to-date information available from all sources.</p>\n\n<p>Given this objective, which approach would be the most suitable for achieving cross-model optimization?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>The company should use transfer learning, a method where a model pre-trained on one task is adapted to improve performance on a different but related task by leveraging knowledge from the original task</strong></p>\n\n<p>Transfer learning is the most suitable approach in this scenario. It allows a model to utilize the knowledge learned from one task or dataset to improve its performance on a new, but related task. For a company using multiple models for different use cases, transfer learning can help optimize performance by adapting insights from the latest data generated by other models. This approach reduces the need for extensive data and computational resources while ensuring that the models benefit from shared knowledge across related domains or tasks.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt1-q41-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/what-is/transfer-learning/\">https://aws.amazon.com/what-is/transfer-learning/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>The company should use incremental training, an approach that allows models to be updated incrementally with new data without needing a complete retraining from scratch</strong> - While incremental training is useful for updating a model with new data continuously, it focuses on enhancing a single model's performance with its own data rather than learning from the data of other models. This approach is not designed for optimizing multiple models by leveraging knowledge across different use cases, making it less suitable for the company’s objective.</p>\n\n<p><strong>The company should use self-supervised learning, a technique where the model learns patterns and representations from unlabeled data without relying on explicit supervision or labeled datasets</strong> - Self-supervised learning is effective for tasks where labeled data is scarce or unavailable, as it allows models to learn useful representations from large amounts of unlabeled data. However, it does not directly address the need to optimize multiple models using the latest data from other models. This approach is more suitable for foundational training rather than model optimization across different use cases.</p>\n\n<p><strong>The company should use reinforcement learning, a strategy where an agent learns to make decisions by interacting with an environment and receiving rewards or penalties based on its actions</strong> - Reinforcement learning is designed for scenarios where a model needs to learn a sequence of actions to achieve a specific goal by maximizing cumulative rewards. It is primarily used in decision-making problems, such as game playing or robotic control. It is not well-suited for optimizing multiple models by learning from the latest data of other models, as it does not involve leveraging cross-model data or knowledge sharing.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/what-is/transfer-learning/\">https://aws.amazon.com/what-is/transfer-learning/</a></p>\n\n<p><a href=\"https://aws.amazon.com/what-is/machine-learning/\">https://aws.amazon.com/what-is/machine-learning/</a></p>\n","answers":["<p>The company should use incremental training, an approach that allows models to be updated incrementally with new data without needing a complete retraining from scratch</p>","<p>The company should use self-supervised learning, a technique where the model learns patterns and representations from unlabeled data without relying on explicit supervision or labeled datasets</p>","<p>The company should use transfer learning, a method where a model pre-trained on one task is adapted to improve performance on a different but related task by leveraging knowledge from the original task</p>","<p>The company should use reinforcement learning, a strategy where an agent learns to make decisions by interacting with an environment and receiving rewards or penalties based on its actions</p>"]},"correct_response":["c"],"section":"Fundamentals of AI and ML","question_plain":"A technology company is utilizing multiple machine learning models across different departments, such as marketing, customer support, and product development, to address various business needs. To enhance overall performance, the company wants these models to learn from each other by sharing the latest data insights and patterns discovered by each model. The goal is to optimize the models' accuracy and efficiency by effectively using the most up-to-date information available from all sources.\n\nGiven this objective, which approach would be the most suitable for achieving cross-model optimization?","related_lectures":[]},{"_class":"assessment","id":93243985,"assessment_type":"multi-select","prompt":{"question":"<p>A logistics company is exploring Amazon Machine Learning (ML) services to enhance its predictive analytics, such as optimizing delivery routes and forecasting demand. The data science team needs to understand the key features and capabilities of various Amazon ML services to determine which ones align with their business goals. To ensure they make the right decisions, the team is reviewing different options and statements about these services.</p>\n\n<p>Which of the following represent the CORRECT statements regarding the Amazon ML services? (Select two)</p>\n","relatedLectureIds":"","feedbacks":["","","","",""],"explanation":"<p>Correct options:</p>\n\n<p><strong>Amazon Polly is used to deploy high-quality, natural-sounding human voices in dozens of languages</strong></p>\n\n<p>Amazon Polly is a cloud service that converts text into lifelike speech. You can use Amazon Polly to develop applications that increase engagement and accessibility. Amazon Polly supports multiple languages and includes a variety of lifelike voices.</p>\n\n<p><strong>Amazon Comprehend service uses machine learning to find insights and relationships in the text</strong></p>\n\n<p>Amazon Comprehend is a natural language processing (NLP) service that uses machine learning to find insights and relationships in text, no machine learning experience is required. Amazon Comprehend uses machine learning to help you uncover the insights and relationships in your unstructured data.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Amazon Comprehend uses machine learning models to convert speech to text</strong> - This statement is incorrect. Amazon Transcribe uses machine learning models to convert speech to text.</p>\n\n<p><strong>Amazon Transcribe is an AWS service for building conversational interfaces for applications using voice and text</strong> - This statement is incorrect. Amazon Transcribe uses machine learning models to convert speech to text. Amazon Lex is the AWS service used to build conversational interfaces for applications using voice and text.</p>\n\n<p><strong>Amazon Rekognition can extract key phrases and automatically organizes a collection of text files by topic</strong> - This statement is incorrect. Amazon Rekognition is a cloud-based image and video analysis service that makes it easy to add advanced computer vision capabilities to your applications.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://aws.amazon.com/ai/services/\">https://aws.amazon.com/ai/services/</a></p>\n","answers":["<p>Amazon Comprehend uses machine learning models to convert speech to text</p>","<p>Amazon Polly is used to deploy high-quality, natural-sounding human voices in dozens of languages</p>","<p>Amazon Transcribe is an AWS service for building conversational interfaces for applications using voice and text</p>","<p>Amazon Rekognition can extract key phrases and automatically organizes a collection of text files by topic</p>","<p>Amazon Comprehend service uses machine learning to find insights and relationships in the text</p>"]},"correct_response":["b","e"],"section":"Applications of Foundation Models","question_plain":"A logistics company is exploring Amazon Machine Learning (ML) services to enhance its predictive analytics, such as optimizing delivery routes and forecasting demand. The data science team needs to understand the key features and capabilities of various Amazon ML services to determine which ones align with their business goals. To ensure they make the right decisions, the team is reviewing different options and statements about these services.\n\nWhich of the following represent the CORRECT statements regarding the Amazon ML services? (Select two)","related_lectures":[]},{"_class":"assessment","id":93243987,"assessment_type":"multiple-choice","prompt":{"question":"<p>A company has developed an app that translates text from English to various other languages. To enhance the quality and accuracy of these translations, the company seeks to evaluate and improve its translation model's performance.</p>\n\n<p>Which metric would be most appropriate for assessing the accuracy of the translations?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>The company should use BLEU (Bilingual Evaluation Understudy) score, a metric specifically designed to evaluate the quality of text that has been machine-translated by comparing it with one or more reference translations</strong></p>\n\n<p>BLEU score is the most appropriate metric for this use case. It is one of the most widely used metrics for evaluating machine translation quality. BLEU compares machine-generated translations with one or more human reference translations by analyzing n-gram overlaps. It provides a quantitative measure of translation accuracy, where a higher BLEU score indicates closer alignment with the reference translation. This makes BLEU particularly suited for assessing the performance of translation models. A BLEU score is typically a number between 0–1; it calculates the similarity of the machine translation to the reference human translation. The higher score represents better quality in natural language understanding (NLU).</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt1-q43-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/blogs/machine-learning/build-a-multilingual-automatic-translation-pipeline-with-amazon-translate-active-custom-translation/\">https://aws.amazon.com/blogs/machine-learning/build-a-multilingual-automatic-translation-pipeline-with-amazon-translate-active-custom-translation/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>The company should use ROUGE (Recall-Oriented Understudy for Gisting Evaluation), a metric primarily used for evaluating the quality of text summarization and comparing the overlap between predicted and reference summaries</strong> - ROUGE is a metric used mainly for evaluating the quality of automatic text summarization by measuring the overlap of n-grams, word sequences, and word pairs between machine-generated and reference summaries. Although it measures some aspects of textual similarity, it is not specifically tailored for translation tasks and does not effectively capture the nuances needed to evaluate translation accuracy.</p>\n\n<p><strong>The company should use Accuracy, a general metric that measures the proportion of correctly predicted outputs</strong> - Accuracy is a broad metric typically used to evaluate classification tasks where the model's output is compared against the correct label. For translation, which involves producing contextually and semantically accurate text rather than simply classifying outputs, accuracy is too simplistic and does not account for the complexities of language, such as syntax and grammar, making it an unsuitable metric for this purpose.</p>\n\n<p><strong>The company should use BERT score, a metric that leverages contextual embeddings from BERT to evaluate the semantic similarity between machine-generated translations and reference translations</strong> - While BERT score is a more advanced metric that uses contextual embeddings to assess the semantic similarity between translated and reference texts, it is less established than BLEU score for evaluating translation tasks. BERT score may provide deeper insights into semantic similarities, but BLEU score remains the standard and most commonly used metric for translation evaluation due to its simplicity and effectiveness in capturing n-gram overlaps, making it the preferred choice.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/blogs/machine-learning/build-a-multilingual-automatic-translation-pipeline-with-amazon-translate-active-custom-translation/\">https://aws.amazon.com/blogs/machine-learning/build-a-multilingual-automatic-translation-pipeline-with-amazon-translate-active-custom-translation/</a></p>\n\n<p><a href=\"https://aws.amazon.com/blogs/machine-learning/evaluate-large-language-models-for-quality-and-responsibility/\">https://aws.amazon.com/blogs/machine-learning/evaluate-large-language-models-for-quality-and-responsibility/</a></p>\n","answers":["<p>The company should use ROUGE (Recall-Oriented Understudy for Gisting Evaluation), a metric primarily used for evaluating the quality of text summarization and comparing the overlap between predicted and reference summaries</p>","<p>The company should use Accuracy, a general metric that measures the proportion of correctly predicted outputs</p>","<p>The company should use BERT score, a metric that leverages contextual embeddings from BERT to evaluate the semantic similarity between machine-generated translations and reference translations</p>","<p>The company should use BLEU (Bilingual Evaluation Understudy) score, a metric specifically designed to evaluate the quality of text that has been machine-translated by comparing it with one or more reference translations</p>"]},"correct_response":["d"],"section":"Security, Compliance, and Governance for AI Solutions","question_plain":"A company has developed an app that translates text from English to various other languages. To enhance the quality and accuracy of these translations, the company seeks to evaluate and improve its translation model's performance.\n\nWhich metric would be most appropriate for assessing the accuracy of the translations?","related_lectures":[]},{"_class":"assessment","id":93243989,"assessment_type":"multiple-choice","prompt":{"question":"<p>A retail company needs to perform sentiment analysis for its customer service audio calls.</p>\n\n<p>Which AWS services would you recommend for this requirement?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Amazon Transcribe and Amazon Comprehend</strong></p>\n\n<p>Amazon Transcribe converts audio input into text, which opens the door for various text analytics applications on voice input</p>\n\n<p>Amazon Comprehend is a natural language processing (NLP) service that uses machine learning to find insights and relationships in text, no machine learning experience is required. Amazon Comprehend uses machine learning to help you uncover the insights and relationships in your unstructured data.</p>\n\n<p>By using Amazon Comprehend on the converted text data from Amazon Transcribe, you can perform sentiment analysis or extract entities and key phrases.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Amazon Rekognition and Amazon Transcribe</strong> - Amazon Rekognition is a cloud-based image and video analysis service that makes it easy to add advanced computer vision capabilities to your applications. Amazon Rekognition is not useful for analysis of audio files.</p>\n\n<p><strong>Amazon Transcribe and Amazon Translate</strong> - Amazon Translate is used to translate unstructured text documents or to build applications that work in multiple languages and Amazon Transcribe converts audio input into text. Sentiment analysis is not possible using these services.</p>\n\n<p><strong>Amazon Translate and Amazon Comprehend</strong> - Amazon Translate is used to translate unstructured text documents or to build applications that work in multiple languages. Translate cannot convert audio input into text to be processed by Amazon Comprehend service. Hence, sentiment analysis is not possible using these services.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/transcribe/faqs/\">https://aws.amazon.com/transcribe/faqs/</a></p>\n\n<p><a href=\"https://docs.aws.amazon.com/managedservices/latest/userguide/comprehend.html\">https://docs.aws.amazon.com/managedservices/latest/userguide/comprehend.html</a></p>\n","answers":["<p>Amazon Rekognition and Amazon Transcribe</p>","<p>Amazon Transcribe and Amazon Translate</p>","<p>Amazon Transcribe and Amazon Comprehend</p>","<p>Amazon Translate and Amazon Comprehend</p>"]},"correct_response":["c"],"section":"Applications of Foundation Models","question_plain":"A retail company needs to perform sentiment analysis for its customer service audio calls.\n\nWhich AWS services would you recommend for this requirement?","related_lectures":[]},{"_class":"assessment","id":93243991,"assessment_type":"multiple-choice","prompt":{"question":"<p>A retail company is looking to implement AI-driven solutions to enhance its in-store operations, such as automating inventory management and improving security through visual monitoring. The company wants to leverage pre-trained computer vision (CV) models for fast deployment but also needs the flexibility to customize these models to fit specific business needs. To make an informed decision, the team is evaluating AWS services that offer both pre-trained and customizable computer vision capabilities.</p>\n\n<p>What do you suggest?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Amazon Rekognition</strong></p>\n\n<p>Amazon Rekognition is a cloud-based image and video analysis service that makes it easy to add advanced computer vision capabilities to your applications. The service is powered by proven deep learning technology and it requires no machine learning expertise to use. Amazon Rekognition includes a simple, easy-to-use API that can quickly analyze any image or video file that’s stored in Amazon S3.</p>\n\n<p>You can add features that detect objects, text, and unsafe content, analyze images/videos, and compare faces to your application using Rekognition's APIs. With Amazon Rekognition's face recognition APIs, you can detect, analyze, and compare faces for a wide variety of use cases, including user verification, cataloging, people counting, and public safety.</p>\n\n<p>Amazon Rekognition offers pre-trained and customizable computer vision (CV) capabilities to extract information and insights from your images and videos.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Amazon SageMaker</strong> - Amazon SageMaker is a fully managed machine learning (ML) service. With SageMaker, data scientists and developers can quickly and confidently build, train, and deploy ML models into a production-ready hosted environment. It provides a UI experience for running ML workflows that makes SageMaker ML tools available across multiple integrated development environments (IDEs).</p>\n\n<p><strong>Amazon DeepRacer</strong> - AWS DeepRacer is an autonomous 1/18th scale race car designed to test RL models by racing on a physical track. Using cameras to view the track and a reinforcement model to control throttle and steering, the car shows how a model trained in a simulated environment can be transferred to the real world.</p>\n\n<p><strong>Amazon Textract</strong> - Amazon Textract is a machine learning (ML) service that automatically extracts text, handwriting, layout elements, and data from scanned documents. It goes beyond simple optical character recognition (OCR) to identify, understand, and extract specific data from documents.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://docs.aws.amazon.com/rekognition/latest/dg/what-is.html\">https://docs.aws.amazon.com/rekognition/latest/dg/what-is.html</a></p>\n\n<p><a href=\"https://aws.amazon.com/textract/\">https://aws.amazon.com/textract/</a></p>\n\n<p><a href=\"https://aws.amazon.com/deepracer/\">https://aws.amazon.com/deepracer/</a></p>\n","answers":["<p>Amazon SageMaker</p>","<p>Amazon DeepRacer</p>","<p>Amazon Rekognition</p>","<p>Amazon Textract</p>"]},"correct_response":["c"],"section":"Applications of Foundation Models","question_plain":"A retail company is looking to implement AI-driven solutions to enhance its in-store operations, such as automating inventory management and improving security through visual monitoring. The company wants to leverage pre-trained computer vision (CV) models for fast deployment but also needs the flexibility to customize these models to fit specific business needs. To make an informed decision, the team is evaluating AWS services that offer both pre-trained and customizable computer vision capabilities.\n\nWhat do you suggest?","related_lectures":[]},{"_class":"assessment","id":93243993,"assessment_type":"multi-select","prompt":{"question":"<p>A retail company is exploring machine learning to enhance its customer segmentation and product recommendation systems. The data science team wants a solution that allows them to quickly get started with pre-built models and workflows, without needing extensive development from scratch. They are considering using Amazon SageMaker JumpStart to accelerate their machine learning projects, but they need to understand the platform's key features to ensure it meets their needs for rapid deployment and scalability.</p>\n\n<p>Which of the following represent the key features of Amazon SageMaker JumpStart? (Select two)</p>\n","relatedLectureIds":"","feedbacks":["","","","",""],"explanation":"<p>Correct options:</p>\n\n<p><strong>You can evaluate, compare, and select Foundation Models quickly based on pre-defined quality and responsibility metrics</strong></p>\n\n<p><strong>Pre-trained models are fully customizable for your use case with your data</strong></p>\n\n<p>Amazon SageMaker JumpStart is a machine learning (ML) hub that can help you accelerate your ML journey. With SageMaker JumpStart, you can evaluate, compare, and select FMs quickly based on pre-defined quality and responsibility metrics to perform tasks like article summarization and image generation. Pretrained models are fully customizable for your use case with your data, and you can easily deploy them into production with the user interface or SDK. You can also share artifacts, including models and notebooks, within your organization to accelerate model building and deployment, and admins can control which models are visible to users within their organization.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Your inference and training data will be used to train the base model</strong> - Your inference and training data will not be used nor shared to update or train the base model that SageMaker JumpStart surfaces to customers.</p>\n\n<p><strong>SageMaker JumpStart provides only public models. Proprietary models are not supported by JumpStart</strong> - SageMaker JumpStart provides proprietary and public models.</p>\n\n<p><strong>You can build highly accurate ML models using a visual interface without any code</strong> - Amazon SageMaker Canvas provides a no-code interface, in which you can create highly accurate machine learning models —without any machine learning experience or writing a single line of code.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/sagemaker/jumpstart/\">https://aws.amazon.com/sagemaker/jumpstart/</a></p>\n\n<p><a href=\"https://aws.amazon.com/sagemaker/faqs/\">https://aws.amazon.com/sagemaker/faqs/</a></p>\n","answers":["<p>Your inference and training data will be used to train the base model</p>","<p>SageMaker JumpStart provides only public models. Proprietary models are not supported by SageMaker JumpStart</p>","<p>You can evaluate, compare, and select Foundation Models quickly based on pre-defined quality and responsibility metrics</p>","<p>You can build highly accurate ML models using a visual interface without any code</p>","<p>Pre-trained models are fully customizable for your use case with your data</p>"]},"correct_response":["c","e"],"section":"Applications of Foundation Models","question_plain":"A retail company is exploring machine learning to enhance its customer segmentation and product recommendation systems. The data science team wants a solution that allows them to quickly get started with pre-built models and workflows, without needing extensive development from scratch. They are considering using Amazon SageMaker JumpStart to accelerate their machine learning projects, but they need to understand the platform's key features to ensure it meets their needs for rapid deployment and scalability.\n\nWhich of the following represent the key features of Amazon SageMaker JumpStart? (Select two)","related_lectures":[]},{"_class":"assessment","id":93243995,"assessment_type":"multiple-choice","prompt":{"question":"<p>A tech company is developing an AI-powered customer support solution using Retrieval-Augmented Generation (RAG) with Amazon Bedrock to provide more accurate and context-aware responses. To achieve this, the company needs a database that can handle fast index lookups and similarity searches to quickly retrieve the most relevant documents or information from a large dataset. The ideal database solution should efficiently support search queries and rank results based on their relevance to the input provided by the user.</p>\n\n<p>Given these requirements, which database solution would be most appropriate for the company to use?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>The company should use Amazon OpenSearch Service, which is designed to provide fast search capabilities and supports full-text search, indexing, and similarity scoring</strong></p>\n\n<p>Amazon OpenSearch Service is the most suitable choice because it is specifically built to handle search and analytics workloads, including fast index lookups and similarity scoring. OpenSearch supports full-text search, vector search, and advanced data indexing, which are essential for the Retrieval-Augmented Generation (RAG) framework. It enables the chatbot or model to quickly find and rank relevant documents based on their similarity to the query, making it highly effective for applications that require rapid data retrieval and relevance ranking.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt1-q47-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/blogs/big-data/amazon-opensearch-services-vector-database-capabilities-explained/\">https://aws.amazon.com/blogs/big-data/amazon-opensearch-services-vector-database-capabilities-explained/</a></p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt1-q47-i2.jpg\">\nvia - <a href=\"https://aws.amazon.com/blogs/big-data/amazon-opensearch-services-vector-database-capabilities-explained/\">https://aws.amazon.com/blogs/big-data/amazon-opensearch-services-vector-database-capabilities-explained/</a></p>\n\n<p>Knowledge Bases for Amazon Bedrock takes care of the entire ingestion workflow of converting your documents into embeddings (vector) and storing the embeddings in a specialized vector database. Knowledge Bases for Amazon Bedrock supports popular databases for vector storage, including vector engine for Amazon OpenSearch Serverless, Pinecone, Redis Enterprise Cloud, Amazon Aurora (coming soon), and MongoDB (coming soon). If you do not have an existing vector database, Amazon Bedrock creates an OpenSearch Serverless vector store for you.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>The company should use Amazon DocumentDB (with MongoDB compatibility), a managed NoSQL document database service designed for storing semi-structured data to facilitate search capabilities</strong> - Amazon DocumentDB is primarily designed for storing and querying semi-structured JSON data. While it provides scalability and managed support for document-based workloads, it is not optimized for full-text search or similarity searches. DocumentDB lacks the native capabilities for efficient indexing and retrieval needed for RAG, making it a less suitable choice.</p>\n\n<p><strong>The company should use Amazon DynamoDB, a fully managed NoSQL database service that offers low-latency data retrieval to handle fast index lookups as well as search operations</strong> - Amazon DynamoDB is a key-value and document database designed for fast and predictable performance with low latency, suitable for high-throughput transactional workloads. However, it does not natively support advanced search capabilities or similarity scoring needed for RAG applications. Its primary focus is on rapid data retrieval based on primary keys, not on the complex search and retrieval functions required for this scenario.</p>\n\n<p><strong>The company should use Amazon Aurora, a managed relational database service that is optimized for high-performance transactional workloads that can be useful for search operations</strong> - Amazon Aurora is a high-performance relational database service that is excellent for OLTP (Online Transaction Processing) workloads. While it provides advanced indexing features for relational data, it is not optimized for full-text search, fast similarity lookups, or the types of search capabilities required for RAG applications. Aurora’s primary strengths lie in transactional integrity and scalability for relational datasets, not in search and retrieval tasks.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/blogs/big-data/amazon-opensearch-services-vector-database-capabilities-explained/\">https://aws.amazon.com/blogs/big-data/amazon-opensearch-services-vector-database-capabilities-explained/</a></p>\n\n<p><a href=\"https://aws.amazon.com/bedrock/knowledge-bases/\">https://aws.amazon.com/bedrock/knowledge-bases/</a></p>\n","answers":["<p>The company should use Amazon DocumentDB (with MongoDB compatibility), a managed NoSQL document database service designed for storing semi-structured data to facilitate search capabilities</p>","<p>The company should use Amazon DynamoDB, a fully managed NoSQL database service that offers low-latency data retrieval to handle fast index lookups as well as search operations</p>","<p>The company should use Amazon Aurora, a managed relational database service that is optimized for high-performance transactional workloads that can be useful for search operations</p>","<p>The company should use Amazon OpenSearch Service, which is designed to provide fast search capabilities and supports full-text search, indexing, and similarity scoring</p>"]},"correct_response":["d"],"section":"Applications of Foundation Models","question_plain":"A tech company is developing an AI-powered customer support solution using Retrieval-Augmented Generation (RAG) with Amazon Bedrock to provide more accurate and context-aware responses. To achieve this, the company needs a database that can handle fast index lookups and similarity searches to quickly retrieve the most relevant documents or information from a large dataset. The ideal database solution should efficiently support search queries and rank results based on their relevance to the input provided by the user.\n\nGiven these requirements, which database solution would be most appropriate for the company to use?","related_lectures":[]},{"_class":"assessment","id":93243997,"assessment_type":"multiple-choice","prompt":{"question":"<p>A technology company is considering using Amazon Bedrock to integrate generative AI capabilities into its existing products but is currently unsure about how frequently and extensively it will use the service in the future. The team needs a flexible pricing model that allows them to experiment with different use cases without committing to a long-term contract or specific usage level. To make an informed decision, the company is conducting due diligence to find the most cost-effective option that aligns with its uncertain usage patterns.</p>\n\n<p>Given this scenario, which pricing model would be the most appropriate for the company to choose?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>The company should opt for on-demand pricing, which allows it to pay only for the actual usage of resources without any long-term commitments</strong></p>\n\n<p>On-demand pricing is the most appropriate option for a company that is uncertain about the time commitment or extent of its usage. This pricing model allows the company to pay for Amazon Bedrock services based on actual usage without requiring any upfront payment or long-term contract. It provides flexibility and scalability, making it suitable for organizations that need to adapt their usage according to evolving needs or have unpredictable workloads.</p>\n\n<p>Amazon Bedrock pricing:</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt1-q48-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/bedrock/pricing/\">https://aws.amazon.com/bedrock/pricing/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>The company should choose provisioned throughput, a model that reserves a certain amount of capacity in advance for a discounted rate</strong> - Provisioned throughput is less suitable in this scenario because it is designed for situations where the usage is consistent and predictable. This model involves committing to a certain level of capacity, which may lead to unnecessary costs if the actual usage is lower than anticipated. Since the company lacks clarity on its time commitment and usage patterns, provisioned throughput does not offer the flexibility needed.</p>\n\n<p><strong>The company should consider spot instances, which provide significant cost savings but come with the risk of interruptions</strong> - Spot Instances are a pricing model offered by AWS for EC2 compute instances, which allows you to bid for spare EC2 capacity at reduced rates. Spot instances can be interrupted by AWS with little notice. This is not applicable as a pricing model for Amazon Bedrock. This option just acts as a distractor.</p>\n\n<p><strong>The company should select reserved instances, which offer lower rates in exchange for a long-term commitment</strong> - Reserved Instances offer a lower rate for EC2 compute resources in exchange for a one- or three-year commitment. This is not applicable as a pricing model for Amazon Bedrock. This option just acts as a distractor.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/bedrock/pricing/\">https://aws.amazon.com/bedrock/pricing/</a></p>\n\n<p><a href=\"https://aws.amazon.com/ec2/pricing/\">https://aws.amazon.com/ec2/pricing/</a></p>\n","answers":["<p>The company should choose provisioned throughput, a model that reserves a certain amount of capacity in advance for a discounted rate</p>","<p>The company should consider spot instances, which provide significant cost savings but come with the risk of interruptions</p>","<p>The company should opt for on-demand pricing, which allows it to pay only for the actual usage of resources without any long-term commitments</p>","<p>The company should select reserved instances, which offer lower rates in exchange for a long-term commitment</p>"]},"correct_response":["c"],"section":"Security, Compliance, and Governance for AI Solutions","question_plain":"A technology company is considering using Amazon Bedrock to integrate generative AI capabilities into its existing products but is currently unsure about how frequently and extensively it will use the service in the future. The team needs a flexible pricing model that allows them to experiment with different use cases without committing to a long-term contract or specific usage level. To make an informed decision, the company is conducting due diligence to find the most cost-effective option that aligns with its uncertain usage patterns.\n\nGiven this scenario, which pricing model would be the most appropriate for the company to choose?","related_lectures":[]},{"_class":"assessment","id":93243999,"assessment_type":"multiple-choice","prompt":{"question":"<p>A healthcare analytics company aims to enhance its AI capabilities by fine-tuning a foundation model (FM) in Amazon Bedrock to specialize in medical text analysis. To achieve this, the company plans to use its own task-specific labeled dataset, consisting of annotated clinical notes and medical records, to fine-tune the model for greater accuracy in extracting relevant information.</p>\n\n<p>Given these requirements, which approach would be most suitable?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>The company should use Provisioned Throughput mode, which allows the company to reserve a specific amount of capacity in advance</strong></p>\n\n<p>With fine-tuning, you can increase model accuracy by providing your own task-specific labeled training dataset and further specialize your FMs. With continued pre-training, you can train models using your own unlabeled data in a secure and managed environment with customer managed keys. Continued pre-training helps models become more domain-specific by accumulating more robust knowledge and adaptability—beyond their original training.</p>\n\n<p>Once the fine-tuning job is complete, you receive a unique model ID for your custom model. Your fine-tuned model is stored securely by Amazon Bedrock. To test and deploy your model, you need to purchase Provisioned Throughput. This mode is designed for situations where there is a predictable, continuous workload, such as the intensive compute required during the fine-tuning phase.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt1-q49-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/blogs/aws/customize-models-in-amazon-bedrock-with-your-own-data-using-fine-tuning-and-continued-pre-training/\">https://aws.amazon.com/blogs/aws/customize-models-in-amazon-bedrock-with-your-own-data-using-fine-tuning-and-continued-pre-training/</a></p>\n\n<p>Exam Alert:</p>\n\n<p>For testing and deploy customized models for Amazon Bedrock (via fine-tuning or continued pre-training), it is mandatory to use Provisioned Throughput.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>The company should use On-Demand mode, which provides flexibility by charging only for the resources consumed</strong> - While On-Demand mode offers flexibility and scalability by charging based on actual usage, it does not support model customization for Amazon Bedrock via fine-tuning or continued pre-training.</p>\n\n<p><strong>The company should leverage batch inference to facilitate fine-tuning of the model</strong> - With batch inference, you can run multiple inference requests asynchronously to process a large number of requests efficiently by running inference on data that is stored in an S3 bucket. You can use batch inference to improve the performance of model inference on large datasets. You cannot use batch inference to facilitate fine-tuning of the model. This option acts as a distractor.</p>\n\n<p><strong>The company should leverage Amazon Bedrock playground to facilitate fine-tuning of the model</strong> - The Amazon Bedrock playgrounds provide you a console environment to experiment with running inference on different models and with different configurations, before deciding to use them in an application. There are playgrounds for text, chat, and image models. Within each playground you can enter prompts and experiment with inference parameters. Prompts are usually one or more sentences of text that set up a scenario, question, or task for a model. You cannot use Amazon Bedrock playground to facilitate fine-tuning of the model. This option acts as a distractor.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/blogs/aws/customize-models-in-amazon-bedrock-with-your-own-data-using-fine-tuning-and-continued-pre-training/\">https://aws.amazon.com/blogs/aws/customize-models-in-amazon-bedrock-with-your-own-data-using-fine-tuning-and-continued-pre-training/</a></p>\n\n<p><a href=\"https://docs.aws.amazon.com/bedrock/latest/userguide/batch-inference.html\">https://docs.aws.amazon.com/bedrock/latest/userguide/batch-inference.html</a></p>\n","answers":["<p>The company should use Provisioned Throughput mode, which allows the company to reserve a specific amount of capacity in advance</p>","<p>The company should use On-Demand mode, which provides flexibility by charging only for the resources consumed</p>","<p>The company should leverage batch inference to facilitate fine-tuning of the model</p>","<p>The company should leverage Amazon Bedrock playground to facilitate fine-tuning of the model</p>"]},"correct_response":["a"],"section":"Applications of Foundation Models","question_plain":"A healthcare analytics company aims to enhance its AI capabilities by fine-tuning a foundation model (FM) in Amazon Bedrock to specialize in medical text analysis. To achieve this, the company plans to use its own task-specific labeled dataset, consisting of annotated clinical notes and medical records, to fine-tune the model for greater accuracy in extracting relevant information.\n\nGiven these requirements, which approach would be most suitable?","related_lectures":[]},{"_class":"assessment","id":93244001,"assessment_type":"multi-select","prompt":{"question":"<p>A software company is evaluating different AWS services to integrate AI-powered solutions into its applications. The team is particularly interested in Amazon Q for automating business workflows and Amazon Bedrock for leveraging pre-trained foundation models. To make an informed decision on which service to adopt for their specific use cases, they need to understand the core differences between the two, including their capabilities, target use cases, and how each service supports AI-driven tasks.</p>\n\n<p>Which of the following represent the correct options for the given scenario? (Select two)</p>\n","relatedLectureIds":"","feedbacks":["","","","",""],"explanation":"<p>Correct options:</p>\n\n<p><strong>Amazon Q is a generative AI–powered assistant that allows you to create pre-packaged generative AI applications, whereas, Amazon Bedrock provides an environment to build and scale generative AI applications using a Foundation Model (FM)</strong></p>\n\n<p>Amazon Q is a generative AI-powered assistant for accelerating software development and leveraging companies' internal data. Amazon Q generates code, tests, and debugs. It has multistep planning and reasoning capabilities that can transform and implement new code generated from developer requests. Amazon Q also makes it easier for employees to get answers to questions across business data.</p>\n\n<p>Amazon Bedrock provides an environment to build and scale generative AI applications with FMs. It is a fully managed service that offers a choice of high-performing FMs from leading AI companies. It also provides a broad set of capabilities around security, privacy, and responsible AI. It also supports fine-tuning, Retrieval Augmented Generation (RAG), and agents that execute tasks.</p>\n\n<p><strong>With Amazon Bedrock, you can choose the underlying Foundation Model. However, Amazon Q does not allow you to choose the underlying Foundation Model</strong></p>\n\n<p>Amazon Bedrock offers a choice of high-performing Foundation Models (FMs) from leading AI companies like AI21 Labs, Anthropic, Cohere, Meta, Mistral AI, Stability AI, and Amazon through a single API. On the other hand, you cannot choose the underlying Foundation Model with Amazon Q.</p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Both Amazon Q and Amazon Bedrock are generative AI-powered assistants that allow you to create pre-packaged generative AI applications</strong></p>\n\n<p><strong>Amazon Bedrock is a generative AI–powered assistant that allows you to create pre-packaged generative AI applications, whereas, Amazon Q provides an environment to build and scale generative AI applications using a Foundation Model (FM)</strong></p>\n\n<p>These two options contradict the explanation provided above, so these options are incorrect.</p>\n\n<p><strong>With Amazon Q, you can choose the underlying Foundation Model. However, Amazon Bedrock does not allow you to choose the underlying Foundation Model</strong> - You cannot choose the underlying Foundation Model with Amazon Q. Amazomn Bedrock does offer a choice of high-performing Foundation Models (FMs).</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/q/\">https://aws.amazon.com/q/</a></p>\n\n<p><a href=\"https://aws.amazon.com/bedrock/\">https://aws.amazon.com/bedrock/</a></p>\n\n<p><a href=\"https://aws.amazon.com/blogs/awsforsap/improve-your-productivity-with-amazon-q-and-bedrock-for-sap-use-cases/\">https://aws.amazon.com/blogs/awsforsap/improve-your-productivity-with-amazon-q-and-bedrock-for-sap-use-cases/</a></p>\n","answers":["<p>With Amazon Q, you can choose the underlying Foundation Model. However, Amazon Bedrock does not allow you to choose the underlying Foundation Model</p>","<p>Both Amazon Q and Amazon Bedrock are generative AI-powered assistants that allow you to create pre-packaged generative AI applications</p>","<p>Amazon Q is a generative AI–powered assistant that allows you to create pre-packaged generative AI applications, whereas, Amazon Bedrock provides an environment to build and scale generative AI applications using a Foundation Model (FM)</p>","<p>Amazon Bedrock is a generative AI–powered assistant that allows you to create pre-packaged generative AI applications, whereas, Amazon Q provides an environment to build and scale generative AI applications using a Foundation Model (FM)</p>","<p>With Amazon Bedrock, you can choose the underlying Foundation Model. However, Amazon Q does not allow you to choose the underlying Foundation Model</p>"]},"correct_response":["c","e"],"section":"Applications of Foundation Models","question_plain":"A software company is evaluating different AWS services to integrate AI-powered solutions into its applications. The team is particularly interested in Amazon Q for automating business workflows and Amazon Bedrock for leveraging pre-trained foundation models. To make an informed decision on which service to adopt for their specific use cases, they need to understand the core differences between the two, including their capabilities, target use cases, and how each service supports AI-driven tasks.\n\nWhich of the following represent the correct options for the given scenario? (Select two)","related_lectures":[]},{"_class":"assessment","id":93244003,"assessment_type":"multiple-choice","prompt":{"question":"<p>The development team at an e-commerce company is considering using Amazon Personalize to create tailored experiences based on user behavior, such as purchase history and browsing patterns. To make an informed decision, the team needs a clear understanding of how Amazon Personalize works and how it generates these recommendations in real time.</p>\n\n<p>Given this context, which statement best describes the Amazon Personalize service?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Elevate the customer experience with ML-powered personalization</strong></p>\n\n<p>Amazon Personalize is a fully managed machine learning (ML) service that uses your data to generate product and content recommendations for your users. You provide data about your end-users (e.g., age, location, device type), items in your catalog (e.g., genre, price), and interactions between users and items (e.g., clicks, purchases). Personalize uses this data to train custom, private models that generate recommendations that can be surfaced via an API.</p>\n\n<p>The service uses algorithms to analyze customer behavior and recommend products, content, and services that are likely to be of interest to them. This enhanced customer experience approach can increase customer engagement, loyalty, and sales, which can lead to increases in revenue and profitability.</p>\n\n<p>Here are some reasons why businesses choose Amazon Personalize for personalization:</p>\n\n<ol>\n<li><p>Improve user engagement and conversion rates: Users are more likely to interact with products and services that are tailored to their preferences, thus businesses can boost user engagement and conversion rates by offering personalized recommendations.</p></li>\n<li><p>Increase customer satisfaction: Businesses can offer a better customer experience by using personalization to surface products and services that are more relevant to their needs and interests.</p></li>\n</ol>\n\n<p>Incorrect options:</p>\n\n<p><strong>Automatically convert speech to text and gain insights</strong> - Amazon Transcribe is an automatic speech recognition service that uses machine learning models to convert audio to text. You can use Amazon Transcribe as a standalone transcription service or add speech-to-text capabilities to any application.</p>\n\n<p><strong>Derive and understand valuable insights from text within documents</strong> - Amazon Comprehend is a natural language processing (NLP) service that uses machine learning to find meaning and insights in text. By utilizing NLP, you can extract important phrases, sentiments, syntax, key entities such as brand, date, location, person, etc., and the language of the text. You can use Amazon Comprehend to identify the language of the text, extract key phrases, places, people, brands, or events, understand sentiment about products or services, and identify the main topics from a library of documents.</p>\n\n<p><strong>Deploy high-quality, natural-sounding human voices in dozens of languages</strong> - Amazon Polly uses deep learning technologies to synthesize natural-sounding human speech, so you can convert articles to speech. With dozens of lifelike voices across a broad set of languages, use Amazon Polly to build speech-activated applications.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://aws.amazon.com/personalize/faqs/\">https://aws.amazon.com/personalize/faqs/</a></p>\n","answers":["<p>Automatically convert speech to text and gain insights</p>","<p>Elevate the customer experience with ML-powered personalization</p>","<p>Derive and understand valuable insights from text within documents</p>","<p>Deploy high-quality, natural-sounding human voices in dozens of languages</p>"]},"correct_response":["b"],"section":"Applications of Foundation Models","question_plain":"The development team at an e-commerce company is considering using Amazon Personalize to create tailored experiences based on user behavior, such as purchase history and browsing patterns. To make an informed decision, the team needs a clear understanding of how Amazon Personalize works and how it generates these recommendations in real time.\n\nGiven this context, which statement best describes the Amazon Personalize service?","related_lectures":[]},{"_class":"assessment","id":93244005,"assessment_type":"multiple-choice","prompt":{"question":"<p>A content marketing company is using a generative AI model to automatically draft articles, social media posts, and product descriptions. As the team feeds various text inputs into the model, they notice that the AI can only consider a certain amount of text at once before generating its response. They want to understand the concept that determines this limit, as it affects the length and complexity of the inputs the model can effectively handle.</p>\n\n<p>What is this concept called that defines the maximum amount of text or characters the AI model can process at one time?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>This concept is referred to as a context window, which determines the amount of text or information the model can consider at once while generating a response, typically measured in tokens rather than characters</strong></p>\n\n<p>The context window is the correct answer because it defines how much text (measured in tokens) the AI model can process at one time to generate a coherent output. It determines the limit of input data that the model can use to understand context, maintain conversation history, or generate relevant responses. The context window is measured in tokens (units of text), not characters, making it the key concept for understanding data processing limits in AI models.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt1-q52-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/blogs/security/context-window-overflow-breaking-the-barrier/\">https://aws.amazon.com/blogs/security/context-window-overflow-breaking-the-barrier/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>This concept is referred to as character count, which directly counts the number of individual characters in a text</strong> - Character count measures the number of characters in a piece of text, but AI models typically do not limit their input based on characters alone. Instead, they rely on tokens, which can represent words, subwords, or punctuation marks. The concept that defines how much text can be processed at one time is the context window, which is measured in tokens, not character count.</p>\n\n<p><strong>This concept is called tokens, which are units of text (like words or subwords) that the model processes</strong> - While tokens are the individual units of text that the model processes, the concept that describes the total amount of text the model can handle at one time is the context window, not tokens themselves. Tokens are components within the context window, and the model's capacity is defined by how many tokens can fit within this window, rather than just the tokens themselves.</p>\n\n<p><strong>This concept is known as embeddings, which are numerical representations of text data used by AI models to understand and process the meaning of words in context</strong> - Embeddings are vector representations that encode the semantic meaning of words or phrases, enabling the AI model to understand relationships and context in text data. However, embeddings do not define the amount of text or the number of characters considered at one time; they are a representation technique used within the model once the text is processed.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://aws.amazon.com/blogs/security/context-window-overflow-breaking-the-barrier/\">https://aws.amazon.com/blogs/security/context-window-overflow-breaking-the-barrier/</a></p>\n","answers":["<p>This concept is referred to as character count, which directly counts the number of individual characters in a text</p>","<p>This concept is called tokens, which are units of text (like words or subwords) that the model processes</p>","<p>This concept is known as embeddings, which are numerical representations of text data used by AI models to understand and process the meaning of words in context</p>","<p>This concept is referred to as a context window, which determines the amount of text or information the model can consider at once while generating a response, typically measured in tokens rather than characters</p>"]},"correct_response":["d"],"section":"Fundamentals of AI and ML","question_plain":"A content marketing company is using a generative AI model to automatically draft articles, social media posts, and product descriptions. As the team feeds various text inputs into the model, they notice that the AI can only consider a certain amount of text at once before generating its response. They want to understand the concept that determines this limit, as it affects the length and complexity of the inputs the model can effectively handle.\n\nWhat is this concept called that defines the maximum amount of text or characters the AI model can process at one time?","related_lectures":[]},{"_class":"assessment","id":93244007,"assessment_type":"multiple-choice","prompt":{"question":"<p>In generative AI, there is a specific concept used to represent words, sub-words, or characters that the model processes as discrete units of text. What is this concept called?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Tokens</strong></p>\n\n<p>Tokens are the correct answer because they represent the fundamental units of text that the AI model processes. Tokens can be whole words, parts of words (sub-words), or even single characters, depending on the model’s tokenization strategy. In generative AI, the model breaks down text into these tokens to better understand the structure, meaning, and context, enabling it to generate coherent language outputs.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt1-q53-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/blogs/security/context-window-overflow-breaking-the-barrier/\">https://aws.amazon.com/blogs/security/context-window-overflow-breaking-the-barrier/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Embeddings</strong> - Embeddings are not the correct answer because they are a way of representing tokens (words, sub-words, or phrases) as numerical vectors to capture their semantic relationships in a high-dimensional space. Embeddings help the model understand the meaning and context of tokens, but they are not the units of text themselves.</p>\n\n<p><strong>Vectors</strong> - Vectors are mathematical constructs used to represent the relationships between different words or tokens in a model. While vectors are crucial for understanding how words are related to each other in the embedding space, they do not directly represent the units of text (tokens) processed by the model.</p>\n\n<p><strong>Context window</strong> - The context window is the total amount of text (measured in tokens) that a model can process at once. It does not refer to the individual units of text, like words or sub-words, but rather to the overall capacity for text input. Therefore, it is not the correct answer for identifying the basic units of text that the model handles.</p>\n\n<p>References:</p>\n\n<p><a href=\"https://aws.amazon.com/blogs/security/context-window-overflow-breaking-the-barrier/\">https://aws.amazon.com/blogs/security/context-window-overflow-breaking-the-barrier/</a></p>\n\n<p><a href=\"https://aws.amazon.com/what-is/embeddings-in-machine-learning/\">https://aws.amazon.com/what-is/embeddings-in-machine-learning/</a></p>\n","answers":["<p>Embeddings</p>","<p>Vectors</p>","<p>Tokens</p>","<p>Context window</p>"]},"correct_response":["c"],"section":"Fundamentals of AI and ML","question_plain":"In generative AI, there is a specific concept used to represent words, sub-words, or characters that the model processes as discrete units of text. What is this concept called?","related_lectures":[]},{"_class":"assessment","id":93243959,"assessment_type":"multiple-choice","prompt":{"question":"<p>Which of the following embedding models would be most suitable for differentiating the contextual meanings of words when applied to different phrases?</p>\n","relatedLectureIds":"","feedbacks":["","","",""],"explanation":"<p>Correct option:</p>\n\n<p><strong>Bidirectional Encoder Representations from Transformers (BERT)</strong></p>\n\n<p>Embedding models are algorithms trained to encapsulate information into dense representations in a multi-dimensional space. Data scientists use embedding models to enable ML models to comprehend and reason with high-dimensional data.</p>\n\n<p>BERT is the correct answer because it is specifically designed to capture the contextual meaning of words by looking at both the words that come before and after them (bidirectional context). Unlike older models that use static embeddings, BERT creates dynamic word embeddings that change depending on the surrounding text, allowing it to understand the different meanings of the same word in various contexts. This makes BERT ideal for tasks that require understanding the nuances and subtleties of language.</p>\n\n<p><img src=\"https://assets-pt.media.datacumulus.com/aws-aif-pt/assets/pt1-q54-i1.jpg\">\nvia - <a href=\"https://aws.amazon.com/what-is/embeddings-in-machine-learning/\">https://aws.amazon.com/what-is/embeddings-in-machine-learning/</a></p>\n\n<p>Incorrect options:</p>\n\n<p><strong>Principal Component Analysis (PCA)</strong> - PCA is a statistical method used for reducing the dimensions of large datasets to simplify them while retaining most of the variance in the data. While it can be applied to various fields, including image compression and data visualization, PCA does not understand or differentiate the contextual meanings of words in natural language processing. Thus, it is not a suitable choice for understanding word meanings in different phrases.</p>\n\n<p><strong>Word2Vec</strong> - Word2Vec is an early embedding model that creates vector representations of words based on their co-occurrence in a given text. However, it uses static embeddings, meaning each word has a single vector representation regardless of the context. This limitation makes Word2Vec less effective at differentiating words with multiple meanings across different phrases since it cannot adjust the embedding based on context, unlike BERT.</p>\n\n<p><strong>Singular Value Decomposition (SVD)</strong> - SVD is a matrix decomposition method used in various applications like data compression and noise reduction. Although it can be part of older methods for text analysis, such as Latent Semantic Analysis (LSA), it is not designed to handle the dynamic, context-dependent meanings of words in sentences. Therefore, it is not suitable for differentiating contextual meanings of words across various phrases.</p>\n\n<p>Reference:</p>\n\n<p><a href=\"https://aws.amazon.com/what-is/embeddings-in-machine-learning/\">https://aws.amazon.com/what-is/embeddings-in-machine-learning/</a></p>\n","answers":["<p>Principal Component Analysis (PCA)</p>","<p>Bidirectional Encoder Representations from Transformers (BERT)</p>",
